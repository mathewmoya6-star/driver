<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA | Vehicle Value Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; line-height: 1.5; }
        :root { --gold: #d4af37; --bg-card: #111111; --border: #222222; --muted: #888888; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 48px; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 24px; font-weight: 800; }
        .logo .mei { color: var(--gold); }
        .logo .drive { color: #fff; }
        .logo .africa { color: #f5e6a3; }
        .nav-links { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-links a:hover { color: var(--gold); }
        .btn-outline { border: 1px solid rgba(255,255,255,0.25); padding: 8px 20px; border-radius: 40px; }
        .btn-gold { background: var(--gold); color: #000 !important; padding: 8px 24px; border-radius: 40px; font-weight: 700; }
        .hero { text-align: center; padding: 60px 0; background: linear-gradient(135deg, #121212 0%, #0a0a0a 100%); }
        .hero h1 { font-size: 48px; color: var(--gold); margin-bottom: 16px; }
        .valuation-form { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; color: #fff; }
        button { background: var(--gold); color: #000; padding: 14px; border: none; border-radius: 40px; font-weight: 700; width: 100%; cursor: pointer; }
        .footer { background: #050505; padding: 40px; text-align: center; font-size: 13px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }
        .gold-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); width: 100%; }
        @media (max-width: 768px) { .navbar { flex-direction: column; } .hero h1 { font-size: 32px; } }
    </style>
</head>
<body>
<div class="gold-divider"></div>
<div class="navbar">
    <div class="logo"><span class="mei">MEI</span> <span class="drive">DRIVE</span> <span class="africa">AFRICA</span></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="learner-hub.html">Learner Hub</a>
        <a href="driver-academy.html">Driver Academy</a>
        <a href="school-safety.html">School Safety</a>
        <a href="valuation.html">Valuation</a>
        <a href="safety-library.html">Safety Library</a>
        <a href="psv-course.html">PSV Course</a>
        <a href="#" class="btn-outline">Login</a>
        <a href="#" class="btn-gold">Sign Up</a>
    </div>
</div>
<section class="hero"><h1>Vehicle Value Estimator</h1><p style="color:var(--muted)">Legally defensible valuations for banks, insurance, and courts</p></section>
<div class="valuation-form">
    <input type="text" placeholder="Vehicle Make (e.g., Toyota, Nissan)">
    <input type="text" placeholder="Model (e.g., Vitz, X-Trail)">
    <select><option>Year of Manufacture</option><option>2015</option><option>2016</option><option>2017</option><option>2018</option><option>2019</option><option>2020</option><option>2021</option><option>2022</option><option>2023</option><option>2024</option></select>
    <select><option>Vehicle Condition</option><option>Excellent</option><option>Very Good</option><option>Good</option><option>Fair</option></select>
    <button>Estimate Value →</button>
</div>
<footer class="footer"><p>© 2026 MEI DRIVE AFRICA. All rights reserved.</p></footer>
</body>
</html>
