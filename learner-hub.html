      display: grid;

    .topic-card {

    }

    }

      color: #1e6f5c;

      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline {
      background: white;
      color: #1e6f5c;
      border: 2px solid #1e6f5c;
    }

    .btn:hover {
      background: #0e5445;
      transform: scale(0.98);
    }

    .quiz-container {
      background: white;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      border: 1px solid #cde3ec;
    }

      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e0edf2;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 1rem 0 1.5rem 0;
      line-height: 1.4;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
    }

    .option {
      background: #f8fafc;
      border: 1.5px solid #dce7ef;
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .option.selected {
      background: #d0ebe4;
      border-color: #1e6f5c;
    }

    .option input {
      accent-color: #1e6f5c;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .nav-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.5rem 0;
    }

    .small-btn {
      background: #e2eaf1;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .small-btn.primary {
      background: #1e6f5c;
      color: white;
    }

    .progress {
      background: #e2e8f0;
      border-radius: 30px;
      height: 6px;
      width: 100%;
      margin: 0.5rem 0;
    }

    .progress-fill {
      background: #1e6f5c;
      height: 6px;
      border-radius: 30px;
      width: 0%;
    }

    .result-box {
      text-align: center;
      padding: 1rem;
    }

    .result-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: #1e6f5c;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .question-text { font-size: 1rem; }
    }
  </style>
</head>

        const q = qs[i % qs.length];
        qText = q.text; options = q.opts; correctIdx = q.correct;
      }
      
      // Fallback for any missing
      if (qText === "") {
        qText = "What is an important road safety rule?";
        options = ["Follow traffic signs and signals", "Speed always", "Ignore pedestrians", "Use phone while driving"];
        correctIdx = 0;
      }
      
      questions.push({
        text: qText,
        options: options.slice(0, 4),
        correct: correctIdx % 4,
        topic: topicId
      });
    }
    return questions;
  }

  // Build full question bank (1050+)
  let MASTER_BANK = [];
  TOPICS.forEach(topic => {
    const topicQuestions = generateQuestionsForTopic(topic.id, topic.count);
    MASTER_BANK.push(...topicQuestions);
  });
  console.log(`Loaded ${MASTER_BANK.length} questions from ${TOPICS.length} topics`);

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getRandomQuestions(count, topicFilter = null) {
    let pool = topicFilter ? MASTER_BANK.filter(q => q.topic === topicFilter) : [...MASTER_BANK];
    if (pool.length === 0) pool = [...MASTER_BANK];
    const shuffled = shuffleArray([...pool]);
    return shuffled.slice(0, Math.min(count, shuffled.length));
  }

  // State
  let activeMode = null;
  let currentQuestions = [];
  let currentIndex = 0;
  let userAnswers = [];
  let quizSubmitted = false;
  let activeTopicId = null;

  const quizPanel = document.getElementById('quizPanel');
  const fullMockBtn = document.getElementById('fullMockBtn');
  const quick10Btn = document.getElementById('quick10Btn');
  const resetQuizBtn = document.getElementById('resetQuizBtn');
  const topicsGrid = document.getElementById('topicsGrid');

  function renderTopics() {
    topicsGrid.innerHTML = TOPICS.map(topic => `
      <div class="topic-card" data-topic="${topic.id}">
        <h3>${topic.icon} ${topic.name}</h3>
        <p>NTSA Handbook • Light Vehicle</p>
        <div class="q-count">📋 ${topic.count}+ questions</div>
      </div>
    `).join('');
    document.querySelectorAll('.topic-card').forEach(card => {
      card.addEventListener('click', () => {
        const tid = card.dataset.topic;
        startTopicPractice(tid);
      });
    });
  }

  function startTopicPractice(topicId) {
    const questions = getRandomQuestions(20, topicId);
    if (questions.length === 0) return;
    currentQuestions = questions;
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(undefined);
    activeMode = 'topic';
    activeTopicId = topicId;
    quizSubmitted = false;
    renderQuiz();
    quizPanel.style.display = 'block';
  }

  function startFullMock() {
    currentQuestions = getRandomQuestions(50);
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(undefined);
    activeMode = 'mock';
    activeTopicId = null;
    quizSubmitted = false;
    renderQuiz();
    quizPanel.style.display = 'block';
  }

  function startQuickPractice() {
    currentQuestions = getRandomQuestions(15);
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(undefined);
    activeMode = 'practice';
    activeTopicId = null;
    quizSubmitted = false;
    renderQuiz();
    quizPanel.style.display = 'block';
  }

  function saveCurrentAnswer() {
    const selectedRadio = document.querySelector('input[name="quizOption"]:checked');
    if (selectedRadio) userAnswers[currentIndex] = parseInt(selectedRadio.value);
  }

  function submitQuiz() {
    saveCurrentAnswer();
    let correctCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
      if (userAnswers[i] !== undefined && userAnswers[i] === currentQuestions[i].correct) correctCount++;
    }
    const total = currentQuestions.length;
    const percent = Math.round((correctCount / total) * 100);
    const passed = percent >= 70;
    let modeTitle = activeMode === 'mock' ? "FULL MOCK EXAM" : (activeMode === 'practice' ? "QUICK PRACTICE" : `TOPIC: ${TOPICS.find(t=>t.id===activeTopicId)?.name || "Practice"}`);
    
    quizPanel.innerHTML = `
      <div class="result-box">
        <h2>📊 ${modeTitle} RESULTS</h2>
        <div class="result-score">${correctCount} / ${total}</div>
        <p style="font-size: 1.2rem; font-weight: 600;">${percent}% Score</p>
        <p>${passed ? '✅ PASS! You are prepared for NTSA exam.' : '❌ Review the handbook and try again.'}</p>
        <hr>
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap:wrap;">
          <button id="retryBtn" class="small-btn primary">⟳ Retry Same Mode</button>
          <button id="closeResultsBtn" class="small-btn">Close</button>
        </div>
      </div>
    `;
    document.getElementById('retryBtn')?.addEventListener('click', () => {
      if (activeMode === 'mock') startFullMock();
      else if (activeMode === 'practice') startQuickPractice();
      else if (activeTopicId) startTopicPractice(activeTopicId);
    });
    document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
      quizPanel.style.display = 'none';
      activeMode = null;
    });
    quizSubmitted = true;
  }

  function renderQuiz() {
    if (!activeMode || currentQuestions.length === 0) return;
    if (quizSubmitted) return;
    const q = currentQuestions[currentIndex];
    const selectedVal = userAnswers[currentIndex];
    const totalQ = currentQuestions.length;
    const answeredCount = userAnswers.filter(a => a !== undefined).length;
    const progressPercent = (answeredCount / totalQ) * 100;
    
    let modeLabel = activeMode === 'mock' ? "🎓 FULL MOCK EXAM (50 Qs)" : (activeMode === 'practice' ? "⚡ QUICK PRACTICE (15 Random)" : `📘 ${TOPICS.find(t=>t.id===activeTopicId)?.name.substring(0, 40) || "Topic Practice"} (20 Qs)`);
    
    let optionsHtml = '';
    q.options.forEach((opt, idx) => {
      const isChecked = (selectedVal === idx);
      optionsHtml += `<label class="option ${isChecked ? 'selected' : ''}"><input type="radio" name="quizOption" value="${idx}" ${isChecked ? 'checked' : ''}><span>${opt}</span></label>`;
    });
    
    const allAnswered = answeredCount === totalQ;
    let actionButton = allAnswered && !quizSubmitted ? `<button id="submitBtn" class="small-btn primary" style="background:#2c7da0;">✅ SUBMIT EXAM</button>` : '';
    
    quizPanel.innerHTML = `
      <div class="quiz-header"><span style="background:#1e6f5c; padding:4px 14px; border-radius:40px; color:white;">${modeLabel}</span><span>Q${currentIndex+1}/${totalQ}</span></div>
      <div class="progress"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
      <div class="question-text">${q.text}</div>
      <div class="options-list">${optionsHtml}</div>
      <div class="nav-buttons">
        <button id="prevBtn" class="small-btn" ${currentIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>◀ Previous</button>
        <button id="nextBtn" class="small-btn primary">Next ▶</button>
        ${actionButton}
        <button id="cancelBtn" class="small-btn">Exit</button>
      </div>
      <div style="margin-top: 0.5rem; font-size:0.75rem;">✔️ Answered: ${answeredCount}/${totalQ}</div>
    `;
    
    document.querySelectorAll('input[name="quizOption"]').forEach(radio => {
      radio.addEventListener('change', (e) => { userAnswers[currentIndex] = parseInt(e.target.value); renderQuiz(); });
    });
    document.getElementById('prevBtn')?.addEventListener('click', () => { if (currentIndex > 0) { saveCurrentAnswer(); currentIndex--; renderQuiz(); } });
    document.getElementById('nextBtn')?.addEventListener('click', () => { if (currentIndex < totalQ - 1) { saveCurrentAnswer(); currentIndex++; renderQuiz(); } else { saveCurrentAnswer(); renderQuiz(); } });
    document.getElementById('cancelBtn')?.addEventListener('click', () => { quizPanel.style.display = 'none'; activeMode = null; });
    if (document.getElementById('submitBtn')) document.getElementById('submitBtn').addEventListener('click', () => submitQuiz());
  }

  fullMockBtn.addEventListener('click', startFullMock);
  quick10Btn.addEventListener('click', startQuickPractice);
  resetQuizBtn.addEventListener('click', () => { quizPanel.style.display = 'none'; activeMode = null; });
  renderTopics();
</script>
</body>
</html>
