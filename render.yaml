services:
  # Backend API Service
  - type: web
    name: meidriveafrica-backend
    runtime: node
    repo: https://github.com/mathewmoya6-star/meidriveafrica
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://jeksrwrzzrczamxijvwl.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODY3NjIyMCwiZXhwIjoyMDk0MjUyMjIwfQ.s5IjoTPsrieGy00A5M45dl4Y0fLfcpvu1O4OOtT0pUk
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.meidriveafrica.com
      - key: API_PREFIX
        value: /api/v1
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: meidriveafrica-frontend
    runtime: static
    repo: https://github.com/mathewmoya6-star/meidriveafrica
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://jeksrwrzzrczamxijvwl.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs
      - key: VITE_API_URL
        value: https://meidriveafrica-backend.onrender.com/api/v1
      - key: VITE_APP_URL
        value: https://www.meidriveafrica.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
