services:
  - type: web
    name: mei-drive-africa
    runtime: node
    repo: https://github.com/your-username/mei-drive-africa
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORT
        value: 10000
