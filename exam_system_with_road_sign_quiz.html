
<!DOCTYPE html>
<html>
<head>
<title>Driving Exam + Road Sign Quiz</title>
<style>
body {font-family:Arial;margin:20px;}
.card {border:1px solid #ccc;padding:15px;margin:10px 0;}
img {max-width:150px;margin:10px 0;}
button {margin:5px;padding:10px;}
</style>
</head>
<body>

<h2>Driving Test System (With Road Sign Quiz)</h2>

<button onclick="start()">Start Exam</button>
<h3 id="timer"></h3>

<div id="quiz"></div>

<script>
let questions = [{"question": "What does this road sign mean?", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/UK_road_sign_601.svg/120px-UK_road_sign_601.svg.png", "A": "Stop", "B": "Give Way", "C": "No Entry", "D": "Speed Limit", "answer": "A"}, {"question": "Identify this sign", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/UK_road_sign_606.svg/120px-UK_road_sign_606.svg.png", "A": "Roundabout", "B": "Hospital", "C": "Parking", "D": "School", "answer": "A"}, {"question": "What is this sign?", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/UK_road_sign_632.svg/120px-UK_road_sign_632.svg.png", "A": "No Entry", "B": "One Way", "C": "Stop", "D": "Speed Limit", "answer": "B"}, {"question": "Seat belt is used for?", "A": "Safety", "B": "Style", "C": "Speed", "D": "Noise", "answer": "A"}, {"question": "Phone use while driving is?", "A": "Allowed", "B": "Illegal", "C": "Optional", "D": "Recommended", "answer": "B"}];
let i=0, score=0, time=1800;

function start(){
setInterval(()=>{
time--;
document.getElementById('timer').innerText="Time: "+time;
},1000);
load();
}

function load(){
if(i>=questions.length){
document.getElementById('quiz').innerHTML =
"Exam Complete. Score: "+score+"/"+questions.length;
return;
}

let q = questions[i];

let img = q.image ? `<img src="${q.image}"/>` : "";

document.getElementById('quiz').innerHTML =
`<div class="card">
${img}
<h3>${q.question}</h3>
<button onclick="ans('A')">${q.A}</button>
<button onclick="ans('B')">${q.B}</button>
<button onclick="ans('C')">${q.C}</button>
<button onclick="ans('D')">${q.D}</button>
</div>`;
}

function ans(a){
if(a==questions[i].answer) score++;
i++;
load();
}
</script>

</body>
</html>
