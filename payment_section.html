<section style="max-width:520px;margin:30px auto;padding:20px;background:#141d2b;color:#fff;border-radius:16px;font-family:Arial,sans-serif">
<h2 style="margin-top:0;color:#f5c518">Buy Premium Access</h2>
<p>Select a plan and pay with M-Pesa STK Push.</p>
<select id="plan" style="width:100%;padding:12px;margin:8px 0;border-radius:8px">
<option value="49">Daily - KES 49</option>
<option value="99">Weekly - KES 99</option>
<option value="199">Monthly - KES 199</option>
<option value="499">Lifetime - KES 499</option>
</select>
<input id="phone" placeholder="07XXXXXXXX or 01XXXXXXXX" style="width:100%;padding:12px;margin:8px 0;border-radius:8px">
<button onclick="payNow()" style="width:100%;padding:12px;border:none;border-radius:8px;background:#f5c518;color:#000;font-weight:bold;cursor:pointer">Pay with M-Pesa</button>
<p id="msg" style="margin-top:12px"></p>
</section>
<script>
async function payNow(){
 const amount=document.getElementById('plan').value;
 const phone=document.getElementById('phone').value.trim();
 if(!phone){document.getElementById('msg').innerText='Enter phone number';return;}
 document.getElementById('msg').innerText='Sending STK Push...';
 try{
 const res=await fetch('/api/stkpush',{
 method:'POST',
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({phone,amount,plan:amount})
 });
 const data=await res.json();
 document.getElementById('msg').innerText=data.message || 'Request sent';
 }catch(e){
 document.getElementById('msg').innerText='Payment request failed';
 }
}
</script>
