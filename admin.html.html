<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>DriverPrep Admin</title><style>body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff}header{padding:18px;background:#141d2b;color:#f5c518;text-align:center;font-size:28px;font-weight:700}.wrap{max-width:1100px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.card{background:#141d2b;padding:18px;border-radius:14px}.stat{font-size:34px;color:#f5c518;font-weight:700}.input,textarea{width:100%;padding:10px;margin:6px 0 10px;background:#0b1220;border:1px solid #24344d;border-radius:8px;color:#fff}.btn{background:#f5c518;color:#000;border:none;padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #24344d;padding:10px;text-align:left}.login{max-width:380px;margin:60px auto;background:#141d2b;padding:24px;border-radius:14px}.hide{display:none}</style></head><body><header>DriverPrep Kenya Admin Portal</header><div id='login' class='login'><h2>Admin Login</h2><input id='u' class='input' placeholder='Username'><input id='p' type='password' class='input' placeholder='Password'><button class='btn' onclick='login()'>Login</button><p id='err'></p></div><div id='app' class='hide'><div class='wrap'><div class='grid'><div class='card'><div>Total Users</div><div class='stat' id='users'>128</div></div><div class='card'><div>Payments Today</div><div class='stat' id='pay'>14</div></div><div class='card'><div>Revenue</div><div class='stat'>KES 4,920</div></div><div class='card'><div>Active Plans</div><div class='stat'>57</div></div></div><div class='grid' style='margin-top:16px'><div class='card'><h3>Update Pricing</h3><input class='input' id='daily' value='49'><input class='input' id='weekly' value='99'><input class='input' id='monthly' value='199'><input class='input' id='life' value='499'><button class='btn' onclick='savePrices()'>Save Prices</button><p id='priceMsg'></p></div><div class='card'><h3>Site Settings</h3><input class='input' id='phone' value='0703738707'><input class='input' id='paybill' value='4095377'><textarea class='input' id='notice'>Welcome to DriverPrep Kenya</textarea><button class='btn' onclick='saveSettings()'>Save Settings</button><p id='setMsg'></p></div></div><div class='card' style='margin-top:16px'><h3>Recent Payment Confirmations</h3><table class='table'><tr><th>Name</th><th>Phone</th><th>Plan</th><th>Status</th></tr><tr><td>Jane Mwangi</td><td>0712345678</td><td>Monthly</td><td>Activated</td></tr><tr><td>Brian Otieno</td><td>0723456789</td><td>Lifetime</td><td>Pending</td></tr></table></div><div class='card' style='margin-top:16px'><button class='btn' onclick='logout()'>Logout</button></div></div></div><script>function login(){let u=document.getElementById('u').value,p=document.getElementById('p').value;if(u==='admin'&&p==='mei2026'){document.getElementById('login').classList.add('hide');document.getElementById('app').classList.remove('hide')}else{document.getElementById('err').innerText='Wrong login details'}}function logout(){location.reload()}function savePrices(){document.getElementById('priceMsg').innerText='Prices saved'}function saveSettings(){document.getElementById('setMsg').innerText='Settings saved'}</script><script>
(function(){
const wrap=document.querySelector('.wrap')||document.body;
const topics=JSON.parse(localStorage.getItem('dp_topics')||'[]');
if(topics.length){let sec=document.createElement('div');sec.className='card';sec.innerHTML='<h2>Latest Topics</h2>'+topics.slice(0,5).map(t=>'<p><strong>'+t.title+'</strong><br>'+t.desc+'</p>').join('');wrap.appendChild(sec);} 
const tests=JSON.parse(localStorage.getItem('dp_tests')||'[]');
if(tests.length){let sec2=document.createElement('div');sec2.className='card';sec2.innerHTML='<h2>Latest Test Questions</h2>'+tests.slice(0,5).map(q=>'<p><strong>'+q.q+'</strong><br>A. '+q.o1+' | B. '+q.o2+' | C. '+q.o3+'</p>').join('');wrap.appendChild(sec2);} 
})();
</script>
</body></html>
