<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEI DRIVE AFRICA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Inter;
    background:#0a0a0a;
    color:#fff;
    margin:0;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-bottom:1px solid #222;
    flex-wrap:wrap;
}

nav button {
    padding:6px 12px;
    margin:5px;
    cursor:pointer;
    background:transparent;
    border:1px solid #333;
    color:#fff;
    border-radius:6px;
}

nav button:hover {
    border-color:#d4af37;
    color:#d4af37;
}

.gold {
    background:#d4af37;
    color:#000;
    font-weight:600;
    border:none;
}

.container {
    padding:20px;
}

.card {
    background:#111;
    padding:15px;
    margin:10px 0;
    border:1px solid #222;
    border-radius:10px;
}

h2 {
    color:#d4af37;
}

input {
    padding:8px;
    margin:5px 0;
    width:220px;
    background:#000;
    border:1px solid #333;
    color:#fff;
    border-radius:5px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div style="font-weight:700;">
MEI DRIVE <span style="color:#d4af37;">AFRICA</span>
</div>

<div>
<button onclick="setPage('home')">Home</button>
<button onclick="setPage('auto')">Auto Value</button>
<button onclick="setPage('learn')">Learner Hub</button>
<button onclick="setPage('academy')">Driver Academy</button>
<button onclick="setPage('safety')">Safety Library</button>
<button onclick="setPage('psv')">PSV Course</button>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="logout()">Logout</button>
</div>
</nav>

<!-- CONTENT -->
<div class="container">

<!-- HOME -->
<div id="home">
<h2>🚗 Smart Mobility Platform</h2>
<p>Learn, certify, value vehicles, and manage road safety systems.</p>
</div>

<!-- AUTO VALUE -->
<div id="auto" style="display:none">
<h2>🚗 Auto Vehicle Valuation</h2>

<input id="make" placeholder="Make"><br>
<input id="model" placeholder="Model"><br>
<input id="year" placeholder="Year"><br>
<input id="mileage" placeholder="Mileage"><br>
<input id="condition" placeholder="Condition (1-10)"><br>

<button class="gold" onclick="addVehicle()">Add Vehicle</button>

<div id="vehicleList"></div>
</div>

<!-- LEARNER HUB -->
<div id="learn" style="display:none">
<h2>📘 Learner Hub</h2>
<div id="courses"></div>
</div>

<!-- ACADEMY -->
<div id="academy" style="display:none">
<h2>🎓 Driver Academy</h2>
<p>Professional driver training modules.</p>
</div>

<!-- SAFETY -->
<div id="safety" style="display:none">
<h2>🛡 Safety Library</h2>
<div id="docs"></div>
</div>

<!-- PSV -->
<div id="psv" style="display:none">
<h2>🚌 PSV Course</h2>
<p>Professional PSV training program.</p>
</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================= SUPABASE FIX ================= */
const client = supabase.createClient(
  "https://awbpzvuxvavzktjtjuvr.supabase.co",
  "sb_publishable_LZU947tUe8TWUx0g6sKJ-A_PiYWi2JF"
);

/* ================= NAV ================= */
function setPage(p){
    document.querySelectorAll(".container > div").forEach(d=>{
        d.style.display="none";
    });
    document.getElementById(p).style.display="block";

    if(p==="auto") loadVehicles();
    if(p==="learn") loadCourses();
    if(p==="safety") loadDocs();
}

/* ================= AUTH ================= */
async function signup(){
    const email = prompt("Email:");
    const password = prompt("Password:");

    const { error } = await client.auth.signUp({ email, password });

    if(error) alert(error.message);
    else alert("Check your email!");
}

async function login(){
    const email = prompt("Email:");
    const password = prompt("Password:");

    const { error } = await client.auth.signInWithPassword({ email, password });

    if(error) alert(error.message);
    else location.reload();
}

async function logout(){
    await client.auth.signOut();
    location.reload();
}

/* ================= AUTO VALUE ================= */
function estimate(year, mileage, condition){
    let base = 2000000;
    let age = (2026 - year) * 80000;
    let km = mileage * 2;
    let bonus = condition * 50000;
    return Math.max(300000, base - age - km + bonus);
}

async function addVehicle(){
    const user = (await client.auth.getUser()).data.user;

    const v = {
        make: make.value,
        model: model.value,
        year: parseInt(year.value),
        mileage: parseInt(mileage.value),
        condition_rating: parseInt(condition.value),
        estimated_value: estimate(year.value, mileage.value, condition.value),
        owner_id: user.id
    };

    await client.from("vehicles").insert([v]);
    loadVehicles();
}

async function loadVehicles(){
    const { data } = await client.from("vehicles").select("*");

    vehicleList.innerHTML = (data || []).map(v=>`
        <div class="card">
            ${v.make} ${v.model} (${v.year})<br>
            💰 KES ${v.estimated_value}
        </div>
    `).join("");
}

/* ================= COURSES ================= */
async function loadCourses(){
    const { data } = await client.from("courses").select("*");

    courses.innerHTML = (data || []).map(c=>`
        <div class="card">
            📘 ${c.title || "Course"}<br>
            ${c.category || ""}
        </div>
    `).join("");
}

/* ================= SAFETY ================= */
async function loadDocs(){
    const { data } = await client.from("safety_documents").select("*");

    docs.innerHTML = (data || []).map(d=>`
        <div class="card">
            🛡 ${d.title}<br>
            ${d.document_type}
        </div>
    `).join("");
}

/* START */
setPage("home");
</script>

</body>
</html>
