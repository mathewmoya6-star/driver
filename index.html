<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEI DRIVE AFRICA | Smart Mobility Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --gold:#d4af37;
    --dark:#0a0a0a;
    --card:#111;
    --border:#222;
    --muted:#888;
}

body {
    margin:0;
    font-family:Inter;
    background:var(--dark);
    color:#fff;
}

header {
    border-bottom:1px solid var(--border);
    padding:15px;
    position:sticky;
    top:0;
    background:var(--dark);
    z-index:10;
}

nav {
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}

button {
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
}

.gold {
    background:var(--gold);
    color:#000;
    padding:6px 12px;
    border-radius:6px;
}

.container { padding:20px; }

.card {
    background:var(--card);
    border:1px solid var(--border);
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#1a1a1a;
    border:1px solid var(--border);
    color:#fff;
}

.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--gold);
    color:#000;
    padding:10px 15px;
    border-radius:8px;
    font-weight:600;
}
</style>
</head>

<body>

<header>
<nav>
<div>MEI <span style="color:var(--gold)">DRIVE AFRICA</span></div>

<div>
<button onclick="setPage('home')">Home</button>
<button onclick="setPage('auto')">Auto Value</button>
<button onclick="setPage('learn')">Learner Hub</button>
<button onclick="setPage('academy')">Driver Academy</button>

<span id="userBox"></span>

<button onclick="openAuth('login')" class="gold">Login</button>
<button onclick="logout()">Logout</button>
</div>
</nav>
</header>

<div class="container">

<!-- HOME -->
<div id="home">
<h2>🚗 Smart Mobility Platform</h2>
<p>Learn, certify, value vehicles and manage safety systems.</p>
</div>

<!-- AUTO -->
<div id="auto" style="display:none">
<h2>🚗 Auto Value</h2>

<input id="make" placeholder="Make">
<input id="model" placeholder="Model">
<input id="year" placeholder="Year">
<input id="mileage" placeholder="Mileage">
<input id="condition" placeholder="Condition 1-10">

<button onclick="addVehicle()">Add Vehicle</button>

<div id="vehicleList"></div>
</div>

<!-- AUTH MODAL -->
<div id="authModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#000000cc;">
<div class="card" style="max-width:400px; margin:100px auto;">

<h3 id="authTitle">Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="auth()" class="gold">Submit</button>
<button onclick="closeAuth()">Close</button>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
"https://awbpzvuxvavzktjtjuvr.supabase.co",
"YOUR_ANON_KEY_HERE"
);

// STATE
let user = null;
let authMode = "login";

// TOAST
function toast(msg){
    const t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3000);
}

// INIT USER
async function loadUser(){
    const { data } = await supabase.auth.getUser();
    user = data.user;
    renderUser();
}

// LIVE AUTH
supabase.auth.onAuthStateChange((event, session)=>{
    user = session?.user || null;
    renderUser();
});

// UI USER
function renderUser(){
    document.getElementById("userBox").innerText =
        user ? " | " + user.email : "";
}

// NAV
function setPage(p){
    document.querySelectorAll(".container > div").forEach(d=>d.style.display="none");
    document.getElementById(p).style.display="block";
}

// AUTH MODAL
function openAuth(mode){
    authMode = mode;
    document.getElementById("authModal").style.display="block";
}

function closeAuth(){
    document.getElementById("authModal").style.display="none";
}

// AUTH ACTION
async function auth(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(authMode === "login"){
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) return toast(error.message);

        toast("Login successful");
        closeAuth();
        await loadUser();
    } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if(error) return toast(error.message);

        toast("Check email to confirm");
        closeAuth();
    }
}

// LOGOUT
async function logout(){
    await supabase.auth.signOut();
    user = null;
    renderUser();
    toast("Logged out");
}

// AUTO VALUE
function estimate(y,m,c){
    return Math.max(300000, 2000000 - (2026-y)*80000 - m*2 + c*50000);
}

async function addVehicle(){
    if(!user) return toast("Login required");

    const v = {
        make:make.value,
        model:model.value,
        year:parseInt(year.value),
        mileage:parseInt(mileage.value),
        condition_rating:parseInt(condition.value),
        estimated_value:estimate(year.value,mileage.value,condition.value),
        owner_id:user.id
    };

    const { error } = await supabase.from("vehicles").insert([v]);

    if(error) return toast(error.message);

    toast("Vehicle added");
}

loadUser();
setPage("home");
</script>

</body>
</html>
