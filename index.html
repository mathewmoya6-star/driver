<!DOCTYPE html>
<html>
<head>
<title>DriverPrep Kenya</title>
</head>

<body>

<h1>DriverPrep Kenya System</h1>

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h3>Vehicle Valuation</h3>

<input id="year" placeholder="Year">

<select id="condition">
  <option value="1">Excellent</option>
  <option value="0.8">Good</option>
  <option value="0.6">Average</option>
</select>

<input id="mileage" placeholder="Mileage">

<button onclick="estimate()">Calculate</button>

<p id="result"></p>

<script src="app.js"></script>
</body>
</html>
