<!-- exam.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mock Exam | DriverPrep Kenya</title>
<link rel="stylesheet" href="style.css">
<style>
.question-box{max-width:800px;margin:auto;background:#0a142f;padding:30px;border-radius:16px}
.question{font-size:26px;margin-bottom:20px}
.option{
display:block;
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#13234d;
color:#fff;
cursor:pointer;
font-size:16px;
text-align:left;
}
.option:hover{background:#f5c518;color:#000}
#nextBtn{margin-top:15px}
#timer{font-size:20px;color:#f5c518;margin-bottom:15px}
#result{font-size:28px;text-align:center;margin-top:20px}
</style>
</head>
<body>

<header>
<div class="logo">DRIVERPREP KENYA</div>
<nav>
<a href="index.html">Home</a>
<a href="study.html">Study</a>
<a href="exam.html">Mock Exam</a>
<a href="dashboard.html">Dashboard</a>
<a href="plans.html">Plans</a>
<a href="admin.html">Admin</a>
</nav>
</header>

<section class="page">
<h1>NTSA Mock Exam</h1>
<p>40 Questions • Pass Mark 70%</p>

<div class="question-box">
<div id="timer">30:00</div>
<div class="question" id="question"></div>
<div id="answers"></div>
<button class="btn gold" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next</button>
<div id="result"></div>
</div>

</section>

<footer>© 2026 DriverPrep Kenya</footer>

<script>
const quiz = [
{q:"What does a red traffic light mean?",a:["Go","Stop","Turn Left","Reverse"],c:1},
{q:"What should you do before overtaking?",a:["Check mirrors","Close eyes","Speed blindly","Use phone"],c:0},
{q:"Seat belts are required for?",a:["Driver only","Passengers only","All occupants","Nobody"],c:2},
{q:"What does a zebra crossing mean?",a:["Animal crossing","Pedestrian crossing","Parking","Police"],c:1},
{q:"Driving under alcohol influence is?",a:["Legal","Recommended","Illegal","Normal"],c:2}
];

while(quiz.length < 40){
quiz.push(...quiz.slice(0,5));
}
quiz.length = 40;

let current=0,score=0,selected=false,time=1800;
let timer=setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
if(time<=0){finishExam();}
},1000);

function loadQuestion(){
selected=false;
document.getElementById("nextBtn").style.display="none";
let q=quiz[current];
document.getElementById("question").innerText=(current+1)+". "+q.q;
let html="";
q.a.forEach((opt,i)=>{
html += `<button class="option" onclick="checkAnswer(${i})">${opt}</button>`;
});
document.getElementById("answers").innerHTML=html;
}
function checkAnswer(i){
if(selected)return;
selected=true;
let correct=quiz[current].c;
let btns=document.querySelectorAll(".option");
btns.forEach((b,index)=>{
if(index===correct)b.style.background="#16a34a";
if(index===i && i!==correct)b.style.background="#dc2626";
b.disabled=true;
});
if(i===correct)score++;
document.getElementById("nextBtn").style.display="inline-block";
}
function nextQuestion(){
current++;
if(current<40)loadQuestion();
else finishExam();
}
function finishExam(){
clearInterval(timer);
document.getElementById("question").style.display="none";
document.getElementById("answers").style.display="none";
document.getElementById("nextBtn").style.display="none";
let percent=Math.round((score/40)*100);
document.getElementById("result").innerHTML=
"You scored "+score+"/40<br><br>"+percent+"%<br><br>"+(percent>=70?"✅ PASS":"❌ FAIL");
}
loadQuestion();
</script>

</body>
</html>
