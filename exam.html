<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTSA Mock Exam - DriverPrep Kenya</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050b1d;
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.top{
text-align:center;
margin-bottom:30px;
}

.top h1{
font-size:42px;
color:#facc15;
margin-bottom:10px;
}

.top p{
color:#bbb;
font-size:18px;
}

.quiz-box{
background:#101a36;
padding:30px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.question{
font-size:28px;
margin-bottom:25px;
font-weight:bold;
}

.option{
display:block;
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1a264d;
color:white;
font-size:18px;
cursor:pointer;
text-align:left;
transition:.3s;
}

.option:hover{
background:#facc15;
color:#111;
}

.next-btn{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:12px;
background:#facc15;
color:#111;
font-size:18px;
font-weight:bold;
cursor:pointer;
display:none;
}

.result{
text-align:center;
font-size:30px;
margin-top:30px;
display:none;
}

.back{
display:block;
text-align:center;
margin-top:30px;
color:#facc15;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<h1>NTSA Mock Exam</h1>
<p>Test your knowledge. Pass with confidence.</p>
</div>

<div class="quiz-box">

<div class="question" id="question">Loading...</div>

<div id="answers"></div>

<button class="next-btn" onclick="nextQuestion()" id="nextBtn">Next Question</button>

<div class="result" id="result"></div>

</div>

<a href="/" class="back">← Back Home</a>

</div>

<script>
const quiz = [
{
q:"What does a RED traffic light mean?",
a:["Go","Stop","Slow Down","Turn Left"],
correct:1
},
{
q:"What should you do before changing lanes?",
a:["Honk only","Check mirrors & signal","Speed up","Close eyes"],
correct:1
},
{
q:"Maximum speed in town unless stated?",
a:["30 km/h","50 km/h","80 km/h","120 km/h"],
correct:1
},
{
q:"Seat belts are required for?",
a:["Driver only","Passengers only","All occupants","Nobody"],
correct:2
},
{
q:"What does a zebra crossing mean?",
a:["Animal crossing","Pedestrian crossing","No parking","Railway"],
correct:1
}
];

let current = 0;
let score = 0;
let selected = false;

function loadQuestion(){
selected=false;
document.getElementById("nextBtn").style.display="none";

let q = quiz[current];
document.getElementById("question").innerHTML=(current+1)+". "+q.q;

let answersHTML="";
q.a.forEach((ans,index)=>{
answersHTML += `<button class="option" onclick="checkAnswer(${index})">${ans}</button>`;
});

document.getElementById("answers").innerHTML=answersHTML;
}

function checkAnswer(index){
if(selected) return;
selected=true;

let correct = quiz[current].correct;
let buttons = document.querySelectorAll(".option");

buttons.forEach((btn,i)=>{
if(i===correct){
btn.style.background="#22c55e";
}
else if(i===index){
btn.style.background="#ef4444";
}
btn.disabled=true;
});

if(index===correct){
score++;
}

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
current++;

if(current<quiz.length){
loadQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("question").style.display="none";
document.getElementById("answers").style.display="none";
document.getElementById("nextBtn").style.display="none";

let percent = Math.round((score/quiz.length)*100);

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=
`You scored ${score}/${quiz.length}<br><br>${percent}%<br><br>${percent>=70 ? "✅ PASS" : "❌ FAIL"}`;
}

loadQuestion();
</script>

</body>
</html>
