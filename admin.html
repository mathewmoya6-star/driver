<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA - Admin Dashboard</title>
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        
        :root {
            --primary-gold: #d4af37;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --card-bg: #111111;
            --border-color: #222222;
        }
        
        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
        }
        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            border: 1px solid var(--primary-gold);
        }
        .login-box h2 { color: var(--primary-gold); text-align: center; margin-bottom: 10px; }
        .login-box p { text-align: center; color: #888; margin-bottom: 25px; }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-size: 14px;
        }
        .login-box input:focus { outline: none; border-color: var(--primary-gold); }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--primary-gold);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .error-msg { color: var(--danger); text-align: center; margin-top: 15px; display: none; }
        
        /* Admin Dashboard */
        .admin-container { display: none; }
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--primary-gold);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.3rem; font-weight: bold; color: var(--primary-gold); }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        
        .admin-layout { display: flex; min-height: calc(100vh - 65px); }
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }
        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .sidebar button:hover, .sidebar button.active {
            background: rgba(212,175,55,0.1);
            border-color: var(--primary-gold);
            color: var(--primary-gold);
        }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary-gold); }
        .stat-label { color: #888; margin-top: 8px; }
        
        .section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .section h2 {
            margin-bottom: 20px;
            color: var(--primary-gold);
            font-size: 1.3rem;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--primary-gold); font-weight: 600; }
        
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; margin: 0 4px; }
        .btn-edit { background: var(--info); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-add { background: var(--success); color: white; padding: 10px 20px; margin-top: 15px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-refresh { background: var(--primary-gold); color: #000; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        
        .search-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #1a1c26;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
        }
        
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .role-admin { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .role-learner { background: rgba(52,152,219,0.2); color: #3498db; }
        .role-driver { background: rgba(46,204,113,0.2); color: #2ecc71; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--primary-gold);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1c26;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
        }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: var(--primary-gold); }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            border-left: 4px solid var(--primary-gold);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .sidebar { width: 100%; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="toast-root"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
        
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const supabaseUrl = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);
        
        // ============================================
        // APP STATE
        // ============================================
        let currentUser = null;
        let isLoading = false;
        let currentPanel = 'dashboard';
        
        // Data stores
        let allUsers = [];
        let allMaterials = [];
        let allQuestions = [];
        let auditLogs = [];
        
        // ============================================
        // UTILITIES
        // ============================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-root');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            toast.innerHTML = `${icon} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showModal(content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><button class="close-modal" onclick="this.closest('.modal').remove()">✕</button>${content}</div>`;
            document.body.appendChild(modal);
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
        }
        
        function setLoading(loading) {
            isLoading = loading;
            const btn = document.querySelector('.login-btn');
            if (btn) btn.disabled = loading;
        }
        
        // ============================================
        // AUTHENTICATION
        // ============================================
        async function checkAdminSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                renderLogin();
                return false;
            }
            
            // Check if user has admin role from profiles table
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();
            
            if (error || profile?.role !== 'admin') {
                await supabase.auth.signOut();
                renderLogin();
                showToast('Admin access required', 'error');
                return false;
            }
            
            currentUser = {
                id: session.user.id,
                email: session.user.email,
                name: session.user.user_metadata?.full_name || session.user.email.split('@')[0],
                role: 'admin'
            };
            
            await loadDashboardData();
            renderAdminPanel();
            return true;
        }
        
        async function handleLogin(email, password) {
            setLoading(true);
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                // Verify admin role
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();
                
                if (profile?.role !== 'admin') {
                    await supabase.auth.signOut();
                    showToast('Access denied. Admin privileges required.', 'error');
                    return;
                }
                
                currentUser = {
                    id: data.user.id,
                    email: data.user.email,
                    name: data.user.user_metadata?.full_name || email.split('@')[0],
                    role: 'admin'
                };
                
                await loadDashboardData();
                renderAdminPanel();
                showToast('Login successful!', 'success');
            } catch (error) {
                document.getElementById('errorMsg').textContent = error.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
            setLoading(false);
        }
        
        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            renderLogin();
            showToast('Logged out', 'info');
        }
        
        // ============================================
        // DATA LOADING FROM SUPABASE
        // ============================================
        async function loadDashboardData() {
            await Promise.all([
                loadUsers(),
                loadMaterials(),
                loadQuestions(),
                loadAuditLogs()
            ]);
        }
        
        async function loadUsers() {
            try {
                // Get users from auth (requires admin privileges)
                const { data: { users }, error } = await supabase.auth.admin.listUsers();
                if (error) throw error;
                
                // Get user roles from profiles table
                const { data: profiles } = await supabase.from('profiles').select('*');
                const profileMap = {};
                if (profiles) {
                    profiles.forEach(p => { profileMap[p.id] = p; });
                }
                
                allUsers = users.map(u => ({
                    id: u.id,
                    email: u.email,
                    name: u.user_metadata?.full_name || u.email.split('@')[0],
                    role: profileMap[u.id]?.role || 'user',
                    status: profileMap[u.id]?.status || 'active',
                    created_at: u.created_at
                }));
            } catch (error) {
                console.error('Error loading users:', error);
                allUsers = [];
            }
        }
        
        async function loadMaterials() {
            try {
                const { data, error } = await supabase
                    .from('materials')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) throw error;
                allMaterials = data || [];
            } catch (error) {
                console.error('Error loading materials:', error);
                allMaterials = [];
            }
        }
        
        async function loadQuestions() {
            try {
                const { data, error } = await supabase
                    .from('questions')
                    .select('*')
                    .limit(100);
                if (error) throw error;
                allQuestions = data || [];
            } catch (error) {
                console.error('Error loading questions:', error);
                allQuestions = [];
            }
        }
        
        async function loadAuditLogs() {
            try {
                const { data, error } = await supabase
                    .from('audit_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (error) throw error;
                auditLogs = data || [];
            } catch (error) {
                auditLogs = [];
            }
        }
        
        async function addAuditLog(action, details) {
            try {
                await supabase.from('audit_logs').insert({
                    user_id: currentUser?.id,
                    user_email: currentUser?.email,
                    action: action,
                    details: details,
                    created_at: new Date().toISOString()
                });
                await loadAuditLogs();
                if (currentPanel === 'audit') renderAuditPanel();
            } catch (error) {
                console.error('Error adding audit log:', error);
            }
        }
        
        // ============================================
        // CRUD OPERATIONS
        // ============================================
        async function createUser(email, password, name, role = 'user') {
            try {
                // Create user in Supabase Auth
                const { data: userData, error: userError } = await supabase.auth.admin.createUser({
                    email: email,
                    password: password,
                    email_confirm: true,
                    user_metadata: { full_name: name }
                });
                if (userError) throw userError;
                
                // Create profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert({
                        id: userData.user.id,
                        email: email,
                        full_name: name,
                        role: role,
                        status: 'active'
                    });
                if (profileError) throw profileError;
                
                await loadUsers();
                await addAuditLog('User Created', `Created user: ${email} with role ${role}`);
                showToast('User created successfully', 'success');
                if (currentPanel === 'users') renderUsersPanel();
                return true;
            } catch (error) {
                showToast(error.message, 'error');
                return false;
            }
        }
        
        async function updateUserRole(userId, role) {
            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ role: role })
                    .eq('id', userId);
                if (error) throw error;
                
                await loadUsers();
                await addAuditLog('User Role Updated', `Updated user ${userId} to role ${role}`);
                showToast('User role updated', 'success');
                if (currentPanel === 'users') renderUsersPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function deleteUser(userId, userEmail) {
            if (!confirm(`Delete user ${userEmail}? This action cannot be undone.`)) return;
            
            try {
                // Delete profile first
                await supabase.from('profiles').delete().eq('id', userId);
                // Delete user from auth
                const { error } = await supabase.auth.admin.deleteUser(userId);
                if (error) throw error;
                
                await loadUsers();
                await addAuditLog('User Deleted', `Deleted user: ${userEmail}`);
                showToast('User deleted', 'success');
                if (currentPanel === 'users') renderUsersPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function createMaterial(materialData) {
            try {
                const { error } = await supabase.from('materials').insert(materialData);
                if (error) throw error;
                
                await loadMaterials();
                await addAuditLog('Material Created', `Created material: ${materialData.title}`);
                showToast('Material created', 'success');
                if (currentPanel === 'materials') renderMaterialsPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function deleteMaterial(materialId, materialTitle) {
            if (!confirm(`Delete "${materialTitle}"?`)) return;
            
            try {
                const { error } = await supabase.from('materials').delete().eq('id', materialId);
                if (error) throw error;
                
                await loadMaterials();
                await addAuditLog('Material Deleted', `Deleted material: ${materialTitle}`);
                showToast('Material deleted', 'success');
                if (currentPanel === 'materials') renderMaterialsPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function createQuestion(questionData) {
            try {
                const { error } = await supabase.from('questions').insert(questionData);
                if (error) throw error;
                
                await loadQuestions();
                await addAuditLog('Question Created', `Added new question`);
                showToast('Question added', 'success');
                if (currentPanel === 'questions') renderQuestionsPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function deleteQuestion(questionId) {
            if (!confirm('Delete this question?')) return;
            
            try {
                const { error } = await supabase.from('questions').delete().eq('id', questionId);
                if (error) throw error;
                
                await loadQuestions();
                await addAuditLog('Question Deleted', `Deleted question ID: ${questionId}`);
                showToast('Question deleted', 'success');
                if (currentPanel === 'questions') renderQuestionsPanel();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h2><i class="fas fa-crown"></i> Admin Login</h2>
                        <p>MEI DRIVE AFRICA</p>
                        <input type="email" id="adminEmail" placeholder="Email">
                        <input type="password" id="adminPassword" placeholder="Password">
                        <button class="login-btn" onclick="window.doLogin()">Login</button>
                        <div class="error-msg" id="errorMsg"></div>
                    </div>
                </div>
            `;
        }
        
        function renderAdminPanel() {
            const totalUsers = allUsers.length;
            const totalMaterials = allMaterials.length;
            const totalQuestions = allQuestions.length;
            const activeUsers = allUsers.filter(u => u.status === 'active').length;
            
            document.getElementById('app').innerHTML = `
                <div class="admin-container" style="display:block">
                    <div class="navbar">
                        <div class="logo"><i class="fas fa-gavel"></i> MEI DRIVE AFRICA - Admin Portal</div>
                        <button class="logout-btn" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                    <div class="admin-layout">
                        <div class="sidebar">
                            <button onclick="switchPanel('dashboard')" id="btn-dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
                            <button onclick="switchPanel('users')" id="btn-users"><i class="fas fa-users"></i> User Management</button>
                            <button onclick="switchPanel('materials')" id="btn-materials"><i class="fas fa-book"></i> Materials</button>
                            <button onclick="switchPanel('questions')" id="btn-questions"><i class="fas fa-question-circle"></i> Questions</button>
                            <button onclick="switchPanel('audit')" id="btn-audit"><i class="fas fa-history"></i> Audit Logs</button>
                        </div>
                        <div class="content">
                            <div id="dashboardPanel" class="panel active">
                                <h2>Dashboard</h2>
                                <div class="stats-grid">
                                    <div class="stat-card"><div class="stat-number">${totalUsers}</div><div class="stat-label">Total Users</div></div>
                                    <div class="stat-card"><div class="stat-number">${activeUsers}</div><div class="stat-label">Active Users</div></div>
                                    <div class="stat-card"><div class="stat-number">${totalMaterials}</div><div class="stat-label">Materials</div></div>
                                    <div class="stat-card"><div class="stat-number">${totalQuestions}</div><div class="stat-label">Questions</div></div>
                                </div>
                                <div class="section">
                                    <h3>Recent Activity</h3>
                                    <div id="recentActivity">${auditLogs.slice(0, 10).map(log => `<div style="padding:8px; border-bottom:1px solid #222;"><small>${new Date(log.created_at).toLocaleString()}</small> - ${log.action} by ${log.user_email || 'system'}</div>`).join('') || '<p>No recent activity</p>'}</div>
                                </div>
                            </div>
                            <div id="usersPanel" class="panel"></div>
                            <div id="materialsPanel" class="panel"></div>
                            <div id="questionsPanel" class="panel"></div>
                            <div id="auditPanel" class="panel"></div>
                        </div>
                    </div>
                </div>
            `;
            
            renderUsersPanel();
            renderMaterialsPanel();
            renderQuestionsPanel();
            renderAuditPanel();
        }
        
        function renderUsersPanel() {
            let html = `
                <h2>User Management</h2>
                <input type="text" id="searchUsers" class="search-input" placeholder="Search users..." onkeyup="filterUsers()">
                <div style="overflow-x:auto;">
                    <table style="width:100%">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                        <tbody id="usersTableBody">
            `;
            
            const searchTerm = document.getElementById('searchUsers')?.value?.toLowerCase() || '';
            const filtered = allUsers.filter(u => u.name?.toLowerCase().includes(searchTerm) || u.email?.toLowerCase().includes(searchTerm));
            
            for (let u of filtered) {
                html += `<tr>
                    <td>${escapeHtml(u.name)}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                    <td><span style="color:${u.status === 'active' ? '#2ecc71' : '#e74c3c'}">${u.status}</span></td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-sm btn-edit" onclick="showEditUserModal('${u.id}', '${u.role}')">Edit Role</button>
                        <button class="btn-sm btn-delete" onclick="deleteUser('${u.id}', '${escapeHtml(u.email)}')">Delete</button>
                    </td>
                </tr>`;
            }
            
            html += `</tbody></table></div>
                <button class="btn-add" onclick="showAddUserModal()">+ Add New User</button>
            `;
            
            document.getElementById('usersPanel').innerHTML = html;
        }
        
        function renderMaterialsPanel() {
            let html = `
                <h2>Materials Management</h2>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <input type="text" id="searchMaterials" class="search-input" style="width:70%;" placeholder="Search materials..." onkeyup="filterMaterials()">
                    <button class="btn-refresh" onclick="showAddMaterialModal()">+ Add Material</button>
                </div>
                <div style="overflow-x:auto;">
                    <table style="width:100%">
                        <thead><tr><th>Title</th><th>Module</th><th>Unit</th><th>Difficulty</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="materialsTableBody">
            `;
            
            const searchTerm = document.getElementById('searchMaterials')?.value?.toLowerCase() || '';
            const filtered = allMaterials.filter(m => m.title?.toLowerCase().includes(searchTerm));
            
            for (let m of filtered) {
                html += `<tr>
                    <td>${escapeHtml(m.title)}</td>
                    <td>${escapeHtml(m.module_type)}</td>
                    <td>${m.unit_number || '-'}</td>
                    <td>${escapeHtml(m.difficulty) || 'beginner'}</td>
                    <td><span style="color:${m.status === 'published' ? '#2ecc71' : '#f39c12'}">${m.status || 'draft'}</span></td>
                    <td>
                        <button class="btn-sm btn-delete" onclick="deleteMaterial('${m.id}', '${escapeHtml(m.title)}')">Delete</button>
                    </td>
                </tr>`;
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('materialsPanel').innerHTML = html;
        }
        
        function renderQuestionsPanel() {
            let html = `
                <h2>Question Bank</h2>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <input type="text" id="searchQuestions" class="search-input" style="width:70%;" placeholder="Search questions..." onkeyup="filterQuestions()">
                    <button class="btn-refresh" onclick="showAddQuestionModal()">+ Add Question</button>
                </div>
                <div style="overflow-x:auto;">
                    <table style="width:100%">
                        <thead><tr><th>Question</th><th>Module</th><th>Actions</th></tr></thead>
                        <tbody id="questionsTableBody">
            `;
            
            const searchTerm = document.getElementById('searchQuestions')?.value?.toLowerCase() || '';
            const filtered = allQuestions.filter(q => q.question_text?.toLowerCase().includes(searchTerm));
            
            for (let q of filtered) {
                html += `<tr>
                    <td>${escapeHtml(q.question_text?.substring(0, 80))}...</td>
                    <td>${escapeHtml(q.module_type) || 'learner'}</td>
                    <td><button class="btn-sm btn-delete" onclick="deleteQuestion(${q.id})">Delete</button></td>
                </tr>`;
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('questionsPanel').innerHTML = html;
        }
        
        function renderAuditPanel() {
            document.getElementById('auditPanel').innerHTML = `
                <h2>Audit Logs</h2>
                <div style="overflow-x:auto;">
                    <table style="width:100%">
                        <thead><tr><th>Timestamp</th><th>Action</th><th>User</th><th>Details</th></tr></thead>
                        <tbody>
                            ${auditLogs.map(log => `<tr>
                                <td>${new Date(log.created_at).toLocaleString()}</td>
                                <td>${escapeHtml(log.action)}</td>
                                <td>${escapeHtml(log.user_email) || 'system'}</td>
                                <td>${escapeHtml(log.details)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        window.showAddUserModal = function() {
            showModal(`
                <h3>Add New User</h3>
                <input type="text" id="newUserName" placeholder="Full Name">
                <input type="email" id="newUserEmail" placeholder="Email">
                <input type="password" id="newUserPassword" placeholder="Password (min 6)">
                <select id="newUserRole">
                    <option value="user">User</option>
                    <option value="learner">Learner</option>
                    <option value="driver">Driver</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-add" onclick="createUserFromModal()" style="width:100%; margin-top:15px;">Create User</button>
            `);
        };
        
        window.createUserFromModal = async function() {
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const password = document.getElementById('newUserPassword').value;
            const role = document.getElementById('newUserRole').value;
            
            if (!name || !email || !password) {
                showToast('Please fill all fields', 'error');
                return;
            }
            await createUser(email, password, name, role);
            closeModal();
        };
        
        window.showEditUserModal = function(userId, currentRole) {
            showModal(`
                <h3>Edit User Role</h3>
                <select id="editUserRole">
                    <option value="user" ${currentRole === 'user' ? 'selected' : ''}>User</option>
                    <option value="learner" ${currentRole === 'learner' ? 'selected' : ''}>Learner</option>
                    <option value="driver" ${currentRole === 'driver' ? 'selected' : ''}>Driver</option>
                    <option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>Admin</option>
                </select>
                <button class="btn-add" onclick="updateUserRoleFromModal('${userId}')" style="width:100%; margin-top:15px;">Save Changes</button>
            `);
        };
        
        window.updateUserRoleFromModal = async function(userId) {
            const role = document.getElementById('editUserRole').value;
            await updateUserRole(userId, role);
            closeModal();
        };
        
        window.showAddMaterialModal = function() {
            showModal(`
                <h3>Add New Material</h3>
                <input type="text" id="newMaterialTitle" placeholder="Title">
                <textarea id="newMaterialDesc" placeholder="Description" rows="3"></textarea>
                <select id="newMaterialModule">
                    <option value="learner">Learner Hub</option>
                    <option value="psv">PSV</option>
                    <option value="boda">Boda</option>
                    <option value="ev">EV</option>
                    <option value="schoolbus">School Bus</option>
                    <option value="academy">Academy</option>
                </select>
                <input type="number" id="newMaterialUnit" placeholder="Unit Number">
                <select id="newMaterialDifficulty">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
                <button class="btn-add" onclick="createMaterialFromModal()" style="width:100%; margin-top:15px;">Create Material</button>
            `);
        };
        
        window.createMaterialFromModal = async function() {
            const materialData = {
                id: crypto.randomUUID(),
                title: document.getElementById('newMaterialTitle').value,
                description: document.getElementById('newMaterialDesc').value,
                content: `<h2>${document.getElementById('newMaterialTitle').value}</h2><p>${document.getElementById('newMaterialDesc').value}</p>`,
                module_type: document.getElementById('newMaterialModule').value,
                unit_number: parseInt(document.getElementById('newMaterialUnit').value) || 0,
                difficulty: document.getElementById('newMaterialDifficulty').value,
                status: 'published',
                created_at: new Date().toISOString()
            };
            
            if (!materialData.title) {
                showToast('Title is required', 'error');
                return;
            }
            await createMaterial(materialData);
            closeModal();
        };
        
        window.showAddQuestionModal = function() {
            showModal(`
                <h3>Add New Question</h3>
                <textarea id="newQuestionText" placeholder="Question text" rows="3"></textarea>
                <input type="text" id="newOptionA" placeholder="Option A">
                <input type="text" id="newOptionB" placeholder="Option B">
                <input type="text" id="newOptionC" placeholder="Option C">
                <input type="text" id="newOptionD" placeholder="Option D">
                <select id="newCorrectAnswer">
                    <option value="1">Option A</option>
                    <option value="2">Option B</option>
                    <option value="3">Option C</option>
                    <option value="4">Option D</option>
                </select>
                <select id="newQuestionModule">
                    <option value="learner">Learner</option>
                    <option value="psv">PSV</option>
                    <option value="boda">Boda</option>
                    <option value="ev">EV</option>
                </select>
                <button class="btn-add" onclick="createQuestionFromModal()" style="width:100%; margin-top:15px;">Add Question</button>
            `);
        };
        
        window.createQuestionFromModal = async function() {
            const questionData = {
                question_text: document.getElementById('newQuestionText').value,
                option_a: document.getElementById('newOptionA').value,
                option_b: document.getElementById('newOptionB').value,
                option_c: document.getElementById('newOptionC').value,
                option_d: document.getElementById('newOptionD').value,
                correct_answer: parseInt(document.getElementById('newCorrectAnswer').value),
                module_type: document.getElementById('newQuestionModule').value,
                explanation: 'Correct answer explanation',
                created_at: new Date().toISOString()
            };
            
            if (!questionData.question_text) {
                showToast('Question text is required', 'error');
                return;
            }
            await createQuestion(questionData);
            closeModal();
        };
        
        // ============================================
        // FILTER FUNCTIONS
        // ============================================
        window.filterUsers = function() { renderUsersPanel(); };
        window.filterMaterials = function() { renderMaterialsPanel(); };
        window.filterQuestions = function() { renderQuestionsPanel(); };
        
        // ============================================
        // PANEL SWITCHING
        // ============================================
        window.switchPanel = function(panel) {
            currentPanel = panel;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${panel}Panel`).classList.add('active');
            
            if (panel === 'users') renderUsersPanel();
            if (panel === 'materials') renderMaterialsPanel();
            if (panel === 'questions') renderQuestionsPanel();
            if (panel === 'audit') renderAuditPanel();
        };
        
        // ============================================
        // ESCAPE HTML
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(c) {
                if (c === '&') return '&amp;';
                if (c === '<') return '&lt;';
                if (c === '>') return '&gt;';
                return c;
            });
        }
        
        // ============================================
        // GLOBAL FUNCTIONS
        // ============================================
        window.doLogin = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            await handleLogin(email, password);
        };
        
        window.logout = logout;
        window.deleteUser = deleteUser;
        window.deleteMaterial = deleteMaterial;
        window.deleteQuestion = deleteQuestion;
        
        // ============================================
        // INITIALIZATION
        // ============================================
        await checkAdminSession();
    </script>
</body>
</html>
