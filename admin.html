<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .admin-badge {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="userInfo" style="margin-bottom: 20px;">
            <span class="admin-badge">Admin Access</span>
            <p>Welcome, <strong id="username"></strong>!</p>
        </div>
        <div>
            <h3>Admin Controls</h3>
            <ul>
                <li>📊 View Analytics</li>
                <li>👥 Manage Users</li>
                <li>⚙️ System Settings</li>
                <li>📝 View Reports</li>
            </ul>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
