<h2>NTSA Exam</h2>

<div id="quiz"></div>

<script>
fetch("/api/questions")
.then(r=>r.json())
.then(data=>{
document.getElementById("quiz").innerHTML =
data.map(q=>`
  <div>
    <p>${q.question}</p>
    <p>A ${q.a}</p>
    <p>B ${q.b}</p>
    <p>C ${q.c}</p>
    <p>D ${q.d}</p>
  </div>
  <hr>
`).join("");
});
</script>
