<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEI DRIVE AFRICA - Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:system-ui;
    background:#0b0f19;
    color:#fff;
    margin:0;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#121b2c;
    padding:40px;
    border-radius:16px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #1f2b3d;
    background:#0b0f19;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    background:#00d084;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.dashboard{
    display:none;
    padding:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<div class="card">
<h2 style="text-align:center;color:#00d084">MEI DRIVE</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>Welcome Admin</h2>
<button onclick="logout()">Logout</button>
</div>

<script>

/* ================= SUPABASE ================= */
const supabaseUrl = "https://fktjmkmzlixlapeyhhyl.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* ================= LOGIN ================= */
document.getElementById("loginBtn").addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert(error.message);
        return;
    }

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
});

/* ================= SESSION CHECK ================= */
supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }
});

/* ================= LOGOUT ================= */
async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

</script>

</body>
</html>
