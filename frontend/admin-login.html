<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEI DRIVE AFRICA – Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background: #0b0f19;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            min-height: 100vh;
        }
        /* Login Card */
        .login-card{
            background: #121b2c;
            max-width: 420px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1f2b3d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .login-card h2{
            text-align: center;
            margin-bottom: 24px;
            color: #00d084;
        }
        .login-card input{
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        .login-card button{
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d084, #00a86b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
        }
        .message{
            text-align: center;
            margin: 12px 0;
            font-size: 14px;
        }
        .error{color:#ef4444}
        .success{color:#10b981}
        /* Dashboard */
        .dashboard{
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .header{
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .stats{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card{
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 20px;
            padding: 24px;
        }
        .stat-card h3{
            font-size: 36px;
            color: #00d084;
            margin-bottom: 8px;
        }
        .section{
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .section h3{
            margin-bottom: 20px;
            color: #00d084;
        }
        .form-group{
            margin-bottom: 16px;
        }
        .form-group input, .form-group select, .form-group textarea{
            width: 100%;
            padding: 12px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 10px;
            color: white;
        }
        table{
            width: 100%;
            border-collapse: collapse;
        }
        th, td{
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f2b3d;
        }
        th{
            color: #00d084;
        }
        .delete-btn{
            background: #ef4444;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .logout-btn{
            background: #ef4444;
            width: auto;
            padding: 8px 20px;
        }
        @media (max-width: 700px){
            .stats{grid-template-columns: 1fr 1fr}
        }
    </style>
</head>
<body>

<!-- LOGIN FORM -->
<div id="loginContainer">
    <div class="login-card">
        <h2>🚗 MEI DRIVE AFRICA</h2>
        <div id="loginMessage" class="message"></div>
        <input type="email" id="email" placeholder="admin@meidriveafrica.com" value="admin@meidriveafrica.com">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button id="loginBtn">Login to Dashboard</button>
    </div>
</div>

<!-- DASHBOARD (hidden initially) -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <h2>📊 Admin Dashboard</h2>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="stats" id="statsArea"></div>
    <div class="section">
        <h3>➕ Add New Module</h3>
        <div class="form-group">
            <label>Module Type</label>
            <select id="moduleType">
                <option value="learner">Learner Driver</option>
                <option value="psv">PSV Commercial</option>
                <option value="boda">Boda Boda</option>
                <option value="ev">Electric Vehicle</option>
            </select>
        </div>
        <div class="form-group">
            <label>Module Number</label>
            <input type="number" id="moduleNumber" placeholder="e.g., 1, 2, 3">
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="moduleTitle" placeholder="Module title">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="moduleDescription" rows="3" placeholder="Description"></textarea>
        </div>
        <button id="addModuleBtn">Save Module</button>
    </div>
    <div class="section">
        <h3>📚 Module Library</h3>
        <div id="moduleList">Loading modules...</div>
    </div>
</div>

<script>
    // ==================== SUPABASE CONFIGURATION ====================
    const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Table mapping
    const TABLES = {
        learner: 'learner_units',
        psv: 'psv_modules',
        boda: 'boda_modules',
        ev: 'ev_modules'
    };
    
    let currentUser = null;
    
    // Helper: show message on login card
    function showLoginMessage(msg, isError = false) {
        const el = document.getElementById('loginMessage');
        el.textContent = msg;
        el.className = `message ${isError ? 'error' : 'success'}`;
        setTimeout(() => {
            if (el) el.textContent = '';
        }, 4000);
    }
    
    // LOGIN FUNCTION
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        if (!email || !password) {
            showLoginMessage('Please enter email and password', true);
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        showLoginMessage('Authenticating...', false);
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = data.user;
            showLoginMessage('✅ Login successful! Loading dashboard...', false);
            setTimeout(() => {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats();
                loadModules();
            }, 1000);
        } catch (err) {
            showLoginMessage(`❌ ${err.message}`, true);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Login to Dashboard';
        }
    }
    
    // LOGOUT
    async function logout() {
        await supabase.auth.signOut();
        currentUser = null;
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('email').value = 'admin@meidriveafrica.com';
        document.getElementById('password').value = '';
        const statsDiv = document.getElementById('statsArea');
        if (statsDiv) statsDiv.innerHTML = '';
        const moduleDiv = document.getElementById('moduleList');
        if (moduleDiv) moduleDiv.innerHTML = 'Loading modules...';
    }
    
    // LOAD STATISTICS
    async function loadStats() {
        const statsDiv = document.getElementById('statsArea');
        statsDiv.innerHTML = '';
        for (const [type, table] of Object.entries(TABLES)) {
            const { count, error } = await supabase.from(table).select('*', { count: 'exact', head: true });
            if (!error) {
                statsDiv.innerHTML += `
                    <div class="stat-card">
                        <h3>${count || 0}</h3>
                        <p>${type.toUpperCase()}</p>
                    </div>
                `;
            }
        }
    }
    
    // LOAD ALL MODULES
    async function loadModules() {
        const container = document.getElementById('moduleList');
        let allModules = [];
        for (const [type, table] of Object.entries(TABLES)) {
            const { data, error } = await supabase.from(table).select('*').order('module_number', { ascending: true });
            if (!error && data && data.length) {
                allModules.push(...data.map(m => ({ ...m, type })));
            }
        }
        if (allModules.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">No modules yet. Create your first module!</div>';
            return;
        }
        let html = '<table><thead><tr><th>Type</th><th>#</th><th>Title</th><th>Action</th></tr></thead><tbody>';
        for (const m of allModules) {
            html += `
                <tr>
                    <td><strong>${m.type.toUpperCase()}</strong></td>
                    <td>${m.module_number}</td>
                    <td>${escapeHtml(m.title)}</td>
                    <td><button class="delete-btn" data-type="${m.type}" data-id="${m.id}">Delete</button></td>
                </tr>
            `;
        }
        html += `</tbody><table>`;
        container.innerHTML = html;
        // Attach delete events
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-type');
                const id = parseInt(btn.getAttribute('data-id'));
                deleteModule(type, id);
            });
        });
    }
    
    // ADD MODULE
    async function addModule() {
        const type = document.getElementById('moduleType').value;
        const table = TABLES[type];
        const moduleNumber = parseInt(document.getElementById('moduleNumber').value);
        const title = document.getElementById('moduleTitle').value.trim();
        const description = document.getElementById('moduleDescription').value.trim();
        if (!title || isNaN(moduleNumber)) {
            alert('Please fill in title and module number');
            return;
        }
        const { error } = await supabase.from(table).insert([{
            module_number: moduleNumber,
            title: title,
            description: description,
            status: 'published',
            created_at: new Date().toISOString()
        }]);
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        alert('Module added successfully!');
        document.getElementById('moduleNumber').value = '';
        document.getElementById('moduleTitle').value = '';
        document.getElementById('moduleDescription').value = '';
        loadStats();
        loadModules();
    }
    
    // DELETE MODULE
    async function deleteModule(type, id) {
        if (!confirm('Are you sure you want to delete this module?')) return;
        const table = TABLES[type];
        const { error } = await supabase.from(table).delete().eq('id', id);
        if (error) {
            alert('Delete error: ' + error.message);
            return;
        }
        loadStats();
        loadModules();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('addModuleBtn').addEventListener('click', addModule);
    
    // Check for existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStats();
            loadModules();
        }
    });
</script>
</body>
</html>
