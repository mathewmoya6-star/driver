<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA | Admin</title>
    <!-- Load Supabase correctly – the library exports 'supabase' globally -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #0d2137; border: 1px solid #00ff88; border-radius: 24px; padding: 32px; max-width: 500px; width: 100%; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #00ff88; background: #0a192f; color: white; }
        button { background: #00ff88; color: #0a192f; font-weight: bold; cursor: pointer; }
        .error { color: #ff4757; margin-top: 12px; }
        pre { background: #000; padding: 10px; overflow: auto; font-size: 12px; }
        .log { margin-top: 20px; background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="card">
    <h2>🚗 MEI DRIVE AFRICA</h2>
    <div id="loginView">
        <h3>Admin Login</h3>
        <input type="email" id="email" placeholder="Email" value="admin@meidrive.com">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginError" class="error"></div>
    </div>
    <div id="adminView" style="display:none;">
        <h3>✅ Admin Panel</h3>
        <button onclick="logout()">Logout</button>
        <div id="adminContent">Loading...</div>
    </div>
    <div class="log" id="debugLog"></div>
</div>

<script>
    // === SUPABASE CONFIG ===
    const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
    
    let supabase;
    let currentUser = null;

    function log(msg) {
        const div = document.getElementById('debugLog');
        div.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        console.log(msg);
    }

    async function init() {
        log('Initializing...');
        // Check if supabase global exists
        if (typeof supabaseJs === 'undefined' && typeof supabase === 'undefined') {
            log('ERROR: Supabase library not loaded. Check CDN.');
            document.getElementById('loginError').innerText = 'Library failed to load. Refresh page.';
            return;
        }
        // The UMD export is usually 'supabase' (not 'supabaseJs')
        const lib = window.supabase || window.supabaseJs;
        if (!lib || !lib.createClient) {
            log('ERROR: createClient not found. Available: ' + Object.keys(window));
            return;
        }
        supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('Supabase client created');
        
        // Check existing session
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error) {
            log('Session error: ' + error.message);
        } else if (session) {
            log('Session found for: ' + session.user.email);
            currentUser = session.user;
            await checkAdminAndShowPanel();
        } else {
            log('No session, showing login');
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('adminView').style.display = 'none';
        }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        document.getElementById('loginError').innerText = '';
        log('Logging in as ' + email);
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            log('Login success');
            currentUser = data.user;
            await checkAdminAndShowPanel();
        } catch (err) {
            log('Login failed: ' + err.message);
            document.getElementById('loginError').innerText = err.message;
        }
    }

    async function checkAdminAndShowPanel() {
        log('Checking admin status...');
        try {
            const { data, error } = await supabase.rpc('is_admin_user');
            if (error) throw error;
            log('is_admin_user result: ' + data);
            if (data === true) {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('adminView').style.display = 'block';
                await loadAdminData();
            } else {
                log('User is not admin');
                await supabase.auth.signOut();
                document.getElementById('loginError').innerText = 'You are not an administrator.';
            }
        } catch (err) {
            log('Admin check error: ' + err.message);
            document.getElementById('loginError').innerText = 'Admin function error: ' + err.message;
        }
    }

    async function loadAdminData() {
        const contentDiv = document.getElementById('adminContent');
        contentDiv.innerHTML = 'Fetching stats...';
        try {
            const { data: users, error: uErr } = await supabase.from('user_profiles').select('count');
            const { data: courses, error: cErr } = await supabase.from('courses').select('count');
            const { data: payments, error: pErr } = await supabase.from('enrollments').select('count');
            if (uErr || cErr || pErr) throw new Error(`Query error: ${uErr?.message || cErr?.message || pErr?.message}`);
            contentDiv.innerHTML = `
                <p>✅ Connected to Supabase</p>
                <p>👥 Users: ${users[0]?.count || 0}</p>
                <p>📚 Courses: ${courses[0]?.count || 0}</p>
                <p>💰 Enrollments: ${payments[0]?.count || 0}</p>
                <hr>
                <p>If you see this, the database is accessible.</p>
                <p>Now run the full SQL setup to enable all admin features.</p>
            `;
        } catch (err) {
            contentDiv.innerHTML = `<div class="error">Failed to load data: ${err.message}</div>`;
            log('Data load error: ' + err.message);
        }
    }

    async function logout() {
        await supabase.auth.signOut();
        currentUser = null;
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('adminView').style.display = 'none';
        log('Logged out');
    }

    window.login = login;
    window.logout = logout;
    // Wait for DOM and then init
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
