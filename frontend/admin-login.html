<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - MEI DRIVE AFRICA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    .navbar {
      background: #111;
      border-bottom: 1px solid #d4af37;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      color: #d4af37;
    }
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .container {
      padding: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #d4af37;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    th {
      color: #d4af37;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-edit { background: #3498db; color: white; }
    .btn-delete { background: #e74c3c; color: white; }
    .section {
      background: #111;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid #222;
    }
    .section h2 {
      margin-bottom: 20px;
      color: #d4af37;
    }
    input, select {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 8px;
      color: white;
      margin-right: 10px;
    }
    .add-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">MEI DRIVE AFRICA - Admin Dashboard</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  
  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>Total Users</div></div>
      <div class="stat-card"><div class="stat-number" id="totalCourses">0</div><div>Total Courses</div></div>
      <div class="stat-card"><div class="stat-number" id="totalRevenue">KSH 0</div><div>Revenue</div></div>
      <div class="stat-card"><div class="stat-number" id="activeUsers">0</div><div>Active Users</div></div>
    </div>

    <!-- User Management -->
    <div class="section">
      <h2>📋 User Management</h2>
      <div style="overflow-x: auto;">
        <table id="usersTable">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
      <div class="add-form">
        <input type="text" id="userName" placeholder="Name">
        <input type="email" id="userEmail" placeholder="Email">
        <select id="userRole"><option value="user">User</option><option value="admin">Admin</option></select>
        <button class="btn" onclick="addUser()" style="background:#2ecc71;">+ Add User</button>
      </div>
    </div>

    <!-- System Settings -->
    <div class="section">
      <h2>⚙️ System Settings</h2>
      <label><input type="checkbox" id="maintenanceMode"> Maintenance Mode</label><br>
      <label><input type="checkbox" id="allowReg" checked> Allow Registration</label><br>
      <button class="btn" onclick="saveSettings()" style="background:#d4af37; color:#000; margin-top:15px;">Save Settings</button>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';
    
    // Check if admin is logged in
    const adminUser = localStorage.getItem('adminUser');
    if (!adminUser) {
      window.location.href = 'admin-login.html';
    }
    
    // Demo data (fallback if no Supabase)
    let users = [
      { id: 1, name: 'John Kamau', email: 'john@mei.com', role: 'admin', status: 'active' },
      { id: 2, name: 'Mary Wanjiku', email: 'mary@mei.com', role: 'user', status: 'active' },
      { id: 3, name: 'Peter Otieno', email: 'peter@mei.com', role: 'user', status: 'inactive' }
    ];
    
    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.name}</td><td>${u.email}</td>
          <td><span style="color:${u.role === 'admin' ? '#e74c3c' : '#3498db'}">${u.role}</span></td>
          <td><span style="color:${u.status === 'active' ? '#2ecc71' : '#e74c3c'}">${u.status}</span></td>
          <td><button class="btn btn-edit" onclick="editUser(${u.id})">Edit</button> <button class="btn btn-delete" onclick="deleteUser(${u.id})">Delete</button></td>
        </tr>
      `).join('');
      
      document.getElementById('totalUsers').innerText = users.length;
      document.getElementById('activeUsers').innerText = users.filter(u => u.status === 'active').length;
      document.getElementById('totalCourses').innerText = '45';
      document.getElementById('totalRevenue').innerText = 'KSH 124,500';
    }
    
    window.addUser = function() {
      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const role = document.getElementById('userRole').value;
      if (name && email) {
        users.push({ id: Date.now(), name, email, role, status: 'active' });
        renderUsers();
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
      }
    };
    
    window.editUser = function(id) {
      const user = users.find(u => u.id === id);
      const newName = prompt('Edit name:', user.name);
      const newRole = prompt('Edit role (user/admin):', user.role);
      if (newName) user.name = newName;
      if (newRole && (newRole === 'user' || newRole === 'admin')) user.role = newRole;
      renderUsers();
    };
    
    window.deleteUser = function(id) {
      if (confirm('Delete this user?')) {
        users = users.filter(u => u.id !== id);
        renderUsers();
      }
    };
    
    window.saveSettings = function() {
      localStorage.setItem('maintenanceMode', document.getElementById('maintenanceMode').checked);
      localStorage.setItem('allowReg', document.getElementById('allowReg').checked);
      alert('Settings saved');
    };
    
    window.logout = function() {
      localStorage.removeItem('adminUser');
      window.location.href = 'admin-login.html';
    };
    
    renderUsers();
  </script>
</body>
</html>
