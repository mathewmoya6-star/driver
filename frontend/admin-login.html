<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #06080f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d084, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00d084;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d084, #00a86b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        label {
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <div class="subtitle">Admin Portal</div>
        
        <div id="message"></div>
        
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@meidriveafrica.com" value="admin@meidriveafrica.com">
        
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        
        <button onclick="login()">Login to Dashboard</button>
        
        <div style="margin-top: 20px; font-size: 12px; color: #94a3b8; text-align: center;">
            Default: Admin@123456<br>
            Admin ID: a10f4b9e-2596-4399-8461-cc3f47e61e89
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://fktjmkmzlixlapeyhhyl.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E'
        );
        
        const ADMIN_ID = 'a10f4b9e-2596-4399-8461-cc3f47e61e89';
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '<div class="info">⏳ Logging in...</div>';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    messageDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                    return;
                }
                
                if (data.user.id !== ADMIN_ID) {
                    messageDiv.innerHTML = '<div class="error">❌ Admin access required. This account is not authorized.</div>';
                    await supabase.auth.signOut();
                    return;
                }
                
                messageDiv.innerHTML = '<div class="success">✅ Login successful! Redirecting...</div>';
                
                // Store session
                localStorage.setItem('admin_logged_in', 'true');
                
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1500);
                
            } catch (err) {
                messageDiv.innerHTML = `<div class="error">❌ ${err.message}</div>`;
            }
        }
        
        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user.id === ADMIN_ID) {
                window.location.href = 'admin-dashboard.html';
            }
        }
        
        checkSession();
    </script>
</body>
</html>
