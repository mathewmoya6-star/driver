<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B0F19 0%, #0a0e17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-card {
            background: rgba(18, 27, 44, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(0, 208, 132, 0.3);
        }
        .logo { text-align: center; font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #00d084, #4ade80); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge { text-align: center; background: rgba(0,208,132,0.15); padding: 6px; border-radius: 40px; margin: 15px 0; color: #00d084; }
        h2 { color: white; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #A0B3D9; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #A0B3D9; }
        input { width: 100%; padding: 12px 16px; background: #0F1622; border: 1px solid #1E2A3E; border-radius: 60px; color: white; }
        input:focus { outline: none; border-color: #00d084; }
        .toggle-admin { display: flex; justify-content: space-between; background: #121B2C; padding: 12px 18px; border-radius: 60px; cursor: pointer; margin-bottom: 20px; }
        .toggle-switch { width: 48px; height: 24px; background: #1E2A3E; border-radius: 40px; position: relative; transition: 0.2s; }
        .toggle-switch.active { background: #00d084; }
        .toggle-switch::after { content: ''; width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 4px; transition: 0.2s; }
        .toggle-switch.active::after { left: 24px; }
        .admin-code-group { display: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #00d084, #00a86b); border: none; border-radius: 60px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { background: rgba(239,68,68,0.2); border-left: 3px solid #EF4444; padding: 12px; border-radius: 12px; margin-top: 20px; color: #FCA5A5; display: none; }
        .success-msg { background: rgba(0,208,132,0.2); border-left: 3px solid #00d084; padding: 12px; border-radius: 12px; margin-top: 20px; color: #A0B3D9; display: none; }
        .footer { margin-top: 24px; text-align: center; font-size: 0.8rem; }
        .footer a { color: #00d084; text-decoration: none; }
    </style>
</head>
<body>
<div class="admin-card">
    <div class="logo">⚡ MEI DRIVE AFRICA</div>
    <div class="badge">ADMIN PORTAL</div>
    <h2>🔐 Admin Login</h2>
    <div class="sub">Grant yourself admin rights with secret code</div>

    <div class="toggle-admin" id="toggleAdminBtn">
        <span><i class="fas fa-shield-alt"></i> Use Admin Code (ADMIN2025)</span>
        <div class="toggle-switch" id="toggleSwitch"></div>
    </div>

    <form id="adminForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <div class="form-group admin-code-group" id="adminCodeGroup">
            <label>Admin Secret Code</label>
            <input type="password" id="adminCode" placeholder="Enter ADMIN2025">
        </div>
        <button type="submit" id="loginBtn">Login & Grant Admin</button>
    </form>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="footer">
        <a href="#" id="backToHome">← Back to Main Site</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script>
    const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle admin code field
    let adminMode = false;
    const toggleBtn = document.getElementById('toggleAdminBtn');
    const toggleSwitch = document.getElementById('toggleSwitch');
    const adminCodeGroup = document.getElementById('adminCodeGroup');

    toggleBtn.addEventListener('click', () => {
        adminMode = !adminMode;
        if (adminMode) {
            toggleSwitch.classList.add('active');
            adminCodeGroup.style.display = 'block';
        } else {
            toggleSwitch.classList.remove('active');
            adminCodeGroup.style.display = 'none';
        }
    });

    // Helper to ensure user profile exists and optionally set admin
    async function ensureUserProfile(userId, makeAdmin = false) {
        // Check if profile exists
        const { data: existing, error: fetchError } = await supabase
            .from('user_profiles')
            .select('id, is_admin')
            .eq('id', userId)
            .maybeSingle();

        if (fetchError && fetchError.code !== 'PGRST116') {
            console.error('Profile fetch error:', fetchError);
            return false;
        }

        if (!existing) {
            // Create profile
            const { error: insertError } = await supabase
                .from('user_profiles')
                .insert({ id: userId, is_admin: makeAdmin });
            if (insertError) {
                console.error('Insert profile error:', insertError);
                return false;
            }
            return makeAdmin;
        } else {
            if (makeAdmin && !existing.is_admin) {
                const { error: updateError } = await supabase
                    .from('user_profiles')
                    .update({ is_admin: true, updated_at: new Date() })
                    .eq('id', userId);
                if (updateError) {
                    console.error('Update admin error:', updateError);
                    return false;
                }
                return true;
            }
            return existing.is_admin || false;
        }
    }

    // Main login & admin granting
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const adminCode = document.getElementById('adminCode').value.trim();
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!email || !password) {
            errorDiv.textContent = '❌ Please enter email and password';
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Authenticating...';

        try {
            // 1. Sign in
            const { data: authData, error: signInError } = await supabase.auth.signInWithPassword({ email, password });
            if (signInError) throw new Error(signInError.message);
            const user = authData.user;

            // 2. Determine if admin should be granted
            let shouldBeAdmin = false;
            if (adminMode) {
                if (adminCode === 'ADMIN2025') {
                    shouldBeAdmin = true;
                } else {
                    throw new Error('Invalid admin secret code. Access denied.');
                }
            } else {
                // Without admin mode, check if user already has admin flag in DB
                const { data: profile } = await supabase.from('user_profiles').select('is_admin').eq('id', user.id).maybeSingle();
                if (profile?.is_admin !== true) {
                    throw new Error('This account has no admin privileges. Enable admin mode and enter the correct code.');
                }
                shouldBeAdmin = true; // already admin
            }

            // 3. Ensure profile and set admin flag if needed
            const isNowAdmin = await ensureUserProfile(user.id, shouldBeAdmin);
            if (!isNowAdmin) {
                throw new Error('Failed to set admin privileges. Please check database permissions.');
            }

            // 4. Success - redirect to main app
            successDiv.textContent = '✅ Admin access granted! Redirecting to dashboard...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);

        } catch (err) {
            errorDiv.textContent = `❌ ${err.message}`;
            errorDiv.style.display = 'block';
            await supabase.auth.signOut();
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login & Grant Admin';
        }
    });

    document.getElementById('backToHome').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
