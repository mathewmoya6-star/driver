<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#00d084">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>MEI DRIVE AFRICA | Enterprise Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d084;
            --primary-dark: #00a86b;
            --primary-light: #4ade80;
            --dark: #000000;
            --dark-card: #0a0a0a;
            --dark-hover: #111111;
            --border: #1a1a1a;
            --text: #FFFFFF;
            --text-muted: #888888;
            --gradient-primary: linear-gradient(135deg, #00d084 0%, #4ade80 100%);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --font-xs: 0.75rem;
            --font-sm: 0.875rem;
            --font-md: 1rem;
            --font-lg: 1.25rem;
            --font-xl: 1.5rem;
            --font-2xl: 1.875rem;
            --z-sidebar: 100;
            --z-modal: 1000;
            --z-toast: 1100;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .admin-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: var(--z-sidebar);
        }
        
        .sidebar-header { padding: var(--spacing-lg); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: var(--spacing-sm); }
        
        .user-info { padding: var(--spacing-lg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: var(--spacing-md); }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--dark); }
        
        .nav-menu { padding: var(--spacing-lg); }
        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: var(--spacing-xs);
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(0, 208, 132, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        .main-content { flex: 1; margin-left: 280px; padding: var(--spacing-xl) var(--spacing-xl); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl); flex-wrap: wrap; gap: var(--spacing-md); }
        .page-title h1 { font-size: var(--font-2xl); font-weight: 700; color: var(--primary); }
        .page-title p { color: var(--text-muted); font-size: var(--font-sm); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .stat-info h3 { font-size: var(--font-sm); font-weight: 500; color: var(--text-muted); margin-bottom: var(--spacing-sm); }
        .stat-number { font-size: var(--font-2xl); font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(0, 208, 132, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary); }
        
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }
        .card-header h2 { font-size: var(--font-lg); font-weight: 600; color: var(--primary); }
        
        .data-table {
            width: 100%;
            overflow-x: auto;
        }
        .data-table table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td {
            padding: var(--spacing-md);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(0, 208, 132, 0.05); color: var(--primary); font-weight: 600; }
        
        .status-badge {
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: 20px;
            font-size: var(--font-xs);
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-pending { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .status-completed { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .role-admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-instructor { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .role-student { background: rgba(0, 208, 132, 0.2); color: var(--primary); }
        
        .btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: var(--font-sm);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .btn-primary { background: var(--gradient-primary); color: var(--dark); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; transform: translateY(-1px); }
        .btn-sm { padding: var(--spacing-xs) var(--spacing-md); font-size: var(--font-xs); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(12px);
            z-index: var(--z-modal);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: var(--spacing-xl);
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: var(--spacing-lg); }
        .form-group label { display: block; margin-bottom: var(--spacing-sm); font-weight: 500; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: var(--spacing-md);
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: var(--font-md);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .toast-container { position: fixed; bottom: var(--spacing-lg); right: var(--spacing-lg); z-index: var(--z-toast); }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: var(--spacing-md) var(--spacing-lg); border-radius: 12px; margin-top: var(--spacing-sm); animation: slideIn 0.3s ease; box-shadow: var(--shadow-lg); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
        }
        .login-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: var(--spacing-xl);
            width: 100%;
            max-width: 460px;
        }
        .login-header { text-align: center; margin-bottom: var(--spacing-xl); }
        .login-header h1 { font-size: var(--font-2xl); color: var(--primary); margin-top: var(--spacing-md); }
        
        .mobile-menu-btn { display: none; position: fixed; top: var(--spacing-md); left: var(--spacing-md); z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: var(--spacing-md); cursor: pointer; color: var(--primary); }
        
        .pagination {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: center;
            margin-top: var(--spacing-lg);
        }
        .pagination button {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--dark-card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover { border-color: var(--primary); color: var(--primary); }
        .pagination button.active { background: var(--primary); color: var(--dark); border-color: var(--primary); }
        
        .search-input {
            padding: var(--spacing-sm) var(--spacing-md);
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            width: 100%;
            max-width: 300px;
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: var(--spacing-md); margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: var(--font-xs); }
            .data-table th, .data-table td { padding: var(--spacing-sm); }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .chart-container { height: 300px; margin-top: var(--spacing-lg); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // ==================== PRODUCTION CONFIGURATION ====================
        const SUPABASE_CONFIG = {
            url: 'https://fktjmkmzlixlapeyhhyl.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E'
        };
        
        // ==================== ENTERPRISE STATE MANAGEMENT ====================
        let appState = {
            currentUser: null,
            currentView: 'login',
            isLoading: false,
            users: { data: [], total: 0, page: 1, limit: 10, search: '' },
            modules: { data: [], total: 0, page: 1, limit: 10, search: '' },
            enrollments: { data: [], total: 0, page: 1, limit: 10 },
            revenue: { total: 0, monthly: [], daily: [] },
            quizAttempts: [],
            certificates: [],
            auditLogs: []
        };
        
        let supabase = null;
        let analyticsChart = null;
        
        // Initialize Supabase
        try {
            supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        } catch(e) { console.error('Supabase init failed:', e); }
        
        // ==================== DATABASE SCHEMA SETUP ====================
        // Required tables to create in Supabase:
        // 1. users (id, email, name, role, status, created_at, updated_at)
        // 2. modules (id, name, description, price, duration, status, created_at)
        // 3. enrollments (id, user_id, module_id, progress, status, enrolled_at, completed_at)
        // 4. quiz_attempts (id, user_id, module_id, score, answers, created_at)
        // 5. certificates (id, user_id, module_id, certificate_code, issued_at)
        // 6. audit_logs (id, user_id, action, details, ip_address, created_at)
        // 7. payments (id, user_id, module_id, amount, status, transaction_id, created_at)
        
        async function initializeDatabaseTables() {
            console.log('Database tables should be created manually in Supabase SQL editor');
            // SQL statements provided in comments
        }
        
        // ==================== AUTHENTICATION SYSTEM ====================
        async function initializeAuth() {
            if (!supabase) {
                showToast('Supabase connection failed', 'error');
                return false;
            }
            
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    // Fetch user profile with role
                    const { data: profile } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (profile && profile.role === 'admin') {
                        appState.currentUser = {
                            id: session.user.id,
                            email: session.user.email,
                            role: profile.role,
                            name: profile.name
                        };
                        appState.currentView = 'dashboard';
                        await loadDashboardData();
                        await loadAnalytics();
                        renderApp();
                        return true;
                    } else {
                        await supabase.auth.signOut();
                        showToast('Admin access required', 'error');
                    }
                }
            } catch (error) {
                console.error('Auth init error:', error);
            }
            return false;
        }
        
        async function handleLogin(email, password) {
            if (!supabase) {
                showToast('Supabase not configured', 'error');
                return false;
            }
            
            setLoading(true);
            try {
                // Sanitize input
                const sanitizedEmail = email.trim().toLowerCase();
                
                const { data, error } = await supabase.auth.signInWithPassword({ 
                    email: sanitizedEmail, 
                    password 
                });
                
                if (error) throw error;
                
                // Verify admin role from users table
                const { data: profile, error: profileError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (profileError || !profile || profile.role !== 'admin') {
                    await supabase.auth.signOut();
                    throw new Error('Admin access required. Please contact system administrator.');
                }
                
                // Log audit entry
                await logAudit(data.user.id, 'LOGIN_SUCCESS', { email: sanitizedEmail });
                
                appState.currentUser = {
                    id: data.user.id,
                    email: data.user.email,
                    role: profile.role,
                    name: profile.name || data.user.email
                };
                
                appState.currentView = 'dashboard';
                await loadDashboardData();
                await loadAnalytics();
                renderApp();
                showToast('Login successful! Welcome back.', 'success');
                return true;
                
            } catch (error) {
                console.error('Login error:', error);
                showToast(error.message || 'Login failed', 'error');
                return false;
            } finally {
                setLoading(false);
            }
        }
        
        async function handleLogout() {
            if (appState.currentUser) {
                await logAudit(appState.currentUser.id, 'LOGOUT', {});
            }
            if (supabase) await supabase.auth.signOut();
            appState.currentUser = null;
            appState.currentView = 'login';
            renderApp();
            showToast('Logged out successfully', 'success');
        }
        
        // ==================== AUDIT & LOGGING ====================
        async function logAudit(userId, action, details) {
            try {
                await supabase
                    .from('audit_logs')
                    .insert([{
                        user_id: userId,
                        action: action,
                        details: details,
                        ip_address: await getClientIP(),
                        created_at: new Date()
                    }]);
            } catch (error) {
                console.error('Audit log error:', error);
            }
        }
        
        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'unknown';
            }
        }
        
        // ==================== DATA LOADING WITH PAGINATION ====================
        async function loadDashboardData() {
            setLoading(true);
            try {
                await Promise.all([
                    loadUsers(),
                    loadModules(),
                    loadEnrollments(),
                    loadRevenue()
                ]);
            } catch (error) {
                console.error('Load data error:', error);
                showToast('Failed to load dashboard data', 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function loadUsers() {
            let query = supabase
                .from('users')
                .select('*', { count: 'exact' });
            
            if (appState.users.search) {
                query = query.ilike('email', `%${appState.users.search}%`);
            }
            
            const start = (appState.users.page - 1) * appState.users.limit;
            const end = start + appState.users.limit - 1;
            
            const { data, error, count } = await query
                .range(start, end)
                .order('created_at', { ascending: false });
            
            if (!error && data) {
                appState.users.data = data;
                appState.users.total = count || 0;
            }
        }
        
        async function loadModules() {
            let query = supabase
                .from('modules')
                .select('*', { count: 'exact' });
            
            if (appState.modules.search) {
                query = query.ilike('name', `%${appState.modules.search}%`);
            }
            
            const start = (appState.modules.page - 1) * appState.modules.limit;
            const end = start + appState.modules.limit - 1;
            
            const { data, error, count } = await query
                .range(start, end)
                .order('created_at', { ascending: false });
            
            if (!error && data) {
                appState.modules.data = data;
                appState.modules.total = count || 0;
            }
        }
        
        async function loadEnrollments() {
            const { data, error, count } = await supabase
                .from('enrollments')
                .select('*, users(name, email), modules(name)', { count: 'exact' })
                .range((appState.enrollments.page - 1) * appState.enrollments.limit, appState.enrollments.page * appState.enrollments.limit - 1)
                .order('enrolled_at', { ascending: false });
            
            if (!error && data) {
                appState.enrollments.data = data;
                appState.enrollments.total = count || 0;
            }
        }
        
        async function loadRevenue() {
            const { data, error } = await supabase
                .from('payments')
                .select('amount, status, created_at')
                .eq('status', 'completed');
            
            if (!error && data) {
                appState.revenue.total = data.reduce((sum, p) => sum + p.amount, 0);
                
                // Group by month for analytics
                const monthly = {};
                data.forEach(payment => {
                    const month = new Date(payment.created_at).toLocaleString('default', { month: 'short' });
                    monthly[month] = (monthly[month] || 0) + payment.amount;
                });
                appState.revenue.monthly = Object.entries(monthly).map(([month, amount]) => ({ month, amount }));
            }
        }
        
        async function loadAnalytics() {
            const { data: quizData } = await supabase
                .from('quiz_attempts')
                .select('score, created_at');
            
            if (quizData && analyticsChart) {
                const avgScores = quizData.reduce((acc, q) => acc + q.score, 0) / (quizData.length || 1);
                updateAnalyticsChart(avgScores);
            }
        }
        
        // ==================== CRUD OPERATIONS ====================
        async function createUser(userData) {
            setLoading(true);
            try {
                // First create auth user
                const { data: authUser, error: authError } = await supabase.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                });
                
                if (authError) throw authError;
                
                // Then create profile
                const { error: profileError } = await supabase
                    .from('users')
                    .insert([{
                        id: authUser.user.id,
                        email: userData.email,
                        name: userData.name,
                        role: userData.role || 'student',
                        status: 'active',
                        created_at: new Date()
                    }]);
                
                if (profileError) throw profileError;
                
                await logAudit(appState.currentUser.id, 'USER_CREATED', { email: userData.email, role: userData.role });
                await loadUsers();
                showToast('User created successfully', 'success');
                closeModal('userModal');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function updateUser(userId, updates) {
            setLoading(true);
            try {
                const { error } = await supabase
                    .from('users')
                    .update(updates)
                    .eq('id', userId);
                
                if (error) throw error;
                
                await logAudit(appState.currentUser.id, 'USER_UPDATED', { user_id: userId, updates });
                await loadUsers();
                showToast('User updated successfully', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function deleteUser(userId) {
            if (!confirm('Are you sure? This will permanently delete the user and all associated data.')) return;
            
            setLoading(true);
            try {
                // Delete from auth
                const { error: authError } = await supabase.auth.admin.deleteUser(userId);
                if (authError) throw authError;
                
                // Delete from users table (cascade should handle related tables)
                const { error } = await supabase
                    .from('users')
                    .delete()
                    .eq('id', userId);
                
                if (error) throw error;
                
                await logAudit(appState.currentUser.id, 'USER_DELETED', { user_id: userId });
                await loadUsers();
                showToast('User deleted successfully', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function createModule(moduleData) {
            setLoading(true);
            try {
                const { error } = await supabase
                    .from('modules')
                    .insert([{
                        ...moduleData,
                        created_at: new Date(),
                        status: 'active'
                    }]);
                
                if (error) throw error;
                
                await logAudit(appState.currentUser.id, 'MODULE_CREATED', { name: moduleData.name });
                await loadModules();
                showToast('Module created successfully', 'success');
                closeModal('moduleModal');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function updateModule(moduleId, updates) {
            setLoading(true);
            try {
                const { error } = await supabase
                    .from('modules')
                    .update(updates)
                    .eq('id', moduleId);
                
                if (error) throw error;
                
                await logAudit(appState.currentUser.id, 'MODULE_UPDATED', { module_id: moduleId });
                await loadModules();
                showToast('Module updated successfully', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function deleteModule(moduleId) {
            if (!confirm('Delete this module? This will also delete all enrollments and quiz attempts.')) return;
            
            setLoading(true);
            try {
                const { error } = await supabase
                    .from('modules')
                    .delete()
                    .eq('id', moduleId);
                
                if (error) throw error;
                
                await logAudit(appState.currentUser.id, 'MODULE_DELETED', { module_id: moduleId });
                await loadModules();
                showToast('Module deleted successfully', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

            analyticsChart.update();
        }
        
        function initAnalyticsChart() {
            const ctx = document.getElementById('analyticsChart')?.getContext('2d');
            if (!ctx) return;
            
            analyticsChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Average Score', 'Remaining'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#00d084', '#1a1a1a'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,

        // ==================== UI HELPER FUNCTIONS ====================
        function setLoading(loading) {

        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${escapeHtml(message)}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.add('active');

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.remove('active');

        function renderPagination(type, total, currentPage, limit) {
            const totalPages = Math.ceil(total / limit);
            if (totalPages <= 1) return '';
            
            let pages = [];
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                pages.push(`<button class="${i === currentPage ? 'active' : ''}" onclick="changePage('${type}', ${i})">${i}</button>`);
            }
            
            return `<div class="pagination">${pages.join('')}</div>`;
        }

                appState.users.page = page;
                await loadUsers();

                appState.modules.page = page;
                await loadModules();
            }
            renderApp();
