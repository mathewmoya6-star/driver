<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        body {
            background: #0a192f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', system-ui;
            margin: 0;
        }
        .login-card {
            background: #0d2137;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid #00ff88;
            width: 320px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
        }
        input {
            background: #0f1a2c;
            color: white;
            border: 1px solid #2c4c6e;
        }
        button {
            background: #00ff88;
            color: #0a192f;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #ff4757;
            margin-top: 12px;
            font-size: 14px;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #00ff88;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🚗 Admin Login</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    // ========== CORRECT SUPABASE CREDENTIALS (same as main platform) ==========
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.innerText = '';

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            errorDiv.innerText = error.message;
            return;
        }

        // After successful login, redirect to admin dashboard
        window.location.href = 'admin.html';
    }
</script>
</body>
</html>
