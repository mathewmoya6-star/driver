<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MEI DRIVE AFRICA - Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:linear-gradient(135deg,#0b0f19 0%,#06080f 100%);
    color:#fff;
    min-height:100vh;
}

/* LOGIN */

.login-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:#121b2c;
    border:1px solid #1f2b3d;
    border-radius:24px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.login-card h1{
    text-align:center;
    margin-bottom:10px;
    font-size:30px;
    background:linear-gradient(135deg,#00d084,#4ade80);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.login-card p{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#94a3b8;
    font-size:14px;
}

.input-group input,
.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:14px;
    background:#0b0f19;
    border:1px solid #1f2b3d;
    border-radius:12px;
    color:#fff;
    font-size:15px;
}

.input-group input:focus,
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    outline:none;
    border-color:#00d084;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00d084,#00a86b);
    color:#000;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.message{
    display:none;
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:14px;
}

.message.error{
    display:block;
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.3);
    color:#ef4444;
}

.message.success{
    display:block;
    background:rgba(16,185,129,.1);
    border:1px solid rgba(16,185,129,.3);
    color:#10b981;
}

.message.info{
    display:block;
    background:rgba(59,130,246,.1);
    border:1px solid rgba(59,130,246,.3);
    color:#60a5fa;
}

/* DASHBOARD */

.dashboard{
    padding:20px;
}

.header{
    background:#121b2c;
    border:1px solid #1f2b3d;
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.header h2{
    color:#00d084;
}

.logout-btn{
    width:auto;
    background:#ef4444;
    color:#fff;
    padding:10px 20px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:24px;
}

.stat-card{
    background:#121b2c;
    border:1px solid #1f2b3d;
    border-radius:16px;
    padding:24px;
}

.stat-card h3{
    font-size:32px;
    color:#00d084;
    margin-bottom:8px;
}

.stat-card p{
    color:#94a3b8;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

.section{
    background:#121b2c;
    border:1px solid #1f2b3d;
    border-radius:16px;
    padding:24px;
}

.section h3{
    margin-bottom:20px;
    color:#00d084;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#94a3b8;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #1f2b3d;
    text-align:left;
}

th{
    color:#00d084;
}

.delete-btn{
    background:#ef4444;
    border:none;
    color:#fff;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

.loading{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

@media(max-width:768px){

    .grid-2{
        grid-template-columns:1fr;
    }

}
</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginSection">

<div class="login-container">

<div class="login-card">

<h1>🚗 MEI DRIVE AFRICA</h1>

<p>Administrator Login</p>

<div id="loginMessage" class="message"></div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="admin@meidriveafrica.com">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
</div>

<button class="btn" id="loginBtn">
Login to Dashboard
</button>

</div>
</div>
</div>

<!-- DASHBOARD -->

<div id="dashboardSection" style="display:none;">

<div class="dashboard">

<div class="header">

<h2>📊 MEI DRIVE AFRICA ADMIN</h2>

<div>
<span id="userEmail"></span>
<button class="btn logout-btn" id="logoutBtn">
Logout
</button>
</div>

</div>

<!-- STATS -->

<div class="stats-grid">

<div class="stat-card">
<h3 id="learnerCount">0</h3>
<p>🚗 Learner Units</p>
</div>

<div class="stat-card">
<h3 id="psvCount">0</h3>
<p>🚌 PSV Modules</p>
</div>

<div class="stat-card">
<h3 id="bodaCount">0</h3>
<p>🏍️ Boda Modules</p>
</div>

<div class="stat-card">
<h3 id="evCount">0</h3>
<p>⚡ EV Modules</p>
</div>

</div>

<!-- CONTENT -->

<div class="grid-2">

<!-- ADD MODULE -->

<div class="section">

<h3>➕ Create Module</h3>

<div class="form-group">
<label>Category</label>

<select id="moduleType">
<option value="learner">Learner Driver</option>
<option value="psv">PSV</option>
<option value="boda">Boda Boda</option>
<option value="ev">Electric Vehicle</option>
</select>
</div>

<div class="form-group">
<label>Module Number</label>
<input type="number" id="moduleNumber">
</div>

<div class="form-group">
<label>Title</label>
<input type="text" id="moduleTitle">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="moduleDescription" rows="5"></textarea>
</div>

<button class="btn" id="addModuleBtn">
Save Module
</button>

</div>

<!-- MODULE LIST -->

<div class="section">

<h3>📚 Module Library</h3>

<div id="modulesList">
<div class="loading">
Loading modules...
</div>
</div>

</div>

</div>

</div>
</div>

<script>

// ===============================
// SUPABASE
// ===============================

const supabaseUrl =
'https://fktjmkmzlixlapeyhhyl.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';

const supabase =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

// ===============================
// TABLES
// ===============================

const TABLES = {
    learner:'learner_units',
    psv:'psv_modules',
    boda:'boda_modules',
    ev:'ev_modules'
};

let currentUser = null;

// ===============================
// MESSAGE
// ===============================

function showMessage(id,message,type){

    const el = document.getElementById(id);

    el.innerHTML = message;
    el.className = `message ${type}`;
    el.style.display = 'block';

    setTimeout(()=>{
        el.style.display='none';
    },4000);
}

// ===============================
// LOGIN
// ===============================

async function performLogin(){

    const email =
    document.getElementById('email').value.trim();

    const password =
    document.getElementById('password').value;

    const btn =
    document.getElementById('loginBtn');

    if(!email || !password){

        showMessage(
            'loginMessage',
            'Enter email and password',
            'error'
        );

        return;
    }

    btn.disabled = true;
    btn.innerText = 'Logging in...';

    try{

        const {data,error} =
        await supabase.auth.signInWithPassword({
            email,
            password
        });

        if(error) throw error;

        currentUser = data.user;

        showDashboard();

    }catch(err){

        showMessage(
            'loginMessage',
            err.message,
            'error'
        );

    }finally{

        btn.disabled = false;
        btn.innerText = 'Login to Dashboard';
    }
}

// ===============================
// SHOW DASHBOARD
// ===============================

function showDashboard(){

    document.getElementById('loginSection')
    .style.display='none';

    document.getElementById('dashboardSection')
    .style.display='block';

    document.getElementById('userEmail')
    .innerText = currentUser.email;

    loadStats();
    loadModules();
}

// ===============================
// LOGOUT
// ===============================

async function performLogout(){

    await supabase.auth.signOut();

    currentUser = null;

    document.getElementById('dashboardSection')
    .style.display='none';

    document.getElementById('loginSection')
    .style.display='block';
}

// ===============================
// LOAD STATS
// ===============================

async function loadStats(){

    for(const [type,table] of Object.entries(TABLES)){

        const {count,error} =
        await supabase
        .from(table)
        .select('*',{
            count:'exact',
            head:true
        });

        if(!error){

            document.getElementById(
                `${type}Count`
            ).innerText = count || 0;
        }
    }
}

// ===============================
// LOAD MODULES
// ===============================

async function loadModules(){

    const container =
    document.getElementById('modulesList');

    let all = [];

    for(const [type,table] of Object.entries(TABLES)){

        const {data,error} =
        await supabase
        .from(table)
        .select('*')
        .order('module_number',{
            ascending:true
        });

        if(!error && data){

            all.push(
                ...data.map(item=>({
                    ...item,
                    type
                }))
            );
        }
    }

    if(all.length===0){

        container.innerHTML =
        `<div class="loading">
            No modules found
        </div>`;

        return;
    }

    let html = `
    <table>
    <thead>
    <tr>
    <th>Type</th>
    <th>No</th>
    <th>Title</th>
    <th>Action</th>
    </tr>
    </thead>
    <tbody>
    `;

    all.forEach(module=>{

        html += `
        <tr>
        <td>${module.type.toUpperCase()}</td>
        <td>${module.module_number}</td>
        <td>${escapeHtml(module.title)}</td>
        <td>
        <button
        class="delete-btn"
        onclick="deleteModule('${module.type}',${module.id})">
        Delete
        </button>
        </td>
        </tr>
        `;
    });

    html += `
    </tbody>
    </table>
    `;

    container.innerHTML = html;
}

// ===============================
// ADD MODULE
// ===============================

async function addModule(){

    const type =
    document.getElementById('moduleType').value;

    const table = TABLES[type];

    const module_number =
    parseInt(
        document.getElementById('moduleNumber').value
    );

    const title =
    document.getElementById('moduleTitle')
    .value.trim();

    const description =
    document.getElementById('moduleDescription')
    .value.trim();

    if(!module_number || !title){

        alert('Fill all fields');

        return;
    }

    const {error} =
    await supabase
    .from(table)
    .insert([
        {
            module_number,
            title,
            description,
            status:'published'
        }
    ]);

    if(error){

        alert(error.message);
        return;
    }

    alert('Module added');

    document.getElementById('moduleNumber').value='';
    document.getElementById('moduleTitle').value='';
    document.getElementById('moduleDescription').value='';

    loadStats();
    loadModules();
}

// ===============================
// DELETE MODULE
// ===============================

async function deleteModule(type,id){

    const confirmDelete =
    confirm('Delete module?');

    if(!confirmDelete) return;

    const table = TABLES[type];

    const {error} =
    await supabase
    .from(table)
    .delete()
    .eq('id',id);

    if(error){

        alert(error.message);
        return;
    }

    loadStats();
    loadModules();
}

// ===============================
// ESCAPE HTML
// ===============================

function escapeHtml(text){

    if(!text) return '';

    return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// ===============================
// SESSION
// ===============================

async function checkSession(){

    const {
        data:{session}
    } = await supabase.auth.getSession();

    if(session){

        currentUser = session.user;

        showDashboard();
    }
}

// ===============================
// INIT
// ===============================

document.addEventListener(
'DOMContentLoaded',
()=>{

    document
    .getElementById('loginBtn')
    .addEventListener('click',performLogin);

    document
    .getElementById('logoutBtn')
    .addEventListener('click',performLogout);

    document
    .getElementById('addModuleBtn')
    .addEventListener('click',addModule);

    checkSession();
});

</script>

</body>
</html>
