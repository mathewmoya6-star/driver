<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B0F19 0%, #0a0e17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-card {
            background: rgba(18, 27, 44, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(0, 208, 132, 0.3);
        }
        .logo { text-align: center; font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #00d084, #4ade80); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge { text-align: center; background: rgba(0,208,132,0.15); padding: 6px; border-radius: 40px; margin: 15px 0; color: #00d084; }
        h2 { color: white; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #A0B3D9; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #A0B3D9; }
        input { width: 100%; padding: 12px 16px; background: #0F1622; border: 1px solid #1E2A3E; border-radius: 60px; color: white; }
        input:focus { outline: none; border-color: #00d084; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #00d084, #00a86b); border: none; border-radius: 60px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { background: rgba(239,68,68,0.2); border-left: 3px solid #EF4444; padding: 12px; border-radius: 12px; margin-top: 20px; color: #FCA5A5; display: none; }
        .success-msg { background: rgba(0,208,132,0.2); border-left: 3px solid #00d084; padding: 12px; border-radius: 12px; margin-top: 20px; color: #A0B3D9; display: none; }
        .footer { margin-top: 24px; text-align: center; font-size: 0.8rem; }
        .footer a { color: #00d084; text-decoration: none; }
    </style>
</head>
<body>
<div class="admin-card">
    <div class="logo">⚡ MEI DRIVE AFRICA</div>
    <div class="badge">ADMIN PORTAL</div>
    <h2>🔐 Admin Login</h2>
    <div class="sub">Sign in with an admin account</div>

    <form id="adminForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" id="loginBtn">Login as Admin</button>
    </form>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="footer">
        <a href="#" id="backToHome">← Back to Main Site</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script>
    // ==================== NEW SUPABASE CREDENTIALS ====================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    // ================================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Helper: Ensure user profile exists (create if missing, default non-admin)
    async function ensureUserProfile(userId) {
        const { data: existing, error: fetchError } = await supabase
            .from('user_profiles')
            .select('id')
            .eq('id', userId)
            .maybeSingle();

        if (fetchError && fetchError.code !== 'PGRST116') {
            console.error('Profile fetch error:', fetchError);
            return false;
        }

        if (!existing) {
            const { error: insertError } = await supabase
                .from('user_profiles')
                .insert({ id: userId, is_admin: false });
            if (insertError) {
                console.error('Insert profile error:', insertError);
                return false;
            }
        }
        return true;
    }

    // Main login: only allow if user has is_admin = true
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!email || !password) {
            errorDiv.textContent = '❌ Please enter email and password';
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Authenticating...';

        try {
            // 1. Sign in
            const { data: authData, error: signInError } = await supabase.auth.signInWithPassword({ email, password });
            if (signInError) throw new Error(signInError.message);
            const user = authData.user;

            // 2. Ensure profile exists (creates if missing, default non-admin)
            await ensureUserProfile(user.id);

            // 3. Check if user has admin flag
            const { data: profile, error: profileError } = await supabase
                .from('user_profiles')
                .select('is_admin')
                .eq('id', user.id)
                .single();

            if (profileError) throw new Error('Could not verify admin status');
            if (!profile || profile.is_admin !== true) {
                throw new Error('You do not have admin privileges. Please contact the system administrator.');
            }

            // 4. Success - redirect to main app (which contains full admin dashboard)
            successDiv.textContent = '✅ Admin access granted! Redirecting to dashboard...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);

        } catch (err) {
            errorDiv.textContent = `❌ ${err.message}`;
            errorDiv.style.display = 'block';
            await supabase.auth.signOut();
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login as Admin';
        }
    });

    document.getElementById('backToHome').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
