<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE - Working Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f19;
            color: white;
        }
        .login-screen, .dashboard {
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 40px;
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d084;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00d084;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: #ff6b6b;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,107,107,0.1);
            border-radius: 8px;
        }
        .success {
            color: #00d084;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,208,132,0.1);
            border-radius: 8px;
        }
        .dashboard {
            display: none;
        }
        .header {
            background: #121b2c;
            border-bottom: 1px solid #1f2b3d;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h2 {
            font-size: 36px;
            color: #00d084;
        }
        .card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h3 {
            margin-bottom: 20px;
            color: #00d084;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 8px;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f2b3d;
        }
        th {
            color: #00d084;
        }
        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 5px 10px;
            width: auto;
            font-size: 12px;
            margin: 0;
        }
        .logout-btn {
            background: #ef4444;
            width: auto;
            padding: 8px 20px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <div id="loginMessage"></div>
        <input type="email" id="email" placeholder="Email" value="admin@meidriveafrica.com">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="handleLogin()">Login</button>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8;">
            Use: admin@meidriveafrica.com / admin123
        </p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <h2>📊 MEI DRIVE Admin</h2>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
    
    <div class="content">
        <div class="stats">
            <div class="stat-card">
                <h2 id="learnerCount">0</h2>
                <p>Learner Units</p>
            </div>
            <div class="stat-card">
                <h2 id="psvCount">0</h2>
                <p>PSV Modules</p>
            </div>
            <div class="stat-card">
                <h2 id="bodaCount">0</h2>
                <p>Boda Modules</p>
            </div>
            <div class="stat-card">
                <h2 id="evCount">0</h2>
                <p>EV Modules</p>
            </div>
        </div>
        
        <div class="grid-2">
            <!-- Add Module Form -->
            <div class="card">
                <h3>➕ Add New Module</h3>
                <div class="form-group">
                    <label>Module Type</label>
                    <select id="moduleType">
                        <option value="learner">Learner Driver</option>
                        <option value="psv">PSV Commercial</option>
                        <option value="boda">Boda Boda</option>
                        <option value="ev">Electric Vehicle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Module Number</label>
                    <input type="number" id="moduleNumber" placeholder="1, 2, 3...">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="moduleTitle" placeholder="Module title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="moduleDescription" rows="3" placeholder="Module description"></textarea>
                </div>
                <button onclick="addModule()">Save Module</button>
            </div>
            
            <!-- Modules List -->
            <div class="card">
                <h3>📚 Module Library</h3>
                <div id="modulesList" style="max-height: 400px; overflow-y: auto;">
                    <p style="text-align: center; padding: 20px;">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TABLES = {
    learner: 'learner_units',
    psv: 'psv_modules',
    boda: 'boda_modules',
    ev: 'ev_modules'
};

let currentSession = null;

// LOGIN FUNCTION
async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('loginMessage');
    
    messageDiv.innerHTML = '<div>⏳ Logging in...</div>';
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        messageDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
        return;
    }
    
    messageDiv.innerHTML = '<div class="success">✅ Login successful! Loading dashboard...</div>';
    currentSession = data.session;
    
    setTimeout(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStats();
        loadModules();
    }, 1000);
}

async function handleLogout() {
    await supabase.auth.signOut();
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
}

async function loadStats() {
    for (const [type, table] of Object.entries(TABLES)) {
        const { count } = await supabase.from(table).select('*', { count: 'exact', head: true });
        document.getElementById(`${type}Count`).innerText = count || 0;
    }
}

async function loadModules() {
    const container = document.getElementById('modulesList');
    let allModules = [];
    
    for (const [type, table] of Object.entries(TABLES)) {
        const { data } = await supabase.from(table).select('*').order('module_number');
        if (data && data.length > 0) {
            allModules.push(...data.map(m => ({ ...m, type })));
        }
    }
    
    if (allModules.length === 0) {
        container.innerHTML = '<p style="text-align: center; padding: 20px;">No modules yet. Create your first module!</p>';
        return;
    }
    
    let html = '<table><thead><tr><th>Type</th><th>#</th><th>Title</th><th>Action</th></tr></thead><tbody>';
    for (const m of allModules) {
        html += `<tr>
            <td>${m.type.toUpperCase()}</td>
            <td>${m.module_number}</td>
            <td>${escapeHtml(m.title)}</td>
            <td><button class="delete-btn" onclick="deleteModule('${m.type}', ${m.id})">Delete</button></td>
        </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function addModule() {
    const type = document.getElementById('moduleType').value;
    const table = TABLES[type];
    const moduleNumber = parseInt(document.getElementById('moduleNumber').value);
    const title = document.getElementById('moduleTitle').value;
    const description = document.getElementById('moduleDescription').value;
    
    if (!title || !moduleNumber) {
        alert('Please fill title and module number');
        return;
    }
    
    const { error } = await supabase.from(table).insert([{
        module_number: moduleNumber,
        title: title,
        description: description,
        status: 'published',
        created_at: new Date()
    }]);
    
    if (error) {
        alert('Error: ' + error.message);
        return;
    }
    
    alert('Module added successfully!');
    document.getElementById('moduleNumber').value = '';
    document.getElementById('moduleTitle').value = '';
    document.getElementById('moduleDescription').value = '';
    loadStats();
    loadModules();
}

async function deleteModule(type, id) {
    if (!confirm('Delete this module?')) return;
    const table = TABLES[type];
    const { error } = await supabase.from(table).delete().eq('id', id);
    if (error) {
        alert('Error: ' + error.message);
    } else {
        loadStats();
        loadModules();
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Check for existing session on page load
async function checkExistingSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        currentSession = session;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStats();
        loadModules();
    }
}

checkExistingSession();
</script>

</body>
</html>
