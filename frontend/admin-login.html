<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #06080f 100%);
            min-height: 100vh;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d084, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-card .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d084;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d084, #00a86b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 24px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 24px;
        }

        .stat-card h3 {
            font-size: 32px;
            color: #00d084;
            margin-bottom: 8px;
        }

        .section {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            margin-bottom: 20px;
            color: #00d084;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f2b3d;
        }

        th {
            color: #00d084;
        }

        .top-bar {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logout-btn {
            width: auto;
            padding: 8px 20px;
            background: #ef4444;
        }

        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <div class="subtitle">Administrator Portal</div>
        
        <div id="messageArea"></div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@meidriveafrica.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <button onclick="handleLogin()">
            🔐 Login to Dashboard
        </button>
        
        <div style="margin-top: 20px; font-size: 12px; color: #94a3b8; text-align: center;">
            Default: admin@meidriveafrica.com / Admin@123456
        </div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <div class="top-bar">
        <h2>📊 MEI DRIVE Admin Dashboard</h2>
        <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <h3 id="learnerCount">0</h3>
            <p>Learner Units</p>
        </div>
        <div class="stat-card">
            <h3 id="psvCount">0</h3>
            <p>PSV Modules</p>
        </div>
        <div class="stat-card">
            <h3 id="bodaCount">0</h3>
            <p>Boda Modules</p>
        </div>
        <div class="stat-card">
            <h3 id="evCount">0</h3>
            <p>EV Modules</p>
        </div>
    </div>
    
    <div class="section">
        <h2>➕ Add New Module</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label style="color: #94a3b8;">Module Type</label>
                <select id="moduleType" style="width: 100%; padding: 10px; background: #0b0f19; border: 1px solid #1f2b3d; border-radius: 8px; color: white;">
                    <option value="learner">Learner Driver</option>
                    <option value="psv">PSV Commercial</option>
                    <option value="boda">Boda Boda</option>
                    <option value="ev">Electric Vehicle</option>
                </select>
            </div>
            <div>
                <label style="color: #94a3b8;">Module Number</label>
                <input type="number" id="moduleNumber" style="width: 100%; padding: 10px; background: #0b0f19; border: 1px solid #1f2b3d; border-radius: 8px; color: white;">
            </div>
            <div style="grid-column: span 2;">
                <label style="color: #94a3b8;">Title</label>
                <input type="text" id="moduleTitle" style="width: 100%; padding: 10px; background: #0b0f19; border: 1px solid #1f2b3d; border-radius: 8px; color: white;">
            </div>
            <div style="grid-column: span 2;">
                <label style="color: #94a3b8;">Description</label>
                <textarea id="moduleDescription" rows="3" style="width: 100%; padding: 10px; background: #0b0f19; border: 1px solid #1f2b3d; border-radius: 8px; color: white;"></textarea>
            </div>
        </div>
        <button onclick="addModule()" style="margin-top: 20px;">💾 Save Module</button>
    </div>
    
    <div class="section">
        <h2>📚 Existing Modules</h2>
        <div id="modulesList" style="overflow-x: auto;">
            <div style="text-align: center; padding: 40px; color: #94a3b8;">Loading modules...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
const ADMIN_UUID = 'a10f4b9e-2596-4399-8461-cc3f47e61e89';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TABLES = {
    learner: 'learner_units',
    psv: 'psv_modules',
    boda: 'boda_modules',
    ev: 'ev_modules'
};

async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageArea = document.getElementById('messageArea');
    
    messageArea.innerHTML = '<div class="message info">⏳ Logging in...</div>';
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        messageArea.innerHTML = `<div class="message error">❌ ${error.message}</div>`;
        return;
    }
    
    if (data.user.id !== ADMIN_UUID) {
        messageArea.innerHTML = '<div class="message error">❌ Admin access required</div>';
        await supabase.auth.signOut();
        return;
    }
    
    messageArea.innerHTML = '<div class="message success">✅ Login successful!</div>';
    
    setTimeout(() => {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStats();
        loadModules();
    }, 1000);
}

async function handleLogout() {
    await supabase.auth.signOut();
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
}

async function loadStats() {
    for (const [type, table] of Object.entries(TABLES)) {
        const { count } = await supabase.from(table).select('*', { count: 'exact', head: true });
        document.getElementById(`${type}Count`).innerText = count || 0;
    }
}

async function loadModules() {
    const container = document.getElementById('modulesList');
    let allModules = [];
    
    for (const [type, table] of Object.entries(TABLES)) {
        const { data } = await supabase.from(table).select('*').order('module_number');
        if (data) allModules.push(...data.map(m => ({ ...m, type })));
    }
    
    if (allModules.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px;">No modules yet. Create your first module above!</div>';
        return;
    }
    
    let html = '<table><th>Type</th><th>#</th><th>Title</th><th>Actions</th></thead><tbody>';
    for (const m of allModules) {
        html += `<tr>
            <td><strong>${m.type.toUpperCase()}</strong></td>
            <td>${m.module_number}</td>
            <td>${escapeHtml(m.title)}</td>
            <td><button onclick="deleteModule('${m.type}', ${m.id})" style="background: #ef4444; padding: 6px 12px;">Delete</button></td>
        </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function addModule() {
    const type = document.getElementById('moduleType').value;
    const table = TABLES[type];
    const moduleNumber = parseInt(document.getElementById('moduleNumber').value);
    const title = document.getElementById('moduleTitle').value;
    const description = document.getElementById('moduleDescription').value;
    
    if (!title || !moduleNumber) {
        alert('Please fill in title and module number');
        return;
    }
    
    const { error } = await supabase.from(table).insert([{
        module_number: moduleNumber,
        title: title,
        description: description,
        status: 'published',
        created_at: new Date()
    }]);
    
    if (error) {
        alert(error.message);
        return;
    }
    
    alert('Module added!');
    document.getElementById('moduleNumber').value = '';
    document.getElementById('moduleTitle').value = '';
    document.getElementById('moduleDescription').value = '';
    loadStats();
    loadModules();
}

async function deleteModule(type, id) {
    if (!confirm('Delete this module?')) return;
    const table = TABLES[type];
    const { error } = await supabase.from(table).delete().eq('id', id);
    if (error) alert(error.message);
    else {
        loadStats();
        loadModules();
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.handleLogin = handleLogin;
window.handleLogout = handleLogout;
window.addModule = addModule;
window.deleteModule = deleteModule;
</script>

</body>
</html>
