<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEI DRIVE AFRICA - Admin Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Inter, Arial, sans-serif;
      background:#050505;
      color:#fff;
    }

    .navbar{
      background:#111;
      border-bottom:1px solid #d4af37;
      padding:18px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:100;
    }

    .logo{
      font-size:1.3rem;
      font-weight:700;
      color:#d4af37;
    }

    .nav-right{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .logout-btn{
      background:#e74c3c;
      color:#fff;
      border:none;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }

    .logout-btn:hover{
      opacity:.9;
    }

    .container{
      max-width:1500px;
      margin:auto;
      padding:30px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .stat-card{
      background:#111;
      border:1px solid #222;
      border-radius:18px;
      padding:25px;
      transition:.3s;
    }

    .stat-card:hover{
      border-color:#d4af37;
      transform:translateY(-3px);
    }

    .stat-number{
      font-size:2.3rem;
      font-weight:800;
      color:#d4af37;
      margin-bottom:8px;
    }

    .section{
      background:#111;
      border:1px solid #222;
      border-radius:18px;
      padding:25px;
      margin-bottom:30px;
    }

    .section h2{
      color:#d4af37;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
    }

    th, td{
      padding:14px;
      border-bottom:1px solid #222;
      text-align:left;
    }

    th{
      color:#d4af37;
      background:#181818;
    }

    tr:hover{
      background:#151515;
    }

    input,
    select{
      background:#1a1a1a;
      border:1px solid #333;
      color:#fff;
      padding:12px;
      border-radius:10px;
      outline:none;
      min-width:180px;
    }

    input:focus,
    select:focus{
      border-color:#d4af37;
    }

    .add-form{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:20px;
    }

    .btn{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:.3s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .btn-green{
      background:#2ecc71;
      color:#fff;
    }

    .btn-edit{
      background:#3498db;
      color:#fff;
    }

    .btn-delete{
      background:#e74c3c;
      color:#fff;
    }

    .btn-lock{
      background:#f39c12;
      color:#fff;
    }

    .btn-save{
      background:#d4af37;
      color:#000;
    }

    .badge{
      padding:5px 10px;
      border-radius:30px;
      font-size:12px;
      font-weight:700;
    }

    .badge-admin{
      background:rgba(231,76,60,.2);
      color:#ff7675;
    }

    .badge-user{
      background:rgba(52,152,219,.2);
      color:#74b9ff;
    }

    .badge-active{
      background:rgba(46,204,113,.2);
      color:#2ecc71;
    }

    .badge-inactive{
      background:rgba(231,76,60,.2);
      color:#ff7675;
    }

    .badge-locked{
      background:rgba(243,156,18,.2);
      color:#f39c12;
    }

    .module-card{
      background:#161616;
      border:1px solid #222;
      padding:18px;
      border-radius:16px;
      margin-bottom:15px;
    }

    .module-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .module-title{
      font-size:1.1rem;
      font-weight:700;
    }

    .module-price{
      color:#2ecc71;
      font-weight:700;
      margin-top:8px;
    }

    .module-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .settings-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .setting-card{
      background:#181818;
      padding:20px;
      border-radius:16px;
      border:1px solid #222;
    }

    .setting-card label{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:15px;
    }

    @media(max-width:768px){
      .container{
        padding:15px;
      }

      .navbar{
        padding:15px;
      }

      .logo{
        font-size:1rem;
      }

      table{
        min-width:700px;
      }
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">MEI DRIVE AFRICA • ADMIN PANEL</div>

    <div class="nav-right">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">

    <!-- STATS -->
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-number" id="totalUsers">0</div>
        <div>Total Users</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalCourses">0</div>
        <div>Total Modules</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="totalRevenue">KSH 0</div>
        <div>Total Revenue</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="activeUsers">0</div>
        <div>Active Users</div>
      </div>

    </div>

    <!-- USER MANAGEMENT -->
    <div class="section">

      <h2>👥 User Management</h2>

      <div style="overflow-x:auto;">
        <table>

          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="usersTableBody"></tbody>

        </table>
      </div>

      <div class="add-form">

        <input type="text" id="userName" placeholder="Full Name">

        <input type="email" id="userEmail" placeholder="Email Address">

        <select id="userRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <button class="btn btn-green" onclick="addUser()">
          + Add User
        </button>

      </div>

    </div>

    <!-- MODULE MANAGEMENT -->
    <div class="section">

      <h2>📚 Module Management</h2>

      <div id="modulesContainer"></div>

      <div class="add-form">

        <input type="text" id="moduleName" placeholder="Module Name">

        <input type="number" id="modulePrice" placeholder="Price">

        <select id="moduleStatus">
          <option value="Unlocked">Unlocked</option>
          <option value="Locked">Locked</option>
        </select>

        <button class="btn btn-green" onclick="addModule()">
          + Add Module
        </button>

      </div>

    </div>

    <!-- SETTINGS -->
    <div class="section">

      <h2>⚙️ System Settings</h2>

      <div class="settings-grid">

        <div class="setting-card">

          <label>
            <input type="checkbox" id="maintenanceMode">
            Maintenance Mode
          </label>

          <label>
            <input type="checkbox" id="allowReg" checked>
            Allow Registration
          </label>

          <button class="btn btn-save" onclick="saveSettings()">
            Save Settings
          </button>

        </div>

      </div>

    </div>

  </div>

  <script type="module">

    import { supabase } from './supabase.js';

    // CHECK LOGIN
    const adminUser = localStorage.getItem('adminUser');

    if(!adminUser){
      window.location.href = 'admin-login.html';
    }

    // USERS
    let users = [

      {
        id:1,
        name:'John Kamau',
        email:'john@mei.com',
        role:'admin',
        status:'active'
      },

      {
        id:2,
        name:'Mary Wanjiku',
        email:'mary@mei.com',
        role:'user',
        status:'active'
      },

      {
        id:3,
        name:'Peter Otieno',
        email:'peter@mei.com',
        role:'user',
        status:'inactive'
      }

    ];

    // MODULES
    let modules = [

      {
        id:1,
        name:'Learner Driver',
        price:3500,
        status:'Unlocked'
      },

      {
        id:2,
        name:'PSV Professional',
        price:5500,
        status:'Locked'
      },

      {
        id:3,
        name:'Boda Boda Safety',
        price:2500,
        status:'Unlocked'
      }

    ];

    // RENDER USERS
    function renderUsers(){

      const tbody = document.getElementById('usersTableBody');

      tbody.innerHTML = users.map(user => `

        <tr>

          <td>${user.name}</td>

          <td>${user.email}</td>

          <td>
            <span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">
              ${user.role}
            </span>
          </td>

          <td>
            <span class="badge ${user.status === 'active' ? 'badge-active' : 'badge-inactive'}">
              ${user.status}
            </span>
          </td>

          <td>

            <button class="btn btn-edit" onclick="editUser(${user.id})">
              Edit
            </button>

            <button class="btn btn-delete" onclick="deleteUser(${user.id})">
              Delete
            </button>

          </td>

        </tr>

      `).join('');

      document.getElementById('totalUsers').innerText = users.length;

      document.getElementById('activeUsers').innerText =
        users.filter(u => u.status === 'active').length;

    }

    // RENDER MODULES
    function renderModules(){

      const container = document.getElementById('modulesContainer');

      container.innerHTML = modules.map(module => `

        <div class="module-card">

          <div class="module-top">

            <div>

              <div class="module-title">
                ${module.name}
              </div>

              <div class="module-price">
                KSH ${module.price.toLocaleString()}
              </div>

              <div style="margin-top:10px;">

                <span class="badge ${module.status === 'Locked'
                  ? 'badge-locked'
                  : 'badge-active'}">

                  ${module.status}

                </span>

              </div>

            </div>

            <div class="module-actions">

              <button class="btn btn-edit"
                onclick="editModule(${module.id})">

                Edit

              </button>

              <button class="btn btn-lock"
                onclick="toggleModuleLock(${module.id})">

                ${module.status === 'Locked'
                  ? 'Unlock'
                  : 'Lock'}

              </button>

              <button class="btn btn-delete"
                onclick="deleteModule(${module.id})">

                Delete

              </button>

            </div>

          </div>

        </div>

      `).join('');

      document.getElementById('totalCourses').innerText =
        modules.length;

      const totalRevenue = modules.reduce((sum, m) => sum + m.price, 0);

      document.getElementById('totalRevenue').innerText =
        'KSH ' + totalRevenue.toLocaleString();

    }

    // ADD USER
    window.addUser = function(){

      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const role = document.getElementById('userRole').value;

      if(name && email){

        users.push({
          id:Date.now(),
          name,
          email,
          role,
          status:'active'
        });

        renderUsers();

        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';

      } else {
        alert('Fill all fields');
      }

    };

    // EDIT USER
    window.editUser = function(id){

      const user = users.find(u => u.id === id);

      const newName = prompt('Edit Name', user.name);
      const newRole = prompt('Edit Role (user/admin)', user.role);

      if(newName){
        user.name = newName;
      }

      if(newRole){
        user.role = newRole;
      }

      renderUsers();

    };

    // DELETE USER
    window.deleteUser = function(id){

      if(confirm('Delete this user?')){

        users = users.filter(u => u.id !== id);

        renderUsers();

      }

    };

    // ADD MODULE
    window.addModule = function(){

      const name = document.getElementById('moduleName').value;
      const price = document.getElementById('modulePrice').value;
      const status = document.getElementById('moduleStatus').value;

      if(name && price){

        modules.push({
          id:Date.now(),
          name,
          price:Number(price),
          status
        });

        renderModules();

        document.getElementById('moduleName').value = '';
        document.getElementById('modulePrice').value = '';

      } else {
        alert('Fill all fields');
      }

    };

    // EDIT MODULE
    window.editModule = function(id){

      const module = modules.find(m => m.id === id);

      const newName = prompt('Edit Module Name', module.name);
      const newPrice = prompt('Edit Price', module.price);

      if(newName){
        module.name = newName;
      }

      if(newPrice){
        module.price = Number(newPrice);
      }

      renderModules();

    };

    // LOCK/UNLOCK MODULE
    window.toggleModuleLock = function(id){

      const module = modules.find(m => m.id === id);

      module.status =
        module.status === 'Locked'
        ? 'Unlocked'
        : 'Locked';

      renderModules();

    };

    // DELETE MODULE
    window.deleteModule = function(id){

      if(confirm('Delete this module?')){

        modules = modules.filter(m => m.id !== id);

        renderModules();

      }

    };

    // SETTINGS
    window.saveSettings = function(){

      localStorage.setItem(
        'maintenanceMode',
        document.getElementById('maintenanceMode').checked
      );

      localStorage.setItem(
        'allowReg',
        document.getElementById('allowReg').checked
      );

      alert('Settings Saved');

    };

    // LOGOUT
    window.logout = function(){

      localStorage.removeItem('adminUser');

      window.location.href = 'admin-login.html';

    };

    // INITIALIZE
    renderUsers();
    renderModules();

  </script>

</body>
</html>
