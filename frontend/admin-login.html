<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEI DRIVE AFRICA • ADMIN PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#00d084;
    --primary-dark:#00a86b;
    --bg:#0b0f19;
    --card:#121b2c;
    --border:#1f2b3d;
    --text:#ffffff;
    --muted:#94a3b8;
    --danger:#ef4444;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* LOGIN */

.login-screen{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:35px;
}

.login-box h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2rem;
}

.login-box p{
    text-align:center;
    color:var(--muted);
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:.9rem;
    color:var(--muted);
}

.input-group input,
.input-group textarea,
.input-group select{
    width:100%;
    background:#0f172a;
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    color:white;
    font-size:15px;
}

.btn{
    width:100%;
    border:none;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#08110d;
    padding:14px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.error{
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.3);
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    color:#ffb4b4;
}

/* DASHBOARD */

.dashboard{
    display:none;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    gap:20px;
    flex-wrap:wrap;
}

.logo{
    font-size:1.5rem;
    font-weight:800;
    color:var(--primary);
}

.logout-btn{
    background:#111827;
    border:1px solid var(--border);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:25px;
}

.stat-card h2{
    font-size:2rem;
    color:var(--primary);
    margin-bottom:8px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}

.panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:25px;
}

.panel h3{
    margin-bottom:20px;
}

.module-list{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top:20px;
}

.module-item{
    background:#0f172a;
    border:1px solid var(--border);
    padding:18px;
    border-radius:16px;
}

.module-item h4{
    margin-bottom:10px;
}

.module-item p{
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:10px;
}

.module-actions{
    display:flex;
    gap:10px;
}

.small-btn{
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.edit-btn{
    background:var(--primary);
    color:#08110d;
}

.delete-btn{
    background:var(--danger);
    color:white;
}

.loading{
    text-align:center;
    padding:30px;
    color:var(--muted);
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

    <div class="login-box">

        <h1>MEI DRIVE AFRICA</h1>
        <p>Secure Admin Dashboard</p>

        <div id="errorBox"></div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@example.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" onclick="login()">
            <i class="fas fa-lock"></i>
            Login
        </button>

    </div>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <div class="container">

        <div class="topbar">
            <div class="logo">
                MEI DRIVE AFRICA • ADMIN
            </div>

            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-card">
                <h2 id="totalModules">0</h2>
                <p>Total Modules</p>
            </div>

            <div class="stat-card">
                <h2 id="learnerCount">0</h2>
                <p>Learner Units</p>
            </div>

            <div class="stat-card">
                <h2 id="psvCount">0</h2>
                <p>PSV Modules</p>
            </div>

            <div class="stat-card">
                <h2 id="bodaCount">0</h2>
                <p>Boda Modules</p>
            </div>

        </div>

        <div class="grid">

            <!-- ADD MODULE -->
            <div class="panel">

                <h3>➕ Add New Module</h3>

                <div class="input-group">
                    <label>Module Type</label>

                    <select id="moduleType">
                        <option value="learner">Learner</option>
                        <option value="psv">PSV</option>
                        <option value="boda">Boda</option>
                        <option value="ev">EV</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Module Number</label>
                    <input type="number" id="moduleNumber">
                </div>

                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="title">
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>

                <div class="input-group">
                    <label>Content (HTML Supported)</label>
                    <textarea id="content" rows="10"></textarea>
                </div>

                <button class="btn" onclick="addModule()">
                    <i class="fas fa-save"></i>
                    Save Module
                </button>

            </div>

            <!-- MODULES -->
            <div class="panel">

                <h3>📚 Existing Modules</h3>

                <div id="moduleList" class="module-list">
                    <div class="loading">Loading modules...</div>
                </div>

            </div>

        </div>

    </div>

</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabaseUrl = 'https://fktjmkmzlixlapeyhhyl.supabase.co';

const supabaseKey =
'YOUR_SUPABASE_ANON_KEY';

const supabase = createClient(
    supabaseUrl,
    supabaseKey
);

window.login = login;
window.logout = logout;
window.addModule = addModule;
window.deleteModule = deleteModule;

const tableMap = {
    learner:'learner_units',
    psv:'psv_modules',
    boda:'boda_modules',
    ev:'ev_modules'
};

async function checkSession(){

    const {
        data:{session}
    } = await supabase.auth.getSession();

    if(session){
        showDashboard();
    }

}

async function login(){

    const email =
    document.getElementById('email').value;

    const password =
    document.getElementById('password').value;

    const errorBox =
    document.getElementById('errorBox');

    errorBox.innerHTML = '';

    const { error } =
    await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){

        errorBox.innerHTML = `
        <div class="error">
            ${error.message}
        </div>
        `;

        return;
    }

    showDashboard();

}

async function logout(){

    await supabase.auth.signOut();

    location.reload();

}

async function showDashboard(){

    document.getElementById('loginScreen')
    .style.display='none';

    document.getElementById('dashboard')
    .style.display='block';

    loadStats();

    loadModules();

}

async function loadStats(){

    let total = 0;

    for(const type in tableMap){

        const table = tableMap[type];

        const {
            count
        } = await supabase
        .from(table)
        .select('*',{
            count:'exact',
            head:true
        });

        document.getElementById(
            type + 'Count'
        ).innerText = count || 0;

        total += count || 0;
    }

    document.getElementById(
        'totalModules'
    ).innerText = total;

}

async function loadModules(){

    const list =
    document.getElementById('moduleList');

    list.innerHTML='';

    for(const type in tableMap){

        const table = tableMap[type];

        const {
            data,
            error
        } = await supabase
        .from(table)
        .select('*')
        .order('module_number',{
            ascending:true
        });

        if(error) continue;

        if(data.length === 0){
            continue;
        }

        data.forEach(module => {

            list.innerHTML += `
            <div class="module-item">

                <h4>
                    ${module.title}
                </h4>

                <p>
                    ${module.description || ''}
                </p>

                <small>
                    ${type.toUpperCase()}
                    • Module ${module.module_number}
                </small>

                <div class="module-actions">

                    <button
                    class="small-btn delete-btn"
                    onclick="
                    deleteModule(
                    '${table}',
                    '${module.id}'
                    )">
                        Delete
                    </button>

                </div>

            </div>
            `;
        });

    }

}

async function addModule(){

    const type =
    document.getElementById('moduleType').value;

    const table =
    tableMap[type];

    const module = {

        module_number:
        Number(
            document.getElementById(
            'moduleNumber'
            ).value
        ),

        title:
        document.getElementById(
        'title'
        ).value,

        description:
        document.getElementById(
        'description'
        ).value,

        content:
        document.getElementById(
        'content'
        ).value,

        status:'published',

        created_at:
        new Date().toISOString()

    };

    const { error } =
    await supabase
    .from(table)
    .insert([module]);

    if(error){

        alert(error.message);

        return;
    }

    alert('Module added successfully');

    document.getElementById(
    'title').value='';

    document.getElementById(
    'description').value='';

    document.getElementById(
    'content').value='';

    loadStats();

    loadModules();

}

async function deleteModule(
    table,
    id
){

    const confirmDelete =
    confirm(
        'Delete this module?'
    );

    if(!confirmDelete) return;

    const { error } =
    await supabase
    .from(table)
    .delete()
    .eq('id',id);

    if(error){

        alert(error.message);

        return;
    }

    loadStats();

    loadModules();

}

checkSession();

</script>

</body>
</html>
