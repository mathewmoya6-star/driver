<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d084;
            --primary-dark: #00a86b;
            --bg: #0b0f19;
            --card: #121b2c;
            --border: #1f2b3d;
            --text: #ffffff;
            --muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b0f19 0%, #0a0e17 100%);
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 20px;
        }

        .topbar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .section h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--primary);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.75rem;
            width: auto;
            margin-right: 8px;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card);
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <p style="text-align: center; color: var(--muted); margin-bottom: 30px;">Admin Login</p>
        
        <div id="loginError" style="color: var(--danger); margin-bottom: 15px;"></div>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@meidriveafrica.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        
        <button class="btn" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="topbar">
        <div class="logo">MEI DRIVE AFRICA • ADMIN</div>
        <div>
            <span id="adminEmail" style="margin-right: 15px;"></span>
            <button class="btn" style="width: auto; padding: 8px 16px;" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <h3 id="totalLearner">0</h3>
            <p>Learner Units</p>
        </div>
        <div class="stat-card">
            <h3 id="totalPSV">0</h3>
            <p>PSV Modules</p>
        </div>
        <div class="stat-card">
            <h3 id="totalBoda">0</h3>
            <p>Boda Modules</p>
        </div>
        <div class="stat-card">
            <h3 id="totalEV">0</h3>
            <p>EV Modules</p>
        </div>
    </div>
    
    <div class="section">
        <h2><i class="fas fa-plus-circle"></i> Add New Module</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Module Type</label>
                <select id="moduleType" style="width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text);">
                    <option value="learner">Learner Driver</option>
                    <option value="psv">PSV Commercial</option>
                    <option value="boda">Boda Boda</option>
                    <option value="ev">Electric Vehicle</option>
                </select>
            </div>
            <div class="input-group">
                <label>Module Number</label>
                <input type="number" id="moduleNumber" placeholder="1, 2, 3...">
            </div>
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="moduleTitle" placeholder="Module Title">
            </div>
            <div class="input-group">
                <label>Duration (minutes)</label>
                <input type="number" id="moduleDuration" placeholder="45">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Description</label>
                <textarea id="moduleDescription" rows="3" style="width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text);"></textarea>
            </div>
        </div>
        <button class="btn" onclick="addModule()" style="margin-top: 15px;">
            <i class="fas fa-save"></i> Save Module
        </button>
    </div>
    
    <div class="section">
        <h2><i class="fas fa-list"></i> All Modules</h2>
        <div id="modulesList">
            <div class="loading">Loading modules...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Supabase Configuration
const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// Table mapping
const TABLES = {
    learner: 'learner_units',
    psv: 'psv_modules',
    boda: 'boda_modules',
    ev: 'ev_modules'
};

// Helper functions
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    
    if (session) {
        // Check if user is admin
        const { data: adminCheck } = await supabase
            .from('admin_users')
            .select('*')
            .eq('user_id', session.user.id)
            .single();
        
        if (adminCheck) {
            currentUser = session.user;
            showDashboard();
            loadStats();
            loadModules();
            return true;
        }
    }
    return false;
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.innerHTML = '';
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        errorDiv.innerHTML = error.message;
        return;
    }
    
    // Check admin status
    const { data: adminCheck } = await supabase
        .from('admin_users')
        .select('*')
        .eq('user_id', data.user.id)
        .single();
    
    if (!adminCheck) {
        errorDiv.innerHTML = 'Admin access required';
        await supabase.auth.signOut();
        return;
    }
    
    currentUser = data.user;
    showDashboard();
    loadStats();
    loadModules();
}

async function handleLogout() {
    await supabase.auth.signOut();
    currentUser = null;
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    showToast('Logged out successfully');
}

async function showDashboard() {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminEmail').innerHTML = `<i class="fas fa-user-shield"></i> ${currentUser.email}`;
}

async function loadStats() {
    for (const [type, table] of Object.entries(TABLES)) {
        const { count } = await supabase
            .from(table)
            .select('*', { count: 'exact', head: true });
        
        const elementId = `total${type.charAt(0).toUpperCase() + type.slice(1)}`;
        const element = document.getElementById(elementId);
        if (element) element.innerText = count || 0;
    }
}

async function loadModules() {
    const container = document.getElementById('modulesList');
    container.innerHTML = '<div class="loading">Loading modules...</div>';
    
    let allModules = [];
    
    for (const [type, table] of Object.entries(TABLES)) {
        const { data, error } = await supabase
            .from(table)
            .select('*')
            .order('module_number', { ascending: true });
        
        if (data && data.length > 0) {
            allModules.push(...data.map(m => ({ ...m, type, table })));
        }
    }
    
    if (allModules.length === 0) {
        container.innerHTML = '<div class="loading">No modules found. Create your first module above!</div>';
        return;
    }
    
    let html = '<table><thead><tr><th>Type</th><th>#</th><th>Title</th><th>Duration</th><th>Actions</th></tr></thead><tbody>';
    
    for (const module of allModules) {
        html += `
            <tr>
                <td><span class="status-badge status-active">${module.type.toUpperCase()}</span></td>
                <td>${module.module_number}</td>
                <td><strong>${escapeHtml(module.title)}</strong><br><small style="color: var(--muted);">${escapeHtml(module.description?.substring(0, 60)) || 'No description'}</small></td>
                <td>${module.duration_minutes || 0} min</td>
                <td>
                    <button class="btn btn-small" onclick="deleteModule('${module.table}', ${module.id})" style="background: var(--danger); color: white;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </td>
            </tr>
        `;
    }
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function addModule() {
    const type = document.getElementById('moduleType').value;
    const table = TABLES[type];
    const moduleNumber = parseInt(document.getElementById('moduleNumber').value);
    const title = document.getElementById('moduleTitle').value;
    const duration = parseInt(document.getElementById('moduleDuration').value) || 0;
    const description = document.getElementById('moduleDescription').value;
    
    if (!title || !moduleNumber) {
        showToast('Please fill in title and module number', 'error');
        return;
    }
    
    const { error } = await supabase
        .from(table)
        .insert([{
            module_number: moduleNumber,
            title: title,
            description: description,
            duration_minutes: duration,
            status: 'published',
            created_at: new Date()
        }]);
    
    if (error) {
        showToast(error.message, 'error');
        return;
    }
    
    showToast('Module added successfully!');
    
    // Clear form
    document.getElementById('moduleNumber').value = '';
    document.getElementById('moduleTitle').value = '';
    document.getElementById('moduleDuration').value = '';
    document.getElementById('moduleDescription').value = '';
    
    // Reload data
    loadStats();
    loadModules();
}

async function deleteModule(table, id) {
    if (!confirm('Are you sure you want to delete this module?')) return;
    
    const { error } = await supabase
        .from(table)
        .delete()
        .eq('id', id);
    
    if (error) {
        showToast(error.message, 'error');
        return;
    }
    
    showToast('Module deleted successfully!');
    loadStats();
    loadModules();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Make functions global
window.handleLogin = handleLogin;
window.handleLogout = handleLogout;
window.addModule = addModule;
window.deleteModule = deleteModule;

// Check session on load
checkSession().then(hasSession => {
    if (!hasSession) {
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
});
</script>

</body>
</html>
