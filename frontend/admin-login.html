<script>
// ===============================
// SUPABASE CONFIG
// ===============================
const supabaseUrl = 'https://fktjmkmzlixlapeyhhyl.supabase.co';

const supabaseKey =
'YOUR_SUPABASE_ANON_KEY';

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

// ===============================
// TABLE MAPPING
// ===============================
const TABLES = {
    learner: 'learner_units',
    psv: 'psv_modules',
    boda: 'boda_modules',
    ev: 'ev_modules'
};

let currentUser = null;

// ===============================
// MESSAGE HELPER
// ===============================
function showMessage(elementId, message, type) {
    const el = document.getElementById(elementId);

    el.innerHTML = message;
    el.className = `message ${type}`;
    el.style.display = 'block';

    setTimeout(() => {
        el.style.display = 'none';
    }, 4000);
}

// ===============================
// LOGIN
// ===============================
async function performLogin() {

    const email =
        document.getElementById('email').value.trim();

    const password =
        document.getElementById('password').value;

    const loginBtn =
        document.getElementById('loginBtn');

    if (!email || !password) {
        showMessage(
            'loginMessage',
            'Please enter email and password',
            'error'
        );
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = 'Logging in...';

    try {

        const { data, error } =
            await supabase.auth.signInWithPassword({
                email,
                password
            });

        if (error) throw error;

        currentUser = data.user;

        showDashboard();

        showMessage(
            'loginMessage',
            'Login successful',
            'success'
        );

    } catch (err) {

        showMessage(
            'loginMessage',
            err.message,
            'error'
        );

    } finally {

        loginBtn.disabled = false;
        loginBtn.innerText = 'Login to Dashboard';

    }
}

// ===============================
// SHOW DASHBOARD
// ===============================
function showDashboard() {

    document.getElementById('loginSection')
        .style.display = 'none';

    document.getElementById('dashboardSection')
        .style.display = 'block';

    document.getElementById('userEmail')
        .innerText = currentUser.email;

    loadStats();
    loadModules();
}

// ===============================
// LOGOUT
// ===============================
async function performLogout() {

    await supabase.auth.signOut();

    currentUser = null;

    document.getElementById('dashboardSection')
        .style.display = 'none';

    document.getElementById('loginSection')
        .style.display = 'block';

    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
}

// ===============================
// LOAD COUNTS
// ===============================
async function loadStats() {

    for (const [type, table] of Object.entries(TABLES)) {

        const { count, error } =
            await supabase
                .from(table)
                .select('*', {
                    count: 'exact',
                    head: true
                });

        if (!error) {

            document.getElementById(
                `${type}Count`
            ).innerText = count || 0;

        }
    }
}

// ===============================
// LOAD MODULES
// ===============================
async function loadModules() {

    const container =
        document.getElementById('modulesList');

    let allModules = [];

    for (const [type, table] of Object.entries(TABLES)) {

        const { data, error } =
            await supabase
                .from(table)
                .select('*')
                .order('module_number', {
                    ascending: true
                });

        if (!error && data) {

            const formatted = data.map(item => ({
                ...item,
                type
            }));

            allModules.push(...formatted);
        }
    }

    if (allModules.length === 0) {

        container.innerHTML = `
            <div class="loading">
                No modules found
            </div>
        `;

        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>No</th>
                    <th>Title</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
    `;

    allModules.forEach(module => {

        html += `
            <tr>
                <td>${module.type.toUpperCase()}</td>
                <td>${module.module_number}</td>
                <td>${escapeHtml(module.title)}</td>
                <td>
                    <button
                        class="delete-btn"
                        onclick="deleteModule(
                            '${module.type}',
                            ${module.id}
                        )">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    container.innerHTML = html;
}

// ===============================
// ADD MODULE
// ===============================
async function addModule() {

    const type =
        document.getElementById('moduleType').value;

    const table = TABLES[type];

    const module_number =
        parseInt(
            document.getElementById('moduleNumber').value
        );

    const title =
        document.getElementById('moduleTitle')
            .value.trim();

    const description =
        document.getElementById('moduleDescription')
            .value.trim();

    if (!module_number || !title) {
        alert('Please fill all fields');
        return;
    }

    const { error } = await supabase
        .from(table)
        .insert([
            {
                module_number,
                title,
                description,
                status: 'published'
            }
        ]);

    if (error) {
        alert(error.message);
        return;
    }

    alert('Module added successfully');

    document.getElementById('moduleNumber').value = '';
    document.getElementById('moduleTitle').value = '';
    document.getElementById('moduleDescription').value = '';

    loadStats();
    loadModules();
}

// ===============================
// DELETE MODULE
// ===============================
async function deleteModule(type, id) {

    const confirmed =
        confirm('Delete this module?');

    if (!confirmed) return;

    const table = TABLES[type];

    const { error } =
        await supabase
            .from(table)
            .delete()
            .eq('id', id);

    if (error) {
        alert(error.message);
        return;
    }

    loadStats();
    loadModules();
}

// ===============================
// ESCAPE HTML
// ===============================
function escapeHtml(text) {

    if (!text) return '';

    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

// ===============================
// SESSION CHECK
// ===============================
async function checkSession() {

    const {
        data: { session }
    } = await supabase.auth.getSession();

    if (session) {

        currentUser = session.user;

        showDashboard();
    }
}

// ===============================
// EVENT LISTENERS
// ===============================
document.addEventListener('DOMContentLoaded', () => {

    document
        .getElementById('loginBtn')
        .addEventListener('click', performLogin);

    document
        .getElementById('logoutBtn')
        .addEventListener('click', performLogout);

    document
        .getElementById('addModuleBtn')
        .addEventListener('click', addModule);

    checkSession();
});
</script>
