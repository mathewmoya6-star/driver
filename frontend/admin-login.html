<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Supabase Admin Panel | Role-Based Control</title>
  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- TailwindCSS for sleek UI (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Custom Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f1f5f9; }
    .card-shadow { box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .transition-smooth { transition: all 0.2s ease; }
    .role-badge { border-radius: 100px; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; }
    .admin-panel-container { max-height: 85vh; overflow-y: auto; }
  </style>
</head>
<body class="antialiased">

  <!-- MAIN APP -->
  <div id="app" class="min-h-screen flex items-center justify-center p-4">
    <!-- Dynamic rendering handled by Vue-like manual JS but plain JS + DOM -->
  </div>

  <script>
    // --------------------------------------------------------------
    // 1. SUPABASE CONFIGURATION (REPLACE WITH YOUR OWN CREDENTIALS)
    // --------------------------------------------------------------
    // IMPORTANT: You need to create a Supabase project and replace these values.
    // For demo, they are placeholders. User must replace with real URL + anon key.
    // The app will show error if credentials are invalid or missing tables.
    const SUPABASE_URL = 'https://your-project.supabase.co';      // <-- REPLACE
    const SUPABASE_ANON_KEY = 'your-anon-key';                   // <-- REPLACE

    // Helper to show if config is missing
    const isConfigMissing = () => SUPABASE_URL.includes('your-project') || SUPABASE_ANON_KEY.includes('your-anon-key');
    
    // Initialize Supabase client
    let supabase = null;
    try {
      if (!isConfigMissing()) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch(e) { console.warn(e); }

    // Global state
    let currentSession = null;     // stores user + role info
    let currentView = 'login';     // 'login' or 'dashboard'
    
    // DOM Elements holder
    const appContainer = document.getElementById('app');
    
    // Helper functions for Supabase auth & roles
    // --------------------------------------------------------------
    // We assume you have a table "user_roles" in Supabase with columns:
    // id, user_id (uuid references auth.users), role (text) e.g., 'admin', 'editor', 'viewer'
    // For this demo to work out-of-box, admin panel will also show how to create roles dynamically.
    // But to make REAL credentials: sign up via Supabase Auth UI or through code.
    // We'll implement login with email/password, then fetch role from 'user_roles' table.
    
    async function fetchUserRole(userId) {
      if (!supabase) return null;
      try {
        const { data, error } = await supabase
          .from('user_roles')
          .select('role')
          .eq('user_id', userId)
          .maybeSingle();
        if (error) {
          console.error("Error fetching role:", error);
          return null;
        }
        return data?.role || null;
      } catch(e) { return null; }
    }
    
    // Initialize role assignment after login
    async function handleLogin(email, password) {
      if (!supabase) {
        showNotification("Supabase not configured. Please set SUPABASE_URL and ANON_KEY.", "error");
        return false;
      }
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const user = data.user;
        if (!user) throw new Error("No user data");
        
        // fetch role from custom table
        let role = await fetchUserRole(user.id);
        if (!role) {
          // If no role assigned, default to 'viewer' but you can set fallback.
          // For admin panel we require admin role to perform sensitive actions. 
          // We'll allow but restrict features based on role.
          role = 'viewer';
          console.warn(`No role found for ${user.id}, defaulting to viewer`);
        }
        
        currentSession = {
          user: user,
          role: role,
          email: user.email
        };
        
        // Store minimal session in localStorage to persist refresh? optional but fine.
        localStorage.setItem('admin_session', JSON.stringify({
          user: { id: user.id, email: user.email },
          role: role,
          timestamp: Date.now()
        }));
        
        showNotification(`Welcome ${user.email} (Role: ${role.toUpperCase()})`, "success");
        return true;
      } catch (err) {
        console.error(err);
        showNotification(`Login failed: ${err.message}`, "error");
        return false;
      }
    }
    
    async function handleLogout() {
      if (supabase) {
        await supabase.auth.signOut();
      }
      currentSession = null;
      localStorage.removeItem('admin_session');
      currentView = 'login';
      renderApp();
      showNotification("Logged out successfully", "info");
    }
    
    async function checkExistingSession() {
      if (!supabase) return false;
      // 1. check local storage quick flag
      const stored = localStorage.getItem('admin_session');
      if (stored) {
        try {
          const sessionData = JSON.parse(stored);
          // verify with supabase if session still active
          const { data: { session } } = await supabase.auth.getSession();
          if (session && session.user) {
            const freshRole = await fetchUserRole(session.user.id);
            currentSession = {
              user: session.user,
              role: freshRole || sessionData.role,
              email: session.user.email
            };
            currentView = 'dashboard';
            renderApp();
            return true;
          } else {
            // if no active session but stored exists, clear it
            localStorage.removeItem('admin_session');
          }
        } catch(e) { console.warn(e);}
      }
      
      // Try get session from supabase
      const { data: { session } } = await supabase.auth.getSession();
      if (session && session.user) {
        const role = await fetchUserRole(session.user.id);
        currentSession = {
          user: session.user,
          role: role || 'viewer',
          email: session.user.email
        };
        currentView = 'dashboard';
        renderApp();
        return true;
      }
      return false;
    }
    
    // Helper: show toast notification
    function showNotification(message, type = "info") {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-medium text-sm transition-all duration-300 ${
        type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-green-600' : 'bg-blue-600'
      }`;
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    // ----- ADMIN PANEL BUSINESS LOGIC (Role-Based) -----
    // Demo data: list of users, products, or content only accessible by roles
    // We'll simulate "Manage Users" (admin only), "View Reports" (admin+editor), "System Settings" (admin only)
    // and "View Analytics" (all roles)
    
    let demoUsers = [
      { id: 1, email: "admin@example.com", role_assigned: "admin", created: "2025-01-01" },
      { id: 2, email: "editor@example.com", role_assigned: "editor", created: "2025-01-10" },
      { id: 3, email: "viewer@example.com", role_assigned: "viewer", created: "2025-02-01" }
    ];
    
    let demoProducts = [
      { id: 101, name: "Premium Plan", price: "$99", status: "active" },
      { id: 102, name: "Basic Plan", price: "$49", status: "inactive" }
    ];
    
    let systemLogs = ["Log: Admin updated settings", "Log: Editor published content", "Log: System backup completed"];
    
    // Role check helpers
    function isAdmin() { return currentSession?.role === 'admin'; }
    function isEditor() { return currentSession?.role === 'editor' || isAdmin(); }
    function isViewer() { return true; } // all logged in users are at least viewer
    
    // --- Action functions for UI ---
    function renderDashboardContent(container) {
      if (!currentSession) return;
      const role = currentSession.role;
      // dynamic interactive panel sections
      container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-2xl card-shadow p-5 border border-gray-100">
            <div class="flex items-center justify-between">
              <div><i class="fas fa-user-shield text-3xl text-indigo-500"></i></div>
              <span class="role-badge bg-indigo-100 text-indigo-800">${role.toUpperCase()}</span>
            </div>
            <h3 class="text-xl font-bold mt-3">${currentSession.email}</h3>
            <p class="text-gray-500 text-sm">Logged in as <strong>${role}</strong></p>
            <button id="logoutBtnMain" class="mt-4 text-sm text-red-500 hover:text-red-700 font-medium"><i class="fas fa-sign-out-alt mr-1"></i> Sign out</button>
          </div>
          <div class="bg-white rounded-2xl card-shadow p-5 border border-gray-100 col-span-2">
            <h3 class="font-bold text-lg mb-2"><i class="fas fa-tachometer-alt mr-2 text-blue-500"></i>Role-Based Permissions</h3>
            <div class="flex flex-wrap gap-2 text-sm mt-1">
              <span class="px-3 py-1 bg-gray-100 rounded-full">${isAdmin() ? '✅' : '❌'} Admin: Full control</span>
              <span class="px-3 py-1 bg-gray-100 rounded-full">${isEditor() ? '✅' : '❌'} Editor: Manage content</span>
              <span class="px-3 py-1 bg-gray-100 rounded-full">✅ Viewer: Read-only access</span>
            </div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- User Management (Admin only) -->
          <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100" id="userManagementCard">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
              <h3 class="font-semibold text-gray-800"><i class="fas fa-users mr-2 text-purple-500"></i>User Management</h3>
              ${isAdmin() ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">Full Access</span>' : '<span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full">Restricted</span>'}
            </div>
            <div class="p-5">
              ${isAdmin() ? `
                <div class="mb-4"><button id="addDemoUserBtn" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-700"><i class="fas fa-plus mr-1"></i>Add Demo User</button></div>
                <div class="overflow-x-auto"><table class="min-w-full text-sm">
                  <thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">Email</th><th>Role</th><th>Actions</th></tr></thead>
                  <tbody id="userTableBody"></tbody>
                </table></div>
              ` : `<div class="text-center py-8 text-gray-400"><i class="fas fa-lock text-3xl mb-2"></i><p>You don't have permission to manage users.<br>Required role: Admin</p></div>`}
            </div>
          </div>
          
          <!-- Products / Content Management (Editor+Admin) -->
          <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
              <h3 class="font-semibold text-gray-800"><i class="fas fa-boxes mr-2 text-amber-500"></i>Products & Content</h3>
              ${isEditor() ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">Editable</span>' : '<span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full">View only</span>'}
            </div>
            <div class="p-5">
              ${isEditor() ? `<div class="mb-4"><button id="addProductBtn" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-emerald-700"><i class="fas fa-plus mr-1"></i>New Product</button></div>` : ''}
              <div class="overflow-x-auto"><table class="min-w-full text-sm">
                <thead class="bg-gray-50"><tr><th>Name</th><th>Price</th><th>Status</th>${isEditor() ? '<th>Action</th>' : ''}</tr></thead>
                <tbody id="productTableBody"></tbody>
              </table></div>
            </div>
          </div>
          
          <!-- System Settings (Admin only) -->
          <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
            <div class="px-5 py-4 border-b border-gray-100">
              <h3 class="font-semibold text-gray-800"><i class="fas fa-cog mr-2 text-gray-600"></i>System Settings</h3>
            </div>
            <div class="p-5">
              ${isAdmin() ? `
                <div class="space-y-3">
                  <label class="flex items-center justify-between"><span>Enable Maintenance Mode</span><input type="checkbox" id="maintenanceToggle" class="toggle-switch"></label>
                  <label class="flex items-center justify-between"><span>Send Daily Reports</span><input type="checkbox" id="dailyReportsToggle" checked></label>
                  <button id="saveSettingsBtn" class="w-full mt-3 bg-slate-800 text-white py-2 rounded-lg text-sm">Save Settings</button>
                  <p class="text-xs text-gray-400 mt-2"><i class="fas fa-info-circle"></i> Admin-only controls</p>
                </div>
              ` : `<div class="text-center py-4 text-gray-400"><i class="fas fa-ban"></i> Access Denied. Admin rights required.</div>`}
            </div>
          </div>
          
          <!-- Audit Logs / Reports (Editor + Admin) -->
          <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
            <div class="px-5 py-4 border-b border-gray-100">
              <h3 class="font-semibold text-gray-800"><i class="fas fa-history mr-2 text-slate-500"></i>Recent System Logs</h3>
            </div>
            <div class="p-5">
              ${isEditor() ? `<div id="logsContainer" class="space-y-1 text-xs font-mono bg-gray-50 p-2 rounded max-h-32 overflow-y-auto"></div>
              <button id="addLogBtn" class="mt-3 text-indigo-500 text-sm"><i class="fas fa-plus-circle"></i> Simulate Action</button>` 
              : `<div class="text-gray-400 text-center p-2">Logs accessible for admin & editors only</div>`}
            </div>
          </div>
        </div>
      `;
      
      // Populate dynamic tables based on roles
      if (isAdmin()) renderUserTable();
      renderProductTable();
      if (isEditor()) renderLogsPanel();
      
      // Bind event listeners based on roles
      if (isAdmin()) {
        document.getElementById('addDemoUserBtn')?.addEventListener('click', () => addDemoUser());
        document.getElementById('saveSettingsBtn')?.addEventListener('click', () => showNotification('Settings saved (demo)', 'success'));
      }
      if (isEditor()) {
        document.getElementById('addProductBtn')?.addEventListener('click', () => addDemoProduct());
        document.getElementById('addLogBtn')?.addEventListener('click', () => addSystemLog());
      }
      document.getElementById('logoutBtnMain')?.addEventListener('click', () => handleLogout());
    }
    
    function renderUserTable() {
      const tbody = document.getElementById('userTableBody');
      if (!tbody) return;
      tbody.innerHTML = demoUsers.map(user => `
        <tr class="border-b">
          <td class="px-3 py-2">${user.email}</td>
          <td class="px-3 py-2"><span class="role-badge ${user.role_assigned === 'admin' ? 'bg-red-100 text-red-700' : user.role_assigned === 'editor' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100'}">${user.role_assigned}</span></td>
          <td class="px-3 py-2"><button data-id="${user.id}" class="deleteUserBtn text-red-500 hover:text-red-700 text-xs"><i class="fas fa-trash-alt"></i></button></td>
        </tr>
      `).join('');
      document.querySelectorAll('.deleteUserBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          if(confirm('Delete user?')) {
            demoUsers = demoUsers.filter(u => u.id !== id);
            renderUserTable();
            showNotification('User removed (demo)', 'info');
          }
        });
      });
    }
    
    function renderProductTable() {
      const tbody = document.getElementById('productTableBody');
      if (!tbody) return;
      tbody.innerHTML = demoProducts.map(prod => `
        <tr class="border-b">
          <td class="px-3 py-2">${prod.name}</td>
          <td>${prod.price}</td>
          <td><span class="px-2 py-0.5 rounded-full text-xs ${prod.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${prod.status}</span></td>
          ${isEditor() ? `<td><button data-id="${prod.id}" class="toggleProductBtn text-indigo-500 text-xs">Toggle status</button></td>` : ''}
        </tr>
      `).join('');
      if (isEditor()) {
        document.querySelectorAll('.toggleProductBtn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(btn.dataset.id);
            const prod = demoProducts.find(p => p.id === id);
            if(prod) {
              prod.status = prod.status === 'active' ? 'inactive' : 'active';
              renderProductTable();
              showNotification(`Product "${prod.name}" status updated`, 'success');
            }
          });
        });
      }
    }
    
    function renderLogsPanel() {
      const logsDiv = document.getElementById('logsContainer');
      if(logsDiv) {
        logsDiv.innerHTML = systemLogs.map(log => `<div class="border-b pb-1 text-gray-600">📌 ${log}</div>`).join('');
      }
    }
    
    function addDemoUser() {
      const newEmail = `user${Date.now()}@demo.com`;
      const newRole = prompt("Assign role: admin, editor, viewer", "viewer");
      if(newRole && ['admin','editor','viewer'].includes(newRole)) {
        const newId = Date.now();
        demoUsers.push({ id: newId, email: newEmail, role_assigned: newRole, created: new Date().toISOString().slice(0,10) });
        renderUserTable();
        showNotification(`Added ${newEmail} as ${newRole}`, 'success');
      } else if(newRole) { showNotification('Invalid role', 'error');}
    }
    
    function addDemoProduct() {
      const name = prompt("Product name", "New Product");
      if(name) {
        const price = prompt("Price", "$29");
        demoProducts.push({ id: Date.now(), name: name, price: price || "$0", status: "active" });
        renderProductTable();
        showNotification('Product added', 'success');
      }
    }
    
    function addSystemLog() {
      const action = prompt("Log message (simulate system event)","Admin performed an action");
      if(action) {
        systemLogs.unshift(`[${new Date().toLocaleTimeString()}] ${action}`);
        if(systemLogs.length > 8) systemLogs.pop();
        renderLogsPanel();
        showNotification("Log added", "info");
      }
    }
    
    // ---- Login UI ----
    function renderLogin() {
      const configWarning = isConfigMissing() ? `
        <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-lg mb-6">
          <p class="text-amber-800 text-sm"><i class="fas fa-exclamation-triangle"></i> <strong>Setup required:</strong> Replace SUPABASE_URL and SUPABASE_ANON_KEY with your actual Supabase project credentials.<br>
          Create a <strong>user_roles</strong> table with fields: user_id (uuid references auth.users) and role (text).</p>
        </div>
      ` : '';
      
      return `
        <div class="max-w-md w-full bg-white rounded-2xl card-shadow p-8">
          <div class="text-center mb-6">
            <i class="fas fa-lock text-4xl text-indigo-500"></i>
            <h2 class="text-2xl font-bold mt-2">Admin Login</h2>
            <p class="text-gray-500 text-sm">Sign in with Supabase credentials</p>
          </div>
          ${configWarning}
          <form id="loginForm">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-1">Email address</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="admin@example.com" required>
            </div>
            <div class="mb-6">
              <label class="block text-gray-700 text-sm font-medium mb-1">Password</label>
              <input type="password" id="loginPassword" class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-indigo-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition">Sign In</button>
          </form>
          <div class="mt-5 text-center text-xs text-gray-400">
            <p>Tip: To test, create user in Supabase Auth & assign role via 'user_roles' table.<br> Admin role gives full access.</p>
          </div>
        </div>
      `;
    }
    
    // ---- Main Render Engine ----
    async function renderApp() {
      if (!appContainer) return;
      if (currentView === 'login') {
        appContainer.innerHTML = renderLogin();
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
          loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showNotification("Enter email & password", "error"); return; }
            const success = await handleLogin(email, password);
            if (success) {
              currentView = 'dashboard';
              renderApp();
            }
          });
        }
      } 
      else if (currentView === 'dashboard' && currentSession) {
        appContainer.innerHTML = `<div class="w-full max-w-7xl mx-auto px-4 py-6 admin-panel-container"><div id="dynamicDashboard"></div></div>`;
        const dashContainer = document.getElementById('dynamicDashboard');
        if (dashContainer) renderDashboardContent(dashContainer);
      } else {
        // fallback
        currentView = 'login';
        renderApp();
      }
    }
    
    // Initialize app, check session
    (async function init() {
      if (!supabase && !isConfigMissing()) {
        appContainer.innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-red-700"><i class="fas fa-database"></i> Supabase client init error. Check your URL and anon key.</div>`;
        return;
      }
      if (isConfigMissing()) {
        // Still allow login demo UI to show configuration instructions
        currentView = 'login';
        await renderApp();
      } else {
        await checkExistingSession();
        if (!currentSession) currentView = 'login';
        await renderApp();
      }
    })();
  </script>
</body>
</html>
