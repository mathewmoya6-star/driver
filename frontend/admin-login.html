<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --primary-light: #88ffcc;
            --dark-card: #0d2137;
            --dark-hover: #112240;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
            --success: #00ff88;
            --danger: #ff4757;
            --warning: #ffa502;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0d2137;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-green); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #0a192f; }
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        .logout-btn { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(0, 255, 136, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary); }
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(0, 255, 136, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        @media (max-width: 768px) {
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 6px; }
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-inactive { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .status-pending { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
        .status-verified { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .role-admin { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .btn {
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #e8413b; }
        .btn-sm { padding: 4px 10px; font-size: 0.7rem; }
        .btn-success { background: #00ff88; color: #0a192f; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: #0f1a2c;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; display: flex; justify-content: space-between; gap: 12px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; color: var(--primary); }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
        }
        .price-input { width: 100px; background: #0f1a2c; border: 1px solid var(--border); border-radius: 8px; padding: 6px; color: white; }
        .revenue-chart { max-width: 100%; height: 300px; margin-top: 20px; }
        .module-item { background: #0f1a2c; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .module-title { font-weight: 600; }
    </style>
</head>
<body>
<div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
<div class="admin-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA</div>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px;">Administrator Panel</p>
        </div>
        <div class="user-info" id="userInfo">
            <div class="user-avatar">👤</div>
            <div><h4 id="userName">Loading...</h4><p id="userEmail">admin@meidrive.com</p></div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="setView('payments')"><i class="fas fa-credit-card"></i> Payment Requests</div>
            <div class="nav-item" onclick="setView('users')"><i class="fas fa-users"></i> User Management</div>
            <div class="nav-item" onclick="setView('courses')"><i class="fas fa-book"></i> Course Management</div>
            <div class="nav-item" onclick="setView('modules')"><i class="fas fa-cubes"></i> Module Manager</div>
            <div class="logout-btn"><div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
        </div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1 id="pageTitle">Dashboard</h1>
                <p id="pageSubtitle">Welcome back, Admin</p>
            </div>
            <div><span style="background: var(--dark-card); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem;"><i class="fas fa-database"></i> Connected</span></div>
        </div>
        <div id="pageContent"><div class="loading-spinner"></div></div>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script>
    // ==================== SUPABASE CREDENTIALS ====================
    const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
    
    let supabase;
    let currentUser = null;
    let currentView = 'dashboard';
    let users = [];
    let courses = [];
    let enrollments = [];
    let lessons = [];
    let revenueChart = null;
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type]} ${escapeHtml(msg)}<span style="cursor:pointer;margin-left:8px;" onclick="this.parentElement.remove()">×</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function initAdmin() {
        supabase = window.supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            showToast('Please login to access admin panel', 'warning');
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }
        currentUser = session.user;
        const { data: isAdmin } = await supabase.rpc('is_admin_user');
        if (!isAdmin) {
            showToast('Admin access denied', 'error');
            await supabase.auth.signOut();
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }
        const { data: profile } = await supabase.from('user_profiles').select('full_name, email').eq('id', currentUser.id).single();
        document.getElementById('userName').innerText = profile?.full_name?.split(' ')[0] || currentUser.email.split('@')[0];
        document.getElementById('userEmail').innerText = profile?.email || currentUser.email;
        await loadData();
        renderCurrentView();
    }
    
    async function loadData() {
        await Promise.all([
            (async () => { const { data } = await supabase.from('user_profiles').select('*').order('created_at', { ascending: false }); users = data || []; })(),
            (async () => { const { data } = await supabase.from('courses').select('*').order('id'); courses = data || []; })(),
            (async () => { 
                const { data } = await supabase.from('enrollments').select(`
                    *, 
                    courses(name),
                    user_profiles(full_name, email)
                `).order('requested_at', { ascending: false });
                enrollments = data || [];
            })(),
            (async () => { const { data } = await supabase.from('lessons').select('*').order('order'); lessons = data || []; })()
        ]);
    }
    
    function getStats() {
        const totalUsers = users.length;
        const activeUsers = users.filter(u => u.status === 'active').length;
        const totalCourses = courses.length;
        const totalRevenue = enrollments.filter(e => e.payment_status === 'verified').reduce((sum, e) => sum + (e.amount || 0), 0);
        const pendingPayments = enrollments.filter(e => e.payment_status === 'pending').length;
        const verifiedEnrollments = enrollments.filter(e => e.payment_status === 'verified').length;
        return { totalUsers, activeUsers, totalCourses, totalRevenue, pendingPayments, verifiedEnrollments };
    }
    
    async function getDailyRevenue() {
        const now = new Date();
        const sevenDaysAgo = new Date(now.setDate(now.getDate() - 7));
        const { data } = await supabase
            .from('enrollments')
            .select('amount, verified_at')
            .eq('payment_status', 'verified')
            .gte('verified_at', sevenDaysAgo.toISOString());
        
        const dailyMap = new Map();
        for (let i = 0; i < 7; i++) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            dailyMap.set(dateStr, 0);
        }
        (data || []).forEach(e => {
            if (e.verified_at) {
                const dateStr = e.verified_at.split('T')[0];
                if (dailyMap.has(dateStr)) dailyMap.set(dateStr, dailyMap.get(dateStr) + (e.amount || 0));
            }
        });
        const labels = Array.from(dailyMap.keys()).sort();
        const values = labels.map(l => dailyMap.get(l));
        return { labels, values };
    }
    
    function renderDashboard() {
        const stats = getStats();
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Active Users</h3><div class="stat-number">${stats.activeUsers}</div></div><div class="stat-icon"><i class="fas fa-user-check"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Pending Payments</h3><div class="stat-number" style="color:#ffa502;">${stats.pendingPayments}</div></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Enrollments</h3><div class="stat-number">${stats.verifiedEnrollments}</div></div><div class="stat-icon"><i class="fas fa-graduation-cap"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Courses</h3><div class="stat-number">${stats.totalCourses}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
            </div>
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Daily Revenue (Last 7 Days)</h3>
                <canvas id="revenueChart" class="revenue-chart"></canvas>
            </div>
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Platform Overview</h3>
                <p style="margin-top: 12px;">MEI DRIVE AFRICA admin panel – manage payments, courses, and users.</p>
                <button class="btn btn-outline" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        // Render chart
        getDailyRevenue().then(({ labels, values }) => {
            const ctx = document.getElementById('revenueChart')?.getContext('2d');
            if (ctx) {
                if (revenueChart) revenueChart.destroy();
                revenueChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: [{ label: 'Revenue (KES)', data: values, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', tension: 0.3, fill: true }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#a0b3d9' } }, y: { ticks: { color: '#a0b3d9' }, beginAtZero: true } } }
                });
            }
        });
    }
    
    function renderPaymentRequests() {
        const pending = enrollments.filter(e => e.payment_status === 'pending');
        if (pending.length === 0) {
            document.getElementById('pageContent').innerHTML = `<div class="card"><h3>No pending payment requests</h3><p>All clear!</p></div>`;
            return;
        }
        let html = `<div class="card"><h2>💰 Pending Payment Requests</h2><table class="data-table"><thead><tr><th>User</th><th>Course</th><th>Amount (KES)</th><th>Requested</th><th>Actions</th></tr></thead><tbody>`;
        for (const p of pending) {
            html += `<tr>
                <td>${escapeHtml(p.user_profiles?.full_name || p.user_id)}<br><small>${escapeHtml(p.user_profiles?.email || '')}</small></td>
                <td>${escapeHtml(p.courses?.name)}</td>
                <td>${p.amount}</td>
                <td>${new Date(p.requested_at).toLocaleString()}</td>
                <td><button class="btn btn-sm btn-success" onclick="approvePayment(${p.id})">✅ Approve</button> <button class="btn btn-sm btn-danger" onclick="rejectPayment(${p.id})">❌ Reject</button></td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function renderUserManagement() {
        let html = `<div class="card"><div class="card-header"><h2><i class="fas fa-users"></i> User Management</h2></div>
            <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead><tbody>`;
        for (const user of users) {
            html += `<tr>
                <td><strong>${escapeHtml(user.full_name || '—')}</strong></td>
                <td>${escapeHtml(user.email)}</td>
                <td><span class="status-badge role-admin">${user.is_admin ? 'Admin' : 'User'}</span></td>
                <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status || 'active'}</span></td>
                <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : '—'}</td>
                <td><button class="btn btn-outline btn-sm" onclick="toggleAdminRole('${user.id}', ${user.is_admin})">${user.is_admin ? 'Remove Admin' : 'Make Admin'}</button>
                    ${user.id !== currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUserProfile('${user.id}')"><i class="fas fa-trash"></i> Delete</button>` : ''}
                </td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function renderCourseManagement() {
        let html = `<div class="card"><div class="card-header"><h2><i class="fas fa-book"></i> Course Management</h2></div>
            <table class="data-table"><thead><tr><th>Course</th><th>Price (KES)</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        for (const course of courses) {
            html += `<tr>
                <td><strong>${escapeHtml(course.name)}</strong><br><small>${escapeHtml(course.description?.substring(0, 60))}</small></td>
                <td><input type="number" id="price_${course.id}" value="${course.price}" class="price-input"></td>
                <td><span class="status-badge ${course.active !== false ? 'status-active' : 'status-inactive'}">${course.active !== false ? 'Active' : 'Inactive'}</span></td>
                <td><button class="btn btn-sm btn-primary" onclick="updateCoursePrice(${course.id})">💾 Save Price</button>
                    <button class="btn btn-sm btn-outline" onclick="toggleCourseActive(${course.id}, ${course.active !== false})">${course.active !== false ? '🔒 Disable' : '🔓 Enable'}</button>
                </td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    async function renderModuleManager() {
        await loadData(); // ensure lessons loaded
        let html = `<div class="card"><div class="card-header"><h2><i class="fas fa-cubes"></i> Module Manager (Lessons)</h2><button class="btn btn-primary" onclick="showAddModuleModal()"><i class="fas fa-plus"></i> Add Module</button></div>`;
        for (const course of courses) {
            const courseLessons = lessons.filter(l => l.course_id === course.id).sort((a,b) => a.order - b.order);
            html += `<h3 style="margin-top:20px;">📘 ${escapeHtml(course.name)}</h3><div id="modules-${course.id}">`;
            if (courseLessons.length === 0) html += `<p class="text-muted">No modules yet. Click "Add Module" to create lessons.</p>`;
            else {
                for (const lesson of courseLessons) {
                    html += `<div class="module-item"><span class="module-title">${escapeHtml(lesson.title)} (Order: ${lesson.order})</span>
                        <div><button class="btn btn-outline btn-sm" onclick="editModule(${lesson.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteModule(${lesson.id})"><i class="fas fa-trash"></i> Delete</button></div></div>`;
                }
            }
            html += `</div>`;
        }
        html += `</div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    // ========== Admin Actions ==========
    window.approvePayment = async (enrollmentId) => {
        const { data, error } = await supabase.rpc('admin_verify_payment', { p_enrollment_id: enrollmentId });
        if (error || !data?.success) showToast('Approval failed', 'error');
        else { showToast('Payment approved – user can now access course', 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.rejectPayment = async (enrollmentId) => {
        const { data, error } = await supabase.rpc('admin_reject_payment', { p_enrollment_id: enrollmentId });
        if (error || !data?.success) showToast('Rejection failed', 'error');
        else { showToast('Payment rejected', 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.toggleAdminRole = async (userId, isAdmin) => {
        const { error } = await supabase.rpc('admin_toggle_role', { p_user_id: userId, p_is_admin: !isAdmin });
        if (error) showToast('Failed to update role', 'error');
        else { showToast('Role updated', 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.deleteUserProfile = async (userId) => {
        if (!confirm('Delete this user profile? The auth user will remain but profile will be removed.')) return;
        const { error } = await supabase.from('user_profiles').delete().eq('id', userId);
        if (error) showToast('Delete failed', 'error');
        else { showToast('User profile deleted', 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.updateCoursePrice = async (courseId) => {
        const price = parseInt(document.getElementById(`price_${courseId}`).value);
        const { error } = await supabase.from('courses').update({ price }).eq('id', courseId);
        if (error) showToast('Update failed', 'error');
        else showToast('Price updated', 'success');
    };
    
    window.toggleCourseActive = async (courseId, currentActive) => {
        const { error } = await supabase.from('courses').update({ active: !currentActive }).eq('id', courseId);
        if (error) showToast('Update failed', 'error');
        else { showToast(`Course ${!currentActive ? 'enabled' : 'disabled'}`, 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.showAddModuleModal = () => {
        const modalHtml = `<div class="modal active" id="moduleModal"><div class="modal-content"><h3>Add New Module</h3>
            <label>Course</label><select id="moduleCourseId">${courses.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
            <label>Title</label><input type="text" id="moduleTitle" placeholder="Module title">
            <label>Content (HTML/text)</label><textarea id="moduleContent" rows="5" placeholder="Full lesson content"></textarea>
            <label>Order (number)</label><input type="number" id="moduleOrder" value="1">
            <div style="display:flex; gap:12px; margin-top:20px;"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createModule()">Create</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.createModule = async () => {
        const courseId = parseInt(document.getElementById('moduleCourseId').value);
        const title = document.getElementById('moduleTitle').value;
        const content = document.getElementById('moduleContent').value;
        const order = parseInt(document.getElementById('moduleOrder').value);
        if (!title) { showToast('Title required', 'error'); return; }
        const { data, error } = await supabase.rpc('admin_create_module', { p_course_id: courseId, p_title: title, p_content: content, p_order: order });
        if (error || !data?.success) showToast('Failed to create module', 'error');
        else { showToast('Module created', 'success'); closeModal(); await loadData(); renderCurrentView(); }
    };
    
    window.editModule = async (moduleId) => {
        const module = lessons.find(l => l.id === moduleId);
        if (!module) return;
        const modalHtml = `<div class="modal active" id="moduleModal"><div class="modal-content"><h3>Edit Module</h3>
            <label>Title</label><input type="text" id="moduleTitle" value="${escapeHtml(module.title)}">
            <label>Content</label><textarea id="moduleContent" rows="5">${escapeHtml(module.content || '')}</textarea>
            <label>Order</label><input type="number" id="moduleOrder" value="${module.order}">
            <div style="display:flex; gap:12px; margin-top:20px;"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateModule(${moduleId})">Save</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.updateModule = async (moduleId) => {
        const title = document.getElementById('moduleTitle').value;
        const content = document.getElementById('moduleContent').value;
        const order = parseInt(document.getElementById('moduleOrder').value);
        if (!title) { showToast('Title required', 'error'); return; }
        const { data, error } = await supabase.rpc('admin_update_module', { p_id: moduleId, p_title: title, p_content: content, p_order: order });
        if (error || !data?.success) showToast('Update failed', 'error');
        else { showToast('Module updated', 'success'); closeModal(); await loadData(); renderCurrentView(); }
    };
    
    window.deleteModule = async (moduleId) => {
        if (!confirm('Delete this module permanently?')) return;
        const { data, error } = await supabase.rpc('admin_delete_module', { p_id: moduleId });
        if (error || !data?.success) showToast('Delete failed', 'error');
        else { showToast('Module deleted', 'success'); await loadData(); renderCurrentView(); }
    };
    
    window.refreshData = async () => {
        showToast('Refreshing...', 'info');
        await loadData();
        renderCurrentView();
        showToast('Data refreshed', 'success');
    };
    
    window.setView = (view) => { currentView = view; renderCurrentView(); };
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    window.closeModal = () => document.querySelector('.modal.active')?.remove();
    
    async function logout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }
    
    function renderCurrentView() {
        const titles = { dashboard: 'Dashboard', payments: 'Payment Requests', users: 'User Management', courses: 'Course Management', modules: 'Module Manager' };
        document.getElementById('pageTitle').innerText = titles[currentView] || 'Dashboard';
        document.getElementById('pageSubtitle').innerHTML = `Welcome back, ${escapeHtml(currentUser?.email?.split('@')[0] || 'Admin')} | ${new Date().toLocaleDateString()}`;
        if (currentView === 'dashboard') renderDashboard();
        else if (currentView === 'payments') renderPaymentRequests();
        else if (currentView === 'users') renderUserManagement();
        else if (currentView === 'courses') renderCourseManagement();
        else if (currentView === 'modules') renderModuleManager();
        else renderDashboard();
    }
    
    initAdmin();
</script>
</body>
</html>
