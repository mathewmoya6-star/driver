@'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEI DRIVE AFRICA - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #06080f 100%);
            min-height: 100vh;
            color: #fff;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
        }
        .login-card h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00d084, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d084, #00a86b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        .message.error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444; display: block; }
        .message.success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #10b981; display: block; }
        .dashboard { display: none; padding: 20px; }
        .header {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h2 { font-size: 24px; color: #00d084; }
        .logout-btn { background: #ef4444; width: auto; padding: 8px 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 24px;
        }
        .stat-card h3 { font-size: 32px; color: #00d084; margin-bottom: 8px; }
        .section {
            background: #121b2c;
            border: 1px solid #1f2b3d;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section h3 { margin-bottom: 20px; color: #00d084; }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #0b0f19;
            border: 1px solid #1f2b3d;
            border-radius: 8px;
            color: #fff;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1f2b3d; }
        th { color: #00d084; }
        .delete-btn {
            background: #ef4444;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="login-container">
        <div class="login-card">
            <h1>🚗 MEI DRIVE AFRICA</h1>
            <p>Administrator Login</p>
            <div id="loginMessage" class="message"></div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@meidriveafrica.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn" id="loginBtn">Login to Dashboard</button>
        </div>
    </div>
</div>

<div id="dashboardSection" style="display: none;">
    <div class="dashboard">
        <div class="header">
            <h2>📊 MEI DRIVE Administration</h2>
            <button class="btn logout-btn" id="logoutBtn">Logout</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><h3 id="learnerCount">0</h3><p>🚗 Learner Units</p></div>
            <div class="stat-card"><h3 id="psvCount">0</h3><p>🚌 PSV Modules</p></div>
            <div class="stat-card"><h3 id="bodaCount">0</h3><p>🏍️ Boda Modules</p></div>
            <div class="stat-card"><h3 id="evCount">0</h3><p>⚡ EV Modules</p></div>
        </div>
        <div class="grid-2">
            <div class="section">
                <h3>➕ Add New Module</h3>
                <div class="form-group">
                    <label>Category</label>
                    <select id="moduleType">
                        <option value="learner">Learner Driver</option>
                        <option value="psv">PSV Commercial</option>
                        <option value="boda">Boda Boda</option>
                        <option value="ev">Electric Vehicle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Module Number</label>
                    <input type="number" id="moduleNumber" placeholder="e.g., 1,2,3">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="moduleTitle" placeholder="Module title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="moduleDescription" rows="3" placeholder="Description"></textarea>
                </div>
                <button class="btn" id="addModuleBtn">Save Module</button>
            </div>
            <div class="section">
                <h3>📚 Module Library</h3>
                <div id="modulesList" style="max-height: 500px; overflow-y: auto;">
                    <div class="loading">Loading modules...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TABLES = {
    learner: 'learner_units',
    psv: 'psv_modules',
    boda: 'boda_modules',
    ev: 'ev_modules'
};

let currentUser = null;

function showMessage(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `message ${type}`;
    setTimeout(() => { if (el) el.style.display = 'none'; }, 4000);
}

async function performLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    if (!email || !password) {
        showMessage('loginMessage', 'Please enter email and password', 'error');
        return;
    }
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    showMessage('loginMessage', 'Authenticating...', 'info');
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        showMessage('loginMessage', 'Login successful! Loading dashboard...', 'success');
        setTimeout(() => {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            loadStats();
            loadModules();
        }, 1000);
    } catch (err) {
        showMessage('loginMessage', `Login failed: ${err.message}`, 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login to Dashboard';
    }
}

async function performLogout() {
    await supabase.auth.signOut();
    currentUser = null;
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboardSection').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
}

async function loadStats() {
    for (const [type, table] of Object.entries(TABLES)) {
        const { count, error } = await supabase.from(table).select('*', { count: 'exact', head: true });
        if (!error) {
            const el = document.getElementById(`${type}Count`);
            if (el) el.innerText = count || 0;
        }
    }
}

async function loadModules() {
    const container = document.getElementById('modulesList');
    let all = [];
    for (const [type, table] of Object.entries(TABLES)) {
        const { data, error } = await supabase.from(table).select('*').order('module_number', { ascending: true });
        if (!error && data) {
            all.push(...data.map(m => ({ ...m, type })));
        }
    }
    if (all.length === 0) {
        container.innerHTML = '<div class="loading">No modules found. Create your first module!</div>';
        return;
    }
    let html = '<table><thead><tr><th>Type</th><th>#</th><th>Title</th><th>Action</th></tr></thead><tbody>';
    for (const m of all) {
        html += `<tr>
            <td><strong>${m.type.toUpperCase()}</strong></td>
            <td>${m.module_number}</td>
            <td>${escapeHtml(m.title)}</span></td>
            <td><button class="delete-btn" data-type="${m.type}" data-id="${m.id}">Delete</button></td>
        </tr>`;
    }
    html += `</tbody></table>`;
    container.innerHTML = html;
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.getAttribute('data-type');
            const id = parseInt(btn.getAttribute('data-id'));
            deleteModule(type, id);
        });
    });
}

async function addModule() {
    const type = document.getElementById('moduleType').value;
    const table = TABLES[type];
    const moduleNumber = parseInt(document.getElementById('moduleNumber').value);
    const title = document.getElementById('moduleTitle').value.trim();
    const description = document.getElementById('moduleDescription').value.trim();
    if (!title || isNaN(moduleNumber)) {
        alert('Please fill title and module number');
        return;
    }
    const { error } = await supabase.from(table).insert([{
        module_number: moduleNumber,
        title: title,
        description: description,
        status: 'published',
        created_at: new Date().toISOString()
    }]);
    if (error) {
        alert('Error: ' + error.message);
        return;
    }
    alert('Module added!');
    document.getElementById('moduleNumber').value = '';
    document.getElementById('moduleTitle').value = '';
    document.getElementById('moduleDescription').value = '';
    loadStats();
    loadModules();
}

async function deleteModule(type, id) {
    if (!confirm('Delete this module?')) return;
    const table = TABLES[type];
    const { error } = await supabase.from(table).delete().eq('id', id);
    if (error) {
        alert('Delete error: ' + error.message);
        return;
    }
    loadStats();
    loadModules();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, (m) => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

document.getElementById('loginBtn').addEventListener('click', performLogin);
document.getElementById('logoutBtn').addEventListener('click', performLogout);
document.getElementById('addModuleBtn').addEventListener('click', addModule);

supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) {
        currentUser = session.user;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        loadStats();
        loadModules();
    }
});
</script>
</body>
</html>
'@ | Out-File -FilePath testnow.html -Encoding UTF8
