<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Admin Panel</title>
    <meta name="theme-color" content="#00d084">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d084;
            --primary-dark: #00a86b;
            --primary-light: #4ade80;
            --dark: #000000;
            --dark-card: #0a0a0a;
            --dark-hover: #111111;
            --border: #1a1a1a;
            --text: #FFFFFF;
            --text-muted: #888888;
            --gradient-primary: linear-gradient(135deg, #00d084 0%, #4ade80 100%);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        
        .admin-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--dark); }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(0, 208, 132, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-card:hover { border-color: var(--primary); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(0, 208, 132, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary); }
        
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 600; color: var(--primary); }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(0, 208, 132, 0.05); color: var(--primary); font-weight: 600; }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .role-admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-user { background: rgba(0, 208, 132, 0.2); color: var(--primary); }
        
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-primary); color: var(--dark); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }
        
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; color: var(--primary); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.75rem; }
            .data-table th, .data-table td { padding: 8px; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Simple mock data - admin panel loads immediately
        let adminView = 'dashboard';
        let adminName = 'Admin User';
        
        // Mock Data
        let users = [
            { id: 1, name: 'John Mwangi', email: 'john@example.com', role: 'user', status: 'active', progress: 45 },
            { id: 2, name: 'Sarah Wanjiku', email: 'sarah@example.com', role: 'user', status: 'active', progress: 78 },
            { id: 3, name: 'Michael Otieno', email: 'michael@example.com', role: 'user', status: 'active', progress: 32 },
            { id: 4, name: 'Grace Akinyi', email: 'grace@example.com', role: 'user', status: 'inactive', progress: 0 },
            { id: 5, name: 'Admin User', email: 'admin@meidrive.com', role: 'admin', status: 'active', progress: 100 }
        ];
        
        let modules = [
            { id: 1, name: 'Learner Hub - 21 Units', price: 0, duration: '25 hours', lessons: 21, status: 'unlocked', enrolled: 1245, description: 'Complete NTSA-approved driver training - 21 comprehensive units' },
            { id: 2, name: 'EV Drivers & Riders', price: 0, duration: '12 hours', lessons: 8, status: 'unlocked', enrolled: 567, description: 'Modern training for electric vehicle drivers' },
            { id: 3, name: 'Boda Boda Safety Course', price: 0, duration: '18 hours', lessons: 12, status: 'unlocked', enrolled: 2341, description: 'Practical road safety training for boda riders' },
            { id: 4, name: 'PSV Professional Course', price: 2999, duration: '15 hours', lessons: 10, status: 'locked', enrolled: 892, description: 'Advanced preparation for commercial drivers' },
            { id: 5, name: 'Advanced Driver Academy', price: 4999, duration: '20 hours', lessons: 8, status: 'locked', enrolled: 234, description: 'Professional development for fleet managers' }
        ];
        
        let quizBank = [
            { id: 1, question: "What is the legal blood alcohol limit for commercial drivers in Kenya?", options: ["0.00%", "0.05%", "0.08%", "0.10%"], correct: 0, category: "Safety", difficulty: "Easy" },
            { id: 2, question: "What does a STOP sign require?", options: ["Slow down", "Complete halt", "Give way", "Honk"], correct: 1, category: "Signs", difficulty: "Easy" },
            { id: 3, question: "What is the maximum speed limit in residential areas?", options: ["30 km/h", "40 km/h", "50 km/h", "60 km/h"], correct: 1, category: "Speed Limits", difficulty: "Easy" }
        ];
        
        let library = [
            { id: 1, title: "Kenya Highway Code", type: "PDF", size: "2.5 MB", downloads: 1245 },
            { id: 2, title: "NTSA Driving Test Guide", type: "PDF", size: "1.8 MB", downloads: 892 },
            { id: 3, title: "Defensive Driving Manual", type: "PDF", size: "3.2 MB", downloads: 567 }
        ];
        
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `${type === 'success' ? '✅' : 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function calculateStats() {
            return {
                totalUsers: users.filter(u => u.role !== 'admin').length,
                totalModules: modules.length,
                totalRevenue: modules.filter(m => m.price > 0).reduce((sum, m) => sum + (m.price * m.enrolled), 0),
                activeUsers: users.filter(u => u.status === 'active' && u.role !== 'admin').length,
                totalQuizQuestions: quizBank.length,
                totalLibraryItems: library.length
            };
        }
        
        function updateUserRole(userId, role) {
            const user = users.find(u => u.id === userId);
            if (user) { user.role = role; showToast(`User ${user.name} is now ${role === 'admin' ? 'Admin' : 'User'}`, 'success'); renderApp(); }
        }
        
        function updateUserStatus(userId, status) {
            const user = users.find(u => u.id === userId);
            if (user) { user.status = status; showToast(`User ${user.name} ${status === 'active' ? 'activated' : 'deactivated'}`, 'success'); renderApp(); }
        }
        
        function toggleModuleStatus(moduleId) {
            const module = modules.find(m => m.id === moduleId);
            if (module) {
                if (module.status === 'unlocked') {
                    const price = prompt('Enter price for this module (KES):', '0');
                    if (price !== null) {
                        module.status = 'locked';
                        module.price = parseInt(price) || 0;
                        showToast(`Module locked with price KES ${module.price}`, 'success');
                    }
                } else {
                    module.status = 'unlocked';
                    module.price = 0;
                    showToast(`Module unlocked and set to FREE`, 'success');
                }
                renderApp();
            }
        }
        
        function deleteUser(userId) {
            if (confirm('Are you sure?')) {
                users = users.filter(u => u.id !== userId);
                showToast('User deleted', 'success');
                renderApp();
            }
        }
        
        function deleteModule(moduleId) {
            if (confirm('Delete this module?')) {
                modules = modules.filter(m => m.id !== moduleId);
                showToast('Module deleted', 'success');
                renderApp();
            }
        }
        
        function deleteQuizQuestion(id) {
            if (confirm('Delete this question?')) {
                quizBank = quizBank.filter(q => q.id !== id);
                showToast('Question deleted', 'success');
                renderApp();
            }
        }
        
        function deleteLibraryItem(id) {
            if (confirm('Delete this item?')) {
                library = library.filter(l => l.id !== id);
                showToast('Item deleted', 'success');
                renderApp();
            }
        }
        
        // Render Functions
        function renderDashboard() {
            const stats = calculateStats();
            return `<div class="stats-grid">
                <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Total Modules</h3><div class="stat-number">${stats.totalModules}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Active Users</h3><div class="stat-number">${stats.activeUsers}</div></div><div class="stat-icon"><i class="fas fa-user-check"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Quiz Questions</h3><div class="stat-number">${stats.totalQuizQuestions}</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Library Items</h3><div class="stat-number">${stats.totalLibraryItems}</div></div><div class="stat-icon"><i class="fas fa-book-open"></i></div></div>
            </div>`;
        }
        
        function renderUserManagement() {
            const regularUsers = users.filter(u => u.role !== 'admin');
            return `<div class="card">
                <div class="card-header"><h2><i class="fas fa-users"></i> User Management</h2></div>
                <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>${regularUsers.map(user => `<tr>
                    <td><strong>${user.name}</strong></td>
                    <td>${user.email}</td>
                    <td><span class="status-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? 'Admin' : 'User'}</span></td>
                    <td><span class="status-badge status-active">${user.status}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="updateUserRole(${user.id}, '${user.role === 'admin' ? 'user' : 'admin'}')">${user.role === 'admin' ? 'Demote' : 'Make Admin'}</button>
                        <button class="btn btn-outline btn-sm" onclick="updateUserStatus(${user.id}, '${user.status === 'active' ? 'inactive' : 'active'}')">${user.status === 'active' ? 'Deactivate' : 'Activate'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                </tr>`).join('')}</tbody>}.</div>`;
        }
        
        function renderModuleManagement() {
            return `<div class="card">
                <div class="card-header"><h2><i class="fas fa-book"></i> Module Management</h2></div>
                <div class="module-info" style="margin-bottom:16px;padding:12px;background:rgba(0,208,132,0.1);border-radius:12px;">
                    <p><i class="fas fa-info-circle"></i> Click <strong>Lock</strong> to set price. Click <strong>Unlock</strong> to make FREE.</p>
                </div>
                <table class="data-table"><thead><tr><th>Module</th><th>Price</th><th>Duration</th><th>Lessons</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>${modules.map(module => `<tr>
                    <td><strong>${module.name}</strong><br><small style="color:var(--text-muted);">${module.description?.substring(0, 40)}...</small></td>
                    <td>${module.price === 0 ? 'FREE' : `KES ${module.price.toLocaleString()}`}</td>
                    <td>${module.duration}</td>
                    <td>${module.lessons}</td>
                    <td>${module.enrolled}</td>
                    <td><span class="status-badge ${module.status === 'unlocked' ? 'status-active' : ''}" style="${module.status === 'locked' ? 'background:rgba(231,76,60,0.2);color:#e74c3c' : ''}">${module.status === 'unlocked' ? 'UNLOCKED' : 'LOCKED'}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="toggleModuleStatus(${module.id})">${module.status === 'unlocked' ? 'Lock & Set Price' : 'Unlock'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteModule(${module.id})">Delete</button>
                    </td>
                </table>`).join('')}</tbody>}.</div>`;
        }
        
        function renderQuizBank() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-brain"></i> Quiz Bank</h2></div>
                <div class="quiz-bank-list">${quizBank.map(q => `<div style="background:rgba(255,255,255,0.03);padding:12px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
                    <div><strong>Q${q.id}:</strong> ${q.question.substring(0, 60)}...<br><small>${q.category} | ${q.difficulty}</small></div>
                    <div><button class="btn btn-danger btn-sm" onclick="deleteQuizQuestion(${q.id})">Delete</button></div>
                </div>`).join('')}</div></div>`;
        }
        
        function renderLibrary() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-book-open"></i> Resource Library</h2></div>
                <div class="library-list">${library.map(item => `<div style="background:rgba(255,255,255,0.03);padding:12px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
                    <div><i class="fas fa-file-pdf" style="color:var(--primary);"></i> <strong>${item.title}</strong><br><small>${item.type} | ${item.size} | ${item.downloads} downloads</small></div>
                    <div><button class="btn btn-danger btn-sm" onclick="deleteLibraryItem(${item.id})">Delete</button></div>
                </div>`).join('')}</div></div>`;
        }
        
        function renderSystemSettings() {
            return `<div class="card">
                <div class="card-header"><h2><i class="fas fa-cog"></i> System Settings</h2></div>
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <div><h3>Site Information</h3><p style="color: var(--text-muted);">MEI DRIVE AFRICA Driver Training Platform</p></div>
                    <div><h3>Contact Email</h3><p style="color: var(--text-muted);">support@meidrive.com</p></div>
                    <div><h3>Version</h3><p style="color: var(--text-muted);">v2.0.0</p></div>
                </div>
            </div>`;
        }
        
        function renderApp() {
            const stats = calculateStats();
            const views = {
                dashboard: renderDashboard() + renderUserManagement() + renderModuleManagement() + renderQuizBank() + renderLibrary() + renderSystemSettings(),
                users: renderUserManagement(),
                modules: renderModuleManagement(),
                quiz: renderQuizBank(),
                library: renderLibrary(),
                settings: renderSystemSettings()
            };
            const content = views[adminView] || views.dashboard;
            
            document.getElementById('app').innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header"><div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA</div><p style="font-size: 0.7rem; color: var(--text-muted);">Administrator Panel</p></div>
                    <div class="user-info"><div class="user-avatar">👑</div><div class="user-details"><h4>${adminName}</h4><p>admin@meidrive.com • Admin</p></div></div>
                    <div class="nav-menu">
                        <div class="nav-item ${adminView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                        <div class="nav-item ${adminView === 'users' ? 'active' : ''}" onclick="setView('users')"><i class="fas fa-users"></i> Users</div>
                        <div class="nav-item ${adminView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> Modules</div>
                        <div class="nav-item ${adminView === 'quiz' ? 'active' : ''}" onclick="setView('quiz')"><i class="fas fa-brain"></i> Quiz Bank</div>
                        <div class="nav-item ${adminView === 'library' ? 'active' : ''}" onclick="setView('library')"><i class="fas fa-book-open"></i> Library</div>
                        <div class="nav-item ${adminView === 'settings' ? 'active' : ''}" onclick="setView('settings')"><i class="fas fa-cog"></i> Settings</div>
                    </div>
                </div>
                <div class="main-content">
                    <div class="top-bar">
                        <div class="page-title"><h1>${adminView.charAt(0).toUpperCase() + adminView.slice(1)}</h1><p>Welcome back, ${adminName}</p></div>
                        <div class="stats-mini"><span style="background: var(--dark-card); padding: 8px 16px; border-radius: 50px;"><i class="fas fa-users"></i> ${stats.totalUsers} Learners</span></div>
                    </div>
                    ${content}
                </div>
                <div id="toast-container"></div>
            `;
        }
        
        function setView(view) { adminView = view; renderApp(); }
        function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('open'); }
        
        window.setView = setView;
        window.toggleSidebar = toggleSidebar;
        window.updateUserRole = updateUserRole;
        window.updateUserStatus = updateUserStatus;
        window.toggleModuleStatus = toggleModuleStatus;
        window.deleteUser = deleteUser;
        window.deleteModule = deleteModule;
        window.deleteQuizQuestion = deleteQuizQuestion;
        window.deleteLibraryItem = deleteLibraryItem;
        
        renderApp();
    </script>
</body>
</html>
