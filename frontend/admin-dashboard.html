<script>
    // API Configuration
    const API_URL = 'https://meidriveafrica-backend.onrender.com';
    
    // Check authentication
    const token = localStorage.getItem('adminToken');
    const adminEmail = localStorage.getItem('adminEmail');
    
    if (!token) {
        window.location.href = 'admin.html';
    }
    
    // Set admin info
    document.getElementById('adminName').textContent = adminEmail?.split('@')[0] || 'Admin';
    
    // Load real data from backend
    async function loadDashboardData() {
        try {
            const response = await fetch(`${API_URL}/api/admin/stats`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (response.ok) {
                const data = await response.json();
                updateStats(data);
                updateEnrollments(data.recentEnrollments);
                updateCourses(data.popularCourses);
            } else if (response.status === 401) {
                // Token expired or invalid
                logout();
            } else {
                // Use fallback demo data
                useDemoData();
            }
        } catch (error) {
            console.log('Backend not reachable, using demo data');
            useDemoData();
        }
    }
    
    function updateStats(data) {
        document.getElementById('totalCourses').textContent = data.totalCourses || 12;
        document.getElementById('totalStudents').textContent = (data.totalStudents || 1234).toLocaleString();
        document.getElementById('totalRevenue').textContent = `KES ${(data.totalRevenue || 45678).toLocaleString()}`;
        document.getElementById('completionRate').textContent = `${data.completionRate || 78}%`;
    }
    
    function updateEnrollments(enrollments) {
        if (!enrollments || enrollments.length === 0) {
            enrollments = [
                { student: 'John Mwangi', course: 'Beginner Driving', date: '2024-01-15', status: 'active', amount: 'KES 5,000' },
                { student: 'Mary Wanjiku', course: 'Defensive Driving', date: '2024-01-14', status: 'active', amount: 'KES 7,500' }
            ];
        }
        
        let html = '<thead><tr><th>Student</th><th>Course</th><th>Date</th><th>Status</th><th>Amount</th></tr></thead><tbody>';
        enrollments.forEach(e => {
            const statusClass = e.status === 'active' ? 'badge-success' : 'badge-warning';
            html += `<tr>
                <td>${e.student}</td>
                <td>${e.course}</td>
                <td>${e.date}</td>
                <td><span class="badge ${statusClass}">${e.status}</span></td>
                <td>${e.amount}</td>
            </tr>`;
        });
        html += '</tbody>';
        document.getElementById('recentEnrollments').innerHTML = html;
    }
    
    function updateCourses(courses) {
        if (!courses || courses.length === 0) {
            courses = [
                { title: 'Beginner Driving', students: 456, rating: 4.8, revenue: 'KES 2,280,000' },
                { title: 'Defensive Driving', students: 324, rating: 4.7, revenue: 'KES 2,430,000' }
            ];
        }
        
        let html = '<thead><tr><th>Course Title</th><th>Students</th><th>Rating</th><th>Revenue</th></tr></thead><tbody>';
        courses.forEach(c => {
            html += `<tr>
                <td>${c.title}</td>
                <td>${c.students}</td>
                <td>⭐ ${c.rating}</td>
                <td>${c.revenue}</td>
            </tr>`;
        });
        html += '</tbody>';
        document.getElementById('popularCourses').innerHTML = html;
    }
    
    function useDemoData() {
        updateStats({ totalCourses: 12, totalStudents: 1234, totalRevenue: 45678, completionRate: 78 });
        updateEnrollments([]);
        updateCourses([]);
    }
    
    function logout() {
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminEmail');
        localStorage.removeItem('adminName');
        window.location.href = 'admin.html';
    }
    
    // Load data on page load
    loadDashboardData();
    
    // Auto-refresh every 30 seconds
    setInterval(loadDashboardData, 30000);
</script>
