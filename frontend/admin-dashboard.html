<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui; background: #0a192f; color: #fff; display: flex; }
        .sidebar { width: 260px; background: #0d2137; padding: 24px 16px; border-right: 1px solid #1e3a5f; }
        .sidebar h3 { color: #00ff88; margin-bottom: 24px; }
        .sidebar button { width: 100%; background: transparent; border: 1px solid #2c4c6e; color: #fff; padding: 10px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .sidebar button:hover { background: #1e3a5f; border-color: #00ff88; color: #00ff88; }
        .main { flex: 1; padding: 24px 32px; }
        .card { background: #0d2137; border: 1px solid #1e3a5f; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: #0d2137; border: 1px solid #00ff88; border-radius: 20px; padding: 16px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 800; color: #00ff88; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #1e3a5f; }
        th { color: #00ff88; }
        button.small { padding: 6px 12px; font-size: 12px; margin: 0 4px; background: #2c4c6e; border: none; border-radius: 20px; color: white; cursor: pointer; }
        button.approve { background: #00b894; }
        button.reject { background: #d63031; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #0d2137; border-left: 4px solid #00ff88; padding: 12px 20px; border-radius: 12px; z-index: 1000; }
        .price-input { width: 100px; background: #0f1a2c; border: 1px solid #2c4c6e; border-radius: 8px; padding: 6px; color: white; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0d2137; border: 1px solid #00ff88; border-radius: 24px; width: 90%; max-width: 500px; padding: 2rem; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0f1a2c; border: 1px solid #2c4c6e; border-radius: 12px; color: white; }
    </style>
</head>
<body>
<div class="sidebar">
    <h3>🚗 MEI ADMIN</h3>
    <button onclick="showView('dashboard')">📊 Dashboard</button>
    <button onclick="showView('users')">👥 Users</button>
    <button onclick="showView('payments')">💰 Payments</button>
    <button onclick="showView('courses')">📚 Courses</button>
    <button onclick="showView('modules')">📦 Modules</button>
    <button onclick="logout()">🚪 Logout</button>
</div>
<div class="main">
    <h2 id="pageTitle">Dashboard</h2>
    <div id="content">Loading...</div>
</div>

<script>
    // ========== CORRECT SUPABASE CREDENTIALS (same as main platform) ==========
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentView = 'dashboard';
    let revenueChart = null;
    let coursesList = [];
    let lessonsList = [];
    
    function toast(msg) {
        const div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    
    async function checkAuthAndAdmin() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = 'admin-login.html';
            return false;
        }
        // Call RPC is_admin_user
        const { data, error } = await supabase.rpc('is_admin_user');
        if (error || !data) {
            toast('Admin access denied or RPC missing. Contact support.');
            await supabase.auth.signOut();
            window.location.href = 'admin-login.html';
            return false;
        }
        return true;
    }
    
    async function loadStats() {
        const { count: users } = await supabase.from('user_profiles').select('*', { count: 'exact', head: true });
        const { count: courses } = await supabase.from('courses').select('*', { count: 'exact', head: true });
        const { data: revenueData } = await supabase.from('enrollments').select('amount').eq('payment_status', 'verified');
        const totalRevenue = revenueData?.reduce((s, e) => s + (e.amount || 0), 0) || 0;
        const { count: pending } = await supabase.from('enrollments').select('*', { count: 'exact', head: true }).eq('payment_status', 'pending');
        return { users: users || 0, courses: courses || 0, revenue: totalRevenue, pending: pending || 0 };
    }
    
    async function loadDashboard() {
        const stats = await loadStats();
        // Get daily revenue for chart
        const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        const { data: daily } = await supabase
            .from('enrollments')
            .select('amount, verified_at')
            .eq('payment_status', 'verified')
            .gte('verified_at', sevenDaysAgo.toISOString());
        const labels = [];
        const values = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            labels.push(dateStr);
            const dayTotal = (daily || []).filter(e => e.verified_at?.startsWith(dateStr)).reduce((s, e) => s + (e.amount || 0), 0);
            values.push(dayTotal);
        }
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${stats.users}</div><div>Total Users</div></div>
                <div class="stat-card"><div class="stat-number">${stats.courses}</div><div>Courses</div></div>
                <div class="stat-card"><div class="stat-number">KES ${stats.revenue.toLocaleString()}</div><div>Revenue</div></div>
                <div class="stat-card"><div class="stat-number">${stats.pending}</div><div>Pending Payments</div></div>
            </div>
            <div class="card"><h3>Daily Revenue (Last 7 days)</h3><canvas id="revenueChart" style="max-height:300px;"></canvas></div>
        `;
        document.getElementById('content').innerHTML = html;
        const ctx = document.getElementById('revenueChart')?.getContext('2d');
        if (ctx) {
            if (revenueChart) revenueChart.destroy();
            revenueChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Revenue (KES)', data: values, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#a0b3d9' } }, y: { ticks: { color: '#a0b3d9' } } } }
            });
        }
    }
    
    async function loadUsers() {
        const { data: users } = await supabase.from('user_profiles').select('*');
        if (!users || users.length === 0) return '<p>No users found.</p>';
        return `
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Admin</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td>${escapeHtml(u.full_name || '-')}</td>
                            <td>${escapeHtml(u.email)}</td>
                            <td>${u.is_admin ? '✅' : '❌'}</td>
                            <td>${u.status || 'active'}</td>
                            <td><button class="small" onclick="toggleAdmin('${u.id}', ${u.is_admin})">Toggle Admin</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function loadPayments() {
        const { data: enrollments } = await supabase
            .from('enrollments')
            .select(`*, courses(name), user_profiles(full_name, email)`)
            .order('requested_at', { ascending: false });
        if (!enrollments || enrollments.length === 0) return '<p>No payments yet.</p>';
        return `
            <table>
                <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Status</th><th>Requested</th><th>Action</th></tr></thead>
                <tbody>
                    ${enrollments.map(e => `
                        <tr>
                            <td>${escapeHtml(e.user_profiles?.full_name || e.user_id)}</td>
                            <td>${escapeHtml(e.courses?.name)}</td>
                            <td>KES ${e.amount}</td>
                            <td>${e.payment_status}</td>
                            <td>${new Date(e.requested_at).toLocaleDateString()}</td>
                            <td>${e.payment_status === 'pending' ? `<button class="small approve" onclick="approvePayment(${e.id})">Approve</button> <button class="small reject" onclick="rejectPayment(${e.id})">Reject</button>` : '—'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function loadCourses() {
        const { data: courses } = await supabase.from('courses').select('*');
        coursesList = courses || [];
        if (!coursesList.length) return '<p>No courses. Add some via SQL.</p>';
        return `
            <table>
                <thead><tr><th>Course</th><th>Price (KES)</th><th>Active</th><th>Actions</th></tr></thead>
                <tbody>
                    ${coursesList.map(c => `
                        <tr>
                            <td>${escapeHtml(c.name)}</td>
                            <td><input type="number" id="price_${c.id}" value="${c.price}" class="price-input"></td>
                            <td>${c.active ? '✅ Active' : '🔴 Inactive'}</td>
                            <td>
                                <button class="small" onclick="updatePrice(${c.id})">Save Price</button>
                                <button class="small" onclick="toggleCourseActive(${c.id}, ${c.active})">${c.active ? 'Disable' : 'Enable'}</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <button class="small" onclick="showAddCourseModal()" style="margin-top: 16px;">+ Add New Course</button>
        `;
    }
    
    async function loadModules() {
        const { data: courses } = await supabase.from('courses').select('*');
        if (!courses || courses.length === 0) return '<p>No courses to add modules to.</p>';
        const { data: lessons } = await supabase.from('lessons').select('*');
        lessonsList = lessons || [];
        let html = `<button class="small" onclick="showAddModuleModal()">+ Add New Module</button><div style="margin-top: 20px;">`;
        for (const course of courses) {
            const courseLessons = lessonsList.filter(l => l.course_id === course.id).sort((a,b) => a.order - b.order);
            html += `<div class="card"><h3>${escapeHtml(course.name)}</h3>`;
            if (courseLessons.length === 0) html += '<p>No modules yet.</p>';
            else {
                html += `<ul style="list-style: none;">`;
                courseLessons.forEach(l => {
                    html += `<li style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 8px; background: #0f1a2c; border-radius: 8px;">
                                <span><strong>${escapeHtml(l.title)}</strong> (Order ${l.order})</span>
                                <span>
                                    <button class="small" onclick="editModule(${l.id})">Edit</button>
                                    <button class="small" onclick="deleteModule(${l.id})">Delete</button>
                                </span>
                            </li>`;
                });
                html += `</ul>`;
            }
            html += `</div>`;
        }
        html += `</div>`;
        return html;
    }
    
    async function showView(view) {
        currentView = view;
        document.getElementById('pageTitle').innerText = view.charAt(0).toUpperCase() + view.slice(1);
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '<div class="loading-spinner"></div>';
        let html = '';
        if (view === 'dashboard') html = await loadDashboard();
        else if (view === 'users') html = await loadUsers();
        else if (view === 'payments') html = await loadPayments();
        else if (view === 'courses') html = await loadCourses();
        else if (view === 'modules') html = await loadModules();
        else html = await loadDashboard();
        if (typeof html === 'string') contentDiv.innerHTML = html;
        else contentDiv.innerHTML = html;
    }
    
    // Admin actions
    window.toggleAdmin = async (userId, current) => {
        const { error } = await supabase.rpc('admin_toggle_role', { p_user_id: userId, p_is_admin: !current });
        if (error) toast('Failed: ' + error.message);
        else { toast('Role updated'); showView(currentView); }
    };
    window.approvePayment = async (enrollmentId) => {
        const { data, error } = await supabase.rpc('admin_verify_payment', { p_enrollment_id: enrollmentId });
        if (error || !data?.success) toast('Approval failed');
        else { toast('Payment approved'); showView(currentView); }
    };
    window.rejectPayment = async (enrollmentId) => {
        const { data, error } = await supabase.rpc('admin_reject_payment', { p_enrollment_id: enrollmentId });
        if (error || !data?.success) toast('Rejection failed');
        else { toast('Payment rejected'); showView(currentView); }
    };
    window.updatePrice = async (courseId) => {
        const price = parseInt(document.getElementById(`price_${courseId}`).value);
        if (isNaN(price)) { toast('Invalid price'); return; }
        const { error } = await supabase.from('courses').update({ price }).eq('id', courseId);
        if (error) toast('Update failed');
        else toast('Price updated');
    };
    window.toggleCourseActive = async (courseId, currentActive) => {
        const { error } = await supabase.from('courses').update({ active: !currentActive }).eq('id', courseId);
        if (error) toast('Failed');
        else { toast(`Course ${!currentActive ? 'enabled' : 'disabled'}`); showView(currentView); }
    };
    
    // Course and module modals (simplified)
    function showAddCourseModal() {
        const modalHtml = `
            <div class="modal active" id="courseModal">
                <div class="modal-content">
                    <h3>Add New Course</h3>
                    <input type="text" id="courseName" placeholder="Course Name">
                    <input type="number" id="coursePrice" placeholder="Price (KES)">
                    <textarea id="courseDesc" placeholder="Description" rows="3"></textarea>
                    <button class="small" onclick="createCourse()">Create</button>
                    <button class="small" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    window.createCourse = async () => {
        const name = document.getElementById('courseName')?.value;
        const price = parseInt(document.getElementById('coursePrice')?.value);
        const description = document.getElementById('courseDesc')?.value;
        if (!name) { toast('Name required'); return; }
        const { error } = await supabase.from('courses').insert({ name, price, description, active: true });
        if (error) toast('Failed: ' + error.message);
        else { toast('Course added'); closeModal(); showView('courses'); }
    };
    function showAddModuleModal() {
        const modalHtml = `
            <div class="modal active" id="moduleModal">
                <div class="modal-content">
                    <h3>Add New Module</h3>
                    <select id="moduleCourseId">${coursesList.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
                    <input type="text" id="moduleTitle" placeholder="Module Title">
                    <textarea id="moduleContent" placeholder="Content (HTML/text)" rows="5"></textarea>
                    <input type="number" id="moduleOrder" placeholder="Order" value="1">
                    <button class="small" onclick="createModule()">Create</button>
                    <button class="small" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    window.createModule = async () => {
        const courseId = parseInt(document.getElementById('moduleCourseId')?.value);
        const title = document.getElementById('moduleTitle')?.value;
        const content = document.getElementById('moduleContent')?.value;
        const order = parseInt(document.getElementById('moduleOrder')?.value);
        if (!title) { toast('Title required'); return; }
        const { error } = await supabase.rpc('admin_create_module', { p_course_id: courseId, p_title: title, p_content: content, p_order: order });
        if (error) toast('Failed: ' + error.message);
        else { toast('Module created'); closeModal(); showView('modules'); }
    };
    window.editModule = async (moduleId) => {
        const module = lessonsList.find(l => l.id === moduleId);
        if (!module) return;
        const modalHtml = `
            <div class="modal active" id="moduleModal">
                <div class="modal-content">
                    <h3>Edit Module</h3>
                    <input type="text" id="moduleTitle" value="${escapeHtml(module.title)}">
                    <textarea id="moduleContent" rows="5">${escapeHtml(module.content || '')}</textarea>
                    <input type="number" id="moduleOrder" value="${module.order}">
                    <button class="small" onclick="updateModule(${moduleId})">Save</button>
                    <button class="small" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.updateModule = async (moduleId) => {
        const title = document.getElementById('moduleTitle')?.value;
        const content = document.getElementById('moduleContent')?.value;
        const order = parseInt(document.getElementById('moduleOrder')?.value);
        if (!title) { toast('Title required'); return; }
        const { error } = await supabase.rpc('admin_update_module', { p_id: moduleId, p_title: title, p_content: content, p_order: order });
        if (error) toast('Update failed');
        else { toast('Module updated'); closeModal(); showView('modules'); }
    };
    window.deleteModule = async (moduleId) => {
        if (!confirm('Delete this module?')) return;
        const { error } = await supabase.rpc('admin_delete_module', { p_id: moduleId });
        if (error) toast('Delete failed');
        else { toast('Module deleted'); showView('modules'); }
    };
    function closeModal() { document.querySelector('.modal.active')?.remove(); }
    window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'admin-login.html'; };
    function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    // Initialization
    (async () => {
        const ok = await checkAuthAndAdmin();
        if (ok) showView('dashboard');
    })();
</script>
</body>
</html>
