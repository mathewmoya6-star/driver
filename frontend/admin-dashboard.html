<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        body { margin: 0; font-family: system-ui; background: #0a192f; color: #fff; display: flex; }
        .sidebar { width: 240px; background: #0d2137; padding: 20px; border-right: 1px solid #1e3a5f; }
        .main { flex: 1; padding: 24px; }
        button { width: 100%; margin-bottom: 12px; padding: 10px; background: #1e3a5f; border: none; border-radius: 12px; color: white; cursor: pointer; }
        button:hover { background: #00ff88; color: #0a192f; }
        .card { background: #0d2137; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #1e3a5f; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #1e3a5f; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #0d2137; border-left: 4px solid #00ff88; padding: 12px 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h3>🚗 MEI ADMIN</h3>
    <button onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('users')">Users</button>
    <button onclick="showView('payments')">Payments</button>
    <button onclick="showView('courses')">Courses</button>
    <button onclick="logout()">Logout</button>
</div>
<div class="main">
    <h2 id="pageTitle">Dashboard</h2>
    <div id="content">Loading...</div>
</div>

<script>
    const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentView = 'dashboard';

    // Check authentication and admin status
    async function checkAuthAndAdmin() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = 'admin-login.html';
            return false;
        }
        const { data: isAdmin, error } = await supabase.rpc('is_admin_user');
        if (error || !isAdmin) {
            await supabase.auth.signOut();
            window.location.href = 'admin-login.html';
            return false;
        }
        return true;
    }

    // Helper: show toast
    function toast(msg) {
        const div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    // Load dashboard stats
    async function loadDashboard() {
        const { count: users } = await supabase.from('user_profiles').select('*', { count: 'exact', head: true });
        const { count: courses } = await supabase.from('courses').select('*', { count: 'exact', head: true });
        const { data: revenue } = await supabase.from('enrollments').select('amount').eq('payment_status', 'verified');
        const totalRevenue = revenue?.reduce((s, e) => s + e.amount, 0) || 0;
        const { count: pending } = await supabase.from('enrollments').select('*', { count: 'exact', head: true }).eq('payment_status', 'pending');
        return `
            <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 16px;">
                <div class="card"><h3>Users</h3><div style="font-size:32px;">${users || 0}</div></div>
                <div class="card"><h3>Courses</h3><div style="font-size:32px;">${courses || 0}</div></div>
                <div class="card"><h3>Pending Payments</h3><div style="font-size:32px;">${pending || 0}</div></div>
                <div class="card"><h3>Total Revenue</h3><div style="font-size:32px;">KES ${totalRevenue.toLocaleString()}</div></div>
            </div>
        `;
    }

    async function loadUsers() {
        const { data: users } = await supabase.from('user_profiles').select('*');
        if (!users) return '<p>No users</p>';
        return `
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Admin</th><th>Action</th></tr></thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td>${escapeHtml(u.full_name || '-')}</td>
                            <td>${escapeHtml(u.email)}</td>
                            <td>${u.is_admin ? '✅' : '❌'}</td>
                            <td><button onclick="toggleAdmin('${u.id}', ${u.is_admin})">Toggle Admin</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    async function loadPayments() {
        const { data: enrollments } = await supabase.from('enrollments').select(`*, courses(name), user_profiles(full_name, email)`);
        if (!enrollments?.length) return '<p>No payments</p>';
        return `
            <table>
                <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                    ${enrollments.map(e => `
                        <tr>
                            <td>${escapeHtml(e.user_profiles?.full_name || e.user_id)}</td>
                            <td>${escapeHtml(e.courses?.name)}</td>
                            <td>KES ${e.amount}</td>
                            <td>${e.payment_status}</td>
                            <td>${e.payment_status === 'pending' ? `<button onclick="approvePayment(${e.id})">Approve</button>` : '—'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    async function loadCourses() {
        const { data: courses } = await supabase.from('courses').select('*');
        return `
            <table>
                <thead><tr><th>Course</th><th>Price</th><th>Active</th><th>Action</th></tr></thead>
                <tbody>
                    ${courses.map(c => `
                        <tr>
                            <td>${escapeHtml(c.name)}</td>
                            <td><input type="number" id="price_${c.id}" value="${c.price}"></td>
                            <td>${c.active ? 'Active' : 'Inactive'}</td>
                            <td><button onclick="updatePrice(${c.id})">Save</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    async function showView(view) {
        currentView = view;
        document.getElementById('pageTitle').innerText = view.charAt(0).toUpperCase() + view.slice(1);
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = 'Loading...';
        let html = '';
        if (view === 'dashboard') html = await loadDashboard();
        else if (view === 'users') html = await loadUsers();
        else if (view === 'payments') html = await loadPayments();
        else if (view === 'courses') html = await loadCourses();
        contentDiv.innerHTML = html;
    }

    // Admin actions (RPC calls)
    window.toggleAdmin = async (userId, current) => {
        const { error } = await supabase.rpc('admin_toggle_role', { p_user_id: userId, p_is_admin: !current });
        if (error) toast('Failed: ' + error.message);
        else { toast('Role updated'); showView(currentView); }
    };
    window.approvePayment = async (enrollmentId) => {
        const { error } = await supabase.rpc('admin_verify_payment', { p_enrollment_id: enrollmentId });
        if (error) toast('Error: ' + error.message);
        else { toast('Payment approved'); showView(currentView); }
    };
    window.updatePrice = async (courseId) => {
        const price = parseInt(document.getElementById(`price_${courseId}`).value);
        const { error } = await supabase.from('courses').update({ price }).eq('id', courseId);
        if (error) toast('Update failed');
        else toast('Price updated');
    };
    window.logout = async () => {
        await supabase.auth.signOut();
        window.location.href = 'admin-login.html';
    };

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    // Init
    (async () => {
        const ok = await checkAuthAndAdmin();
        if (ok) showView('dashboard');
    })();
</script>
</body>
</html>
