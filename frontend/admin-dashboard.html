<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script type="module" src="./supabase.js"></script>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0a0a0a;
      color:white;
      display:flex;
    }
    .sidebar{
      width:220px;
      background:#111;
      height:100vh;
      padding:20px;
    }
    .main{
      flex:1;
      padding:20px;
    }
    button{
      background:#d4af37;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      margin-bottom:10px;
      width:100%;
    }
    .card{
      background:#111;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>MEI ADMIN</h3>
  <button onclick="loadUsers()">Users</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">
  <h2>Dashboard</h2>
  <div id="content"></div>
</div>

<script type="module">
import { supabase } from "./supabase.js";

/* AUTH CHECK */
async function checkAuth(){
  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    window.location.href = "admin-login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if(profile.role !== "admin"){
    await supabase.auth.signOut();
    window.location.href = "admin-login.html";
  }
}

checkAuth();

/* LOAD USERS */
window.loadUsers = async function () {
  const { data: users } = await supabase
    .from("profiles")
    .select("*");

  document.getElementById("content").innerHTML =
    users.map(u => `
      <div class="card">
        <b>${u.full_name || "No name"}</b><br>
        Role: ${u.role}
      </div>
    `).join("");
};

/* LOGOUT */
window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "admin-login.html";
};
</script>

</body>
</html>
