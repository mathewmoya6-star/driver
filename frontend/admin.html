<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI Admin Dashboard | Local Storage Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #f0f0f0;
            line-height: 1.5;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #0a0a0f;
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid #222;
            color: #ccc;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            color: #d4af37;
        }

        .nav-btn.active {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
        }

        .logout-btn {
            margin-top: 40px;
            background: rgba(220, 53, 69, 0.15);
            border-color: #dc3545;
            color: #ff6b6b;
        }

        .logout-btn:hover {
            background: #dc3545;
            color: white;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 32px 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222;
        }

        .stat-card:hover {
            border-color: #d4af37;
        }

        .stat-card h3 {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4af37;
        }

        .user-section {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #222;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th {
            color: #d4af37;
            font-weight: 600;
        }

        .role-badge {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
        }

        .delete-btn {
            background: #dc3545;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .delete-btn:hover {
            background: #ff4444;
        }

        .add-user-form {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #222;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-top: 16px;
        }

        .form-field {
            flex: 1;
            min-width: 160px;
        }

        .form-field label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-field input, .form-field select {
            width: 100%;
            padding: 12px;
            background: #1a1a22;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }

        .add-btn {
            background: #d4af37;
            color: #000;
            font-weight: 700;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a22;
            border-left: 4px solid #d4af37;
            padding: 14px 24px;
            border-radius: 12px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0f0f14;
            border: 1px solid #d4af37;
            border-radius: 28px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a22;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 20px 12px; }
            .sidebar h2 span, .nav-btn span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
            .nav-btn i { margin: 0; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <h2><i class="fas fa-crown"></i> <span>MEI ADMIN</span></h2>
        <button class="nav-btn active" onclick="showPanel('dashboard')">
            <i class="fas fa-chart-line"></i> <span>Dashboard</span>
        </button>
        <button class="nav-btn" onclick="showPanel('users')">
            <i class="fas fa-users"></i> <span>Manage Users</span>
        </button>
        <button class="nav-btn logout-btn" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
    </div>

    <div class="main-content">
        <div id="dashboardPanel">
            <h1 style="margin-bottom: 24px;"><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><h3><i class="fas fa-users"></i> Total Users</h3><div class="stat-number" id="totalUsers">0</div></div>
                <div class="stat-card"><h3><i class="fas fa-graduation-cap"></i> Learners</h3><div class="stat-number" id="studentCount">0</div></div>
                <div class="stat-card"><h3><i class="fas fa-truck"></i> Drivers</h3><div class="stat-number" id="driverCount">0</div></div>
                <div class="stat-card"><h3><i class="fas fa-check-circle"></i> Units Done</h3><div class="stat-number" id="totalCompletions">0</div></div>
            </div>
            <div class="user-section">
                <h3><i class="fas fa-chart-pie"></i> Platform Activity</h3>
                <div id="recentActivity" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="usersPanel" style="display: none;">
            <h1 style="margin-bottom: 24px;"><i class="fas fa-user-shield"></i> User Management</h1>
            
            <div class="add-user-form">
                <h3><i class="fas fa-user-plus"></i> Add New User</h3>
                <div class="form-group">
                    <div class="form-field">
                        <label>Full Name</label>
                        <input type="text" id="userName" placeholder="John Kamau">
                    </div>
                    <div class="form-field">
                        <label>Email</label>
                        <input type="email" id="userEmail" placeholder="user@example.com">
                    </div>
                    <div class="form-field">
                        <label>Password</label>
                        <input type="password" id="userPassword" placeholder="••••••">
                    </div>
                    <div class="form-field">
                        <label>Role</label>
                        <select id="userRole">
                            <option value="learner">Learner Driver</option>
                            <option value="driver">Professional Driver</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button class="add-btn" onclick="addNewUser()"><i class="fas fa-save"></i> Create User</button>
                </div>
            </div>

            <div class="user-section">
                <h2><i class="fas fa-list"></i> Registered Users</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Progress</th><th>Action</th></tr></thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= LOCAL STORAGE ADMIN SYSTEM (NO SERVER REQUIRED) =======================
    
    let currentAdmin = null;
    
    // Initialize demo users in localStorage if not exists
    function initDemoData() {
        if (!localStorage.getItem('mei_users')) {
            const demoUsers = [
                { id: 'user_1', name: 'John Kamau', email: 'john@example.com', password: 'pass123', role: 'learner', progress: 5, totalUnits: 14 },
                { id: 'user_2', name: 'Mary Wanjiku', email: 'mary@example.com', password: 'pass123', role: 'driver', progress: 12, totalUnits: 14 },
                { id: 'user_3', name: 'Peter Otieno', email: 'peter@example.com', password: 'pass123', role: 'learner', progress: 3, totalUnits: 14 },
                { id: 'user_4', name: 'Admin User', email: 'admin@mei.com', password: 'admin123', role: 'admin', progress: 14, totalUnits: 14 }
            ];
            localStorage.setItem('mei_users', JSON.stringify(demoUsers));
        }
    }
    
    // Check if admin is logged in
    function checkAdminAuth() {
        const adminData = localStorage.getItem('mei_admin_logged_in');
        if (adminData === 'true') {
            currentAdmin = { name: 'Administrator', email: 'admin@mei.com', role: 'admin' };
            return true;
        }
        showAdminLoginModal();
        return false;
    }
    
    // Show login modal
    function showAdminLoginModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.id = 'adminLoginModal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2 style="color:#d4af37;margin-bottom:20px;"><i class="fas fa-lock"></i> Admin Login</h2>
                <input type="email" id="adminEmail" placeholder="Admin Email" value="admin@mei.com">
                <input type="password" id="adminPass" placeholder="Password" value="admin123">
                <button onclick="authenticateAdmin()" style="width:100%;background:#d4af37;color:#000;padding:12px;border:none;border-radius:40px;font-weight:bold;margin-top:10px;cursor:pointer;">Login</button>
                <p style="color:#888;font-size:12px;margin-top:16px;text-align:center;">Demo: admin@mei.com / admin123</p>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function closeModal() {
        const modal = document.getElementById('adminLoginModal');
        if (modal) modal.remove();
    }
    
    function authenticateAdmin() {
        const email = document.getElementById('adminEmail')?.value || 'admin@mei.com';
        const password = document.getElementById('adminPass')?.value || 'admin123';
        
        const users = JSON.parse(localStorage.getItem('mei_users') || '[]');
        const admin = users.find(u => u.email === email && u.role === 'admin' && u.password === password);
        
        if (admin || (email === 'admin@mei.com' && password === 'admin123')) {
            localStorage.setItem('mei_admin_logged_in', 'true');
            currentAdmin = { name: 'Administrator', email: email, role: 'admin' };
            closeModal();
            showToast('Welcome to Admin Dashboard', 'success');
            loadDashboardStats();
            loadAllUsers();
        } else {
            showToast('Invalid admin credentials', 'error');
        }
    }
    
    // Dashboard stats
    function loadDashboardStats() {
        const users = JSON.parse(localStorage.getItem('mei_users') || '[]');
        const total = users.length;
        const learners = users.filter(u => u.role === 'learner').length;
        const drivers = users.filter(u => u.role === 'driver').length;
        const totalProgress = users.reduce((sum, u) => sum + (u.progress || 0), 0);
        
        document.getElementById('totalUsers').innerText = total;
        document.getElementById('studentCount').innerText = learners;
        document.getElementById('driverCount').innerText = drivers;
        document.getElementById('totalCompletions').innerText = totalProgress;
        
        document.getElementById('recentActivity').innerHTML = `
            <div class="stat-card" style="margin-top:12px;">
                <p><i class="fas fa-database"></i> Total users in system: ${total}</p>
                <p><i class="fas fa-chart-line"></i> Total units completed: ${totalProgress}</p>
                <p><i class="fas fa-clock"></i> Last updated: ${new Date().toLocaleString()}</p>
                <p style="font-size:12px;color:#888;margin-top:12px;">✅ Data stored securely in your browser</p>
            </div>
        `;
    }
    
    // Load all users
    function loadAllUsers() {
        const users = JSON.parse(localStorage.getItem('mei_users') || '[]');
        const tbody = document.getElementById('usersTableBody');
        
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No users found. Add some users above.</td></tr>';
            return;
        }
        
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${escapeHtml(u.name)}</td>
                <td>${escapeHtml(u.email)}</td>
                <td><span class="role-badge">${u.role}</span></td>
                <td>📘 ${u.progress || 0}/${u.totalUnits || 14} units</td>
                <td>${u.role !== 'admin' ? `<button class="delete-btn" onclick="deleteUser('${u.id}')"><i class="fas fa-trash"></i> Delete</button>` : '<span style="color:#888;">Protected</span>'}</td>
            </tr>
        `).join('');
    }
    
    // Add new user
    function addNewUser() {
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        const password = document.getElementById('userPassword').value;
        const role = document.getElementById('userRole').value;
        
        if (!email) {
            showToast('Please enter an email address', 'error');
            return;
        }
        
        const users = JSON.parse(localStorage.getItem('mei_users') || '[]');
        
        // Check if email exists
        if (users.some(u => u.email === email)) {
            showToast('User with this email already exists', 'error');
            return;
        }
        
        const newUser = {
            id: 'user_' + Date.now(),
            name: name || email.split('@')[0],
            email: email,
            password: password || 'pass123',
            role: role,
            progress: 0,
            totalUnits: 14
        };
        
        users.push(newUser);
        localStorage.setItem('mei_users', JSON.stringify(users));
        
        // Clear form
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPassword').value = '';
        
        showToast(`✅ User ${newUser.name} created successfully!`, 'success');
        loadAllUsers();
        loadDashboardStats();
    }
    
    // Delete user
    function deleteUser(userId) {
        if (!confirm('Delete this user? This action cannot be undone.')) return;
        
        let users = JSON.parse(localStorage.getItem('mei_users') || '[]');
        const userToDelete = users.find(u => u.id === userId);
        
        if (userToDelete?.role === 'admin') {
            showToast('Cannot delete admin user', 'error');
            return;
        }
        
        users = users.filter(u => u.id !== userId);
        localStorage.setItem('mei_users', JSON.stringify(users));
        
        showToast('User deleted successfully', 'success');
        loadAllUsers();
        loadDashboardStats();
    }
    
    function handleLogout() {
        localStorage.removeItem('mei_admin_logged_in');
        currentAdmin = null;
        showToast('Logged out of admin panel', 'info');
        showAdminLoginModal();
    }
    
    function showPanel(panel) {
        document.getElementById('dashboardPanel').style.display = panel === 'dashboard' ? 'block' : 'none';
        document.getElementById('usersPanel').style.display = panel === 'users' ? 'block' : 'none';
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if (panel === 'dashboard') document.querySelector('.nav-btn:first-child').classList.add('active');
        else document.querySelectorAll('.nav-btn')[1].classList.add('active');
        
        if (panel === 'dashboard') loadDashboardStats();
        if (panel === 'users') loadAllUsers();
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Make functions global
    window.showPanel = showPanel;
    window.handleLogout = handleLogout;
    window.authenticateAdmin = authenticateAdmin;
    window.addNewUser = addNewUser;
    window.deleteUser = deleteUser;
    window.showAdminLoginModal = showAdminLoginModal;
    window.closeModal = closeModal;
    
    // Initialize
    initDemoData();
    checkAdminAuth();
</script>
</body>
</html>
