<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Admin Panel</title>
    <meta name="description" content="Admin Dashboard for MEI DRIVE AFRICA Driver Training Platform">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --secondary: #00ff88;
            --dark: #0a0a0a;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        
        /* Layout */
        .admin-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 1.6rem; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        .logout-btn {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Cards */
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 600; }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(212, 175, 55, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-inactive { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-user { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: var(--dark-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }
        
        /* Switch Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before { transform: translateX(26px); }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.75rem; }
            .data-table th, .data-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================
        // APP STATE
        // ============================================
        let currentUser = { name: 'Admin User', email: 'admin@meidrive.com', role: 'admin' };
        let adminView = 'dashboard';
        
        // Data Stores
        let users = [
            { id: 1, name: 'John Mwangi', email: 'john@example.com', role: 'user', status: 'active', enrolledModules: ['Beginner Drivers', 'EV Training'] },
            { id: 2, name: 'Sarah Wanjiku', email: 'sarah@example.com', role: 'user', status: 'active', enrolledModules: ['Boda Boda Safety', 'PSV Course'] },
            { id: 3, name: 'Michael Otieno', email: 'michael@example.com', role: 'user', status: 'active', enrolledModules: ['School Bus Safety'] },
            { id: 4, name: 'Grace Akinyi', email: 'grace@example.com', role: 'user', status: 'inactive', enrolledModules: [] },
            { id: 5, name: 'Admin User', email: 'admin@meidrive.com', role: 'admin', status: 'active', enrolledModules: ['All Modules'] }
        ];
        
        let modules = [
            { id: 1, name: 'Beginner Drivers Course', price: 0, duration: '25 hours', lessons: 21, status: 'unlocked', enrolled: 1245 },
            { id: 2, name: 'EV Drivers & Riders', price: 0, duration: '12 hours', lessons: 8, status: 'unlocked', enrolled: 567 },
            { id: 3, name: 'Boda Boda Safety Course', price: 0, duration: '18 hours', lessons: 12, status: 'unlocked', enrolled: 2341 },
            { id: 4, name: 'PSV Professional Course', price: 2999, duration: '15 hours', lessons: 10, status: 'locked', enrolled: 892 },
            { id: 5, name: 'School Bus Safety Program', price: 1999, duration: '10 hours', lessons: 6, status: 'locked', enrolled: 456 },
            { id: 6, name: 'Advanced Driver Academy', price: 4999, duration: '20 hours', lessons: 8, status: 'locked', enrolled: 234 }
        ];
        
        let systemSettings = {
            maintenanceMode: false,
            allowRegistration: true,
            siteName: 'MEI DRIVE AFRICA',
            contactEmail: 'support@meidrive.com'
        };
        
        // Stats
        let totalRevenue = modules.filter(m => m.price > 0).reduce((sum, m) => sum + (m.price * m.enrolled), 0);
        
        // Toast System
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // CRUD Functions
        function addUser(name, email, role) {
            const newUser = {
                id: users.length + 1,
                name: name,
                email: email,
                role: role,
                status: 'active',
                enrolledModules: []
            };
            users.push(newUser);
            showToast(`User ${name} added successfully!`, 'success');
            renderApp();
        }
        
        function deleteUser(userId) {
            users = users.filter(u => u.id !== userId);
            showToast('User deleted successfully', 'success');
            renderApp();
        }
        
        function updateUserStatus(userId, status) {
            const user = users.find(u => u.id === userId);
            if (user) {
                user.status = status;
                showToast(`User ${user.name} ${status === 'active' ? 'activated' : 'deactivated'}`, 'success');
                renderApp();
            }
        }
        
        function addModule(name, price, duration, lessons) {
            const newModule = {
                id: modules.length + 1,
                name: name,
                price: parseInt(price),
                duration: duration,
                lessons: parseInt(lessons),
                status: price === 0 ? 'unlocked' : 'locked',
                enrolled: 0
            };
            modules.push(newModule);
            showToast(`Module ${name} added successfully!`, 'success');
            renderApp();
        }
        
        function updateModuleStatus(moduleId, status) {
            const module = modules.find(m => m.id === moduleId);
            if (module) {
                module.status = status;
                showToast(`Module ${module.name} ${status === 'unlocked' ? 'unlocked' : 'locked'}`, 'success');
                renderApp();
            }
        }
        
        function deleteModule(moduleId) {
            modules = modules.filter(m => m.id !== moduleId);
            showToast('Module deleted successfully', 'success');
            renderApp();
        }
        
        function saveSettings() {
            const maintenanceMode = document.getElementById('maintenanceMode')?.checked || false;
            const allowRegistration = document.getElementById('allowRegistration')?.checked || true;
            systemSettings.maintenanceMode = maintenanceMode;
            systemSettings.allowRegistration = allowRegistration;
            showToast('System settings saved successfully!', 'success');
            renderApp();
        }
        
        // Calculate Stats
        function calculateStats() {
            const totalUsers = users.length;
            const totalModules = modules.length;
            const totalRev = modules.filter(m => m.price > 0).reduce((sum, m) => sum + (m.price * m.enrolled), 0);
            const activeUsers = users.filter(u => u.status === 'active').length;
            return { totalUsers, totalModules, totalRevenue: totalRev, activeUsers };
        }
        
        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        
        function renderDashboard() {
            const stats = calculateStats();
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Users</h3>
                            <div class="stat-number">${stats.totalUsers}</div>
                        </div>
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Modules</h3>
                            <div class="stat-number">${stats.totalModules}</div>
                        </div>
                        <div class="stat-icon"><i class="fas fa-book"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Revenue</h3>
                            <div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div>
                        </div>
                        <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Active Users</h3>
                            <div class="stat-number">${stats.activeUsers}</div>
                        </div>
                        <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                    </div>
                </div>
            `;
        }
        
        function renderUserManagement() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-users"></i> User Management</h2>
                        <button class="btn btn-primary" onclick="openAddUserModal()"><i class="fas fa-user-plus"></i> + Add User</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Enrolled Modules</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td><strong>${user.name}</strong></td>
                                    <td>${user.email}</td>
                                    <td><span class="status-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? 'Admin' : 'User'}</span></td>
                                    <td>
                                        <span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status}</span>
                                    </td>
                                    <td>${user.enrolledModules.slice(0,2).join(', ')}${user.enrolledModules.length > 2 ? '...' : ''}</td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="toggleUserStatus(${user.id})" style="margin-right: 8px;">
                                            ${user.status === 'active' ? '🔒 Deactivate' : '✅ Activate'}
                                        </button>
                                        <button class="btn btn-danger btn-sm" onclick="confirmDeleteUser(${user.id})"><i class="fas fa-trash"></i> Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderModuleManagement() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-book"></i> Module Management</h2>
                        <button class="btn btn-primary" onclick="openAddModuleModal()"><i class="fas fa-plus"></i> + Add Module</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr><th>Module Name</th><th>Price</th><th>Duration</th><th>Lessons</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${modules.map(module => `
                                <tr>
                                    <td><strong>${module.name}</strong></td>
                                    <td>${module.price === 0 ? 'FREE' : `KES ${module.price.toLocaleString()}`}</td>
                                    <td>${module.duration}</td>
                                    <td>${module.lessons}</td>
                                    <td>${module.enrolled}</td>
                                    <td>
                                        <span class="status-badge ${module.status === 'unlocked' ? 'status-active' : 'status-inactive'}">${module.status}</span>
                                    </td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="toggleModuleStatus(${module.id})" style="margin-right: 8px;">
                                            ${module.status === 'unlocked' ? '🔒 Lock' : '🔓 Unlock'}
                                        </button>
                                        <button class="btn btn-danger btn-sm" onclick="confirmDeleteModule(${module.id})"><i class="fas fa-trash"></i> Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderSystemSettings() {
            return `
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-cog"></i> System Settings</h2>
                        <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Save Settings</button>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 24px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                            <div>
                                <h3>Maintenance Mode</h3>
                                <p style="color: var(--text-muted); font-size: 0.8rem;">When enabled, only admins can access the site</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="maintenanceMode" ${systemSettings.maintenanceMode ? 'checked' : ''}>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                            <div>
                                <h3>Allow Registration</h3>
                                <p style="color: var(--text-muted); font-size: 0.8rem;">Enable new user signups</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="allowRegistration" ${systemSettings.allowRegistration ? 'checked' : ''}>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <hr style="border-color: var(--border);">
                        <div>
                            <h3>Site Information</h3>
                            <div style="margin-top: 16px;">
                                <label style="display: block; margin-bottom: 8px;">Site Name</label>
                                <input type="text" id="siteName" value="${systemSettings.siteName}" style="width: 100%; max-width: 400px;">
                                <label style="display: block; margin: 16px 0 8px;">Contact Email</label>
                                <input type="email" id="contactEmail" value="${systemSettings.contactEmail}" style="width: 100%; max-width: 400px;">
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderApp() {
            const app = document.getElementById('app');
            const stats = calculateStats();
            
            const views = {
                dashboard: renderDashboard() + renderUserManagement() + renderModuleManagement() + renderSystemSettings(),
                users: renderUserManagement(),
                modules: renderModuleManagement(),
                settings: renderSystemSettings()
            };
            
            const content = views[adminView] || views.dashboard;
            
            app.innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="logo">
                            <span class="logo-icon">🚗</span> MEI DRIVE AFRICA
                        </div>
                        <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px;">Administrator Panel</p>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar">👤</div>
                        <div class="user-details">
                            <h4>${currentUser.name}</h4>
                            <p>${currentUser.email} • Admin</p>
                        </div>
                    </div>
                    <div class="nav-menu">
                        <div class="nav-item ${adminView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </div>
                        <div class="nav-item ${adminView === 'users' ? 'active' : ''}" onclick="setView('users')">
                            <i class="fas fa-users"></i> User Management
                        </div>
                        <div class="nav-item ${adminView === 'modules' ? 'active' : ''}" onclick="setView('modules')">
                            <i class="fas fa-book"></i> Module Management
                        </div>
                        <div class="nav-item ${adminView === 'settings' ? 'active' : ''}" onclick="setView('settings')">
                            <i class="fas fa-cog"></i> System Settings
                        </div>
                        <div class="logout-btn">
                            <div class="nav-item" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </div>
                        </div>
                    </div>
                </div>
                <div class="main-content">
                    <div class="top-bar">
                        <div class="page-title">
                            <h1>${adminView === 'dashboard' ? 'Dashboard' : adminView === 'users' ? 'User Management' : adminView === 'modules' ? 'Module Management' : 'System Settings'}</h1>
                            <p>Welcome back, ${currentUser.name}</p>
                        </div>
                        <div class="stats-mini">
                            <span style="background: var(--dark-card); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem;">
                                <i class="fas fa-users"></i> ${stats.totalUsers} Users
                            </span>
                        </div>
                    </div>
                    ${content}
                </div>
                <div id="toast-container"></div>
                
                <!-- Add User Modal -->
                <div class="modal" id="addUserModal">
                    <div class="modal-content">
                        <h3><i class="fas fa-user-plus"></i> Add New User</h3>
                        <input type="text" id="newUserName" placeholder="Full Name">
                        <input type="email" id="newUserEmail" placeholder="Email Address">
                        <select id="newUserRole">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                        <div style="display: flex; gap: 12px; margin-top: 20px;">
                            <button class="btn btn-outline" onclick="closeModal('addUserModal')">Cancel</button>
                            <button class="btn btn-primary" onclick="submitAddUser()">Add User</button>
                        </div>
                    </div>
                </div>
                
                <!-- Add Module Modal -->
                <div class="modal" id="addModuleModal">
                    <div class="modal-content">
                        <h3><i class="fas fa-plus"></i> Add New Module</h3>
                        <input type="text" id="newModuleName" placeholder="Module Name">
                        <input type="number" id="newModulePrice" placeholder="Price (KES)">
                        <input type="text" id="newModuleDuration" placeholder="Duration (e.g., 20 hours)">
                        <input type="number" id="newModuleLessons" placeholder="Number of Lessons">
                        <div style="display: flex; gap: 12px; margin-top: 20px;">
                            <button class="btn btn-outline" onclick="closeModal('addModuleModal')">Cancel</button>
                            <button class="btn btn-primary" onclick="submitAddModule()">Add Module</button>
                        </div>
                    </div>
                </div>
                
                <!-- Delete Confirmation Modal -->
                <div class="modal" id="deleteConfirmModal">
                    <div class="modal-content">
                        <h3><i class="fas fa-trash"></i> Confirm Delete</h3>
                        <p id="deleteMessage">Are you sure you want to delete this item?</p>
                        <div style="display: flex; gap: 12px; margin-top: 20px;">
                            <button class="btn btn-outline" onclick="closeModal('deleteConfirmModal')">Cancel</button>
                            <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Modal Functions
        window.openAddUserModal = () => {
            document.getElementById('addUserModal').classList.add('active');
        };
        
        window.openAddModuleModal = () => {
            document.getElementById('addModuleModal').classList.add('active');
        };
        
        window.submitAddUser = () => {
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const role = document.getElementById('newUserRole').value;
            if (name && email) {
                addUser(name, email, role);
                closeModal('addUserModal');
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
            } else {
                showToast('Please fill all fields', 'error');
            }
        };
        
        window.submitAddModule = () => {
            const name = document.getElementById('newModuleName').value;
            const price = document.getElementById('newModulePrice').value;
            const duration = document.getElementById('newModuleDuration').value;
            const lessons = document.getElementById('newModuleLessons').value;
            if (name && duration && lessons) {
                addModule(name, price || 0, duration, lessons);
                closeModal('addModuleModal');
                document.getElementById('newModuleName').value = '';
                document.getElementById('newModulePrice').value = '';
                document.getElementById('newModuleDuration').value = '';
                document.getElementById('newModuleLessons').value = '';
            } else {
                showToast('Please fill all fields', 'error');
            }
        };
        
        window.toggleUserStatus = (userId) => {
            const user = users.find(u => u.id === userId);
            if (user) {
                updateUserStatus(userId, user.status === 'active' ? 'inactive' : 'active');
            }
        };
        
        window.toggleModuleStatus = (moduleId) => {
            const module = modules.find(m => m.id === moduleId);
            if (module) {
                updateModuleStatus(moduleId, module.status === 'unlocked' ? 'locked' : 'unlocked');
            }
        };
        
        let pendingDelete = null;
        let deleteType = null;
        
        window.confirmDeleteUser = (userId) => {
            pendingDelete = userId;
            deleteType = 'user';
            document.getElementById('deleteMessage').innerHTML = 'Are you sure you want to delete this user? This action cannot be undone.';
            document.getElementById('deleteConfirmModal').classList.add('active');
        };
        
        window.confirmDeleteModule = (moduleId) => {
            pendingDelete = moduleId;
            deleteType = 'module';
            document.getElementById('deleteMessage').innerHTML = 'Are you sure you want to delete this module? This action cannot be undone.';
            document.getElementById('deleteConfirmModal').classList.add('active');
        };
        
        window.confirmDeleteBtn = () => {
            if (deleteType === 'user') {
                deleteUser(pendingDelete);
            } else if (deleteType === 'module') {
                deleteModule(pendingDelete);
            }
            closeModal('deleteConfirmModal');
            pendingDelete = null;
            deleteType = null;
        };
        
        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
        };
        
        window.setView = (view) => {
            adminView = view;
            renderApp();
        };
        
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };
        
        window.logout = () => {
            showToast('Logged out successfully', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        };
        
        window.saveSettings = saveSettings;
        
        // Make functions global for onclick
        window.openAddUserModal = openAddUserModal;
        window.openAddModuleModal = openAddModuleModal;
        window.submitAddUser = submitAddUser;
        window.submitAddModule = submitAddModule;
        window.toggleUserStatus = toggleUserStatus;
        window.toggleModuleStatus = toggleModuleStatus;
        window.confirmDeleteUser = confirmDeleteUser;
        window.confirmDeleteModule = confirmDeleteModule;
        window.confirmDeleteBtn = confirmDeleteBtn;
        window.closeModal = closeModal;
        window.setView = setView;
        window.toggleSidebar = toggleSidebar;
        window.logout = logout;
        window.saveSettings = saveSettings;
        
        // Initialize
        renderApp();
    </script>
</body>
</html>
