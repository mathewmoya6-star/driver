<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==================== PRODUCTION CONFIGURATION ====================
        // IMPORTANT: Replace these with your actual Supabase credentials
        const SUPABASE_CONFIG = {
            url: 'https://your-project.supabase.co',  // ← REPLACE WITH YOUR URL
            anonKey: 'your-anon-key-here'              // ← REPLACE WITH YOUR ANON KEY
        };
        
        // ==================== STATE MANAGEMENT ====================
        let appState = {
            currentUser: null,
            currentView: 'login',
            isLoading: false,
            users: [],
            modules: [],
            quizBank: [],
            library: [],
            pagination: { page: 1, limit: 10, total: 0 }
        };
        
        let supabase = null;
        
        // Initialize Supabase
        try {
            if (SUPABASE_CONFIG.url && !SUPABASE_CONFIG.url.includes('your-project')) {
                supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
            }
        } catch(e) { console.error('Supabase init failed:', e); }
        
        // ==================== UTILITY FUNCTIONS ====================
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        function sanitizeInput(str) {
            if (!str) return '';
            return str.replace(/[<>]/g, '').trim();
        }
        
        async function apiCall(fn, errorMsg = 'Operation failed') {
            appState.isLoading = true;
            renderApp();
            try {
                const result = await fn();
                return result;
            } catch (error) {
                console.error(error);
                showToast(`${errorMsg}: ${error.message}`, 'error');
                return null;
            } finally {
                appState.isLoading = false;
                renderApp();
            }
        }
        
        // ==================== AUTHENTICATION ====================
        async function initializeAuth() {
            if (!supabase) {
                showToast('Supabase not configured. Please set credentials.', 'error');
                return false;
            }
            
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .single();
                
                appState.currentUser = {
                    id: session.user.id,
                    email: session.user.email,
                    role: profile?.role || 'viewer',
                    name: profile?.name || session.user.email
                };
                appState.currentView = 'dashboard';
                await loadDashboardData();
                renderApp();
                return true;
            }
            return false;
        }
        
        async function handleLogin(email, password) {
            if (!supabase) {
                showToast('Supabase not configured. Please set SUPABASE_URL and ANON_KEY.', 'error');
                return false;
            }
            
            return await apiCall(async () => {
                const { data, error } = await supabase.auth.signInWithPassword({ 
                    email: sanitizeInput(email), 
                    password 
                });
                if (error) throw error;
                
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('user_id', data.user.id)
                    .single();
                
                if (!profile || profile.role !== 'admin') {
                    await supabase.auth.signOut();
                    throw new Error('Admin access required');
                }
                
                appState.currentUser = {
                    id: data.user.id,
                    email: data.user.email,
                    role: profile.role,
                    name: profile.name
                };
                appState.currentView = 'dashboard';
                await loadDashboardData();
                renderApp();
                showToast('Login successful!', 'success');
                return true;
            }, 'Login failed');
        }
        
        async function handleLogout() {
            if (supabase) await supabase.auth.signOut();
            appState.currentUser = null;
            appState.currentView = 'login';
            renderApp();
            showToast('Logged out successfully', 'success');
        }
        
        // ==================== DATABASE OPERATIONS ====================
        async function loadDashboardData() {
            if (!supabase) return;
            
            await apiCall(async () => {
                const [usersRes, modulesRes, quizRes, libraryRes] = await Promise.all([
                    supabase.from('users').select('*', { count: 'exact' }).range(0, 9),
                    supabase.from('modules').select('*'),
                    supabase.from('quiz_questions').select('*'),
                    supabase.from('library_items').select('*')
                ]);
                
                if (usersRes.data) appState.users = usersRes.data;
                if (modulesRes.data) appState.modules = modulesRes.data;
                if (quizRes.data) appState.quizBank = quizRes.data;
                if (libraryRes.data) appState.library = libraryRes.data;
            }, 'Failed to load data');
        }
        
        async function createUser(userData) {
            return await apiCall(async () => {
                const { data, error } = await supabase
                    .from('users')
                    .insert([{ ...userData, created_at: new Date() }])
                    .select();
                if (error) throw error;
                await loadDashboardData();
                showToast('User created successfully', 'success');
                return data;
            }, 'Failed to create user');
        }
        
        async function updateUser(userId, updates) {
            return await apiCall(async () => {
                const { error } = await supabase
                    .from('users')
                    .update(updates)
                    .eq('id', userId);
                if (error) throw error;
                await loadDashboardData();
                showToast('User updated successfully', 'success');
            }, 'Failed to update user');
        }
        
        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            return await apiCall(async () => {
                const { error } = await supabase
                    .from('users')
                    .delete()
                    .eq('id', userId);
                if (error) throw error;
                await loadDashboardData();
                showToast('User deleted successfully', 'success');
            }, 'Failed to delete user');
        }
        
        // ==================== RENDER FUNCTIONS ====================
        function renderLoading() {
            return `<div class="stats-grid">
                ${[...Array(6)].map(() => `<div class="stat-card"><div class="loading-skeleton" style="width:100%;height:80px;"></div></div>`).join('')}
            </div>`;
        }
        
        function renderLogin() {
            const configWarning = (!SUPABASE_CONFIG.url || SUPABASE_CONFIG.url.includes('your-project')) ?
                `<div class="card" style="background: rgba(231, 76, 60, 0.1); border-color: #e74c3c;">
                    <p style="color: #e74c3c;"><i class="fas fa-exclamation-triangle"></i> ⚠️ Supabase not configured! Please edit SUPABASE_CONFIG with your project credentials.</p>
                    <p style="margin-top: 8px; font-size: 0.875rem;">Required: Create tables (users, modules, quiz_questions, library_items, user_profiles)</p>
                </div>` : '';
            
            return `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-header">
                            <div style="font-size: 3rem;">🚗</div>
                            <h1>MEI DRIVE AFRICA</h1>
                            <p style="color: var(--text-muted);">Administrator Login</p>
                        </div>
                        ${configWarning}
                        <form id="loginForm" onsubmit="event.preventDefault(); handleLoginSubmit()">
                            <div style="margin-bottom: var(--spacing-lg);">
                                <label style="display: block; margin-bottom: var(--spacing-sm);">Email Address</label>
                                <input type="email" id="loginEmail" required placeholder="admin@meidrive.com" autocomplete="email">
                            </div>
                            <div style="margin-bottom: var(--spacing-xl);">
                                <label style="display: block; margin-bottom: var(--spacing-sm);">Password</label>
                                <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;" ${appState.isLoading ? 'disabled' : ''}>
                                ${appState.isLoading ? '<i class="fas fa-spinner fa-spin"></i> Loading...' : '<i class="fas fa-sign-in-alt"></i> Sign In'}
                            </button>
                        </form>
                        <div style="margin-top: var(--spacing-lg); text-align: center; font-size: var(--font-sm); color: var(--text-muted);">
                            <p>Need an account? Contact system administrator</p>
                            <p style="margin-top: var(--spacing-sm);">Default: Create admin user via Supabase Auth + user_profiles table</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderDashboard() {
            if (appState.isLoading) return renderLoading();
            
            const stats = {
                totalUsers: appState.users.length,
                totalModules: appState.modules.length,
                totalQuiz: appState.quizBank.length,
                totalLibrary: appState.library.length
            };
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Total Modules</h3><div class="stat-number">${stats.totalModules}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Quiz Questions</h3><div class="stat-number">${stats.totalQuiz}</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Library Items</h3><div class="stat-number">${stats.totalLibrary}</div></div><div class="stat-icon"><i class="fas fa-book-open"></i></div></div>
                </div>
                ${renderUserManagement()}
                ${renderModuleManagement()}
            `;
        }
        
        function renderUserManagement() {
            const nonAdminUsers = appState.users.filter(u => u.role !== 'admin');
            
            return `<div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-users"></i> User Management</h2>
                    <button class="btn btn-primary btn-sm" onclick="openCreateUserModal()"><i class="fas fa-plus"></i> Add User</button>
                </div>
                <div style="margin-bottom: var(--spacing-md);">
                    <input type="text" id="userSearch" class="search-input" placeholder="Search users..." onkeyup="filterUsers()">
                </div>
                <div class="data-table">
                    <table style="width: 100%;">
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="usersTableBody">
                            ${nonAdminUsers.map(user => `
                                <tr>
                                    <td><strong>${escapeHtml(user.name || 'N/A')}</strong></td>
                                    <td>${escapeHtml(user.email)}</td>
                                    <td><span class="status-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role || 'user'}</span></td>
                                    <td><span class="status-badge status-active">${user.status || 'active'}</span></td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="editUser('${user.id}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }
        
        function renderModuleManagement() {
            return `<div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-book"></i> Module Management</h2>
                    <button class="btn btn-primary btn-sm" onclick="openCreateModuleModal()"><i class="fas fa-plus"></i> Add Module</button>
                </div>
                <div class="data-table">
                    <table style="width: 100%;">
                        <thead><tr><th>Name</th><th>Price</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${appState.modules.map(module => `
                                <tr>
                                    <td><strong>${escapeHtml(module.name)}</strong></td>
                                    <td>${module.price === 0 ? 'FREE' : `KES ${module.price}`}</td>
                                    <td>${module.duration || 'N/A'}</td>
                                    <td><span class="status-badge status-active">${module.status || 'active'}</span></td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="editModule('${module.id}')"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteModule('${module.id}')"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function handleLoginSubmit() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            if (email && password) handleLogin(email, password);
        }
        
        function setView(view) {
            appState.currentView = view;
            renderApp();
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar')?.classList.toggle('open');
        }
        
        function openCreateUserModal() { showToast('Create user modal - Implement with form', 'info'); }
        function openCreateModuleModal() { showToast('Create module modal - Implement with form', 'info'); }
        function editUser(id) { showToast(`Edit user ${id}`, 'info'); }
        function editModule(id) { showToast(`Edit module ${id}`, 'info'); }
        function deleteModule(id) { showToast(`Delete module ${id}`, 'info'); }
        function filterUsers() { showToast('Search functionality - Implement with debounce', 'info'); }
        
        function renderApp() {
            const root = document.getElementById('root');
            if (!root) return;
            
            if (appState.currentView === 'login' || !appState.currentUser) {
                root.innerHTML = renderLogin();
                return;
            }
            
            const views = {
                dashboard: renderDashboard(),
                users: renderUserManagement(),
                modules: renderModuleManagement()
            };
            
            const content = views[appState.currentView] || views.dashboard;
            
            root.innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="logo"><span>🚗</span> MEI DRIVE AFRICA</div>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">Administrator Panel</p>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar">👑</div>
                        <div>
                            <h4>${escapeHtml(appState.currentUser?.name || 'Admin')}</h4>
                            <p style="font-size: 0.75rem; color: var(--text-muted);">${escapeHtml(appState.currentUser?.email)} • ${appState.currentUser?.role}</p>
                        </div>
                    </div>
                    <div class="nav-menu">
                        <div class="nav-item ${appState.currentView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                        <div class="nav-item ${appState.currentView === 'users' ? 'active' : ''}" onclick="setView('users')"><i class="fas fa-users"></i> Users</div>
                        <div class="nav-item ${appState.currentView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> Modules</div>
                        <div class="nav-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
                <div class="main-content">
                    <div class="top-bar">
                        <div class="page-title">
                            <h1>${appState.currentView.charAt(0).toUpperCase() + appState.currentView.slice(1)}</h1>
                            <p>Welcome back, ${escapeHtml(appState.currentUser?.name || 'Admin')}</p>
                        </div>
                    </div>
                    ${content}
                </div>
                <div id="toast-container"></div>
            `;
        }
        
        // Expose global functions
        window.setView = setView;
        window.toggleSidebar = toggleSidebar;
        window.handleLoginSubmit = handleLoginSubmit;
        window.handleLogout = handleLogout;
        window.deleteUser = deleteUser;
        window.openCreateUserModal = openCreateUserModal;
        window.openCreateModuleModal = openCreateModuleModal;
        window.editUser = editUser;
        window.editModule = editModule;
        window.deleteModule = deleteModule;
        window.filterUsers = filterUsers;
        
        // Initialize
        initializeAuth().then(() => renderApp());
    </script>
</body>
</html>
