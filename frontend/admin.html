<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.5;
        }
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text-muted: #888888;
            --success: #2ecc71;
            --danger: #e74c3c;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0d1117;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 1.6rem; }
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        .logout-btn { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 600; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(212, 175, 55, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        @media (max-width: 768px) {
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 6px; }
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-inactive { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-admin { background: rgba(212, 175, 55, 0.2); color: #d4af37; }
        .role-user { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-warning { background: #f39c12; color: #000; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: var(--dark-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; display: flex; justify-content: space-between; gap: 12px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .progress-bar { background: #1e1e2a; border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 8px; border-radius: 10px; width: 0%; }
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
<div class="admin-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA</div>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px;">Administrator Panel</p>
        </div>
        <div class="user-info" id="userInfo">
            <div class="user-avatar">👤</div>
            <div><h4 id="userName">Loading...</h4><p id="userEmail">admin@meidrive.com</p></div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="setView('users')"><i class="fas fa-users"></i> User Management</div>
            <div class="nav-item" onclick="setView('courses')"><i class="fas fa-book"></i> Course Management</div>
            <div class="nav-item" onclick="setView('analytics')"><i class="fas fa-chart-simple"></i> Analytics</div>
            <div class="logout-btn"><div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
        </div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="page-title">
                <h1 id="pageTitle">Dashboard</h1>
                <p id="pageSubtitle">Welcome back, Admin</p>
            </div>
            <div><span style="background: var(--dark-card); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem;"><i class="fas fa-database"></i> Connected</span></div>
        </div>
        <div id="pageContent"><div class="loading-spinner"></div></div>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<script>
    // ==================== SUPABASE CLIENT (ANON KEY ONLY) ====================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    let supabase;
    let currentUser = null;
    let isAdmin = false;
    let currentView = 'dashboard';
    
    // Data stores
    let usersList = [];
    let coursesList = [];
    let enrollmentsList = [];
    let quizAttempts = [];
    
    const defaultCourses = [
        { id: 1, name: "Learner Hub", type: "learner", price: 0, duration: "25 hours", lessons: 21, description: "Complete NTSA-approved driver training", icon: "fa-id-card", active: true, enrolled: 1245 },
        { id: 2, name: "EV Drivers & Riders", type: "ev", price: 0, duration: "12 hours", lessons: 8, description: "Electric vehicle safety training", icon: "fa-charging-station", active: true, enrolled: 567 },
        { id: 3, name: "Boda Boda Safety", type: "boda", price: 0, duration: "18 hours", lessons: 10, description: "Motorcycle safety training", icon: "fa-motorcycle", active: true, enrolled: 2341 },
        { id: 4, name: "PSV Professional", type: "psv", price: 2999, duration: "15 hours", lessons: 10, description: "Commercial driver certification", icon: "fa-bus", active: true, enrolled: 892 },
        { id: 5, name: "School Bus/Van Driver", type: "schoolbus", price: 1999, duration: "12 hours", lessons: 12, description: "School transport safety", icon: "fa-chalkboard-user", active: true, enrolled: 456 }
    ];
    
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const id = Date.now();
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type] || 'ℹ️'} ${escapeHtml(message)}<span style="cursor:pointer;margin-left:8px;" onclick="this.parentElement.remove()">×</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function initAdmin() {
        supabase = window.supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error || !session) {
            showToast('Please login to access admin panel', 'warning');
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            return;
        }
        
        currentUser = session.user;
        
        // Check admin via secure RPC (uses auth.uid())
        const { data: isAdminUser, error: adminErr } = await supabase.rpc('is_admin_user');
        if (adminErr || !isAdminUser) {
            showToast('Admin access denied. You do not have administrator privileges.', 'error');
            await supabase.auth.signOut();
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            return;
        }
        
        isAdmin = true;
        
        // Fetch user profile for display
        const { data: profile } = await supabase
            .from('user_profiles')
            .select('full_name, email')
            .eq('id', currentUser.id)
            .single();
        
        document.getElementById('userName').innerText = profile?.full_name || currentUser.email.split('@')[0];
        document.getElementById('userEmail').innerText = profile?.email || currentUser.email;
        
        await loadAllData();
        renderCurrentView();
    }
    
    async function loadAllData() {
        await Promise.all([
            loadUsers(),
            loadCourses(),
            loadEnrollments(),
            loadQuizAttempts()
        ]);
    }
    
    async function loadUsers() {
        const { data, error } = await supabase
            .from('user_profiles')
            .select('id, email, full_name, is_admin, status, created_at')
            .order('created_at', { ascending: false });
        if (!error) usersList = data || [];
    }
    
    async function loadCourses() {
        const { data, error } = await supabase.from('courses').select('*').order('id');
        if (error && error.code === '42P01') {
            // Table missing – create and insert defaults
            await supabase.rpc('admin_upsert_course', { p_id: null, p_name: 'Learner Hub', p_type: 'learner', p_price: 0, p_duration: '25 hours', p_lessons: 21, p_description: 'Complete NTSA-approved driver training', p_icon: 'fa-id-card', p_active: true });
            coursesList = defaultCourses;
        } else if (data && data.length > 0) {
            coursesList = data;
        } else {
            coursesList = defaultCourses;
            for (const c of defaultCourses) {
                await supabase.from('courses').upsert(c);
            }
        }
    }
    
    async function loadEnrollments() {
        const { data } = await supabase.from('enrollments').select('*');
        enrollmentsList = data || [];
    }
    
    async function loadQuizAttempts() {
        const { data } = await supabase.from('quiz_attempts').select('*');
        quizAttempts = data || [];
    }
    
    function getStats() {
        const totalUsers = usersList.length;
        const activeUsers = usersList.filter(u => u.status === 'active').length;
        const totalCourses = coursesList.length;
        const totalRevenue = enrollmentsList.reduce((sum, e) => sum + (e.amount || 0), 0);
        const totalEnrollments = enrollmentsList.length;
        const totalQuizAttempts = quizAttempts.length;
        const avgQuizScore = quizAttempts.length > 0 
            ? Math.round(quizAttempts.reduce((sum, q) => sum + (q.score || 0), 0) / quizAttempts.length) 
            : 0;
        return { totalUsers, activeUsers, totalCourses, totalRevenue, totalEnrollments, totalQuizAttempts, avgQuizScore };
    }
    
    function renderDashboard() {
        const stats = getStats();
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Active Users</h3><div class="stat-number">${stats.activeUsers}</div></div><div class="stat-icon"><i class="fas fa-user-check"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Total Courses</h3><div class="stat-number">${stats.totalCourses}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Enrollments</h3><div class="stat-number">${stats.totalEnrollments}</div></div><div class="stat-icon"><i class="fas fa-graduation-cap"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Avg Quiz Score</h3><div class="stat-number">${stats.avgQuizScore}%</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
            </div>
            <div class="card">
                <h3><i class="fas fa-chart-line"></i> Platform Overview</h3>
                <p style="margin-top: 12px;">MEI DRIVE AFRICA is connected to Supabase. All data is synchronized in real-time.</p>
                <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;">
                    <button class="btn btn-outline" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
                    <button class="btn btn-outline" onclick="exportReport()"><i class="fas fa-download"></i> Export Report</button>
                </div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function renderUserManagement() {
        const html = `
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-users"></i> User Management</h2>
                    <button class="btn btn-primary" onclick="showAddUserModal()"><i class="fas fa-user-plus"></i> Add User</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${usersList.map(user => `
                                <tr>
                                    <td><strong>${escapeHtml(user.full_name || '—')}</strong></td>
                                    <td>${escapeHtml(user.email)}</td>
                                    <td><span class="status-badge ${user.is_admin ? 'role-admin' : 'role-user'}">${user.is_admin ? 'Admin' : 'User'}</span></td>
                                    <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status || 'active'}</span></td>
                                    <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : '—'}</td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="toggleAdmin('${user.id}', ${user.is_admin})">${user.is_admin ? 'Remove Admin' : 'Make Admin'}</button>
                                        ${user.id !== currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUserById('${user.id}')"><i class="fas fa-trash"></i> Delete</button>` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function renderCourseManagement() {
        const html = `
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-book"></i> Course Management</h2>
                    <button class="btn btn-primary" onclick="showAddCourseModal()"><i class="fas fa-plus"></i> Add Course</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr><th>Course</th><th>Price</th><th>Duration</th><th>Lessons</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${coursesList.map(course => `
                                <tr>
                                    <td><strong>${escapeHtml(course.name)}</strong><br><small style="color:#888;">${escapeHtml((course.description || '').substring(0, 40))}...</small></td>
                                    <td>${course.price === 0 ? 'FREE' : `KES ${course.price.toLocaleString()}`}</td>
                                    <td>${course.duration || '—'}</td>
                                    <td>${course.lessons || 0}</td>
                                    <td>${course.enrolled || 0}</td>
                                    <td><span class="status-badge ${course.active !== false ? 'status-active' : 'status-inactive'}">${course.active !== false ? 'Active' : 'Inactive'}</span></td>
                                    <td>
                                        <button class="btn btn-warning btn-sm" onclick="toggleCourseStatus(${course.id}, ${course.active !== false})"><i class="fas fa-lock"></i> ${course.active !== false ? 'Disable' : 'Enable'}</button>
                                        <button class="btn btn-outline btn-sm" onclick="editCourse(${course.id})"><i class="fas fa-edit"></i> Edit</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function renderAnalytics() {
        const stats = getStats();
        const completionRate = stats.totalUsers > 0 ? Math.round((stats.activeUsers / stats.totalUsers) * 100) : 0;
        const revenuePerUser = stats.totalUsers > 0 ? Math.round(stats.totalRevenue / stats.totalUsers) : 0;
        const enrollmentRate = stats.totalCourses > 0 ? Math.round((stats.totalEnrollments / (stats.totalCourses * 100)) * 100) : 0;
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-info"><h3>Completion Rate</h3><div class="stat-number">${completionRate}%</div></div><div class="stat-icon"><i class="fas fa-chart-pie"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Revenue/User</h3><div class="stat-number">KES ${revenuePerUser.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div>
                <div class="stat-card"><div class="stat-info"><h3>Quiz Attempts</h3><div class="stat-number">${stats.totalQuizAttempts}</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
            </div>
            <div class="card">
                <h3><i class="fas fa-chart-bar"></i> Performance Insights</h3>
                <div style="margin-top: 20px;">
                    <div style="margin-bottom: 16px;"><strong>User Growth</strong><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, stats.totalUsers / 10)}%;"></div></div><span>${stats.totalUsers} total users</span></div>
                    <div style="margin-bottom: 16px;"><strong>Course Engagement</strong><div class="progress-bar"><div class="progress-fill" style="width: ${enrollmentRate}%;"></div></div><span>${stats.totalEnrollments} enrollments</span></div>
                    <div style="margin-bottom: 16px;"><strong>Revenue Progress</strong><div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, stats.totalRevenue / 50000)}%;"></div></div><span>KES ${stats.totalRevenue.toLocaleString()} total revenue</span></div>
                </div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    // Admin Actions (using RPC)
    window.showAddUserModal = () => {
        const modalHtml = `
            <div class="modal active" id="addUserModal">
                <div class="modal-content">
                    <h3><i class="fas fa-user-plus"></i> Add New User</h3>
                    <input type="text" id="newUserName" placeholder="Full Name">
                    <input type="email" id="newUserEmail" placeholder="Email Address">
                    <input type="password" id="newUserPassword" placeholder="Temporary Password">
                    <select id="newUserRole"><option value="false">User</option><option value="true">Admin</option></select>
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button class="btn btn-outline" onclick="closeModal('addUserModal')">Cancel</button>
                        <button class="btn btn-primary" onclick="submitAddUser()">Add User</button>
                    </div>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.submitAddUser = async () => {
        const email = document.getElementById('newUserEmail')?.value;
        const password = document.getElementById('newUserPassword')?.value;
        const fullName = document.getElementById('newUserName')?.value;
        const isAdminRole = document.getElementById('newUserRole')?.value === 'true';
        
        if (!email || !password || !fullName) {
            showToast('All fields required', 'error');
            return;
        }
        
        const { data, error } = await supabase.rpc('admin_create_user', {
            p_email: email,
            p_password: password,
            p_full_name: fullName,
            p_is_admin: isAdminRole
        });
        
        if (error || !data?.success) {
            showToast(error?.message || data?.error || 'Failed to create user', 'error');
        } else {
            showToast('User created successfully', 'success');
            closeModal('addUserModal');
            await loadUsers();
            renderCurrentView();
        }
    };
    
    window.toggleAdmin = async (userId, currentIsAdmin) => {
        const { data, error } = await supabase.rpc('admin_toggle_role', {
            p_user_id: userId,
            p_is_admin: !currentIsAdmin
        });
        if (error || !data?.success) {
            showToast('Failed to update role', 'error');
        } else {
            showToast(`Admin status updated`, 'success');
            await loadUsers();
            renderCurrentView();
        }
    };
    
    window.deleteUserById = async (userId) => {
        if (!confirm('⚠️ Permanently delete this user? This cannot be undone.')) return;
        const { data, error } = await supabase.rpc('admin_delete_user', { p_user_id: userId });
        if (error || !data?.success) {
            showToast(error?.message || 'Delete failed', 'error');
        } else {
            showToast('User deleted', 'success');
            await loadUsers();
            renderCurrentView();
        }
    };
    
    window.toggleCourseStatus = async (courseId, isActive) => {
        const { data, error } = await supabase.rpc('admin_toggle_course', {
            p_course_id: courseId,
            p_active: !isActive
        });
        if (error || !data?.success) {
            showToast('Failed to update course', 'error');
        } else {
            showToast(`Course ${!isActive ? 'enabled' : 'disabled'}`, 'success');
            await loadCourses();
            renderCurrentView();
        }
    };
    
    window.showAddCourseModal = () => {
        showToast('Add course – Use the "Edit" button to update existing', 'info');
        // Full CRUD can be added similarly using admin_upsert_course
    };
    
    window.editCourse = (courseId) => {
        const course = coursesList.find(c => c.id === courseId);
        if (!course) return;
        const modalHtml = `
            <div class="modal active" id="editCourseModal">
                <div class="modal-content">
                    <h3>Edit Course</h3>
                    <input type="text" id="editCourseName" value="${escapeHtml(course.name)}" placeholder="Course Name">
                    <input type="text" id="editCourseType" value="${escapeHtml(course.type)}" placeholder="Course Type (learner/psv/boda/ev)">
                    <input type="number" id="editCoursePrice" value="${course.price}" placeholder="Price (KES)">
                    <input type="text" id="editCourseDuration" value="${escapeHtml(course.duration || '')}" placeholder="Duration">
                    <input type="number" id="editCourseLessons" value="${course.lessons || 0}" placeholder="Lessons">
                    <textarea id="editCourseDesc" rows="3" placeholder="Description">${escapeHtml(course.description || '')}</textarea>
                    <select id="editCourseActive"><option value="true" ${course.active !== false ? 'selected' : ''}>Active</option><option value="false" ${course.active === false ? 'selected' : ''}>Inactive</option></select>
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button class="btn btn-outline" onclick="closeModal('editCourseModal')">Cancel</button>
                        <button class="btn btn-primary" onclick="saveCourse(${course.id})">Save</button>
                    </div>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.saveCourse = async (courseId) => {
        const name = document.getElementById('editCourseName')?.value;
        const type = document.getElementById('editCourseType')?.value;
        const price = parseInt(document.getElementById('editCoursePrice')?.value) || 0;
        const duration = document.getElementById('editCourseDuration')?.value;
        const lessons = parseInt(document.getElementById('editCourseLessons')?.value) || 0;
        const desc = document.getElementById('editCourseDesc')?.value;
        const active = document.getElementById('editCourseActive')?.value === 'true';
        
        const { data, error } = await supabase.rpc('admin_upsert_course', {
            p_id: courseId,
            p_name: name,
            p_type: type,
            p_price: price,
            p_duration: duration,
            p_lessons: lessons,
            p_description: desc,
            p_icon: 'fa-book',
            p_active: active
        });
        
        if (error || !data?.success) {
            showToast('Failed to save course', 'error');
        } else {
            showToast('Course updated', 'success');
            closeModal('editCourseModal');
            await loadCourses();
            renderCurrentView();
        }
    };
    
    window.refreshData = async () => {
        showToast('Refreshing...', 'info');
        await loadAllData();
        renderCurrentView();
        showToast('Data refreshed', 'success');
    };
    
    window.exportReport = () => {
        const stats = getStats();
        const report = `MEI DRIVE AFRICA Report\nDate: ${new Date().toLocaleString()}\nTotal Users: ${stats.totalUsers}\nActive Users: ${stats.activeUsers}\nTotal Courses: ${stats.totalCourses}\nTotal Revenue: KES ${stats.totalRevenue}\nTotal Enrollments: ${stats.totalEnrollments}\nAverage Quiz Score: ${stats.avgQuizScore}%`;
        const blob = new Blob([report], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `mei_report_${Date.now()}.txt`;
        link.click();
        showToast('Report exported', 'success');
    };
    
    window.closeModal = (id) => document.getElementById(id)?.remove();
    window.setView = (view) => { currentView = view; renderCurrentView(); };
    window.toggleSidebar = () => document.getElementById('sidebar')?.classList.toggle('open');
    
    async function logout() {
        await supabase.auth.signOut();
        showToast('Logged out', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }
    window.logout = logout;
    
    function renderCurrentView() {
        const titles = { dashboard: 'Dashboard', users: 'User Management', courses: 'Course Management', analytics: 'Analytics' };
        document.getElementById('pageTitle').innerText = titles[currentView];
        document.getElementById('pageSubtitle').innerHTML = `Welcome back, ${escapeHtml(currentUser?.email?.split('@')[0] || 'Admin')} | ${new Date().toLocaleDateString()}`;
        
        if (currentView === 'dashboard') renderDashboard();
        else if (currentView === 'users') renderUserManagement();
        else if (currentView === 'courses') renderCourseManagement();
        else if (currentView === 'analytics') renderAnalytics();
    }
    
    initAdmin();
</script>
</body>
</html>
