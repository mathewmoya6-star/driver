<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI Drive Africa | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #f0f0f0;
            line-height: 1.5;
        }

        /* Admin Layout */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0a0a0f;
            border-right: 1px solid rgba(212, 175, 55, 0.25);
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar h2 {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar h2 i {
            font-size: 1.4rem;
        }

        .nav-btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid #222;
            color: #ccc;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .nav-btn i {
            width: 24px;
        }

        .nav-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            color: #d4af37;
        }

        .nav-btn.active {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
        }

        .logout-btn {
            margin-top: 50px;
            background: rgba(220, 53, 69, 0.15);
            border-color: #dc3545;
            color: #ff6b6b;
        }

        .logout-btn:hover {
            background: #dc3545;
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #222;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        .stat-card h3 {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4af37;
        }

        /* User Section */
        .user-section {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #222;
        }

        .user-section h2, .user-section h3 {
            color: #d4af37;
            margin-bottom: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th {
            color: #d4af37;
            font-weight: 600;
        }

        .role-badge {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            font-weight: 600;
        }

        .role-badge.admin {
            background: rgba(220, 53, 69, 0.15);
            color: #ff6b6b;
        }

        .delete-btn {
            background: #dc3545;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff4444;
            transform: scale(0.95);
        }

        .edit-btn {
            background: #2c2c3a;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 0.7rem;
            margin-right: 8px;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #3a3a4a;
        }

        /* Add User Form */
        .add-user-form {
            background: #0f0f14;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #222;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a22;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .add-btn {
            background: #d4af37;
            color: #000;
            font-weight: 700;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: #0f0f14;
            border: 1px solid #d4af37;
            border-radius: 32px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
        }

        .modal-card h2 {
            color: #d4af37;
            margin-bottom: 20px;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a22;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }

        .modal-card button {
            width: 100%;
            background: #d4af37;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a22;
            border-left: 4px solid #d4af37;
            padding: 14px 24px;
            border-radius: 12px;
            z-index: 2100;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 20px 12px;
            }
            .sidebar h2 span, .nav-btn span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
                padding: 20px;
            }
            .nav-btn i {
                margin: 0;
                font-size: 1.2rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <h2><i class="fas fa-crown"></i> <span>MEI ADMIN</span></h2>
        <button class="nav-btn active" onclick="AdminApp.showPanel('dashboard')">
            <i class="fas fa-chart-line"></i> <span>Dashboard</span>
        </button>
        <button class="nav-btn" onclick="AdminApp.showPanel('users')">
            <i class="fas fa-users"></i> <span>Users</span>
        </button>
        <button class="nav-btn logout-btn" onclick="AdminApp.logout()">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
    </div>

    <div class="main-content">
        <!-- Dashboard Panel -->
        <div id="dashboardPanel">
            <h1 style="margin-bottom: 28px;"><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="user-section">
                <h3><i class="fas fa-chart-pie"></i> Platform Insights</h3>
                <div id="activityLog" style="margin-top: 16px;"></div>
            </div>
        </div>

        <!-- Users Panel -->
        <div id="usersPanel" style="display: none;">
            <h1 style="margin-bottom: 28px;"><i class="fas fa-user-shield"></i> User Management</h1>
            
            <div class="add-user-form">
                <h3><i class="fas fa-user-plus"></i> Add New User</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="userFullName" placeholder="e.g., John Kamau">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="userEmail" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="userPassword" placeholder="••••••">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="userRoleSelect">
                            <option value="learner">📘 Learner Driver</option>
                            <option value="driver">🚛 Professional Driver</option>
                            <option value="admin">👑 Administrator</option>
                        </select>
                    </div>
                </div>
                <button class="add-btn" onclick="AdminApp.addUser()"><i class="fas fa-save"></i> Create User Account</button>
            </div>

            <div class="user-section">
                <div class="section-header">
                    <h2><i class="fas fa-list"></i> Registered Users</h2>
                    <span id="userCount" style="color:#888;">0 total</span>
                </div>
                <div style="overflow-x: auto;">
                    <table id="usersTable">
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Progress</th><th style="width:120px">Actions</th></tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= COMPLETE ADMIN DASHBOARD - NO SERVER NEEDED =======================
    
    const AdminApp = {
        // Data storage key
        STORAGE_KEY: 'mei_drive_users',
        SESSION_KEY: 'mei_admin_session',
        
        currentAdmin: null,
        
        // Initialize demo data
        initData: function() {
            if (!localStorage.getItem(this.STORAGE_KEY)) {
                const demoUsers = [
                    { id: 'admin_1', name: 'Alex Mwangi', email: 'admin@meidrive.com', password: 'admin123', role: 'admin', progress: 14, totalUnits: 14, joined: '2024-01-15' },
                    { id: 'user_1', name: 'John Kamau', email: 'john@example.com', password: 'pass123', role: 'learner', progress: 5, totalUnits: 14, joined: '2025-01-10' },
                    { id: 'user_2', name: 'Mary Wanjiku', email: 'mary@example.com', password: 'pass123', role: 'driver', progress: 12, totalUnits: 14, joined: '2024-11-20' },
                    { id: 'user_3', name: 'Peter Otieno', email: 'peter@example.com', password: 'pass123', role: 'learner', progress: 3, totalUnits: 14, joined: '2025-02-01' },
                    { id: 'user_4', name: 'Grace Nduta', email: 'grace@example.com', password: 'pass123', role: 'driver', progress: 9, totalUnits: 14, joined: '2024-12-05' },
                    { id: 'user_5', name: 'James Omondi', email: 'james@example.com', password: 'pass123', role: 'learner', progress: 7, totalUnits: 14, joined: '2025-01-25' }
                ];
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(demoUsers));
            }
        },
        
        // Get all users
        getUsers: function() {
            return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]');
        },
        
        // Save users
        saveUsers: function(users) {
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(users));
        },
        
        // Check authentication
        checkAuth: function() {
            const session = localStorage.getItem(this.SESSION_KEY);
            if (session === 'true') {
                this.currentAdmin = { name: 'Administrator', role: 'admin' };
                return true;
            }
            this.showLoginModal();
            return false;
        },
        
        // Show login modal
        showLoginModal: function() {
            const modalHtml = `
                <div id="adminLoginModal" class="modal-overlay">
                    <div class="modal-card">
                        <h2><i class="fas fa-lock"></i> Admin Access</h2>
                        <input type="email" id="loginEmail" placeholder="Admin Email" value="admin@meidrive.com">
                        <input type="password" id="loginPassword" placeholder="Password" value="admin123">
                        <button onclick="AdminApp.login()">Login to Dashboard</button>
                        <p style="color:#888;font-size:12px;margin-top:16px;text-align:center;">Demo: admin@meidrive.com / admin123</p>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        },
        
        // Login handler
        login: function() {
            const email = document.getElementById('loginEmail')?.value || 'admin@meidrive.com';
            const password = document.getElementById('loginPassword')?.value || 'admin123';
            
            const users = this.getUsers();
            const admin = users.find(u => u.email === email && u.password === password && u.role === 'admin');
            
            if (admin) {
                localStorage.setItem(this.SESSION_KEY, 'true');
                this.currentAdmin = admin;
                document.getElementById('adminLoginModal')?.remove();
                this.showToast('Welcome back, ' + admin.name, 'success');
                this.loadDashboard();
                this.loadUsersTable();
            } else {
                this.showToast('Invalid admin credentials', 'error');
            }
        },
        
        // Logout
        logout: function() {
            localStorage.removeItem(this.SESSION_KEY);
            this.currentAdmin = null;
            this.showToast('Logged out successfully', 'info');
            this.showLoginModal();
        },
        
        // Load dashboard stats
        loadDashboard: function() {
            const users = this.getUsers();
            const totalUsers = users.length;
            const learners = users.filter(u => u.role === 'learner').length;
            const drivers = users.filter(u => u.role === 'driver').length;
            const admins = users.filter(u => u.role === 'admin').length;
            const totalProgress = users.reduce((sum, u) => sum + (u.progress || 0), 0);
            const avgProgress = totalUsers > 0 ? Math.round(totalProgress / totalUsers) : 0;
            
            const statsHtml = `
                <div class="stat-card"><h3><i class="fas fa-users"></i> Total Users</h3><div class="stat-number">${totalUsers}</div></div>
                <div class="stat-card"><h3><i class="fas fa-graduation-cap"></i> Learner Drivers</h3><div class="stat-number">${learners}</div></div>
                <div class="stat-card"><h3><i class="fas fa-truck"></i> Professional Drivers</h3><div class="stat-number">${drivers}</div></div>
                <div class="stat-card"><h3><i class="fas fa-chart-line"></i> Avg. Progress</h3><div class="stat-number">${avgProgress}/14</div></div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;
            
            const recentUsers = [...users].sort((a,b) => new Date(b.joined) - new Date(a.joined)).slice(0, 5);
            const activityHtml = `
                <div style="background:#1a1a22; border-radius:16px; padding:16px;">
                    <p><i class="fas fa-chart-simple"></i> <strong>Platform Summary</strong></p>
                    <p style="margin-top:12px;">📊 Total units completed across all users: <strong style="color:#d4af37;">${totalProgress}</strong></p>
                    <p>👥 User breakdown: ${learners} Learners · ${drivers} Drivers · ${admins} Admins</p>
                    <p style="margin-top:12px; font-size:12px; color:#888;">🕒 Last 5 registrations:</p>
                    <ul style="margin-top:8px; margin-left:20px;">
                        ${recentUsers.map(u => `<li>${u.name} (${u.role}) - joined ${u.joined}</li>`).join('')}
                    </ul>
                </div>
            `;
            document.getElementById('activityLog').innerHTML = activityHtml;
        },
        
        // Load users table
        loadUsersTable: function() {
            const users = this.getUsers();
            const tbody = document.getElementById('usersTableBody');
            document.getElementById('userCount').innerText = users.length + ' total';
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No users found. Add your first user above.</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => {
                const isCurrentAdmin = user.id === this.currentAdmin?.id;
                const canDelete = user.role !== 'admin' || !isCurrentAdmin;
                const roleClass = user.role === 'admin' ? 'admin' : '';
                
                return `
                    <tr>
                        <td><strong>${this.escapeHtml(user.name)}</strong></td>
                        <td>${this.escapeHtml(user.email)}</td>
                        <td><span class="role-badge ${roleClass}">${user.role === 'admin' ? '👑 Admin' : user.role === 'driver' ? '🚛 Driver' : '📘 Learner'}</span></td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span>${user.progress || 0}/${user.totalUnits || 14}</span>
                                <div style="flex:1; background:#222; border-radius:10px; height:5px; width:80px;">
                                    <div style="width:${((user.progress || 0)/(user.totalUnits || 14))*100}%; background:#d4af37; height:5px; border-radius:10px;"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            ${canDelete ? `<button class="edit-btn" onclick="AdminApp.editUser('${user.id}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="AdminApp.deleteUser('${user.id}')"><i class="fas fa-trash"></i></button>` : '<span style="color:#555;">—</span>'}
                        </td>
                    </tr>
                `;
            }).join('');
        },
        
        // Add new user
        addUser: function() {
            const name = document.getElementById('userFullName').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRoleSelect').value;
            
            if (!email) {
                this.showToast('Email is required', 'error');
                return;
            }
            
            const users = this.getUsers();
            if (users.some(u => u.email === email)) {
                this.showToast('Email already exists', 'error');
                return;
            }
            
            const newUser = {
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                name: name || email.split('@')[0],
                email: email,
                password: password || 'pass123',
                role: role,
                progress: 0,
                totalUnits: 14,
                joined: new Date().toISOString().split('T')[0]
            };
            
            users.push(newUser);
            this.saveUsers(users);
            
            // Clear form
            document.getElementById('userFullName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            
            this.showToast(`✅ User ${newUser.name} created successfully`, 'success');
            this.loadDashboard();
            this.loadUsersTable();
        },
        
        // Edit user (quick edit - promote progress)
        editUser: function(userId) {
            const users = this.getUsers();
            const user = users.find(u => u.id === userId);
            if (!user || user.role === 'admin') return;
            
            const newProgress = prompt(`Update progress for ${user.name} (0-14 units):`, user.progress);
            if (newProgress !== null) {
                const progress = Math.min(14, Math.max(0, parseInt(newProgress) || 0));
                user.progress = progress;
                this.saveUsers(users);
                this.showToast(`Updated ${user.name}'s progress to ${progress}/14`, 'success');
                this.loadDashboard();
                this.loadUsersTable();
            }
        },
        
        // Delete user
        deleteUser: function(userId) {
            const users = this.getUsers();
            const user = users.find(u => u.id === userId);
            
            if (!user) return;
            if (user.role === 'admin') {
                this.showToast('Cannot delete admin users', 'error');
                return;
            }
            
            if (confirm(`Delete user "${user.name}"? This action cannot be undone.`)) {
                const filtered = users.filter(u => u.id !== userId);
                this.saveUsers(filtered);
                this.showToast(`User ${user.name} deleted`, 'success');
                this.loadDashboard();
                this.loadUsersTable();
            }
        },
        
        // Show/hide panels
        showPanel: function(panel) {
            document.getElementById('dashboardPanel').style.display = panel === 'dashboard' ? 'block' : 'none';
            document.getElementById('usersPanel').style.display = panel === 'users' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (panel === 'dashboard') {
                document.querySelector('.nav-btn:first-child').classList.add('active');
                this.loadDashboard();
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                this.loadUsersTable();
            }
        },
        
        // Toast notification
        showToast: function(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        },
        
        // Escape HTML
        escapeHtml: function(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        },
        
        // Initialize app
        init: function() {
            this.initData();
            if (!this.checkAuth()) {
                return;
            }
            this.loadDashboard();
            this.loadUsersTable();
        }
    };
    
    // Make global
    window.AdminApp = AdminApp;
    
    // Start the app
    AdminApp.init();
</script>
</body>
</html>
