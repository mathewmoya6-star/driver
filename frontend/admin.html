<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Admin Panel - Live System</title>
    <meta name="description" content="Admin Dashboard for MEI DRIVE AFRICA Driver Training Platform">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --secondary: #00ff88;
            --dark: #0a0a0a;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        
        /* Layout */
        .admin-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 1.6rem; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        .logout-btn { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Cards */
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 600; }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(212, 175, 55, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-inactive { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-user { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-warning { background: #f39c12; color: #000; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: var(--dark-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }
        
        /* Switch Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before { transform: translateX(26px); }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.75rem; }
            .data-table th, .data-table td { padding: 8px; }
        }
        
        .quiz-bank-list, .library-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .quiz-item, .library-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .price-input-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .price-input-container input {
            flex: 1;
            margin: 0;
        }
        .module-guide-banner {
            background: rgba(212,175,55,0.12);
            border-left: 3px solid var(--primary);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================
        // FULLY FUNCTIONAL ADMIN PANEL - REAL DATA MANAGEMENT
        // ============================================
        
        // App State
        let currentUser = { name: 'Admin User', email: 'admin@meidrive.com', role: 'admin' };
        let adminView = 'dashboard';
        
        // Data Stores (Live editable)
        let users = [];
        let modules = [];
        let quizBank = [];
        let library = [];
        let systemSettings = {
            maintenanceMode: false,
            allowRegistration: true,
            siteName: 'MEI DRIVE AFRICA',
            contactEmail: 'support@meidrive.com'
        };
        
        // Pending lock module data
        let pendingLockModuleId = null;
        
        // Load Initial Data
        function initializeData() {
            users = [
                { id: 1, name: 'John Mwangi', email: 'john@example.com', role: 'user', status: 'active', enrolledModules: ['Learner Hub', 'EV Training'], progress: 45 },
                { id: 2, name: 'Sarah Wanjiku', email: 'sarah@example.com', role: 'user', status: 'active', enrolledModules: ['Boda Boda Safety', 'PSV Course'], progress: 78 },
                { id: 3, name: 'Michael Otieno', email: 'michael@example.com', role: 'user', status: 'active', enrolledModules: ['School Bus Safety'], progress: 32 },
                { id: 4, name: 'Grace Akinyi', email: 'grace@example.com', role: 'user', status: 'inactive', enrolledModules: [], progress: 0 },
                { id: 5, name: 'Admin User', email: 'admin@meidrive.com', role: 'admin', status: 'active', enrolledModules: ['All Modules'], progress: 100 }
            ];
            
            modules = [
                { id: 1, name: 'Learner Hub', price: 0, duration: '25 hours', examTimer: 60, lessons: 21, status: 'unlocked', enrolled: 1245, description: 'Complete NTSA-approved driver training - 21 comprehensive units' },
                { id: 2, name: 'EV Drivers & Riders', price: 0, duration: '12 hours', examTimer: 45, lessons: 8, status: 'unlocked', enrolled: 567, description: 'Modern training for electric vehicle drivers focused on safety and efficiency' },
                { id: 3, name: 'Boda Boda Safety Course', price: 0, duration: '18 hours', examTimer: 50, lessons: 12, status: 'unlocked', enrolled: 2341, description: 'Practical road safety training for everyday riders' },
                { id: 4, name: 'PSV Professional Course', price: 2999, duration: '15 hours', examTimer: 90, lessons: 10, status: 'locked', enrolled: 892, description: 'Advanced preparation for matatu, bus, and commercial drivers' },
                { id: 5, name: 'School Bus Safety Program', price: 1999, duration: '10 hours', examTimer: 60, lessons: 6, status: 'locked', enrolled: 456, description: 'Specialized safety training for passenger protection' },
                { id: 6, name: 'Advanced Driver Academy', price: 4999, duration: '20 hours', examTimer: 120, lessons: 8, status: 'locked', enrolled: 234, description: 'Professional development for fleet managers' }
            ];
            
            quizBank = [
                { id: 1, question: "What is the minimum age for a private vehicle learner's licence in Kenya?", options: ["16 years", "17 years", "18 years", "21 years"], correct: 2, category: "Licensing", difficulty: "Easy" },
                { id: 2, question: "What is the legal blood alcohol limit for a private vehicle driver?", options: ["0.00%", "0.05%", "0.08%", "0.10%"], correct: 2, category: "Safety", difficulty: "Medium" },
                { id: 3, question: "What does a continuous yellow line on a two-way road mean?", options: ["Overtaking encouraged", "No overtaking", "Parking allowed", "Slow down only"], correct: 1, category: "Road Markings", difficulty: "Easy" },
                { id: 4, question: "What is the maximum speed limit in a residential area?", options: ["30 km/h", "40 km/h", "50 km/h", "60 km/h"], correct: 1, category: "Speed Limits", difficulty: "Easy" },
                { id: 5, question: "What does ABS stand for?", options: ["Automatic Braking System", "Anti-lock Braking System", "Advanced Brake Service", "Auxiliary Brake Safety"], correct: 1, category: "Vehicle Technology", difficulty: "Medium" }
            ];
            
            library = [
                { id: 1, title: "Kenya Highway Code", type: "PDF", url: "/pdfs/highway-code.pdf", size: "2.5 MB", downloads: 1245 },
                { id: 2, title: "NTSA Driving Test Guide", type: "PDF", url: "/pdfs/test-guide.pdf", size: "1.8 MB", downloads: 892 },
                { id: 3, title: "Defensive Driving Manual", type: "PDF", url: "/pdfs/defensive-driving.pdf", size: "3.2 MB", downloads: 567 },
                { id: 4, title: "PSV Regulations Handbook", type: "PDF", url: "/pdfs/psv-regulations.pdf", size: "2.1 MB", downloads: 234 }
            ];
        }
        
        initializeData();
        
        // Toast System
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // CRUD Functions
        function addUser(name, email, role) {
            const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 6;
            const newUser = { id: newId, name, email, role, status: 'active', enrolledModules: [], progress: 0 };
            users.push(newUser);
            showToast(`User ${name} added successfully!`, 'success');
            renderApp();
        }
        
        function deleteUser(userId) {
            users = users.filter(u => u.id !== userId);
            showToast('User deleted successfully', 'success');
            renderApp();
        }
        
        function updateUserStatus(userId, status) {
            const user = users.find(u => u.id === userId);
            if (user) { user.status = status; showToast(`User ${user.name} ${status === 'active' ? 'activated' : 'deactivated'}`, 'success'); renderApp(); }
        }
        
        function updateUserRole(userId, role) {
            const user = users.find(u => u.id === userId);
            if (user) { user.role = role; showToast(`User ${user.name} is now ${role === 'admin' ? 'Admin' : 'User'}`, 'success'); renderApp(); }
        }
        
        function addModule(name, price, duration, examTimer, lessons, description) {
            const newId = modules.length > 0 ? Math.max(...modules.map(m => m.id)) + 1 : 7;
            const newModule = {
                id: newId, name, price: parseInt(price), duration, examTimer: parseInt(examTimer),
                lessons: parseInt(lessons), status: price === 0 ? 'unlocked' : 'locked', enrolled: 0, description
            };
            modules.push(newModule);
            showToast(`Module "${name}" added!`, 'success');
            renderApp();
        }
        
        function updateModule(moduleId, updates) {
            const module = modules.find(m => m.id === moduleId);
            if (module) { 
                Object.assign(module, updates); 
                showToast(`Module "${module.name}" updated!`, 'success'); 
                renderApp(); 
            }
        }
        
        // Lock Module with price prompt
        function lockModuleWithPrice(moduleId) {
            const module = modules.find(m => m.id === moduleId);
            if (!module) return;
            pendingLockModuleId = moduleId;
            const modal = document.getElementById('priceInputModal');
            document.getElementById('priceInputMessage').innerHTML = `Set price for "<strong>${module.name}</strong>" (KES)`;
            document.getElementById('priceInput').value = module.price || 0;
            modal.classList.add('active');
        }
        
        function confirmLockWithPrice() {
            const price = parseInt(document.getElementById('priceInput').value) || 0;
            if (pendingLockModuleId) {
                updateModule(pendingLockModuleId, { status: 'locked', price: price });
                showToast(`Module locked with price KES ${price.toLocaleString()}`, 'success');
                closeModal('priceInputModal');
                pendingLockModuleId = null;
                renderApp();
            }
        }
        
        function unlockModule(moduleId) {
            updateModule(moduleId, { status: 'unlocked', price: 0 });
            showToast(`Module unlocked and set to FREE`, 'success');
        }
        
        function toggleModuleStatus(moduleId) {
            const module = modules.find(m => m.id === moduleId);
            if (module.status === 'unlocked') {
                lockModuleWithPrice(moduleId);
            } else {
                unlockModule(moduleId);
            }
        }
        
        function deleteModule(moduleId) {
            modules = modules.filter(m => m.id !== moduleId);
            showToast('Module deleted successfully', 'success');
            renderApp();
        }
        
        function addQuizQuestion(question, options, correct, category, difficulty) {
            const newId = quizBank.length > 0 ? Math.max(...quizBank.map(q => q.id)) + 1 : 6;
            const newQuestion = { id: newId, question, options, correct, category, difficulty };
            quizBank.push(newQuestion);
            showToast('Quiz question added!', 'success');
            renderApp();
        }
        
        function deleteQuizQuestion(id) {
            quizBank = quizBank.filter(q => q.id !== id);
            showToast('Question deleted', 'success');
            renderApp();
        }
        
        function addLibraryItem(title, type, url, size) {
            const newId = library.length > 0 ? Math.max(...library.map(l => l.id)) + 1 : 5;
            const newItem = { id: newId, title, type, url, size, downloads: 0 };
            library.push(newItem);
            showToast(`Resource "${title}" added!`, 'success');
            renderApp();
        }
        
        function deleteLibraryItem(id) {
            library = library.filter(l => l.id !== id);
            showToast('Library item deleted', 'success');
            renderApp();
        }
        
        function saveSettings() {
            const maintenanceToggle = document.getElementById('maintenanceMode');
            const registrationToggle = document.getElementById('allowRegistration');
            const siteNameInput = document.getElementById('siteName');
            const contactEmailInput = document.getElementById('contactEmail');
            
            if (maintenanceToggle) systemSettings.maintenanceMode = maintenanceToggle.checked;
            if (registrationToggle) systemSettings.allowRegistration = registrationToggle.checked;
            if (siteNameInput) systemSettings.siteName = siteNameInput.value;
            if (contactEmailInput) systemSettings.contactEmail = contactEmailInput.value;
            
            showToast('System settings saved!', 'success');
            renderApp();
        }
        
        function calculateStats() {
            return {
                totalUsers: users.length,
                totalModules: modules.length,
                totalRevenue: modules.filter(m => m.price > 0).reduce((sum, m) => sum + (m.price * m.enrolled), 0),
                activeUsers: users.filter(u => u.status === 'active').length,
                totalQuizQuestions: quizBank.length,
                totalLibraryItems: library.length
            };
        }
        
        // ========== RENDER ENGINE ==========
        function renderDashboard() {
            const stats = calculateStats();
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Total Modules</h3><div class="stat-number">${stats.totalModules}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Active Users</h3><div class="stat-number">${stats.activeUsers}</div></div><div class="stat-icon"><i class="fas fa-user-check"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Quiz Questions</h3><div class="stat-number">${stats.totalQuizQuestions}</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Library Items</h3><div class="stat-number">${stats.totalLibraryItems}</div></div><div class="stat-icon"><i class="fas fa-book-open"></i></div></div>
                </div>
            `;
        }
        
        function renderUserManagement() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-users"></i> User Management</h2><button class="btn btn-primary" onclick="window.openAddUserModal()"><i class="fas fa-user-plus"></i> + Add User</button></div>
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Progress</th><th>Actions</th></tr></thead>
                        <tbody>${users.map(user => `
                            <tr>
                                <td><strong>${escapeHtml(user.name)}</strong></td>
                                <td>${escapeHtml(user.email)}</td>
                                <td><span class="status-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? 'Admin' : 'User'}</span></td>
                                <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status}</span></td>
                                <td>${user.progress || 0}%</td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="window.updateUserRole(${user.id}, '${user.role === 'admin' ? 'user' : 'admin'}')" style="margin-right: 4px;">${user.role === 'admin' ? '👤 Make User' : '👑 Make Admin'}</button>
                                    <button class="btn btn-outline btn-sm" onclick="window.updateUserStatus(${user.id}, '${user.status === 'active' ? 'inactive' : 'active'}')" style="margin-right: 4px;">${user.status === 'active' ? '🔒 Deactivate' : '✅ Activate'}</button>
                                    <button class="btn btn-danger btn-sm" onclick="window.confirmDeleteUser(${user.id})"><i class="fas fa-trash"></i></button>
                                 </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            `;
        }
        
        function renderModuleManagement() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-book"></i> Module Management</h2><button class="btn btn-primary" onclick="window.openAddModuleModal()"><i class="fas fa-plus"></i> + Add Module</button></div>
                    <div class="module-guide-banner"><i class="fas fa-lightbulb"></i> <strong>Lock/Unlock Guide:</strong> Click <strong style="color:#e74c3c;">Lock & Set Price</strong> to set a price and lock module. Click <strong style="color:#2ecc71;">Unlock (Make FREE)</strong> to make module free again.</div>
                    <table class="data-table">
                        <thead><tr><th>Module</th><th>Price</th><th>Duration</th><th>Exam Timer</th><th>Lessons</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${modules.map(module => `
                            <tr>
                                <td><strong>${escapeHtml(module.name)}</strong><br><small style="color:var(--text-muted);">${escapeHtml(module.description?.substring(0, 40) || '')}...</small></td>
                                <td>${module.price === 0 ? 'FREE' : `KES ${module.price.toLocaleString()}`}</td>
                                <td>${module.duration}</td>
                                <td>${module.examTimer} min</td>
                                <td>${module.lessons}</td>
                                <td>${module.enrolled}</td>
                                <td><span class="status-badge ${module.status === 'unlocked' ? 'status-active' : 'status-inactive'}">${module.status === 'unlocked' ? 'UNLOCKED' : 'LOCKED'}</span></td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="window.openEditModuleModal(${module.id})" style="margin-right: 4px;"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="btn btn-sm" style="background:${module.status === 'unlocked' ? '#e74c3c' : '#2ecc71'}; color:white; border:none;" onclick="window.toggleModuleStatus(${module.id})">
                                        ${module.status === 'unlocked' ? '🔒 Lock & Set Price' : '🔓 Unlock (FREE)'}
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="window.confirmDeleteModule(${module.id})"><i class="fas fa-trash"></i></button>
                                  </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            `;
        }
        
        function renderQuizBank() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-brain"></i> Quiz Bank</h2><button class="btn btn-primary" onclick="window.openAddQuizModal()"><i class="fas fa-plus"></i> Add Question</button></div><div class="quiz-bank-list">${quizBank.map(q => `<div class="quiz-item"><div><strong>Q${q.id}:</strong> ${escapeHtml(q.question.substring(0, 70))}...<br><small>${q.category} | ${q.difficulty}</small></div><div><button class="btn btn-danger btn-sm" onclick="window.deleteQuizQuestion(${q.id})"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div></div>`;
        }
        
        function renderLibrary() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-book-open"></i> Resource Library</h2><button class="btn btn-primary" onclick="window.openAddLibraryModal()"><i class="fas fa-plus"></i> Add Resource</button></div><div class="library-list">${library.map(item => `<div class="library-item"><div><i class="fas fa-file-pdf" style="color:var(--primary);"></i> <strong>${escapeHtml(item.title)}</strong><br><small>${item.type} | ${item.size} | ${item.downloads} downloads</small></div><div><button class="btn btn-danger btn-sm" onclick="window.deleteLibraryItem(${item.id})"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div></div>`;
        }
        
        function renderSystemSettings() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-cog"></i> System Settings</h2><button class="btn btn-primary" onclick="window.saveSettings()"><i class="fas fa-save"></i> Save Settings</button></div><div style="display:flex;flex-direction:column;gap:24px;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><h3>Maintenance Mode</h3><p style="color:var(--text-muted);">Only admins can access</p></div><label class="toggle-switch"><input type="checkbox" id="maintenanceMode" ${systemSettings.maintenanceMode ? 'checked' : ''}><span class="toggle-slider"></span></label></div><div style="display:flex;justify-content:space-between;align-items:center;"><div><h3>Allow Registration</h3><p style="color:var(--text-muted);">Enable new signups</p></div><label class="toggle-switch"><input type="checkbox" id="allowRegistration" ${systemSettings.allowRegistration ? 'checked' : ''}><span class="toggle-slider"></span></label></div><hr><div><h3>Site Information</h3><label>Site Name</label><input type="text" id="siteName" value="${escapeHtml(systemSettings.siteName)}" style="width:100%;"><label style="margin-top:16px;">Contact Email</label><input type="email" id="contactEmail" value="${escapeHtml(systemSettings.contactEmail)}" style="width:100%;"></div></div></div>`;
        }
        
        function renderApp() {
            const app = document.getElementById('app');
            const stats = calculateStats();
            const views = {
                dashboard: renderDashboard() + renderUserManagement() + renderModuleManagement() + renderQuizBank() + renderLibrary() + renderSystemSettings(),
                users: renderUserManagement(),
                modules: renderModuleManagement(),
                quiz: renderQuizBank(),
                library: renderLibrary(),
                settings: renderSystemSettings()
            };
            const content = views[adminView] || views.dashboard;
            app.innerHTML = `
                <div class="mobile-menu-btn" onclick="window.toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar"><div class="sidebar-header"><div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA</div><p style="font-size:0.7rem;color:var(--text-muted);">Admin Panel</p></div><div class="user-info"><div class="user-avatar">👤</div><div><h4>${escapeHtml(currentUser.name)}</h4><p>${escapeHtml(currentUser.email)}</p></div></div><div class="nav-menu">${['dashboard','users','modules','quiz','library','settings'].map(v => `<div class="nav-item ${adminView === v ? 'active' : ''}" onclick="window.setView('${v}')"><i class="fas fa-${v === 'dashboard' ? 'chart-line' : v === 'users' ? 'users' : v === 'modules' ? 'book' : v === 'quiz' ? 'brain' : v === 'library' ? 'book-open' : 'cog'}"></i> ${v.charAt(0).toUpperCase() + v.slice(1)}</div>`).join('')}<div class="logout-btn"><div class="nav-item" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div></div></div>
                <div class="main-content"><div class="top-bar"><div class="page-title"><h1>${adminView.charAt(0).toUpperCase() + adminView.slice(1)}</h1><p>Welcome back, ${escapeHtml(currentUser.name)}</p></div><div><span style="background:var(--dark-card);padding:8px 16px;border-radius:50px;"><i class="fas fa-users"></i> ${stats.totalUsers} Users</span></div></div>${content}</div>
                <div id="toast-container"></div>
                <!-- Modals: Add User, Module, Edit, PriceInput, Quiz, Library, Delete -->
                <div class="modal" id="addUserModal"><div class="modal-content"><h3>➕ Add User</h3><input id="newUserName" placeholder="Full Name"><input id="newUserEmail" placeholder="Email"><select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select><div style="display:flex;gap:12px;margin-top:20px;"><button class="btn btn-outline" onclick="window.closeModal('addUserModal')">Cancel</button><button class="btn btn-primary" onclick="window.submitAddUser()">Add</button></div></div></div>
                <div class="modal" id="addModuleModal"><div class="modal-content"><h3>📘 Add Module</h3><input id="newModuleName" placeholder="Module Name"><input id="newModulePrice" placeholder="Price KES (0 for FREE)"><input id="newModuleDuration" placeholder="Duration (e.g., 20 hours)"><input id="newModuleTimer" placeholder="Exam Timer (minutes)"><input id="newModuleLessons" placeholder="Lessons"><textarea id="newModuleDescription" placeholder="Description" rows="2"></textarea><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('addModuleModal')">Cancel</button><button class="btn btn-primary" onclick="window.submitAddModule()">Create</button></div></div></div>
                <div class="modal" id="editModuleModal"><div class="modal-content"><h3>✏️ Edit Module</h3><input type="hidden" id="editModuleId"><input id="editModuleName" placeholder="Name"><input id="editModulePrice" placeholder="Price"><input id="editModuleDuration" placeholder="Duration"><input id="editModuleTimer" placeholder="Timer"><input id="editModuleLessons" placeholder="Lessons"><textarea id="editModuleDescription" rows="2"></textarea><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('editModuleModal')">Cancel</button><button class="btn btn-primary" onclick="window.submitEditModule()">Save</button></div></div></div>
                <div class="modal" id="priceInputModal"><div class="modal-content"><h3><i class="fas fa-lock"></i> Set Lock Price</h3><p id="priceInputMessage"></p><div class="price-input-container"><span>KES</span><input type="number" id="priceInput" value="0"></div><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('priceInputModal')">Cancel</button><button class="btn btn-primary" onclick="window.confirmLockWithPrice()">Confirm Lock</button></div></div></div>
                <div class="modal" id="addQuizModal"><div class="modal-content"><h3>🧠 Add Quiz</h3><input id="quizQuestion" placeholder="Question"><input id="quizOptionA" placeholder="Option A"><input id="quizOptionB" placeholder="Option B"><input id="quizOptionC" placeholder="Option C"><input id="quizOptionD" placeholder="Option D"><select id="quizCorrect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select><input id="quizCategory" placeholder="Category"><select id="quizDifficulty"><option>Easy</option><option>Medium</option><option>Hard</option></select><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('addQuizModal')">Cancel</button><button class="btn btn-primary" onclick="window.submitAddQuiz()">Add</button></div></div></div>
                <div class="modal" id="addLibraryModal"><div class="modal-content"><h3>📚 Add Resource</h3><input id="libTitle" placeholder="Title"><select id="libType"><option>PDF</option><option>DOC</option><option>VIDEO</option></select><input id="libUrl" placeholder="URL"><input id="libSize" placeholder="Size"><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('addLibraryModal')">Cancel</button><button class="btn btn-primary" onclick="window.submitAddLibrary()">Add</button></div></div></div>
                <div class="modal" id="deleteConfirmModal"><div class="modal-content"><h3>⚠️ Confirm Delete</h3><p id="deleteMessage"></p><div style="display:flex;gap:12px;"><button class="btn btn-outline" onclick="window.closeModal('deleteConfirmModal')">Cancel</button><button class="btn btn-danger" id="confirmDeleteBtn">Delete</button></div></div></div>
            `;
            document.getElementById('confirmDeleteBtn').onclick = () => window.confirmDeleteBtn();
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        // Global modal helpers
        window.openAddUserModal = () => document.getElementById('addUserModal').classList.add('active');
        window.openAddModuleModal = () => document.getElementById('addModuleModal').classList.add('active');
        window.openEditModuleModal = (id) => { const m = modules.find(m => m.id === id); if(m){ document.getElementById('editModuleId').value=m.id; document.getElementById('editModuleName').value=m.name; document.getElementById('editModulePrice').value=m.price; document.getElementById('editModuleDuration').value=m.duration; document.getElementById('editModuleTimer').value=m.examTimer; document.getElementById('editModuleLessons').value=m.lessons; document.getElementById('editModuleDescription').value=m.description||''; document.getElementById('editModuleModal').classList.add('active'); } };
        window.openAddQuizModal = () => document.getElementById('addQuizModal').classList.add('active');
        window.openAddLibraryModal = () => document.getElementById('addLibraryModal').classList.add('active');
        window.submitAddUser = () => { const n=document.getElementById('newUserName').value, e=document.getElementById('newUserEmail').value, r=document.getElementById('newUserRole').value; if(n&&e){ addUser(n,e,r); closeModal('addUserModal'); } else showToast('Fill all fields','error'); };
        window.submitAddModule = () => { const n=document.getElementById('newModuleName').value, p=document.getElementById('newModulePrice').value, d=document.getElementById('newModuleDuration').value, t=document.getElementById('newModuleTimer').value, l=document.getElementById('newModuleLessons').value, desc=document.getElementById('newModuleDescription').value; if(n&&d&&l){ addModule(n,p||0,d,t||60,l,desc); closeModal('addModuleModal'); } else showToast('Fill required fields','error'); };
        window.submitEditModule = () => { const id=parseInt(document.getElementById('editModuleId').value); updateModule(id,{name:document.getElementById('editModuleName').value,price:parseInt(document.getElementById('editModulePrice').value)||0,duration:document.getElementById('editModuleDuration').value,examTimer:parseInt(document.getElementById('editModuleTimer').value)||60,lessons:parseInt(document.getElementById('editModuleLessons').value),description:document.getElementById('editModuleDescription').value}); closeModal('editModuleModal'); };
        window.submitAddQuiz = () => { const q=document.getElementById('quizQuestion').value, opts=[document.getElementById('quizOptionA').value,document.getElementById('quizOptionB').value,document.getElementById('quizOptionC').value,document.getElementById('quizOptionD').value], cor=parseInt(document.getElementById('quizCorrect').value), cat=document.getElementById('quizCategory').value, diff=document.getElementById('quizDifficulty').value; if(q&&opts.every(o=>o)){ addQuizQuestion(q,opts,cor,cat,diff); closeModal('addQuizModal'); } else showToast('Fill all options','error'); };
        window.submitAddLibrary = () => { const t=document.getElementById('libTitle').value, ty=document.getElementById('libType').value, u=document.getElementById('libUrl').value, s=document.getElementById('libSize').value; if(t&&u){ addLibraryItem(t,ty,u,s); closeModal('addLibraryModal'); } else showToast('Title and URL required','error'); };
        window.updateUserStatus = updateUserStatus; window.updateUserRole = updateUserRole; window.toggleModuleStatus = toggleModuleStatus; window.deleteQuizQuestion = deleteQuizQuestion; window.deleteLibraryItem = deleteLibraryItem; window.confirmLockWithPrice = confirmLockWithPrice; window.saveSettings = saveSettings;
        let pendingDel=null, delType=null;
        window.confirmDeleteUser = (id)=>{ pendingDel=id; delType='user'; document.getElementById('deleteMessage').innerHTML='Delete this user?'; document.getElementById('deleteConfirmModal').classList.add('active'); };
        window.confirmDeleteModule = (id)=>{ pendingDel=id; delType='module'; document.getElementById('deleteMessage').innerHTML='Delete this module?'; document.getElementById('deleteConfirmModal').classList.add('active'); };
        window.confirmDeleteBtn = ()=>{ if(delType==='user') deleteUser(pendingDel); else if(delType==='module') deleteModule(pendingDel); closeModal('deleteConfirmModal'); pendingDel=null; delType=null; };
        window.closeModal = (id)=> document.getElementById(id).classList.remove('active');
        window.setView = (view)=>{ adminView=view; renderApp(); };
        window.toggleSidebar = ()=> document.getElementById('sidebar').classList.toggle('open');
        window.logout = ()=>{ showToast('Logged out','info'); setTimeout(()=> alert('Demo logout - would redirect'),800); };
        renderApp();
    </script>
</body>
</html>
