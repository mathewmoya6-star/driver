<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #f0f0f0; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #0a0a0f; border-right: 1px solid rgba(212,175,55,0.3); padding: 32px 20px; position: fixed; height: 100vh; }
        .sidebar h2 { color: #d4af37; margin-bottom: 40px; }
        .nav-btn { width: 100%; padding: 12px 16px; margin-bottom: 8px; background: transparent; border: 1px solid #222; color: #ccc; cursor: pointer; border-radius: 12px; text-align: left; display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover { background: rgba(212,175,55,0.1); border-color: #d4af37; }
        .nav-btn.active { background: #d4af37; color: #000; }
        .logout-btn { margin-top: 50px; background: rgba(220,53,69,0.15); border-color: #dc3545; color: #ff6b6b; }
        .main-content { margin-left: 260px; flex: 1; padding: 32px 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: #0f0f14; border-radius: 24px; padding: 24px; border: 1px solid #222; }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #d4af37; }
        .user-section { background: #0f0f14; border-radius: 24px; padding: 24px; margin-top: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { color: #d4af37; }
        .delete-btn { background: #dc3545; border: none; padding: 5px 12px; border-radius: 20px; color: white; cursor: pointer; }
        .add-user-form { background: #0f0f14; border-radius: 24px; padding: 24px; margin-top: 24px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px; }
        .form-group { flex: 1; min-width: 160px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #1a1a22; border: 1px solid #333; border-radius: 10px; color: white; }
        .add-btn { background: #d4af37; color: #000; padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; margin-top: 16px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a22; border-left: 4px solid #d4af37; padding: 12px 20px; border-radius: 10px; z-index: 2000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: flex; justify-content: center; align-items: center; }
        .modal-card { background: #0f0f14; border: 1px solid #d4af37; border-radius: 28px; padding: 32px; max-width: 400px; width: 90%; }
        .modal-card input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a22; border: 1px solid #333; border-radius: 10px; color: white; }
        .modal-card button { width: 100%; background: #d4af37; color: #000; padding: 12px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <h2><i class="fas fa-crown"></i> MEI ADMIN</h2>
        <button class="nav-btn active" onclick="showPanel('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
        <button class="nav-btn" onclick="showPanel('users')"><i class="fas fa-users"></i> Users</button>
        <button class="nav-btn logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="main-content">
        <div id="dashboardPanel">
            <h1>Admin Dashboard</h1>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
        <div id="usersPanel" style="display: none;">
            <h1>User Management</h1>
            <div class="add-user-form">
                <h3>Add New User</h3>
                <div class="form-row">
                    <div class="form-group"><input type="text" id="userName" placeholder="Name"></div>
                    <div class="form-group"><input type="email" id="userEmail" placeholder="Email"></div>
                    <div class="form-group"><select id="userRole"><option value="learner">Learner</option><option value="driver">Driver</option><option value="admin">Admin</option></select></div>
                </div>
                <button class="add-btn" onclick="addUser()">Add User</button>
            </div>
            <div class="user-section">
                <table id="usersTable"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Action</th></tr></thead><tbody id="usersTableBody"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
    let adminToken = localStorage.getItem('admin_token');
    
    async function apiCall(endpoint, options = {}) {
        const res = await fetch(endpoint, {
            ...options,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}`, ...options.headers }
        });
        if (res.status === 401) { handleLogout(); throw new Error('Session expired'); }
        return res.json();
    }
    
    async function login(email, password) {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (data.session?.access_token) {
            adminToken = data.session.access_token;
            localStorage.setItem('admin_token', adminToken);
            return true;
        }
        return false;
    }
    
    async function loadStats() {
        const stats = await apiCall('/api/admin/stats');
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers || 0}</div></div>
            <div class="stat-card"><h3>Learners</h3><div class="stat-number">${stats.students || 0}</div></div>
            <div class="stat-card"><h3>Drivers</h3><div class="stat-number">${stats.drivers || 0}</div></div>
        `;
    }
    
    async function loadUsers() {
        const users = await apiCall('/api/admin/users');
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = users.map(u => `<tr><td>${u.user_name || u.user_id}</td><td>${u.user_email || u.user_id}</td><td>${u.user_role || 'learner'}</td><td><button class="delete-btn" onclick="deleteUser('${u.user_id}')">Delete</button></td></tr>`).join('');
    }
    
    async function addUser() {
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        const role = document.getElementById('userRole').value;
        if (!email) return showToast('Email required');
        await apiCall('/api/admin/users', { method: 'POST', body: JSON.stringify({ user_id: email, name, email, role }) });
        showToast('User added');
        loadUsers();
        loadStats();
    }
    
    async function deleteUser(id) { if (confirm('Delete?')) { await apiCall(`/api/admin/users/${id}`, { method: 'DELETE' }); loadUsers(); loadStats(); } }
    
    function showPanel(panel) {
        document.getElementById('dashboardPanel').style.display = panel === 'dashboard' ? 'block' : 'none';
        document.getElementById('usersPanel').style.display = panel === 'users' ? 'block' : 'none';
        if (panel === 'dashboard') loadStats();
        if (panel === 'users') loadUsers();
    }
    
    function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    
    function handleLogout() { localStorage.removeItem('admin_token'); adminToken = null; showLoginModal(); }
    
    function showLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><h2>Admin Login</h2><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button onclick="doLogin()">Login</button></div>`;
        document.body.appendChild(modal);
    }
    
    async function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (await login(email, password)) { document.querySelector('.modal-overlay')?.remove(); showToast('Welcome Admin'); loadStats(); showPanel('dashboard'); }
        else showToast('Login failed');
    }
    
    if (!adminToken) showLoginModal();
    else { loadStats(); showPanel('dashboard'); }
    
    window.showPanel = showPanel; window.addUser = addUser; window.deleteUser = deleteUser; window.handleLogout = handleLogout; window.doLogin = doLogin;
</script>
</body>
</html>
