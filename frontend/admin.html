<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Admin Panel</title>
    <meta name="description" content="Admin Dashboard for MEI DRIVE AFRICA Driver Training Platform">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --secondary: #00ff88;
            --dark: #0a0a0a;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        
        /* Layout */
        .admin-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 1.6rem; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        .logout-btn { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Cards */
        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 600; }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { background: rgba(212, 175, 55, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-inactive { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-user { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            background: var(--dark-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }
        
        /* Switch Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before { transform: translateX(26px); }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.75rem; }
            .data-table th, .data-table td { padding: 8px; }
        }
        
        .quiz-bank-list, .library-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .quiz-item, .library-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--dark);
        }
        .login-card {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
        }
        .login-card h2 { text-align: center; margin-bottom: 24px; color: var(--primary); }
        .login-card input { width: 100%; margin-bottom: 16px; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; }
        .error-message { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="app">Loading...</div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION (same as frontend)
        // ============================================
        const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
        
        let supabase;
        let currentAdmin = null;
        let adminView = 'dashboard';
        
        // Data stores
        let users = [];
        let modules = { learner: [], psv: [], boda: [], ev: [] };
        let quizBank = [];
        let library = [];
        
        const moduleTables = {
            learner: 'learner_units',
            psv: 'psv_modules',
            boda: 'boda_modules',
            ev: 'ev_modules'
        };
        
        // Helper: escape HTML
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        // Toast
        function showToast(msg, type) {
            let container = document.getElementById('toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'toast-container'; container.className = 'toast-container'; document.body.appendChild(container); }
            const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
        }
        
        // Load all data from Supabase
        async function loadAllData() {
            try {
                // Load profiles (users)
                const { data: profiles } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
                users = profiles || [];
                
                // Load modules from each table
                for (const [key, table] of Object.entries(moduleTables)) {
                    const { data } = await supabase.from(table).select('*').order('module_number', { ascending: true });
                    modules[key] = data || [];
                }
                
                // Load quiz questions
                const { data: questions } = await supabase.from('questions').select('*').order('id', { ascending: false });
                quizBank = questions || [];
                
                // Load library docs
                const { data: docs } = await supabase.from('library_docs').select('*').order('id', { ascending: false });
                library = docs || [];
            } catch (err) {
                console.error('Error loading data:', err);
                showToast('Error loading data from Supabase', 'error');
            }
        }
        
        // CRUD Operations for Modules
        async function addModule(type, moduleData) {
            const table = moduleTables[type];
            const { error } = await supabase.from(table).insert([moduleData]);
            if (error) { showToast(error.message, 'error'); return false; }
            await loadAllData();
            showToast(`Module added to ${type}`, 'success');
            renderApp();
            return true;
        }
        
        async function updateModule(type, id, updates) {
            const table = moduleTables[type];
            const { error } = await supabase.from(table).update(updates).eq('id', id);
            if (error) { showToast(error.message, 'error'); return false; }
            await loadAllData();
            showToast('Module updated', 'success');
            renderApp();
            return true;
        }
        
        async function deleteModule(type, id) {
            const table = moduleTables[type];
            const { error } = await supabase.from(table).delete().eq('id', id);
            if (error) { showToast(error.message, 'error'); return false; }
            await loadAllData();
            showToast('Module deleted', 'success');
            renderApp();
            return true;
        }
        
        // User management
        async function updateUserRole(userId, isAdmin) {
            const { error } = await supabase.from('profiles').update({ is_admin: isAdmin }).eq('id', userId);
            if (error) { showToast(error.message, 'error'); return; }
            await loadAllData();
            showToast(`User role updated`, 'success');
            renderApp();
        }
        
        async function updateUserStatus(userId, status) {
            const { error } = await supabase.from('profiles').update({ status }).eq('id', userId);
            if (error) { showToast(error.message, 'error'); return; }
            await loadAllData();
            showToast(`User ${status}`, 'success');
            renderApp();
        }
        
        async function deleteUser(userId) {
            if (!confirm('Permanently delete user? This will also delete their progress.')) return;
            await supabase.from('user_progress').delete().eq('user_id', userId);
            await supabase.from('profiles').delete().eq('id', userId);
            await loadAllData();
            showToast('User deleted', 'success');
            renderApp();
        }
        
        // Quiz management
        async function addQuizQuestion(questionData) {
            const { error } = await supabase.from('questions').insert([questionData]);
            if (error) { showToast(error.message, 'error'); return false; }
            await loadAllData();
            showToast('Question added', 'success');
            renderApp();
            return true;
        }
        
        async function deleteQuizQuestion(id) {
            const { error } = await supabase.from('questions').delete().eq('id', id);
            if (error) { showToast(error.message, 'error'); return; }
            await loadAllData();
            showToast('Question deleted', 'success');
            renderApp();
        }
        
        // Library management
        async function addLibraryItem(itemData) {
            const { error } = await supabase.from('library_docs').insert([itemData]);
            if (error) { showToast(error.message, 'error'); return false; }
            await loadAllData();
            showToast('Resource added', 'success');
            renderApp();
            return true;
        }
        
        async function deleteLibraryItem(id) {
            const { error } = await supabase.from('library_docs').delete().eq('id', id);
            if (error) { showToast(error.message, 'error'); return; }
            await loadAllData();
            showToast('Resource deleted', 'success');
            renderApp();
        }
        
        function getAllModulesArray() {
            return [...modules.learner, ...modules.psv, ...modules.boda, ...modules.ev];
        }
        
        function calculateStats() {
            const allModules = getAllModulesArray();
            const totalRevenue = allModules.reduce((sum, m) => sum + ((m.price || 0) * (m.enrolled_count || 0)), 0);
            return {
                totalUsers: users.length,
                totalModules: allModules.length,
                totalRevenue: totalRevenue,
                activeUsers: users.filter(u => u.status === 'active').length,
                totalQuizQuestions: quizBank.length,
                totalLibraryItems: library.length
            };
        }
        
        // ============ RENDER FUNCTIONS ============
        function renderDashboard() {
            const stats = calculateStats();
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div><div class="stat-icon"><i class="fas fa-users"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Total Modules</h3><div class="stat-number">${stats.totalModules}</div></div><div class="stat-icon"><i class="fas fa-book"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Total Revenue</h3><div class="stat-number">KES ${stats.totalRevenue.toLocaleString()}</div></div><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Active Users</h3><div class="stat-number">${stats.activeUsers}</div></div><div class="stat-icon"><i class="fas fa-user-check"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Quiz Questions</h3><div class="stat-number">${stats.totalQuizQuestions}</div></div><div class="stat-icon"><i class="fas fa-brain"></i></div></div>
                    <div class="stat-card"><div class="stat-info"><h3>Library Items</h3><div class="stat-number">${stats.totalLibraryItems}</div></div><div class="stat-icon"><i class="fas fa-book-open"></i></div></div>
                </div>
            `;
        }
        
        function renderUserManagement() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-users"></i> User Management</h2></div>
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${users.map(user => `
                            <tr>
                                <td><strong>${escapeHtml(user.full_name || user.email)}</strong></td>
                                <td>${escapeHtml(user.email)}</td>
                                <td><span class="status-badge ${user.is_admin ? 'role-admin' : 'role-user'}">${user.is_admin ? 'Admin' : 'User'}</span></td>
                                <td><span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-inactive'}">${user.status || 'active'}</span></td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="updateUserRole('${user.id}', ${!user.is_admin})" style="margin-right: 4px;">${user.is_admin ? '👤 Make User' : '👑 Make Admin'}</button>
                                    <button class="btn btn-outline btn-sm" onclick="updateUserStatus('${user.id}', '${user.status === 'active' ? 'inactive' : 'active'}')" style="margin-right: 4px;">${user.status === 'active' ? '🔒 Deactivate' : '✅ Activate'}</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i></button>
                                 </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            `;
        }
        
        function renderModuleManagement() {
            const allModules = getAllModulesArray();
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-book"></i> Module Management</h2><button class="btn btn-primary" onclick="openAddModuleModal()"><i class="fas fa-plus"></i> + Add Module</button></div>
                    <table class="data-table">
                        <thead><tr><th>Module</th><th>Type</th><th>Price</th><th>Duration</th><th>Lessons</th><th>Enrolled</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${Object.entries(modules).flatMap(([type, items]) => items.map(mod => `
                                <tr>
                                    <td><strong>${escapeHtml(mod.title || mod.name)}</strong></td>
                                    <td>${type.toUpperCase()}</td>
                                    <td>${mod.price === 0 ? 'FREE' : `KES ${mod.price.toLocaleString()}`}</td>
                                    <td>${mod.duration || '-'}</td>
                                    <td>${mod.lessons_count || mod.module_number || '-'}</td>
                                    <td>${mod.enrolled_count || 0}</td>
                                    <td><span class="status-badge ${mod.is_locked ? 'status-inactive' : 'status-active'}">${mod.is_locked ? 'LOCKED' : 'UNLOCKED'}</span></td>
                                    <td>
                                        <button class="btn btn-outline btn-sm" onclick="editModule('${type}', ${mod.id})" style="margin-right: 4px;"><i class="fas fa-edit"></i> Edit</button>
                                        <button class="btn btn-${mod.is_locked ? 'success' : 'warning'} btn-sm" onclick="toggleLock('${type}', ${mod.id}, ${mod.is_locked})" style="margin-right: 4px;">${mod.is_locked ? '🔓 Unlock' : '🔒 Lock'}</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteModuleItem('${type}', ${mod.id})"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderQuizBank() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-brain"></i> Quiz Bank Management</h2><button class="btn btn-primary" onclick="openAddQuizModal()"><i class="fas fa-plus"></i> + Add Question</button></div>
                    <div class="quiz-bank-list">
                        ${quizBank.map(q => `
                            <div class="quiz-item">
                                <div><strong>Q${q.id}:</strong> ${escapeHtml(q.text).substring(0, 80)}...<br><small style="color:var(--text-muted);">Category: ${escapeHtml(q.category)}</small></div>
                                <div><button class="btn btn-danger btn-sm" onclick="deleteQuizQuestion(${q.id})"><i class="fas fa-trash"></i></button></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderLibrary() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-book-open"></i> Resource Library</h2><button class="btn btn-primary" onclick="openAddLibraryModal()"><i class="fas fa-plus"></i> + Add Resource</button></div>
                    <div class="library-list">
                        ${library.map(item => `
                            <div class="library-item">
                                <div><i class="fas fa-file-pdf" style="color:var(--primary);"></i> <strong>${escapeHtml(item.title)}</strong><br><small style="color:var(--text-muted);">${escapeHtml(item.category || 'General')} | ${item.downloads || 0} downloads</small></div>
                                <div><button class="btn btn-danger btn-sm" onclick="deleteLibraryItem(${item.id})"><i class="fas fa-trash"></i></button></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderSystemSettings() {
            return `
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-cog"></i> System Settings</h2><button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Save Settings</button></div>
                    <div style="display: flex; flex-direction: column; gap: 24px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                            <div><h3>Maintenance Mode</h3><p style="color: var(--text-muted); font-size: 0.8rem;">When enabled, only admins can access the site</p></div>
                            <label class="toggle-switch"><input type="checkbox" id="maintenanceMode"><span class="toggle-slider"></span></label>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                            <div><h3>Allow Registration</h3><p style="color: var(--text-muted); font-size: 0.8rem;">Enable new user signups</p></div>
                            <label class="toggle-switch"><input type="checkbox" id="allowRegistration" checked><span class="toggle-slider"></span></label>
                        </div>
                        <hr style="border-color: var(--border);">
                        <div>
                            <h3>Site Information</h3>
                            <div style="margin-top: 16px;">
                                <label>Site Name</label>
                                <input type="text" id="siteName" value="MEI DRIVE AFRICA" style="width: 100%; max-width: 400px;">
                                <label style="margin-top: 16px;">Contact Email</label>
                                <input type="email" id="contactEmail" value="support@meidrive.com" style="width: 100%; max-width: 400px;">
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderApp() {
            const app = document.getElementById('app');
            if (!app) return;
            
            const views = {
                dashboard: renderDashboard() + renderUserManagement() + renderModuleManagement() + renderQuizBank() + renderLibrary() + renderSystemSettings(),
                users: renderUserManagement(),
                modules: renderModuleManagement(),
                quiz: renderQuizBank(),
                library: renderLibrary(),
                settings: renderSystemSettings()
            };
            const content = views[adminView] || views.dashboard;
            const stats = calculateStats();
            
            app.innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header"><div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA</div><p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px;">Administrator Panel</p></div>
                    <div class="user-info"><div class="user-avatar">👤</div><div class="user-details"><h4>${escapeHtml(currentAdmin?.full_name || currentAdmin?.email?.split('@')[0] || 'Admin')}</h4><p>${escapeHtml(currentAdmin?.email || '')} • Admin</p></div></div>
                    <div class="nav-menu">
                        <div class="nav-item ${adminView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                        <div class="nav-item ${adminView === 'users' ? 'active' : ''}" onclick="setView('users')"><i class="fas fa-users"></i> User Management</div>
                        <div class="nav-item ${adminView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> Module Management</div>
                        <div class="nav-item ${adminView === 'quiz' ? 'active' : ''}" onclick="setView('quiz')"><i class="fas fa-brain"></i> Quiz Bank</div>
                        <div class="nav-item ${adminView === 'library' ? 'active' : ''}" onclick="setView('library')"><i class="fas fa-book-open"></i> Library</div>
                        <div class="nav-item ${adminView === 'settings' ? 'active' : ''}" onclick="setView('settings')"><i class="fas fa-cog"></i> System Settings</div>
                        <div class="logout-btn"><div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                    </div>
                </div>
                <div class="main-content">
                    <div class="top-bar"><div class="page-title"><h1>${adminView === 'dashboard' ? 'Dashboard' : adminView === 'users' ? 'User Management' : adminView === 'modules' ? 'Module Management' : adminView === 'quiz' ? 'Quiz Bank' : adminView === 'library' ? 'Resource Library' : 'System Settings'}</h1><p>Welcome back, ${escapeHtml(currentAdmin?.full_name?.split(' ')[0] || currentAdmin?.email?.split('@')[0] || 'Admin')}</p></div><div class="stats-mini"><span style="background: var(--dark-card); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem;"><i class="fas fa-users"></i> ${stats.totalUsers} Users</span></div></div>
                    ${content}
                </div>
                <div id="toast-container"></div>
                <div class="modal" id="addModuleModal"><div class="modal-content"><h3>Add Module</h3><select id="moduleType"><option value="learner">Learner Hub</option><option value="psv">PSV</option><option value="boda">Boda</option><option value="ev">EV</option></select><input type="text" id="moduleTitle" placeholder="Title"><input type="number" id="modulePrice" placeholder="Price (KES, 0 for free)"><input type="text" id="moduleDuration" placeholder="Duration (e.g., 10 hours)"><input type="number" id="moduleLessons" placeholder="Number of lessons"><div style="display: flex; gap: 12px; margin-top: 20px;"><button class="btn btn-outline" onclick="closeModal('addModuleModal')">Cancel</button><button class="btn btn-primary" onclick="submitAddModule()">Add</button></div></div></div>
            `;
        }
        
        function renderLogin(errorMsg = '') {
            const app = document.getElementById('app');
            if (!app) return;
            app.innerHTML = `
                <div class="login-screen">
                    <div class="login-card">
                        <h2><i class="fas fa-lock"></i> Admin Login</h2>
                        <input type="email" id="adminEmail" placeholder="Email" autocomplete="email">
                        <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password">
                        ${errorMsg ? `<div class="error-message">${errorMsg}</div>` : ''}
                        <button class="btn btn-primary" style="width:100%; margin-top:16px;" onclick="performLogin()">Login</button>
                        <p style="text-align:center; margin-top:16px; font-size:0.75rem;">Only users with admin privileges can access.</p>
                    </div>
                </div>
            `;
        }
        
        // Login function
        async function performLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            if (!email || !password) {
                renderLogin('Please enter email and password');
                return;
            }
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    renderLogin(error.message);
                    return;
                }
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('is_admin, full_name, email')
                    .eq('id', data.user.id)
                    .single();
                if (profileError || !profile || profile.is_admin !== true) {
                    await supabase.auth.signOut();
                    renderLogin('Access denied: Not an admin user');
                    return;
                }
                currentAdmin = { id: data.user.id, email: data.user.email, full_name: profile.full_name || data.user.email };
                await loadAllData();
                renderApp();
            } catch (err) {
                renderLogin('Login failed. Try again.');
            }
        }
        
        // Logout
        async function logout() {
            await supabase.auth.signOut();
            currentAdmin = null;
            renderLogin();
            showToast('Logged out', 'info');
        }
        
        // UI Helpers
        function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
        function setView(view) { adminView = view; renderApp(); }
        function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('open'); }
        
        // Module actions (global for onclick)
        window.editModule = async (type, id) => {
            const module = modules[type].find(m => m.id === id);
            if (!module) return;
            const newTitle = prompt('New title:', module.title || module.name);
            if (newTitle) await updateModule(type, id, { title: newTitle, name: newTitle });
        };
        window.toggleLock = async (type, id, isLocked) => {
            if (isLocked) {
                await updateModule(type, id, { is_locked: false, price: 0 });
            } else {
                const price = prompt('Set price for this module (KES):', '0');
                if (price !== null) await updateModule(type, id, { is_locked: true, price: parseInt(price) || 0 });
            }
        };
        window.deleteModuleItem = async (type, id) => { if (confirm('Delete module?')) await deleteModule(type, id); };
        window.openAddModuleModal = () => document.getElementById('addModuleModal').classList.add('active');
        window.submitAddModule = async () => {
            const type = document.getElementById('moduleType').value;
            const title = document.getElementById('moduleTitle').value;
            const price = parseInt(document.getElementById('modulePrice').value) || 0;
            const duration = document.getElementById('moduleDuration').value;
            const lessons = parseInt(document.getElementById('moduleLessons').value) || 1;
            if (!title) { showToast('Title required', 'error'); return; }
            await addModule(type, { title, name: title, price, duration, lessons_count: lessons, module_number: Date.now() % 1000, is_locked: price > 0 });
            closeModal('addModuleModal');
            document.getElementById('moduleTitle').value = '';
            document.getElementById('modulePrice').value = '';
            document.getElementById('moduleDuration').value = '';
            document.getElementById('moduleLessons').value = '';
        };
        window.openAddQuizModal = () => {
            const q = prompt('Enter question text:');
            if (q) addQuizQuestion({ text: q, options: ['A', 'B', 'C', 'D'], correct: 0, category: 'General' });
        };
        window.openAddLibraryModal = () => {
            const title = prompt('Title:');
            if (title) addLibraryItem({ title, category: 'General', downloads: '0', link: '#' });
        };
        window.saveSettings = () => showToast('Settings saved locally (demo)', 'success');
        
        // Expose global functions
        window.updateUserRole = updateUserRole;
        window.updateUserStatus = updateUserStatus;
        window.deleteUser = deleteUser;
        window.deleteQuizQuestion = deleteQuizQuestion;
        window.deleteLibraryItem = deleteLibraryItem;
        window.performLogin = performLogin;
        window.logout = logout;
        window.setView = setView;
        window.closeModal = closeModal;
        window.toggleSidebar = toggleSidebar;
        window.saveSettings = saveSettings;
        
        // Initialize Supabase and check session
        async function init() {
            try {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('is_admin, full_name, email')
                        .eq('id', session.user.id)
                        .single();
                    if (profile && profile.is_admin === true) {
                        currentAdmin = { id: session.user.id, email: session.user.email, full_name: profile.full_name };
                        await loadAllData();
                        renderApp();
                        return;
                    } else {
                        await supabase.auth.signOut();
                    }
                }
                renderLogin();
            } catch (err) {
                console.error('Init error:', err);
                document.getElementById('app').innerHTML = '<div style="color:red; padding:40px; text-align:center;">Failed to initialize. Check console.</div>';
            }
        }
        
        init();
    </script>
</body>
</html>
