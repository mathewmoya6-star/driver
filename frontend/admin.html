<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Admin Portal</title>
    <meta name="theme-color" content="#d4af37">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000); }
        :root { --primary: #d4af37; --primary-dark: #b8960c; --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%); --dark-card: #111111; --border: rgba(212, 175, 55, 0.25); --text-muted: #aaaaaa; --error: #e74c3c; }
        .admin-container { width: 100%; max-width: 480px; margin: 2rem; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .admin-card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 32px; padding: 2rem; backdrop-filter: blur(8px); box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.1); transition: 0.3s; }
        .admin-card:hover { border-color: var(--primary); }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo i { font-size: 3rem; color: var(--primary); }
        .logo h1 { font-size: 1.8rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 0.5rem; }
        h2 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.85rem; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--primary-light); }
        input { width: 100%; padding: 12px 16px; background: #0f0f15; border: 1px solid var(--border); border-radius: 16px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 1rem; }
        .error-message { background: rgba(231,76,60,0.15); border-left: 3px solid var(--error); padding: 12px; border-radius: 12px; margin-bottom: 1.5rem; color: #ff9e8a; font-size: 0.85rem; }
        .success-message { background: rgba(46,204,113,0.15); border-left: 3px solid #2ecc71; padding: 12px; border-radius: 12px; margin-bottom: 1.5rem; color: #8dffc7; }
        .admin-dashboard { display: none; }
        .loading { display: none; text-align: center; margin: 1rem 0; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: var(--primary); }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .stat-card { background: #1a1a1a; padding: 1rem; border-radius: 16px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        hr { border-color: var(--border); margin: 1rem 0; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-card">
        <div class="logo"><i class="fas fa-car"></i><h1>MEI DRIVE AFRICA</h1></div>
        <h2>Admin Portal</h2>
        <div class="subtitle">Sign in with an admin account</div>
        <div id="loginForm">
            <div class="input-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@meidriveafrica.com"></div>
            <div class="input-group"><label>Password</label><input type="password" id="adminPassword" placeholder="••••••••"></div>
            <div id="loginError" class="error-message" style="display:none;"></div>
            <button class="btn btn-primary" onclick="adminLogin()"><i class="fas fa-sign-in-alt"></i> Login as Admin</button>
            <div id="loginLoading" class="loading"><div class="spinner"></div><p>Verifying...</p></div>
        </div>
        <div id="adminDashboard" class="admin-dashboard">
            <div id="dashboardMessage" class="success-message"></div>
            <h3>System Overview</h3>
            <div class="admin-stats" id="adminStats"><div class="stat-card"><div class="stat-value">—</div><div>Users</div></div><div class="stat-card"><div class="stat-value">—</div><div>Enrollments</div></div></div>
            <button class="btn btn-outline" onclick="showToast('Course management coming soon','info')">Manage Courses</button>
            <button class="btn btn-outline" onclick="showToast('User management coming soon','info')">Manage Users</button>
            <hr>
            <button class="btn btn-outline" onclick="adminLogout()">Logout</button>
        </div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
    </div>
</div>
<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    let supabase = null;

    async function init() {
        supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        if (session) await checkAdminAndShow(session.user);
    }

    async function adminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');
        const loading = document.getElementById('loginLoading');
        const btn = document.querySelector('#loginForm .btn-primary');
        if (!email || !password) { errorDiv.textContent = 'Enter email and password'; errorDiv.style.display = 'block'; return; }
        errorDiv.style.display = 'none';
        btn.disabled = true;
        loading.style.display = 'block';
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            await checkAdminAndShow(data.user);
        } catch (err) {
            errorDiv.textContent = err.message;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    async function checkAdminAndShow(user) {
        // Direct query to check admin status (RLS will allow if user is admin)
        const { data, error } = await supabase
            .from('user_profiles')
            .select('is_admin')
            .eq('id', user.id)
            .single();
        if (error || !data || !data.is_admin) {
            document.getElementById('loginError').textContent = 'Could not verify admin status. Make sure your account is marked as admin in user_profiles.';
            document.getElementById('loginError').style.display = 'block';
            await supabase.auth.signOut();
            document.querySelector('#loginForm .btn-primary').disabled = false;
            document.getElementById('loginLoading').style.display = 'none';
            return;
        }
        // Admin verified
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        document.getElementById('dashboardMessage').innerHTML = `<i class="fas fa-check-circle"></i> Welcome, ${user.email}. You have admin access.`;
        // Load some stats
        const { count: userCount } = await supabase.from('user_profiles').select('*', { count: 'exact', head: true });
        const { count: enrollCount } = await supabase.from('enrollments').select('*', { count: 'exact', head: true });
        document.getElementById('adminStats').innerHTML = `
            <div class="stat-card"><div class="stat-value">${userCount || 0}</div><div>Users</div></div>
            <div class="stat-card"><div class="stat-value">${enrollCount || 0}</div><div>Enrollments</div></div>
        `;
    }

    async function adminLogout() {
        await supabase.auth.signOut();
        location.reload();
    }

    function showToast(msg, type) { alert(msg); } // simple fallback
    window.adminLogin = adminLogin;
    window.adminLogout = adminLogout;
    window.showToast = showToast;
    init();
</script>
</body>
</html>
