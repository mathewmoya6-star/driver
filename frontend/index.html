<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | NTSA Premier E-Learning Platform</title>
    <meta name="description" content="Kenya's #1 NTSA-certified driver training platform">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --secondary: #00ff88;
            --dark: #0a0a0a;
            --card: #111111;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #2ecc71;
            --error: #e74c3c;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.5;
        }

        /* Layout */
        .app { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-info h3 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Modules Grid */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 40px; }
        
        .module-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .module-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .module-cover { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
        .module-badge { position: absolute; top: 12px; right: 12px; background: var(--primary); color: #000; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .module-content { padding: 20px; }
        .module-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .module-description { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }
        .module-stats { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.75rem; color: var(--text-muted); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; background: var(--gradient-gold); border-radius: 3px; transition: width 0.3s; }
        
        /* Buttons */
        .btn { padding: 10px 20px; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; font-size: 0.85rem; }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        
        /* Course Player */
        .course-layout { display: flex; gap: 24px; }
        .course-main { flex: 1; }
        .video-container { background: #000; border-radius: 24px; overflow: hidden; margin-bottom: 24px; }
        .video-container video { width: 100%; aspect-ratio: 16/9; }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
        
        .course-sidebar { width: 320px; background: var(--card); border-radius: 24px; padding: 20px; position: sticky; top: 24px; height: fit-content; }
        .lesson-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .lesson-item:hover, .lesson-item.active { background: rgba(212, 175, 55, 0.1); }
        .lesson-item.completed { color: var(--success); }
        
        /* Quiz */
        .quiz-question { margin-bottom: 24px; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .quiz-option {
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
        }
        .quiz-option:hover { background: rgba(212, 175, 55, 0.1); }
        .quiz-option.selected { background: var(--primary); color: #000; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 32px;
        }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .course-layout { flex-direction: column; }
            .course-sidebar { width: 100%; position: static; }
        }
        
        .loader { display: flex; justify-content: center; align-items: center; height: 200px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input, select { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; }
        .hero { text-align: center; padding: 60px 20px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================
        // DATA (Complete Platform Content)
        // ============================================
        
        const MODULES = [
            { id: 1, type: 'learner', name: 'Learner Driver Hub', icon: '📚', description: 'Complete NTSA-approved driver training - 21 comprehensive units', color: '#d4af37', lessons: 21, quizzes: 21, exams: 2, hours: 25, is_free: true },
            { id: 2, type: 'psv', name: 'PSV Professional Course', icon: '🚌', description: 'Professional Public Service Vehicle driver training', color: '#3498db', lessons: 10, quizzes: 10, exams: 1, hours: 15, is_free: true },
            { id: 3, type: 'ev', name: 'Electric Vehicle Training', icon: '⚡', description: 'Master EV operation, charging, and safety', color: '#00ff88', lessons: 8, quizzes: 8, exams: 1, hours: 12, is_free: true },
            { id: 4, type: 'boda', name: 'Boda Boda Safety Course', icon: '🏍️', description: 'Comprehensive motorcycle safety training', color: '#e67e22', lessons: 12, quizzes: 12, exams: 1, hours: 18, is_free: true },
            { id: 5, type: 'schoolbus', name: 'School Bus Safety Program', icon: '🏫', description: 'Specialized training for school bus drivers', color: '#9b59b6', lessons: 6, quizzes: 6, exams: 1, hours: 10, is_free: true },
            { id: 6, type: 'academy', name: 'Advanced Driver Academy', icon: '🎓', description: 'Professional development for fleet managers', color: '#e74c3c', lessons: 6, quizzes: 6, exams: 1, hours: 20, is_free: false }
        ];

        const LESSONS = {
            learner: [
                { number: 1, title: 'Introduction to Driving', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '15:30', objectives: ['Understand purpose of driver training', 'Recognize accident causes', 'Develop responsible driving'] },
                { number: 2, title: 'Getting Your Learner\'s License', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '12:00', objectives: ['NTSA application process', 'Required documents', 'Fees and timelines'] },
                { number: 3, title: 'The Traffic Act & Highway Code', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '20:00', objectives: ['Traffic Act provisions', 'Highway Code guidelines', 'Penalties for violations'] },
                { number: 4, title: 'Road Signs and Markings', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '18:30', objectives: ['Warning signs', 'Regulatory signs', 'Road markings'] },
                { number: 5, title: 'Right of Way Rules', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '14:00', objectives: ['Give-way rules', 'Intersection safety', 'Emergency vehicles'] }
            ],
            psv: [
                { number: 1, title: 'PSV Licensing & Compliance', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '20:00', objectives: ['License requirements', 'NTSA regulations', 'Compliance standards'] },
                { number: 2, title: 'Professional Driver Conduct', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '15:00', objectives: ['Code of conduct', 'Ethics', 'Professional behaviour'] }
            ],
            ev: [
                { number: 1, title: 'Introduction to Electric Vehicles', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '18:00', objectives: ['EV technology', 'Benefits', 'Types of EVs'] },
                { number: 2, title: 'EV Battery Technology', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '22:00', objectives: ['Battery types', 'Range management', 'Battery health'] }
            ],
            boda: [
                { number: 1, title: 'Motorcycle Controls & Operation', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '25:00', objectives: ['Basic controls', 'Clutch and throttle', 'Balance'] },
                { number: 2, title: 'Protective Gear & Safety', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '15:00', objectives: ['Helmets', 'Jackets', 'Visibility gear'] }
            ],
            schoolbus: [
                { number: 1, title: 'Child Safety Fundamentals', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '20:00', objectives: ['Child behaviour', 'Safety protocols', 'Legal responsibilities'] }
            ],
            academy: [
                { number: 1, title: 'Fleet Management Fundamentals', video: 'https://www.w3schools.com/html/mov_bbb.mp4', duration: '30:00', objectives: ['Fleet operations', 'Vehicle selection', 'Maintenance planning'] }
            ]
        };

        const QUIZZES = {
            learner_1: [
                { question: 'What is the minimum age for a private vehicle learner\'s licence in Kenya?', options: ['16 years', '17 years', '18 years', '21 years'], correct: 2, explanation: 'The Traffic Act specifies 18 years as the minimum age.' },
                { question: 'What is the leading cause of road accidents in Kenya?', options: ['Poor roads', 'Mechanical failure', 'Human error', 'Bad weather'], correct: 2, explanation: 'Approximately 80% of accidents are caused by human error.' },
                { question: 'What does defensive driving mean?', options: ['Driving aggressively', 'Driving slowly', 'Anticipating hazards', 'Using high beam'], correct: 2, explanation: 'Defensive driving means anticipating hazards and being prepared.' }
            ]
        };

        // App State
        let currentUser = null;
        let currentView = 'dashboard';
        let currentModule = null;
        let currentLesson = null;
        let userProgress = JSON.parse(localStorage.getItem('userProgress') || '{}');
        let completedLessons = JSON.parse(localStorage.getItem('completedLessons') || '{}');

        // Helper Functions
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function saveProgress() {
            localStorage.setItem('userProgress', JSON.stringify(userProgress));
            localStorage.setItem('completedLessons', JSON.stringify(completedLessons));
        }

        function markLessonComplete(moduleType, lessonNum) {
            const key = `${moduleType}_${lessonNum}`;
            if (!completedLessons[key]) {
                completedLessons[key] = true;
                userProgress[moduleType] = (userProgress[moduleType] || 0) + 1;
                saveProgress();
                showToast('Lesson completed! 🎉', 'success');
                renderApp();
            }
        }

        // Auth
        function login(email, password) {
            if (email && password) {
                currentUser = { email, name: email.split('@')[0] };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast(`Welcome back, ${currentUser.name}!`, 'success');
                renderApp();
                return true;
            }
            showToast('Please enter email and password', 'error');
            return false;
        }

        function signUp(name, email, password) {
            if (name && email && password && password.length >= 6) {
                currentUser = { email, name };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast('Account created successfully!', 'success');
                renderApp();
                return true;
            }
            showToast('Please fill all fields correctly', 'error');
            return false;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showToast('Logged out', 'info');
            renderApp();
        }

        function checkSession() {
            const stored = localStorage.getItem('currentUser');
            if (stored) {
                currentUser = JSON.parse(stored);
            }
        }

        // UI Functions
        function setView(view) {
            currentView = view;
            currentModule = null;
            currentLesson = null;
            renderApp();
        }

        function viewModule(moduleType) {
            currentModule = moduleType;
            const lessons = LESSONS[moduleType] || [];
            if (lessons.length > 0) {
                currentLesson = lessons[0];
            }
            currentView = 'course';
            renderApp();
        }

        function selectLesson(lesson) {
            currentLesson = lesson;
            renderApp();
        }

        function openQuiz(moduleType, lessonNum) {
            const quizKey = `${moduleType}_${lessonNum}`;
            const quiz = QUIZZES[quizKey] || QUIZZES.learner_1;
            let currentQuestion = 0;
            let answers = [];
            let score = 0;

            function renderQuestion() {
                const q = quiz[currentQuestion];
                const modalContent = document.getElementById('quizModalContent');
                modalContent.innerHTML = `
                    <div class="quiz-question">
                        <h3>Question ${currentQuestion + 1} of ${quiz.length}</h3>
                        <p style="margin: 16px 0;">${q.question}</p>
                        <div class="quiz-options">
                            ${q.options.map((opt, idx) => `
                                <div class="quiz-option" onclick="selectQuizOption(this, ${idx})">${String.fromCharCode(65 + idx)}. ${opt}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-primary" onclick="nextQuestion()">Next →</button>
                    </div>
                `;
            }

            window.selectQuizOption = (el, idx) => {
                document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
                answers[currentQuestion] = idx;
            };

            window.nextQuestion = () => {
                if (answers[currentQuestion] === undefined) {
                    showToast('Please select an answer', 'warning');
                    return;
                }
                if (currentQuestion + 1 < quiz.length) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    // Calculate score
                    let correct = 0;
                    quiz.forEach((q, idx) => {
                        if (answers[idx] === q.correct) correct++;
                    });
                    score = Math.round((correct / quiz.length) * 100);
                    const passed = score >= 70;
                    if (passed) {
                        markLessonComplete(currentModule, currentLesson.number);
                    }
                    const modalContent = document.getElementById('quizModalContent');
                    modalContent.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 4rem;">${passed ? '🎉' : '📚'}</div>
                            <h3>Quiz Complete!</h3>
                            <p style="font-size: 2rem; margin: 16px 0;">${score}%</p>
                            <p>${passed ? 'Congratulations! You passed the quiz.' : 'Keep practicing! You need 70% to pass.'}</p>
                            <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeModal(); renderApp();">Close</button>
                        </div>
                    `;
                }
            };

            const modalContent = document.getElementById('quizModalContent');
            modalContent.innerHTML = '<div class="spinner"></div>';
            renderQuestion();
            document.getElementById('quizModal').classList.add('active');
        }

        window.closeModal = () => {
            document.getElementById('quizModal').classList.remove('active');
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        // Render Functions
        function renderAuth() {
            return `
                <div class="hero">
                    <div style="font-size: 4rem;">🚗</div>
                    <h1 style="font-size: 2.5rem; margin: 20px 0;">MEI DRIVE AFRICA</h1>
                    <p style="color: var(--text-muted); max-width: 500px; margin: 0 auto 30px;">Kenya's #1 NTSA-certified driver training platform</p>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="showLoginModal()">🔑 Login</button>
                        <button class="btn btn-outline" onclick="showSignupModal()">📝 Sign Up</button>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>6</h3><p>Modules</p></div><div class="stat-icon">📚</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>63+</h3><p>Lessons</p></div><div class="stat-icon">🎥</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>500+</h3><p>Questions</p></div><div class="stat-icon">📝</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>NTSA</h3><p>Certified</p></div><div class="stat-icon">✅</div></div>
                </div>
            `;
        }

        function renderDashboard() {
            const totalLessons = MODULES.reduce((sum, m) => sum + (LESSONS[m.type]?.length || m.lessons), 0);
            const completedCount = Object.keys(completedLessons).length;
            const progressPercent = totalLessons ? Math.round((completedCount / totalLessons) * 100) : 0;
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>${MODULES.length}</h3><p>Modules</p></div><div class="stat-icon">📚</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>${completedCount}</h3><p>Lessons Done</p></div><div class="stat-icon">✅</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>${progressPercent}%</h3><p>Progress</p></div><div class="stat-icon">📈</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>0</h3><p>Certificates</p></div><div class="stat-icon">🎓</div></div>
                </div>
                <div class="section-header"><h2>📚 Your Learning Journey</h2><button class="btn btn-outline" onclick="setView('modules')">View All →</button></div>
                <div class="modules-grid">
                    ${MODULES.map(module => {
                        const moduleLessons = LESSONS[module.type]?.length || module.lessons;
                        const completedInModule = Object.keys(completedLessons).filter(k => k.startsWith(module.type)).length;
                        const moduleProgress = moduleLessons ? Math.round((completedInModule / moduleLessons) * 100) : 0;
                        return `
                            <div class="module-card" onclick="viewModule('${module.type}')">
                                <div class="module-cover" style="background:linear-gradient(135deg, ${module.color}20, #0a0a0a)">
                                    <div style="font-size: 3rem;">${module.icon}</div>
                                    <div class="module-badge">${module.is_free ? 'FREE' : 'PREMIUM'}</div>
                                </div>
                                <div class="module-content">
                                    <h3 class="module-title">${module.name}</h3>
                                    <p class="module-description">${module.description}</p>
                                    <div class="module-stats">
                                        <span><i class="fas fa-video"></i> ${moduleLessons} lessons</span>
                                        <span><i class="fas fa-clock"></i> ${module.hours} hours</span>
                                    </div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${moduleProgress}%"></div></div>
                                    <div class="module-footer">
                                        <button class="btn btn-primary">Continue →</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderModules() {
            return `
                <div class="section-header"><h2>📚 All Training Modules</h2></div>
                <div class="modules-grid">
                    ${MODULES.map(module => {
                        const moduleLessons = LESSONS[module.type]?.length || module.lessons;
                        const completedInModule = Object.keys(completedLessons).filter(k => k.startsWith(module.type)).length;
                        const moduleProgress = moduleLessons ? Math.round((completedInModule / moduleLessons) * 100) : 0;
                        return `
                            <div class="module-card" onclick="viewModule('${module.type}')">
                                <div class="module-cover" style="background:linear-gradient(135deg, ${module.color}20, #0a0a0a)">
                                    <div style="font-size: 3rem;">${module.icon}</div>
                                    <div class="module-badge">${module.is_free ? 'FREE' : 'PREMIUM'}</div>
                                </div>
                                <div class="module-content">
                                    <h3 class="module-title">${module.name}</h3>
                                    <p class="module-description">${module.description}</p>
                                    <div class="module-stats">
                                        <span><i class="fas fa-video"></i> ${moduleLessons} lessons</span>
                                        <span><i class="fas fa-question-circle"></i> ${module.quizzes} quizzes</span>
                                        <span><i class="fas fa-clock"></i> ${module.hours} hours</span>
                                    </div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${moduleProgress}%"></div></div>
                                    <div class="module-footer">
                                        <button class="btn btn-primary">Start Learning →</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderCourse() {
            const module = MODULES.find(m => m.type === currentModule);
            const lessons = LESSONS[currentModule] || [];
            const isCompleted = currentLesson && completedLessons[`${currentModule}_${currentLesson.number}`];
            const currentIndex = lessons.findIndex(l => l.number === currentLesson?.number);
            const prevLesson = currentIndex > 0 ? lessons[currentIndex - 1] : null;
            const nextLesson = currentIndex < lessons.length - 1 ? lessons[currentIndex + 1] : null;

            return `
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-outline" onclick="setView('modules')">← Back to Modules</button>
                </div>
                <div class="course-layout">
                    <div class="course-main">
                        <div class="video-container">
                            <video src="${currentLesson?.video || ''}" controls poster=""></video>
                        </div>
                        <div class="lesson-content">
                            <h2>${currentLesson?.title || ''}</h2>
                            <div style="margin: 16px 0;">
                                <h3>📖 Learning Objectives</h3>
                                <ul style="margin-left: 20px; margin-top: 8px;">
                                    ${(currentLesson?.objectives || []).map(obj => `<li>${obj}</li>`).join('')}
                                </ul>
                            </div>
                            <div style="background: var(--card); border-radius: 16px; padding: 20px; margin: 20px 0;">
                                <h3>📝 Key Takeaways</h3>
                                <p>This lesson covers essential knowledge for your NTSA driving test. Review the material and complete the quiz to test your understanding.</p>
                            </div>
                        </div>
                        <div class="lesson-nav">
                            ${prevLesson ? `<button class="btn btn-outline" onclick="selectLesson(${JSON.stringify(prevLesson).replace(/"/g, '&quot;')})">← Previous Lesson</button>` : '<div></div>'}
                            ${!isCompleted ? `<button class="btn btn-primary" onclick="openQuiz('${currentModule}', ${currentLesson?.number})">📝 Take Quiz →</button>` : `<button class="btn" style="background: var(--success); color: #000;">✅ Completed</button>`}
                            ${nextLesson ? `<button class="btn btn-primary" onclick="selectLesson(${JSON.stringify(nextLesson).replace(/"/g, '&quot;')})">Next Lesson →</button>` : '<div></div>'}
                        </div>
                    </div>
                    <div class="course-sidebar">
                        <h3 style="margin-bottom: 16px;">Course Content: ${module?.name}</h3>
                        <div class="progress-bar" style="margin-bottom: 16px;">
                            <div class="progress-fill" style="width: ${(Object.keys(completedLessons).filter(k => k.startsWith(currentModule)).length / lessons.length * 100)}%"></div>
                        </div>
                        <div class="lesson-list">
                            ${lessons.map(lesson => {
                                const completed = completedLessons[`${currentModule}_${lesson.number}`];
                                const isActive = currentLesson?.number === lesson.number;
                                return `
                                    <div class="lesson-item ${isActive ? 'active' : ''} ${completed ? 'completed' : ''}" onclick="selectLesson(${JSON.stringify(lesson).replace(/"/g, '&quot;')})">
                                        <div class="lesson-status">${completed ? '✅' : (isActive ? '▶️' : '📘')}</div>
                                        <div><strong>Lesson ${lesson.number}</strong><br><small>${lesson.title}</small></div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProgress() {
            const totalLessons = MODULES.reduce((sum, m) => sum + (LESSONS[m.type]?.length || m.lessons), 0);
            const completedCount = Object.keys(completedLessons).length;
            const overallProgress = totalLessons ? Math.round((completedCount / totalLessons) * 100) : 0;
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-info"><h3>${completedCount}/${totalLessons}</h3><p>Lessons Completed</p></div><div class="stat-icon">✅</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>0/${MODULES.reduce((s, m) => s + m.quizzes, 0)}</h3><p>Quizzes Passed</p></div><div class="stat-icon">📝</div></div>
                    <div class="stat-card"><div class="stat-info"><h3>${overallProgress}%</h3><p>Overall Progress</p></div><div class="stat-icon">📈</div></div>
                </div>
                <div class="section-header"><h2>📋 Module Progress</h2></div>
                ${MODULES.map(module => {
                    const moduleLessons = LESSONS[module.type]?.length || module.lessons;
                    const completedInModule = Object.keys(completedLessons).filter(k => k.startsWith(module.type)).length;
                    const moduleProgress = moduleLessons ? Math.round((completedInModule / moduleLessons) * 100) : 0;
                    return `
                        <div class="stat-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <span style="font-size: 2rem;">${module.icon}</span>
                                <div><strong>${module.name}</strong><p style="color: var(--text-muted); font-size: 0.8rem;">${moduleLessons} lessons</p></div>
                            </div>
                            <div style="flex: 1; max-width: 300px; margin: 0 16px;">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${moduleProgress}%"></div></div>
                            </div>
                            <span>${moduleProgress}%</span>
                            <button class="btn btn-outline" onclick="viewModule('${module.type}')">Resume</button>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function renderExams() {
            return `
                <div class="section-header"><h2>📝 NTSA Final Exams</h2></div>
                <div class="modules-grid">
                    ${MODULES.filter(m => m.exams > 0).map(module => {
                        const completedInModule = Object.keys(completedLessons).filter(k => k.startsWith(module.type)).length;
                        const moduleLessons = LESSONS[module.type]?.length || module.lessons;
                        const isReady = completedInModule === moduleLessons;
                        return `
                            <div class="module-card">
                                <div class="module-cover" style="background:linear-gradient(135deg, ${module.color}20, #0a0a0a)">
                                    <div style="font-size: 3rem;">${module.icon}</div>
                                </div>
                                <div class="module-content">
                                    <h3>${module.name} Final Exam</h3>
                                    <p>Certification exam for ${module.name}</p>
                                    <div class="module-stats">
                                        <span><i class="fas fa-question"></i> 50 questions</span>
                                        <span><i class="fas fa-clock"></i> 90 minutes</span>
                                        <span><i class="fas fa-graduation-cap"></i> Pass: 80%</span>
                                    </div>
                                    ${isReady ? 
                                        `<button class="btn btn-primary" onclick="showToast('Exam starting soon!', 'info')">Start Exam →</button>` :
                                        `<button class="btn btn-outline" disabled style="opacity:0.5;">Complete all lessons first</button>`
                                    }
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLibrary() {
            const resources = [
                { icon: '📘', title: 'Kenya Highway Code', desc: 'Official NTSA Highway Code - Complete PDF' },
                { icon: '📝', title: 'NTSA Driving Test Guide', desc: 'Complete test preparation with sample questions' },
                { icon: '🚌', title: 'PSV Regulations Handbook', desc: 'Complete PSV rules and regulations' },
                { icon: '⚡', title: 'EV Driver Handbook', desc: 'Electric vehicle operation guide' },
                { icon: '🏍️', title: 'Boda Safety Manual', desc: 'Complete motorcycle safety guide' },
                { icon: '🚑', title: 'First Aid for Drivers', desc: 'Emergency response procedures' }
            ];
            return `
                <div class="section-header"><h2>📖 Resource Library</h2></div>
                <div class="modules-grid">
                    ${resources.map(r => `
                        <div class="module-card">
                            <div class="module-cover"><div style="font-size: 3rem;">${r.icon}</div></div>
                            <div class="module-content">
                                <h3>${r.title}</h3>
                                <p>${r.desc}</p>
                                <button class="btn btn-outline" onclick="showToast('Download started: ${r.title}', 'success')">Download →</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderApp() {
            const app = document.getElementById('app');
            
            if (!currentUser) {
                app.innerHTML = `
                    <div class="main-content" style="margin-left: 0; max-width: 1200px; margin: 0 auto;">
                        ${renderAuth()}
                    </div>
                    <div class="modal" id="loginModal"><div class="modal-content" id="loginModalContent"></div></div>
                    <div class="modal" id="signupModal"><div class="modal-content" id="signupModalContent"></div></div>
                `;
                return;
            }

            const views = {
                dashboard: renderDashboard(),
                modules: renderModules(),
                progress: renderProgress(),
                exams: renderExams(),
                library: renderLibrary()
            };

            const content = currentView === 'course' ? renderCourse() : (views[currentView] || views.dashboard);

            app.innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header"><div class="logo"><span>🚗</span> MEI DRIVE AFRICA</div></div>
                    <div class="user-info">
                        <div class="user-avatar">👤</div>
                        <div class="user-details">
                            <h4>${escapeHtml(currentUser.name)}</h4>
                            <p>${escapeHtml(currentUser.email)}</p>
                        </div>
                    </div>
                    <div class="nav-menu">
                        <div class="nav-item ${currentView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                        <div class="nav-item ${currentView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> My Modules</div>
                        <div class="nav-item ${currentView === 'progress' ? 'active' : ''}" onclick="setView('progress')"><i class="fas fa-chart-simple"></i> Progress</div>
                        <div class="nav-item ${currentView === 'exams' ? 'active' : ''}" onclick="setView('exams')"><i class="fas fa-file-alt"></i> Exams</div>
                        <div class="nav-item ${currentView === 'library' ? 'active' : ''}" onclick="setView('library')"><i class="fas fa-book-open"></i> Library</div>
                        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
                <div class="main-content">
                    <div class="top-bar">
                        <div class="page-title">
                            <h1>${currentView === 'dashboard' ? 'Dashboard' : currentView === 'modules' ? 'My Modules' : currentView === 'progress' ? 'My Progress' : currentView === 'exams' ? 'Final Exams' : 'Resource Library'}</h1>
                            <p>Welcome back, ${escapeHtml(currentUser.name)}</p>
                        </div>
                    </div>
                    ${content}
                </div>
                <div class="modal" id="quizModal"><div class="modal-content" id="quizModalContent" style="max-width: 600px;"></div></div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c] || c));
        }

        // Modal Functions
        window.showLoginModal = () => {
            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginModalContent');
            content.innerHTML = `
                <h3>🔐 Login</h3>
                <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; margin: 16px 0;">
                <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; margin: 16px 0;">
                <button class="btn btn-primary" style="width: 100%;" onclick="doLogin()">Login</button>
                <hr style="margin: 16px 0;">
                <p style="text-align: center;">New user? <a href="#" onclick="showSignupModal(); return false;">Sign Up</a></p>
            `;
            modal.classList.add('active');
        };

        window.showSignupModal = () => {
            const modal = document.getElementById('signupModal');
            const content = document.getElementById('signupModalContent');
            content.innerHTML = `
                <h3>📝 Sign Up</h3>
                <input type="text" id="signupName" placeholder="Full Name" style="width: 100%; margin: 16px 0;">
                <input type="email" id="signupEmail" placeholder="Email" style="width: 100%; margin: 16px 0;">
                <input type="password" id="signupPassword" placeholder="Password (min 6)" style="width: 100%; margin: 16px 0;">
                <button class="btn btn-primary" style="width: 100%;" onclick="doSignup()">Sign Up</button>
                <hr style="margin: 16px 0;">
                <p style="text-align: center;">Already have an account? <a href="#" onclick="showLoginModal(); return false;">Login</a></p>
            `;
            modal.classList.add('active');
        };

        window.doLogin = () => {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            if (login(email, password)) {
                document.getElementById('loginModal').classList.remove('active');
            }
        };

        window.doSignup = () => {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            if (signUp(name, email, password)) {
                document.getElementById('signupModal').classList.remove('active');
            }
        };

        // Expose functions globally
        window.setView = setView;
        window.viewModule = viewModule;
        window.selectLesson = selectLesson;
        window.openQuiz = openQuiz;
        window.logout = logout;
        window.showToast = showToast;
        window.toggleSidebar = toggleSidebar;
        window.closeModal = closeModal;

        // Initialize
        checkSession();
        renderApp();
    </script>
</body>
</html>
