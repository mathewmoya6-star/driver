<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MEI DRIVE AFRICA | Premier Driver Safety Platform</title>
    <meta name="description" content="Kenya's NTSA-certified digital driving academy - Complete driver training, PSV, Boda, EV professional courses">
    <meta name="theme-color" content="#00d084">
    <meta name="author" content="MEI DRIVE AFRICA">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="MEI DRIVE AFRICA - Driver Safety Platform">
    <meta property="og:description" content="NTSA-certified driving courses, practice tests, and professional certification">
    <meta property="og:type" content="website">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ============================================
           RESET & BASE VARIABLES
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B0F19;
            color: #E8EDF5;
            line-height: 1.5;
            overflow-x: hidden;
        }

        :root {
            --accent: #00d084;
            --accent-dark: #00a86b;
            --accent-light: #4ade80;
            --accent-glow: rgba(0, 208, 132, 0.2);
            --bg-primary: #0B0F19;
            --bg-secondary: #0F1622;
            --bg-card: #121B2C;
            --bg-hover: #1A2538;
            --border: #1E2A3E;
            --border-light: #2A3A50;
            --text-primary: #FFFFFF;
            --text-secondary: #A0B3D9;
            --text-muted: #6B7FA3;
            --error: #EF4444;
            --warning: #F59E0B;
            --success: #00d084;
            --info: #3B82F6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(0, 208, 132, 0.15);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Selection */
        ::selection { background: var(--accent); color: #0B0F19; }

        /* ============================================
           TYPOGRAPHY
        ============================================ */
        h1, h2, h3, h4, h5, h6 { font-weight: 700; line-height: 1.2; }
        h1 { font-size: clamp(1.8rem, 5vw, 3.5rem); }
        h2 { font-size: clamp(1.3rem, 4vw, 2rem); }
        h3 { font-size: 1.2rem; }
        
        a { text-decoration: none; color: inherit; }
        
        /* ============================================
           LAYOUT COMPONENTS
        ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation - Touch Optimized */
        .navbar {
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 208, 132, 0.2);
            padding: 12px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            letter-spacing: -0.5px;
            padding: 8px 0;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .logo span { color: var(--text-primary); background: none; }

        .nav-links {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition);
            min-height: 44px;
            min-width: 44px;
        }

        .nav-links button:active {
            transform: scale(0.96);
        }

        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            padding: 12px;
            min-height: 48px;
            min-width: 48px;
        }

        /* Hero Section - Touch Optimized */
        .hero {
            background: linear-gradient(135deg, #071120 0%, #0A1628 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(0, 208, 132, 0.08), transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FFFFFF, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
            font-size: 1rem;
            line-height: 1.6;
        }

        .hero-btns {
            margin-top: 28px;
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Buttons - Touch Optimized */
        .btn-primary, .btn-secondary, .btn-outline {
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            min-height: 52px;
        }

        .btn-primary:active, .btn-secondary:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #0B0F19;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 10px 18px;
            font-size: 0.85rem;
            min-height: 44px;
        }

        /* Section Styles */
        .section-title {
            font-size: 1.6rem;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent);
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        /* Course Grid - Touch Cards */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-img {
            width: 100%;
            height: 170px;
            background: linear-gradient(135deg, #0f1a2c, #0a1020);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .card-content {
            padding: 20px;
        }

        .card h3 {
            margin-bottom: 10px;
            color: var(--accent);
            font-size: 1.15rem;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .badge-accent {
            background: var(--accent);
            color: #0B0F19;
        }

        /* Quiz Panel - No Timer */
        .quiz-panel {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            margin: 32px 0;
            border: 1px solid var(--border);
        }

        .question-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: var(--bg-card);
            padding: 14px 18px;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: var(--transition);
            font-size: 0.9rem;
            min-height: 52px;
        }

        .option:active {
            transform: scale(0.98);
            background: var(--bg-hover);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 28px;
            padding: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: var(--accent);
            padding: 8px;
            min-width: 44px;
            text-align: center;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 40px;
            font-size: 0.8rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--bg-card);
            border-left: 3px solid var(--accent);
            padding: 14px 18px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-md);
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive Design - Touch First */
        @media (max-width: 1024px) {
            .container { padding: 0 16px; }
            .hero { padding: 50px 16px; }
            .course-grid { gap: 18px; }
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                margin-top: 12px;
                gap: 6px;
            }
            .nav-links.show { display: flex; }
            .nav-links button { 
                width: 100%; 
                text-align: center; 
                padding: 14px;
                font-size: 1rem;
            }
            .hero { padding: 40px 16px; }
            .hero p { font-size: 0.95rem; }
            .hero-btns { flex-direction: column; align-items: center; gap: 12px; }
            .hero-btns button { width: 100%; max-width: 280px; justify-content: center; }
            .section-title { font-size: 1.3rem; margin-bottom: 20px; }
            .course-grid { grid-template-columns: 1fr; gap: 16px; }
            .quiz-panel { padding: 18px; }
            .question-card { padding: 18px; }
            .btn-primary, .btn-secondary { padding: 12px 20px; font-size: 0.9rem; min-height: 48px; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 12px; }
            .card-content { padding: 16px; }
            .card-img { height: 140px; font-size: 3rem; }
            .modal-content { padding: 20px; }
            .option { padding: 12px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="scrollToSection('home')">MEI <span>DRIVE AFRICA</span></div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <button onclick="scrollToSection('courses')">📚 Learning Programme</button>
            <button onclick="scrollToSection('quiz-section')">📝 Quiz</button>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero" id="home">
    <h1>MEI DRIVE AFRICA</h1>
    <p>Drive Smart. Stay Safe. Arrive Home. Keep Our Roads Safe.</p>
    <div class="hero-btns">
        <button class="btn-primary" onclick="scrollToSection('courses')"><i class="fas fa-graduation-cap"></i> Explore Courses</button>
        <button class="btn-secondary" onclick="scrollToSection('quiz-section')"><i class="fas fa-question-circle"></i> Practice Quiz</button>
    </div>
</section>

<!-- Main Container -->
<div class="container">
    <!-- Learning Programme Section -->
    <div id="courses">
        <div class="section-title">
            <i class="fas fa-book-open"></i>
            <h2>Learning Programme</h2>
        </div>
        <div class="course-grid" id="courseGrid"></div>
    </div>

    <!-- Quiz Section (No Timer) -->
    <div id="quiz-section">
        <div class="quiz-panel">
            <div id="quizContainer"></div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Meidriveafrica • All Rights Reserved</p>
    <p style="margin-top: 6px; font-size: 0.7rem;">NTSA-Certified Digital Driving Academy</p>
</footer>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Lesson Modal -->
<div id="lessonModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeLessonModal()">✕</span>
        <div id="lessonContent"></div>
    </div>
</div>

<script>
    // ============================================
    // COURSES DATA
    // ============================================
    const coursesData = [
        { id: 1, title: "Digital Safety Library", description: "Complete NTSA manuals, road safety guides, emergency response protocols, first aid procedures, and defensive driving handbooks.", icon: "📚", content: "<h2>Digital Safety Library</h2><p>Access comprehensive safety manuals including: Kenya Highway Code, Defensive Driving Handbook, First Aid Guide, Emergency Response Protocols, Vehicle Inspection Checklists, and NTSA Regulations.</p><ul><li>Kenya Highway Code (Official)</li><li>Defensive Driving Techniques</li><li>First Aid & CPR Guide</li><li>Emergency Response Procedures</li><li>Vehicle Safety Checklists</li></ul>" },
        { id: 2, title: "NTSA Quiz Bank", description: "1000+ real NTSA-style questions, CBT mock exams, timed tests with instant scoring and detailed explanations.", icon: "📝", content: "<h2>NTSA Practice Questions</h2><p>Complete question bank covering all exam topics with detailed explanations for each answer.</p><ul><li>Road Signs & Markings</li><li>Highway Code Rules</li><li>Vehicle Controls</li><li>Defensive Driving</li><li>PSV Operations</li><li>Boda Safety</li><li>EV Technology</li></ul>" },
        { id: 3, title: "Learner Driver Hub", description: "Complete 21-unit NTSA syllabus covering road signs, vehicle controls, roundabouts, defensive driving, and emergency procedures.", icon: "🚗", content: "<h2>Learner Driver Hub - 21 Complete Units</h2><p><strong>Units 1-21:</strong> Complete NTSA driving syllabus including Introduction, Highway Code, Vehicle Controls, Maintenance, Moving Off, Turning, Roundabouts, Overtaking, Speed Limits, Defensive Driving, Night Driving, Weather, Alcohol & Drugs, Fatigue, Pedestrian Safety, Emergencies, First Aid, Insurance, Eco Driving, Test Prep, and Advanced Skills.</p>" },
        { id: 4, title: "PSV Professional Academy", description: "Professional matatu, bus, and PSV driver training focusing on discipline, passenger safety, and NTSA compliance.", icon: "🚌", content: "<h2>PSV Professional Academy</h2><p>Complete training for public service vehicle operators.</p><ul><li>PSV Licensing & Compliance</li><li>Professional Driver Conduct</li><li>Passenger Management & Safety</li><li>Defensive PSV Driving</li><li>Route Management</li><li>Vehicle Care & Daily Inspection</li><li>Emergency Response</li></ul>" },
        { id: 5, title: "Boda Boda Safety Course", description: "Motorcycle safety training covering protective gear, defensive riding techniques, passenger handling, and professional rider discipline.", icon: "🏍️", content: "<h2>Boda Boda Safety Course</h2><p>Comprehensive training for motorcycle riders.</p><ul><li>Motorcycle Controls & Operation</li><li>Protective Gear & Safety Equipment</li><li>Professionalism & Customer Service</li><li>Drug & Alcohol Prevention</li><li>Night Riding Techniques</li><li>Defensive Riding Mastery</li><li>Motorcycle Maintenance</li></ul>" },
        { id: 6, title: "Electric Vehicle Training", description: "Modern EV driving techniques, regenerative braking systems, battery management, charging infrastructure, and safety protocols.", icon: "🔋", content: "<h2>Electric Vehicle Training</h2><p>Complete education for electric vehicle operation.</p><ul><li>Introduction to EV Technology</li><li>Battery Systems & Management</li><li>Regenerative Braking</li><li>Charging Infrastructure</li><li>EV Safety & Fire Prevention</li><li>Eco-Driving & Energy Efficiency</li><li>EV Laws & Compliance in Kenya</li></ul>" }
    ];

    // Question Bank
    const questionBank = [
        { id: 1, text: "What is the maximum speed limit for a PSV vehicle in Kenya?", options: ["100 km/h", "80 km/h", "110 km/h", "50 km/h"], correct: 1, explanation: "PSV vehicles are legally limited to 80 km/h for passenger safety." },
        { id: 2, text: "What does the 'STOP' sign require drivers to do?", options: ["Slow down and proceed", "Come to a complete halt", "Give way to right", "Sound horn"], correct: 1, explanation: "A STOP sign requires a complete halt at the designated line." },
        { id: 3, text: "What is the legal blood alcohol limit for commercial drivers in Kenya?", options: ["0.05%", "0.08%", "0.00%", "0.10%"], correct: 2, explanation: "Commercial drivers must maintain 0.00% blood alcohol concentration." },
        { id: 4, text: "What does the 2-second rule help maintain?", options: ["Fuel economy", "Safe following distance", "Engine temperature", "Tyre pressure"], correct: 1, explanation: "The 2-second rule ensures adequate stopping distance." },
        { id: 5, text: "When driving in heavy rain, you should:", options: ["Use high beams", "Increase speed", "Reduce speed", "Brake suddenly"], correct: 2, explanation: "Reduce speed to prevent hydroplaning and maintain control." }
    ];

    // ============================================
    // APP STATE
    // ============================================
    let currentQuiz = { questions: [], currentIndex: 0, score: 0 };

    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    function renderCourseGrid() {
        const grid = document.getElementById('courseGrid');
        if (!grid) return;
        grid.innerHTML = coursesData.map(course => `
            <div class="card" onclick="viewLesson(${course.id})">
                <div class="card-img">${course.icon}</div>
                <div class="card-content">
                    <span class="badge badge-accent">NTSA Certified</span>
                    <h3>${course.title}</h3>
                    <p>${course.description.substring(0, 100)}${course.description.length > 100 ? '...' : ''}</p>
                    <button class="btn-outline" style="width:100%;">Start Learning →</button>
                </div>
            </div>
        `).join('');
    }

    function viewLesson(courseId) {
        const course = coursesData.find(c => c.id === courseId);
        if (course) {
            document.getElementById('lessonContent').innerHTML = course.content;
            document.getElementById('lessonModal').style.display = 'flex';
        }
    }

    function closeLessonModal() {
        document.getElementById('lessonModal').style.display = 'none';
    }

    // ============================================
    // QUIZ SYSTEM (No Timer)
    // ============================================
    function initQuiz() {
        currentQuiz.questions = [...questionBank];
        currentQuiz.currentIndex = 0;
        currentQuiz.score = 0;
        renderQuizQuestion();
    }

    function renderQuizQuestion() {
        if (currentQuiz.currentIndex >= currentQuiz.questions.length) {
            const percent = Math.round((currentQuiz.score / currentQuiz.questions.length) * 100);
            document.getElementById('quizContainer').innerHTML = `
                <div class="question-card" style="text-align:center;">
                    <h3>🎉 Quiz Complete!</h3>
                    <p style="font-size:1.2rem; margin:20px 0;">Your score: ${currentQuiz.score}/${currentQuiz.questions.length} (${percent}%)</p>
                    <button class="btn-primary" onclick="initQuiz()">Restart Quiz</button>
                </div>
            `;
            if (percent >= 80) showToast("Excellent! Great job!", "success");
            return;
        }

        const q = currentQuiz.questions[currentQuiz.currentIndex];
        document.getElementById('quizContainer').innerHTML = `
            <div class="question-card">
                <h3 style="margin-bottom:8px;">Question ${currentQuiz.currentIndex + 1}/${currentQuiz.questions.length}</h3>
                <div class="question-text">${q.text}</div>
                <div class="options-group">
                    ${q.options.map((opt, idx) => `
                        <div class="option" onclick="answerQuestion(${idx})">
                            ${String.fromCharCode(65 + idx)}. ${opt}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    window.answerQuestion = function(selected) {
        const q = currentQuiz.questions[currentQuiz.currentIndex];
        if (selected === q.correct) {
            currentQuiz.score++;
            showToast(`✅ Correct! ${q.explanation}`, "success");
        } else {
            showToast(`❌ Wrong. ${q.explanation}`, "error");
        }
        currentQuiz.currentIndex++;
        renderQuizQuestion();
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    function scrollToSection(id) {
        const element = document.getElementById(id);
        if (element) element.scrollIntoView({ behavior: 'smooth' });
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        toast.innerHTML = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Mobile Menu Toggle
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    
    if (mobileBtn) {
        mobileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navLinks?.classList.toggle('show');
        });
    }

    // Close mobile menu when clicking outside
    document.addEventListener('click', (e) => {
        if (navLinks?.classList.contains('show') && 
            !navLinks.contains(e.target) && 
            mobileBtn && !mobileBtn.contains(e.target)) {
            navLinks.classList.remove('show');
        }
    });

    // Close mobile menu when clicking a link
    document.querySelectorAll('#navLinks button').forEach(btn => {
        btn.addEventListener('click', () => {
            navLinks?.classList.remove('show');
        });
    });

    // Expose global functions
    window.viewLesson = viewLesson;
