    <script type="module">
        // ============================================
        // PRODUCTION-READY SINGLE FILE APPLICATION
        // All features in one file - compatible with Render/Vercel
        // ============================================
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
        import DOMPurify from 'https://cdn.jsdelivr.net/npm/dompurify@3.0.6/+esm';
        
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            SUPABASE_URL: window.__ENV__.SUPABASE_URL,
            SUPABASE_ANON_KEY: window.__ENV__.SUPABASE_ANON_KEY,
            APP_URL: window.__ENV__.APP_URL,
            APP_NAME: window.__ENV__.APP_NAME,
            ITEMS_PER_PAGE: 12,
            API_TIMEOUT: 30000,
            MAX_RETRIES: 3,
            CACHE_TTL: 5 * 60 * 1000
        };
        
        // ============================================
        // SANITIZATION (XSS Protection)
        // ============================================
        const ALLOWED_DOMAINS = [
            'youtube.com', 'youtu.be', 'vimeo.com',
            'images.unsplash.com', 'supabase.co',
            'fktjmkmzlixlapeyhhyl.supabase.co'
        ];
        
        function sanitizeText(text) {
            if (!text) return '';
            if (typeof text !== 'string') text = String(text);
            return text.replace(/[&<>]/g, (char) => {
                if (char === '&') return '&amp;';
                if (char === '<') return '&lt;';
                if (char === '>') return '&gt;';
                return char;
            });
        }
        
        function sanitizeHtml(html) {
            if (!html) return '';
            if (typeof html !== 'string') html = String(html);
            return DOMPurify.sanitize(html, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'div', 'span', 'a', 'img', 'iframe'],
                ALLOWED_ATTR: ['href', 'src', 'alt', 'title', 'class', 'allow', 'allowfullscreen', 'frameborder'],
                FORBID_TAGS: ['script', 'style', 'form', 'input', 'button']
            });
        }
        
        function validateUrl(url, type = 'image') {
            if (!url) return null;
            try {
                const urlObj = new URL(url);
                const isAllowed = ALLOWED_DOMAINS.some(d => urlObj.hostname === d || urlObj.hostname.endsWith(`.${d}`));
                if (!isAllowed) return null;
                
                if (type === 'youtube') {
                    const videoId = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?/]+)/)?.[1];
                    if (videoId) return `https://www.youtube.com/embed/${videoId}`;
                    return null;
                }
                return url;
            } catch { return null; }
        }
        
        // ============================================
        // SUPABASE CLIENT
        // ============================================
        let supabaseClient = null;
        function getSupabase() {
            if (!supabaseClient) {
                supabaseClient = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            }
            return supabaseClient;
        }
        
        // ============================================
        // CACHE SYSTEM
        // ============================================
        const cache = new Map();
        
        function getCached(key) {
            const cached = cache.get(key);
            if (cached && Date.now() - cached.timestamp < CONFIG.CACHE_TTL) {
                return cached.data;
            }
            return null;
        }
        
        function setCached(key, data) {
            cache.set(key, { data, timestamp: Date.now() });
        }
        
        // ============================================
        // API WITH RETRY LOGIC
        // ============================================
        async function fetchWithRetry(fn, retries = CONFIG.MAX_RETRIES) {
            let lastError;
            for (let i = 0; i < retries; i++) {
                try {
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Request timeout')), CONFIG.API_TIMEOUT)
                    );
                    return await Promise.race([fn(), timeoutPromise]);
                } catch (error) {
                    lastError = error;
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                    }
                }
            }
            throw lastError;
        }
        
        async function fetchMaterials(moduleType, page = 1) {
            const cacheKey = `materials_${moduleType}_${page}`;
            const cached = getCached(cacheKey);
            if (cached) return cached;
            
            const supabase = getSupabase();
            const start = (page - 1) * CONFIG.ITEMS_PER_PAGE;
            
            const result = await fetchWithRetry(async () => {
                return await supabase
                    .from('materials')
                    .select('*')
                    .eq('module_type', moduleType)
                    .eq('status', 'published')
                    .order('unit_number', { ascending: true })
                    .range(start, start + CONFIG.ITEMS_PER_PAGE - 1);
            });
            
            if (result.error) throw result.error;
            const data = result.data || [];
            setCached(cacheKey, data);
            return data;
        }
        
        async function fetchMaterialById(id) {
            const supabase = getSupabase();
            const result = await fetchWithRetry(async () => {
                return await supabase.from('materials').select('*').eq('id', id).single();
            });
            if (result.error) throw result.error;
            return result.data;
        }
        
        async function fetchQuestions(moduleType, limit = 20) {
            const cacheKey = `questions_${moduleType}`;
            const cached = getCached(cacheKey);
            if (cached) return cached;
            
            const supabase = getSupabase();
            const result = await fetchWithRetry(async () => {
                return await supabase
                    .from('questions')
                    .select('*')
                    .eq('module_type', moduleType)
                    .limit(limit);
            });
            
            if (result.error) throw result.error;
            const data = result.data || [];
            setCached(cacheKey, data);
            return data;
        }
        
        // ============================================
        // AUTHENTICATION
        // ============================================
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let sessionInterval = null;
        
        async function refreshSession() {
            const supabase = getSupabase();
            const { data: { session }, error } = await supabase.auth.getSession();
            if (!error && session) {
                const expiresAt = new Date(session.expires_at * 1000);
                if (expiresAt - new Date() < 10 * 60 * 1000) {
                    await supabase.auth.refreshSession();
                }
            }
        }
        
        function startSessionRefresh() {
            if (sessionInterval) clearInterval(sessionInterval);
            sessionInterval = setInterval(refreshSession, 5 * 60 * 1000);
        }
        
        async function login(email, password) {
            const supabase = getSupabase();
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = {
                id: data.user.id,
                email: data.user.email,
                name: data.user.user_metadata?.full_name || email.split('@')[0]
            };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            startSessionRefresh();
            updateAuthUI();
            showToast(`Welcome back, ${currentUser.name}!`, 'success');
            return currentUser;
        }
        
        async function signUp(email, password, name) {
            const supabase = getSupabase();
            const { error } = await supabase.auth.signUp({
                email, password,
                options: { data: { full_name: name } }
            });
            if (error) throw error;
            showToast('Sign up successful! Please verify your email.', 'success');
        }
        
        async function logout() {
            const supabase = getSupabase();
            await supabase.auth.signOut();
            currentUser = null;
            localStorage.removeItem('currentUser');
            if (sessionInterval) clearInterval(sessionInterval);
            updateAuthUI();
            showToast('Logged out successfully', 'info');
            navigateTo('home');
        }
        
        function updateAuthUI() {
            const authDiv = document.getElementById('authButtons');

        // ============================================
        // UI COMPONENTS
        // ============================================
        let toastQueue = [];
        let showingToast = false;
        
        function showToast(message, type = 'info', duration = 3000) {
            toastQueue.push({ message, type, duration });
            processToastQueue();
        }
        
        async function processToastQueue() {
            if (showingToast || toastQueue.length === 0) return;
            showingToast = true;
            const { message, type, duration } = toastQueue.shift();
            const container = document.getElementById('toast-root');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i> ${sanitizeText(message)}`;
            container.appendChild(toast);
            await new Promise(r => setTimeout(r, duration));
            toast.remove();
            showingToast = false;
            processToastQueue();
        }
        
        function showModal(content, onClose) {
            const modalRoot = document.getElementById('modal-root');
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <button class="close-modal" aria-label="Close">&times;</button>
                    <div class="modal-body"></div>
                </div>
            `;
            const body = modal.querySelector('.modal-body');
            body.innerHTML = content;
            modal.querySelector('.close-modal').onclick = () => {
                modal.remove();
                if (onClose) onClose();
            };
            modal.onclick = (e) => { if (e.target === modal) { modal.remove(); if (onClose) onClose(); } };
            modalRoot.appendChild(modal);
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();

        // PAGE RENDERING
        // ============================================

                    <h2><i class="fas fa-question-circle"></i> NTSA Official Test Question Bank</h2>
                    ${questions.map((q, idx) => `
                        <div class="question-card">
                            <div class="question-text"><strong>${idx + 1}.</strong> ${sanitizeText(q.question_text)}</div>
                            <div class="options-group">
                                ${[q.option_a, q.option_b, q.option_c, q.option_d].map((opt, optIdx) => `
                                    <div class="option" onclick="window.checkAnswer(${q.id}, ${optIdx + 1}, 'learner')">
                                        ${String.fromCharCode(65 + optIdx)}. ${sanitizeText(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        async function renderPSV() {
            const materials = await fetchMaterials('psv', 1);
            const questions = await fetchQuestions('psv', 5);
            return `
                <div class="hero"><h1>PSV Professional Course</h1><p>Certified Training for Professional PSV Drivers</p></div>
                <div class="grid">${materials.map(m => renderMaterialCard(m, 'psv')).join('')}</div>
                <div class="question-bank"><h2>PSV Certification Questions</h2>
                    ${questions.map((q, idx) => `
                        <div class="question-card">
                            <div class="question-text"><strong>${idx + 1}.</strong> ${sanitizeText(q.question_text)}</div>
                            <div class="options-group">
                                ${[q.option_a, q.option_b, q.option_c, q.option_d].map((opt, optIdx) => `
                                    <div class="option" onclick="window.checkAnswer(${q.id}, ${optIdx + 1}, 'psv')">
                                        ${String.fromCharCode(65 + optIdx)}. ${sanitizeText(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        async function renderSchoolBus() {
            const materials = await fetchMaterials('schoolbus', 1);
            const questions = await fetchQuestions('schoolbus', 5);
            return `
                <div class="hero"><h1>School Bus Safety Program</h1><p>Specialized Training for Safely Transporting Children</p></div>
                <div class="grid">${materials.map(m => renderMaterialCard(m, 'schoolbus')).join('')}</div>
                <div class="question-bank"><h2>School Transport Safety Questions</h2>
                    ${questions.map((q, idx) => `

                            <div class="options-group">

        async function renderEV() {
            const materials = await fetchMaterials('ev', 1);
            const questions = await fetchQuestions('ev', 5);
            return `
                <div class="hero ev-hero"><h1>⚡ Electric Vehicle (EV) Specialized Training</h1><p>Complete Training for EV Driving, Maintenance & Safety</p></div>
                <div class="grid">${materials.map(m => renderMaterialCard(m, 'ev')).join('')}</div>
                <div class="question-bank"><h2><i class="fas fa-bolt"></i> EV Certification Exam Questions</h2>
                    ${questions.map((q, idx) => `
                        <div class="question-card">
                            <div class="question-text"><strong style="color:#00ff88;">⚡ ${idx + 1}.</strong> ${sanitizeText(q.question_text)}</div>
                            <div class="options-group">
                                ${[q.option_a, q.option_b, q.option_c, q.option_d].map((opt, optIdx) => `
                                    <div class="option" onclick="window.checkAnswer(${q.id}, ${optIdx + 1}, 'ev')">
                                        ${String.fromCharCode(65 + optIdx)}. ${sanitizeText(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        async function renderBoda() {
            const materials = await fetchMaterials('boda', 1);
            const questions = await fetchQuestions('boda', 5);
            return `
                <div class="hero"><h1>Boda Boda Safety Course</h1><p>NTSA-Approved Motorcycle Safety Training</p></div>
                <div class="grid">${materials.map(m => renderMaterialCard(m, 'boda')).join('')}</div>
                <div class="question-bank"><h2>Motorcycle Safety Questions</h2>
                    ${questions.map((q, idx) => `
                        <div class="question-card">
                            <div class="question-text"><strong>${idx + 1}.</strong> ${sanitizeText(q.question_text)}</div>
                            <div class="options-group">
                                ${[q.option_a, q.option_b, q.option_c, q.option_d].map((opt, optIdx) => `
                                    <div class="option" onclick="window.checkAnswer(${q.id}, ${optIdx + 1}, 'boda')">
                                        ${String.fromCharCode(65 + optIdx)}. ${sanitizeText(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderAcademy() {
            const modules = [
                { id: 1, title: 'Fleet Management Fundamentals', desc: 'Managing commercial vehicle fleets', icon: 'fa-truck' },
                { id: 2, title: 'Transport Logistics & Planning', desc: 'Efficient transport operations', icon: 'fa-route' },
                { id: 3, title: 'Driver Recruitment & Training', desc: 'Building a professional driver team', icon: 'fa-users' }
            ];
            return `
                <div class="hero"><h1>Advanced Driver Academy</h1><p>Professional Driver Certification & Fleet Management</p></div>
                <div class="grid">
                    ${modules.map(m => `
                        <div class="card" onclick="window.showToast('${sanitizeText(m.title)} module started', 'info')">
                            <i class="fas ${m.icon}" style="font-size: 2rem; color: var(--primary-gold); margin-bottom: 15px;"></i>
                            <span class="unit-badge">Module ${m.id}</span>
                            <h3>${sanitizeText(m.title)}</h3>
                            <p>${sanitizeText(m.desc)}</p>
                            <button class="btn-small">Start →</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderLibrary() {
            const resources = [
                { title: 'Kenya Highway Code (Official)', icon: 'fa-file-pdf', size: '2.4 MB' },
                { title: 'EV Driver Handbook Kenya', icon: 'fa-file-pdf', size: '3.5 MB' },
                { title: 'NTSA Driving Test Guide', icon: 'fa-file-pdf', size: '1.8 MB' },
                { title: 'PSV Driver Manual', icon: 'fa-file-pdf', size: '3.2 MB' },
                { title: 'School Bus Safety Manual', icon: 'fa-file-pdf', size: '2.1 MB' },
                { title: 'EV Maintenance Guide', icon: 'fa-file-pdf', size: '2.8 MB' }
            ];
            return `
                <div class="hero"><h1>Resource Library</h1><p>Official Documents, Manuals & Reference Materials</p></div>
                <div class="grid">
                    ${resources.map(r => `
                        <div class="card" onclick="window.showToast('Download started: ${sanitizeText(r.title)}', 'success')">
                            <i class="fas ${r.icon}" style="font-size: 2rem; color: var(--primary-gold); margin-bottom: 15px;"></i>
                            <h3>${sanitizeText(r.title)}</h3>
                            <p style="color: var(--text-muted);">${r.size}</p>
                            <button class="btn-small"><i class="fas fa-download"></i> Download →</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // ============================================
        // VIEWER & INTERACTIONS
        // ============================================
        window.viewMaterial = async (id) => {
            try {
                const material = await fetchMaterialById(id);
                const content = document.getElementById('page-content');
                const imageUrl = validateUrl(material.image_url);
                const videoUrl = validateUrl(material.video_url, 'youtube');
                
                content.innerHTML = `
                    <div style="background: var(--card-bg); border-radius: 24px; padding: 32px; margin: 20px 0;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h2 style="color: var(--primary-gold);">${sanitizeText(material.title)}</h2>
                            <button class="btn-small" onclick="window.navigateTo('${currentPage}')">← Back</button>
                        </div>
                        ${imageUrl ? `<img src="${imageUrl}" alt="${sanitizeText(material.title)}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 24px;" loading="lazy">` : ''}
                        <div style="margin-bottom: 24px;">
                            <p>${sanitizeText(material.description)}</p>
                            ${material.content ? `<div style="margin-top: 20px;">${sanitizeHtml(typeof material.content === 'string' ? material.content : JSON.stringify(material.content))}</div>` : ''}
                        </div>
                        ${videoUrl ? `
                            <div style="position: relative; padding-bottom: 56.25%; height: 0; margin: 24px 0;">
                                <iframe src="${videoUrl}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 16px;" allowfullscreen loading="lazy"></iframe>
                            </div>
                        ` : ''}
                        <button class="btn" style="width: 100%;" onclick="window.showToast('Unit marked as complete! 🎉', 'success')">
                            <i class="fas fa-check-circle"></i> Mark as Complete
                        </button>
                    </div>
                `;
                content.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                showToast('Error loading material', 'error');
            }
        };
        
        window.checkAnswer = (questionId, selected, moduleType) => {
            showToast(selected === 1 ? '✓ Correct! Excellent answer!' : '✗ Incorrect. Review the material and try again.', 
                     selected === 1 ? 'success' : 'error');
        };
        
        // ============================================
        // ROUTING & NAVIGATION
        // ============================================
        const pageRenderers = {
            home: renderHome,
            learner: renderLearner,
            psv: renderPSV,
            schoolbus: renderSchoolBus,
            ev: renderEV,
            boda: renderBoda,
            academy: renderAcademy,
            library: renderLibrary
        };
        
        window.navigateTo = async (page) => {
            currentPage = page;
            const content = document.getElementById('page-content');
            content.innerHTML = '<div class="spinner"></div>';
            
            try {
                const renderer = pageRenderers[page];
                if (renderer) {
                    const html = await renderer();
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Page Not Found</h3></div>';
                }
                history.pushState({ page }, '', `/${page === 'home' ? '' : page}`);
                document.getElementById('navLinks')?.classList.remove('show');
            } catch (error) {
                console.error('Navigation error:', error);
                content.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error Loading Page</h3><p>Please try again.</p></div>';
                showToast('Error loading page', 'error');
            }
        };
        
        // ============================================
        // AUTH MODALS
        // ============================================
        window.showLoginModal = () => {
            showModal(`
                <h3>Login to MEI Drive Africa</h3>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" style="width:100%; padding:12px; margin:10px 0; background:#1a1c26; border:1px solid #333; border-radius:12px; color:#fff;">
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" style="width:100%; padding:12px; margin:10px 0; background:#1a1c26; border:1px solid #333; border-radius:12px; color:#fff;">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="window.loginUser()">Login</button>
                <hr style="margin:16px 0;">
                <h4>Create Account</h4>
                <input type="text" id="signupName" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0; background:#1a1c26; border:1px solid #333; border-radius:12px; color:#fff;">
                <input type="email" id="signupEmail" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#1a1c26; border:1px solid #333; border-radius:12px; color:#fff;">
                <input type="password" id="signupPassword" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#1a1c26; border:1px solid #333; border-radius:12px; color:#fff;">
                <button class="btn-outline" style="width:100%; margin-top:10px;" onclick="window.signUpUser()">Create Account</button>
            `);
        };
        
        window.loginUser = async () => {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            if (!email || !password) { showToast('Please enter email and password', 'error'); return; }
            try {
                await login(email, password);
                closeModal();
                navigateTo('home');
            } catch (error) { showToast(error.message, 'error'); }
        };
        
        window.signUpUser = async () => {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            if (!name || !email || !password) { showToast('Please fill all fields', 'error'); return; }
            try {
                await signUp(email, password, name);
                closeModal();
            } catch (error) { showToast(error.message, 'error'); }
        };
        
        window.logoutUser = logout;
        window.showToast = showToast;
        
        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            updateAuthUI();
            
            // Check for existing session
            const supabase = getSupabase();
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = {
                    id: session.user.id,
                    email: session.user.email,
                    name: session.user.user_metadata?.full_name
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                startSessionRefresh();
                updateAuthUI();
            }
            
            // Handle initial route
            const initialPage = window.location.pathname.slice(1) || 'home';
            await navigateTo(initialPage in pageRenderers ? initialPage : 'home');
            
            // Handle browser back/forward
            window.addEventListener('popstate', (event) => {
                const page = event.state?.page || 'home';
                if (page in pageRenderers) navigateTo(page);
            });
        }
        
        init();
    </script>
</body>
</html>
