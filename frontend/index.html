<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MEI DRIVE AFRICA | Premier Driver Safety Platform</title>
    <meta name="description" content="Kenya's premier NTSA-certified driver training platform - 21 Learner Units, PSV, Boda, EV, and 1000+ NTSA Practice Questions">
    <meta name="theme-color" content="#d4af37">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; line-height: 1.5; }
        
        :root {
            --primary-gold: #d4af37;
            --ev-green: #00ff88;
            --card-bg: #111111;
            --border-color: #222222;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }
        
        .container { width: 100%; padding: 0 16px; margin: 0 auto; }
        @media (min-width: 768px) { .container { max-width: 1400px; padding: 0 24px; } }
        
        .navbar { background: rgba(10,10,10,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,175,55,0.3); position: sticky; top: 0; z-index: 1000; padding: 12px 0; }
        .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-weight: 800; font-size: 1.1rem; background: var(--gradient-gold); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        @media (min-width: 768px) { .logo { font-size: 1.4rem; } }
        
        .mobile-menu-btn { display: flex; background: transparent; border: none; color: var(--primary-gold); font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .nav-links { display: none; width: 100%; flex-direction: column; align-items: center; padding: 16px 0 8px; gap: 8px; }
        .nav-links.show { display: flex; }
        .nav-links button { background: transparent; border: none; color: #e0e0e0; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-size: 15px; width: 100%; text-align: center; }
        @media (min-width: 768px) {
            .mobile-menu-btn { display: none; }
            .nav-links { display: flex !important; width: auto; flex-direction: row; padding: 0; gap: 4px; }
            .nav-links button { width: auto; padding: 8px 16px; font-size: 14px; }
        }
        
        .btn, .btn-ev { min-height: 48px; padding: 12px 24px; font-size: 16px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
        .btn { background: var(--gradient-gold); color: #000; }
        .btn-ev { background: linear-gradient(135deg, #00ff88, #00b4d8); color: #000; }
        .btn-small { min-height: 40px; padding: 8px 20px; font-size: 14px; border-radius: 50px; background: var(--gradient-gold); color: #000; border: none; cursor: pointer; }
        .btn:disabled, .btn-ev:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin: 20px 0; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 24px; } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border-color); transition: transform 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        @media (min-width: 768px) { .card:hover { transform: translateY(-4px); border-color: var(--primary-gold); } }
        .card-ev { border-left: 4px solid #00ff88; }
        
        .unit-badge, .ev-badge-module { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
        .unit-badge { background: var(--gradient-gold); color: #000; }
        .ev-badge-module { background: linear-gradient(135deg, #00ff88, #00b4d8); color: #000; }
        
        .progress-bar { background: #2a2a2a; border-radius: 20px; height: 6px; margin: 16px 0; overflow: hidden; }
        .progress-fill { background: var(--gradient-gold); height: 100%; width: 0%; transition: width 0.3s; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 16px 12px; border: 1px solid var(--border-color); text-align: center; }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--primary-gold); }
        
        .hero { text-align: center; padding: 32px 16px; background: radial-gradient(circle at 10% 30%, rgba(212,175,55,0.08), #0a0a0a); border-radius: 32px; margin: 16px 0 24px; }
        .hero h1 { font-size: 1.8rem; margin-bottom: 12px; }
        @media (min-width: 768px) { .hero h1 { font-size: clamp(1.8rem, 5vw, 3.5rem); } }
        .highlight { background: var(--gradient-gold); background-clip: text; -webkit-background-clip: text; color: transparent; }
        
        .question-bank { background: linear-gradient(145deg, #0f1119, #080a10); border-radius: 24px; margin: 24px 0; padding: 20px; }
        .question-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .question-text { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
        .options-group { display: flex; flex-direction: column; gap: 8px; }
        .option { background: #1a1c26; padding: 14px 16px; border-radius: 12px; cursor: pointer; border: 1px solid #2a2e3a; font-size: 14px; transition: all 0.2s; }
        .option:hover { background: #252a38; }
        .option.correct { background: rgba(46,204,113,0.2); border-color: #2ecc71; }
        .option.wrong { background: rgba(231,76,60,0.2); border-color: #e74c3c; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; padding: 16px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--primary-gold); border-radius: 24px; padding: 24px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .modal-content input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1c26; border: 1px solid #2c2f3a; border-radius: 12px; color: #fff; font-size: 16px; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: var(--primary-gold); padding: 8px; margin: -8px -8px 0 0; }
        
        #toast-root { position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        @media (min-width: 768px) { #toast-root { bottom: 30px; right: 30px; left: auto; min-width: 300px; } }
        .toast { background: var(--card-bg); border-left: 4px solid var(--primary-gold); padding: 14px 18px; border-radius: 12px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .unit-content { line-height: 1.6; }
        .unit-content h2 { color: var(--primary-gold); margin: 20px 0 10px; }
        .unit-content h3 { color: var(--ev-green); margin: 15px 0 10px; }
        .unit-content ul, .unit-content ol { margin-left: 20px; margin-bottom: 15px; }
        .unit-content li { margin: 8px 0; }
        
        .hero-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; justify-content: center; align-items: center; }
        @media (min-width: 480px) { .hero-buttons { flex-direction: row; } }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; cursor: pointer; }
        .pagination button.active { background: var(--primary-gold); color: #000; }
        
        .score-card { background: var(--card-bg); border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 20px; border: 1px solid var(--primary-gold); }
        .score-card h3 { color: var(--primary-gold); margin-bottom: 8px; }
        .score-card .score { font-size: 2rem; font-weight: 800; }
        
        .profile-link { background: rgba(212,175,55,0.2); border-radius: 40px; padding: 6px 16px; cursor: pointer; font-size: 14px; }
        .admin-panel { display: none; }
        .admin-sidebar { width: 260px; background: var(--card-bg); border-right: 1px solid var(--border-color); padding: 20px; min-height: calc(100vh - 70px); }
        .admin-sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: transparent; border: 1px solid var(--border-color); color: #fff; border-radius: 12px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; }
        .admin-sidebar button:hover { background: rgba(212,175,55,0.1); border-color: var(--primary-gold); color: var(--primary-gold); }
        .admin-layout { display: flex; min-height: calc(100vh - 70px); }
        .admin-content { flex: 1; padding: 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 16px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--primary-gold); }
        .role-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .role-admin { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .role-learner { background: rgba(52,152,219,0.2); color: #3498db; }
        .role-driver { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1c26; border: 1px solid var(--border-color); border-radius: 12px; color: #fff; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; margin: 0 4px; }
        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-add { background: #2ecc71; color: white; }
        
        @media (max-width: 768px) { .admin-layout { flex-direction: column; } .admin-sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div id="app">
        <!-- Dynamic content will be loaded here -->
    </div>

    <script type="module">
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
        
        const supabaseUrl = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
        
        const supabase = createClient(supabaseUrl, supabaseAnonKey);
        
        // ============================================
        // APP STATE
        // ============================================
        let currentUser = null;
        let session = null;
        let isLoading = false;
        
        // Module Data
        const LEARNER_UNITS = Array.from({ length: 21 }, (_, i) => ({ 
            id: i+1, 
            title: `Unit ${i+1}: ${i===0?"Introduction to Driving":i===1?"Highway Code":i===2?"Vehicle Controls":i===3?"Maintenance":i===4?"Moving Off":"Driving Skills"}`, 
            desc: "Essential driving knowledge and skills for Kenyan roads",
            content: "<h2>Learning Unit</h2><p>Complete training content for professional driving in Kenya.</p><ul><li>Learn essential driving techniques</li><li>Understand road safety rules</li><li>Master defensive driving skills</li></ul>"
        }));
        const PSV_UNITS = Array.from({ length: 10 }, (_, i) => ({ id: i+1, title: `PSV Module ${i+1}`, desc: "Professional PSV driver training", content: "<h2>PSV Training</h2><p>Professional Public Service Vehicle driver training.</p>" }));
        const SCHOOLBUS_UNITS = Array.from({ length: 6 }, (_, i) => ({ id: i+1, title: `School Bus Safety ${i+1}`, desc: "Child transport safety", content: "<h2>School Bus Safety</h2><p>Specialized training for transporting children safely.</p>" }));
        const BODA_UNITS = Array.from({ length: 12 }, (_, i) => ({ id: i+1, title: `Boda Module ${i+1}`, desc: "Motorcycle safety training", content: "<h2>Boda Training</h2><p>Complete motorcycle safety and operations training.</p>" }));
        const EV_UNITS = Array.from({ length: 8 }, (_, i) => ({ id: i+1, title: `EV Module ${i+1}`, desc: "Electric vehicle training", content: "<h2>EV Training</h2><p>Electric vehicle driving, maintenance and safety.</p>" }));
        const ACADEMY_UNITS = Array.from({ length: 6 }, (_, i) => ({ id: i+1, title: `Academy Module ${i+1}`, desc: "Professional development", content: "<h2>Academy Training</h2><p>Advanced professional driver development.</p>" }));
        
        const NTSA_QUESTIONS = Array.from({ length: 50 }, (_, i) => ({ 
            id: i+1, 
            text: `NTSA Practice Question ${i+1}: What is the safe following distance in good conditions?`, 
            options: ["2 seconds", "3 seconds", "4 seconds", "5 seconds"], 
            correct: 1, 
            explanation: "The 3-second rule is recommended for safe following distance under normal conditions."
        }));
        
        let toastQueue = [];
        let isProcessingToast = false;
        
        function showToast(message, type = 'info') {
            toastQueue.push({ message, type });
            if (!isProcessingToast) processToastQueue();
        }
        
        async function processToastQueue() {
            if (toastQueue.length === 0) { isProcessingToast = false; return; }
            isProcessingToast = true;
            const { message, type } = toastQueue.shift();
            const container = document.getElementById('toast-root') || document.body;
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            toast.textContent = `${icon} ${message}`;
            container.appendChild(toast);
            await new Promise(r => setTimeout(r, 3000));
            toast.remove();
            processToastQueue();
        }
        
        // ============================================
        // AUTHENTICATION
        // ============================================
        async function signUp(email, password, name) {
            if (!name || name.length < 2) { showToast('Please enter your full name', 'error'); return null; }
            if (!email || !email.includes('@')) { showToast('Please enter a valid email', 'error'); return null; }
            if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return null; }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email.trim(),
                    password: password,
                    options: { data: { full_name: name.trim() } }
                });
                if (error) throw error;
                showToast('Account created! Please check your email for verification.', 'success');
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }
        
        async function login(email, password) {
            if (!email || !password) { showToast('Please enter email and password', 'error'); return null; }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email.trim(),
                    password: password
                });
                if (error) throw error;
                
                currentUser = {
                    id: data.user.id,
                    email: data.user.email,
                    name: data.user.user_metadata?.full_name || email.split('@')[0],
                    role: email === 'admin@mei.com' ? 'admin' : 'user'
                };
                session = data.session;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast(`Welcome ${currentUser.name}!`, 'success');
                renderMainApp();
                return currentUser;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }
        
        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            session = null;
            localStorage.removeItem('currentUser');
            showToast('Logged out successfully', 'info');
            renderMainApp();
        }
        
        async function checkSession() {
            const stored = localStorage.getItem('currentUser');
            if (stored) {
                currentUser = JSON.parse(stored);
                const { data: { session: currentSession } } = await supabase.auth.getSession();
                session = currentSession;
                if (!session) {
                    localStorage.removeItem('currentUser');
                    currentUser = null;
                }
            }
        }
        
        // ============================================
        // UI COMPONENTS
        // ============================================
        function renderCard(unit, type) {
            const isEv = type === 'ev';
            return `<div class="card ${isEv ? 'card-ev' : ''}" onclick="window.viewMaterial(${unit.id}, '${type}')">
                <span class="${isEv ? 'ev-badge-module' : 'unit-badge'}">${isEv ? '⚡' : ''} ${type === 'learner' ? `Unit ${unit.id}` : ''}</span>
                <h3>${unit.title}</h3>
                <p>${unit.desc.substring(0, 80)}...</p>
                <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                <button class="btn-small">📖 View →</button>
            </div>`;
        }
        
        function renderNavigation() {
            const isAdmin = currentUser?.role === 'admin';
            return `
                <div class="navbar">
                    <div class="container nav">
                        <div class="logo" data-nav="home">MEI DRIVE AFRICA ⚡</div>
                        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">☰</button>
                        <div class="nav-links" id="navLinks">
                            <button data-nav="home">🏠 Home</button>
                            <button data-nav="learner">📚 Learner (21)</button>
                            <button data-nav="psv">🚌 PSV (10)</button>
                            <button data-nav="schoolbus">🏫 School Bus (6)</button>
                            <button data-nav="boda">🏍️ Boda (12)</button>
                            <button data-nav="ev">⚡ EV (8)</button>
                            <button data-nav="academy">🎓 Academy (6)</button>
                            <button data-nav="library">📖 Library</button>
                            <button data-nav="quiz">📝 Quiz</button>
                            ${isAdmin ? '<button data-nav="admin">👑 Admin</button>' : ''}
                            <div id="authButtons"></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderAuthButtons() {
            const authDiv = document.getElementById('authButtons');
            if (!authDiv) return;
            if (currentUser) {
                authDiv.innerHTML = `<div class="profile-link" onclick="window.showProfileModal()">👤 ${currentUser.name}</div><button onclick="logout()">🚪 Logout</button>`;
            } else {
                authDiv.innerHTML = `<button onclick="window.showLoginModal()">🔑 Login</button><button onclick="window.showSignupModal()">📝 Sign Up</button>`;
            }
        }
        
        // ============================================
        // PAGES
        // ============================================
        function renderHome() {
            return `
                <div class="hero">
                    <h1>Kenya's <span class="highlight">Digital Driver Safety Platform</span></h1>
                    <p>Drive Smart. Stay Safe. Arrive Home. Keep Our Roads Safe</p>
                    <div class="hero-buttons">
                        <button class="btn" onclick="navigateTo('learner')">📚 Start Learning (21 Units)</button>
                        <button class="btn-ev" onclick="navigateTo('ev')">⚡ EV Course</button>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">21</div><div>Learner Units</div></div>
                    <div class="stat-card"><div class="stat-number">10</div><div>PSV Units</div></div>
                    <div class="stat-card"><div class="stat-number">12</div><div>Boda Units</div></div>
                    <div class="stat-card"><div class="stat-number">8</div><div>EV Units</div></div>
                </div>
                <div class="grid">
                    <div class="card" onclick="navigateTo('learner')"><div style="font-size:2rem;margin-bottom:12px;">📚</div><h3>Learner Hub</h3><p>21 Complete Units</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('psv')"><div style="font-size:2rem;margin-bottom:12px;">🚌</div><h3>PSV Course</h3><p>10 Units</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('schoolbus')"><div style="font-size:2rem;margin-bottom:12px;">🏫</div><h3>School Bus</h3><p>6 Units</p><button class="btn-small">Start →</button></div>
                    <div class="card card-ev" onclick="navigateTo('ev')"><div style="font-size:2rem;margin-bottom:12px;">⚡</div><h3>EV Training</h3><p>8 Units</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('boda')"><div style="font-size:2rem;margin-bottom:12px;">🏍️</div><h3>Boda Safety</h3><p>12 Units</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('academy')"><div style="font-size:2rem;margin-bottom:12px;">🎓</div><h3>Academy</h3><p>6 Units</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('library')"><div style="font-size:2rem;margin-bottom:12px;">📖</div><h3>Library</h3><p>Resources</p><button class="btn-small">Start →</button></div>
                    <div class="card" onclick="navigateTo('quiz')"><div style="font-size:2rem;margin-bottom:12px;">📝</div><h3>NTSA Quiz</h3><p>Practice Questions</p><button class="btn-small">Start →</button></div>
                </div>
            `;
        }
        
        function renderModule(moduleType, units) {
            let cards = '';
            for (let i = 0; i < units.length; i++) cards += renderCard(units[i], moduleType);
            return `<div class="hero"><h1>${moduleType.toUpperCase()} Training</h1><p>Complete training for professional certification</p></div><div class="grid">${cards}</div>`;
        }
        
        function renderLibrary() {
            const resources = ['Kenya Highway Code', 'EV Driver Handbook', 'NTSA Test Guide', 'PSV Manual', 'Boda Safety Guide', 'EV Maintenance Manual'];
            return `<div class="hero"><h1>📖 Resource Library</h1><p>Official documents, manuals and reference materials</p></div><div class="grid">${resources.map(r => `<div class="card" onclick="showToast('Download started: ${r}','success')"><div style="font-size:2rem;">📄</div><h3>${r}</h3><button class="btn-small">Download →</button></div>`).join('')}</div>`;
        }
        
        // Quiz functionality
        let currentQuizPage = 1;
        let quizAnswers = {};
        const questionsPerPage = 5;
        
        function renderQuiz() {
            const start = (currentQuizPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const pageQuestions = NTSA_QUESTIONS.slice(start, end);
            const totalPages = Math.ceil(NTSA_QUESTIONS.length / questionsPerPage);
            
            let answered = Object.keys(quizAnswers).length;
            let correct = 0;
            for (let [id, answer] of Object.entries(quizAnswers)) {
                const q = NTSA_QUESTIONS.find(qq => qq.id == id);
                if (q && answer === q.correct) correct++;
            }
            
            let html = `<div class="hero"><h1>📝 NTSA Practice Test</h1><p>Prepare with real exam questions</p></div>`;
            html += `<div class="score-card"><h3>Your Progress</h3><div class="score">${answered}/${NTSA_QUESTIONS.length}</div><div>Score: ${correct}/${answered} (${answered ? Math.round(correct/answered*100) : 0}%)</div></div>`;
            
            for (let q of pageQuestions) {
                const selected = quizAnswers[q.id];
                html += `<div class="question-card"><div class="question-text"><strong>${q.id}.</strong> ${q.text}</div><div class="options-group">`;
                for (let i = 0; i < q.options.length; i++) {
                    let optionClass = '';
                    if (selected !== undefined) {
                        if (i === q.correct) optionClass = 'correct';
                        else if (i === selected && i !== q.correct) optionClass = 'wrong';
                    }
                    html += `<div class="option ${optionClass}" onclick="selectAnswer(${q.id}, ${i})">${String.fromCharCode(65+i)}. ${q.options[i]}</div>`;
                }
                if (selected !== undefined) {
                    html += `<div style="margin-top:12px;padding:12px;background:rgba(52,152,219,0.1);border-radius:8px;"><small>📖 ${q.explanation}</small></div>`;
                }
                html += `</div></div>`;
            }
            
            html += `<div class="pagination">`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentQuizPage ? 'active' : ''}" onclick="goToQuizPage(${i})">${i}</button>`;
            }
            html += `</div>`;
            return html;
        }
        
        function selectAnswer(id, answer) {
            quizAnswers[id] = answer;
            renderPage('quiz');
        }
        
        function goToQuizPage(page) {
            currentQuizPage = page;
            renderPage('quiz');
        }
        
        // Admin Panel
        let adminUsers = [
            { id: 1, name: "John Kamau", email: "admin@mei.com", role: "admin", status: "active" },
            { id: 2, name: "Mary Wanjiku", email: "mary@mei.com", role: "learner", status: "active" },
            { id: 3, name: "Peter Otieno", email: "peter@mei.com", role: "driver", status: "inactive" }
        ];
        
        function renderAdmin() {
            const totalUsers = adminUsers.length;
            const activeUsers = adminUsers.filter(u => u.status === 'active').length;
            let html = `
                <div class="admin-layout">
                    <div class="admin-sidebar">
                        <h3>👑 Admin Panel</h3>
                        <button onclick="showAdminSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
                        <button onclick="showAdminSection('users')"><i class="fas fa-users"></i> Users</button>
                        <button onclick="showAdminSection('quizzes')"><i class="fas fa-question-circle"></i> Quizzes</button>
                    </div>
                    <div class="admin-content" id="adminContent">
                        <div id="dashboardSection">
                            <h2>Dashboard</h2>
                            <div class="stats-grid">
                                <div class="stat-card"><div class="stat-number">${totalUsers}</div><div>Total Users</div></div>
                                <div class="stat-card"><div class="stat-number">${activeUsers}</div><div>Active Users</div></div>
                                <div class="stat-card"><div class="stat-number">45</div><div>Modules</div></div>
                                <div class="stat-card"><div class="stat-number">50</div><div>Questions</div></div>
                            </div>
                        </div>
                        <div id="usersSection" style="display:none;">
                            <h2>User Management</h2>
                            <input type="text" class="search-input" id="userSearch" placeholder="Search users..." onkeyup="filterUsers()">
                            <div style="overflow-x:auto;"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody id="usersTableBody">
                                ${adminUsers.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><span class="role-badge role-${u.role}">${u.role}</span></td><td><span style="color:${u.status === 'active' ? '#2ecc71' : '#e74c3c'}">${u.status}</span></td><td><button class="btn-sm btn-edit" onclick="editUser(${u.id})">Edit</button> <button class="btn-sm btn-delete" onclick="deleteUser(${u.id})">Delete</button></td></tr>`).join('')}
                            </tbody></table></div>
                            <button class="btn-add" style="margin-top:20px;padding:10px 20px;" onclick="showAddUserModal()">+ Add User</button>
                        </div>
                        <div id="quizzesSection" style="display:none;">
                            <h2>Quiz Management</h2>
                            <div class="stats-grid">
                                <div class="stat-card"><div class="stat-number">${NTSA_QUESTIONS.length}</div><div>Total Questions</div></div>
                                <div class="stat-card"><div class="stat-number">${Object.keys(quizAnswers).length}</div><div>Questions Answered</div></div>
                            </div>
                            <button class="btn" onclick="resetQuiz()">Reset Quiz Progress</button>
                        </div>
                    </div>
                </div>
            `;
            return html;
        }
        
        window.showAdminSection = function(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            document.getElementById('quizzesSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
        };
        
        window.filterUsers = function() {
            const searchTerm = document.getElementById('userSearch')?.value?.toLowerCase() || '';
            const filtered = adminUsers.filter(u => u.name.toLowerCase().includes(searchTerm) || u.email.toLowerCase().includes(searchTerm));
            const tbody = document.getElementById('usersTableBody');
            if (tbody) {
                tbody.innerHTML = filtered.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><span class="role-badge role-${u.role}">${u.role}</span></td><td><span style="color:${u.status === 'active' ? '#2ecc71' : '#e74c3c'}">${u.status}</span></td><td><button class="btn-sm btn-edit" onclick="editUser(${u.id})">Edit</button> <button class="btn-sm btn-delete" onclick="deleteUser(${u.id})">Delete</button></td></tr>`).join('');
            }
        };
        
        window.editUser = function(id) {
            const user = adminUsers.find(u => u.id === id);
            const newName = prompt('Edit name:', user.name);
            const newRole = prompt('Edit role (admin/learner/driver):', user.role);
            if (newName) user.name = newName;
            if (newRole) user.role = newRole;
            filterUsers();
            showToast('User updated', 'success');
        };
        
        window.deleteUser = function(id) {
            if (confirm('Delete this user?')) {
                adminUsers = adminUsers.filter(u => u.id !== id);
                filterUsers();
                showToast('User deleted', 'success');
            }
        };
        
        window.showAddUserModal = function() {
            const name = prompt('Enter name:');
            const email = prompt('Enter email:');
            if (name && email) {
                adminUsers.push({ id: Date.now(), name, email, role: 'learner', status: 'active' });
                filterUsers();
                showToast('User added', 'success');
            }
        };
        
        window.resetQuiz = function() {
            quizAnswers = {};
            currentQuizPage = 1;
            renderPage('quiz');
            showToast('Quiz progress reset', 'success');
        };
        
        // Material viewer
        window.viewMaterial = function(id, type) {
            let unit;
            if (type === 'learner') unit = LEARNER_UNITS.find(u => u.id === id);
            else if (type === 'psv') unit = PSV_UNITS.find(u => u.id === id);
            else if (type === 'schoolbus') unit = SCHOOLBUS_UNITS.find(u => u.id === id);
            else if (type === 'boda') unit = BODA_UNITS.find(u => u.id === id);
            else if (type === 'ev') unit = EV_UNITS.find(u => u.id === id);
            else if (type === 'academy') unit = ACADEMY_UNITS.find(u => u.id === id);
            
            if (unit) {
                const content = document.getElementById('page-content');
                content.innerHTML = `<div style="background:var(--card-bg);border-radius:24px;padding:24px;margin:20px 0;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h2 style="color:var(--primary-gold);">${unit.title}</h2><button class="btn-small" onclick="navigateTo('${type}')">← Back</button></div>
                    <div class="unit-content">${unit.content}</div>
                    <button class="btn" style="margin-top:20px;" onclick="showToast('Unit completed! 🎉','success')">✅ Mark Complete</button>
                </div>`;
                window.scrollTo({ top: 0 });
            }
        };
        
        // Page rendering
        let currentPage = 'home';
        
        function renderPage(page) {
            currentPage = page;
            const content = document.getElementById('page-content');
            if (!content) return;
            
            if (page === 'home') content.innerHTML = renderHome();
            else if (page === 'learner') content.innerHTML = renderModule('learner', LEARNER_UNITS);
            else if (page === 'psv') content.innerHTML = renderModule('psv', PSV_UNITS);
            else if (page === 'schoolbus') content.innerHTML = renderModule('schoolbus', SCHOOLBUS_UNITS);
            else if (page === 'boda') content.innerHTML = renderModule('boda', BODA_UNITS);
            else if (page === 'ev') content.innerHTML = renderModule('ev', EV_UNITS);
            else if (page === 'academy') content.innerHTML = renderModule('academy', ACADEMY_UNITS);
            else if (page === 'library') content.innerHTML = renderLibrary();
            else if (page === 'quiz') content.innerHTML = renderQuiz();
            else if (page === 'admin') {
                if (currentUser?.role === 'admin') content.innerHTML = renderAdmin();
                else { showToast('Admin access required', 'error'); navigateTo('home'); }
            }
        }
        
        window.navigateTo = function(page) {
            renderPage(page);
            const navLinks = document.getElementById('navLinks');
            if (navLinks) navLinks.classList.remove('show');
            window.scrollTo({ top: 0 });
        };
        
        window.selectAnswer = selectAnswer;
        window.goToQuizPage = goToQuizPage;
        
        // Auth modals
        function showLoginModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><button class="close-modal" onclick="this.closest('.modal').remove()">✕</button>
                <h3>🔐 Login to MEI Drive Africa</h3>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                <button class="btn" style="width:100%;margin-top:10px;" onclick="window.doLogin()">Login</button>
                <hr style="margin:16px 0;">
                <p style="text-align:center;color:#aaa;">Don't have an account? <a href="#" onclick="closeModal();showSignupModal()">Sign Up</a></p>
            </div>`;
            document.body.appendChild(modal);
            modal.style.display = 'flex';
        }
        
        function showSignupModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><button class="close-modal" onclick="this.closest('.modal').remove()">✕</button>
                <h3>📝 Create Account</h3>
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
                <button class="btn" style="width:100%;margin-top:10px;" onclick="window.doSignup()">Sign Up</button>
                <hr style="margin:16px 0;">
                <p style="text-align:center;color:#aaa;">Already have an account? <a href="#" onclick="closeModal();showLoginModal()">Login</a></p>
            </div>`;
            document.body.appendChild(modal);
            modal.style.display = 'flex';
        }
        
        window.doLogin = async function() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            await login(email, password);
            closeModal();
        };
        
        window.doSignup = async function() {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            await signUp(email, password, name);
            closeModal();
        };
        
        window.showProfileModal = function() {
            showModal(`<h3>👤 Profile</h3><p><strong>Name:</strong> ${currentUser?.name}</p><p><strong>Email:</strong> ${currentUser?.email}</p><p><strong>Role:</strong> ${currentUser?.role || 'User'}</p><button class="btn" style="width:100%;margin-top:15px;" onclick="closeModal()">Close</button>`);
        };
        
        function showModal(content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><button class="close-modal" onclick="this.closest('.modal').remove()">✕</button>${content}</div>`;
            document.body.appendChild(modal);
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
        }
        
        // Make functions globally available
        window.showLoginModal = showLoginModal;
        window.showSignupModal = showSignupModal;
        window.closeModal = closeModal;
        window.logout = logout;
        window.showToast = showToast;
        
        // Render main app
        async function renderMainApp() {
            document.getElementById('app').innerHTML = `
                ${renderNavigation()}
                <div class="container"><main id="page-content"><div class="spinner"></div></main></div>
                <div id="toast-root"></div>
            `;
            renderAuthButtons();
            
            // Event listeners
            document.getElementById('mobileMenuBtn')?.addEventListener('click', function(e) {
                e.stopPropagation();
                document.getElementById('navLinks')?.classList.toggle('show');
            });
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('[data-nav]');
                if (btn) navigateTo(btn.getAttribute('data-nav'));
                const navLinks = document.getElementById('navLinks');
                const mobileBtn = document.getElementById('mobileMenuBtn');
                if (navLinks?.classList.contains('show') && !navLinks.contains(e.target) && mobileBtn && !mobileBtn.contains(e.target)) {
                    navLinks.classList.remove('show');
                }
            });
            
            renderPage('home');
        }
        
        // Initialize
        await checkSession();
        renderMainApp();
    </script>
</body>
</html>
