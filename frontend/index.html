<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MEI DRIVE AFRICA | NTSA Test Prep & Driver Safety</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0B0F19; color: #E8EDF5; line-height: 1.5; }
        :root {
            --primary: #00d084;
            --primary-dark: #00a86b;
            --bg-card: #121B2C;
            --border: #1E2A3E;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* Navbar */
        .navbar { background: rgba(11,15,25,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,208,132,0.3); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #4ade80); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .nav-links button, .nav-links .nav-item { background: transparent; border: none; color: #A0B3D9; padding: 8px 14px; border-radius: 50px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .nav-links button:hover, .nav-links .nav-item:hover { background: rgba(0,208,132,0.1); color: var(--primary); }
        
        /* Buttons */
        .btn { padding: 12px 28px; border-radius: 50px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; font-weight: 700; cursor: pointer; color: #0B0F19; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.02); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-small { padding: 6px 14px; border-radius: 40px; background: var(--primary); border: none; cursor: pointer; font-size: 12px; font-weight: 600; color: #0B0F19; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #0B0F19; }
        
        /* Cards & Grid */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; transition: 0.2s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
        
        /* Hero */
        .hero { text-align: center; padding: 40px 20px; background: radial-gradient(circle at 10% 30%, rgba(0,208,132,0.08), #0B0F19); border-radius: 32px; margin: 20px 0; }
        .hero h1 { font-size: 28px; } @media (min-width: 768px) { .hero h1 { font-size: 42px; } }
        .highlight { color: var(--primary); }
        
        /* Progress Bar */
        .progress-bar { background: #1E2A3E; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; }
        
        /* Module Cards */
        .module-card { background: var(--bg-card); border-left: 4px solid var(--primary); padding: 16px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; }
        .module-card:hover { background: #162131; }
        
        /* Admin Panel */
        .admin-section { margin: 30px 0; }
        .admin-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .admin-tab { padding: 12px 24px; cursor: pointer; border-radius: 12px 12px 0 0; background: #1E2A3E; transition: 0.2s; }
        .admin-tab.active { background: var(--primary); color: #0B0F19; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        input, select, textarea { background: #0F1622; border: 1px solid var(--border); padding: 10px 14px; border-radius: 12px; color: white; width: 100%; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #121B2C; border: 1px solid var(--primary); border-radius: 24px; padding: 28px; max-width: 500px; width: 90%; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: var(--primary); }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; z-index: 1100; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* User Badge */
        .user-badge { background: rgba(0,208,132,0.15); border-radius: 40px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        
        /* Responsive */
        @media (max-width: 768px) { 
            .nav { flex-direction: column; }
            .nav-links { justify-content: center; }
            .grid { grid-template-columns: 1fr; }
            th, td { font-size: 12px; padding: 8px; }
        }
        
        /* Content styling */
        .content-body { line-height: 1.6; }
        .safety-box { background: rgba(0,208,132,0.1); border-left: 3px solid var(--primary); padding: 16px; margin: 16px 0; border-radius: 12px; }
        
        footer { text-align: center; padding: 24px; color: #666; margin-top: 40px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
<div id="app">
    <div class="navbar">
        <div class="container nav">
            <div class="logo" onclick="navigateTo('home')">MEI DRIVE AFRICA ⚡</div>
            <div class="nav-links" id="navLinks">
                <button onclick="navigateTo('home')">🏠 Home</button>
                <button onclick="navigateTo('learner')">📚 Learner Hub</button>
                <button onclick="navigateTo('psv')">🚌 PSV</button>
                <button onclick="navigateTo('boda')">🏍️ Boda</button>
                <button onclick="navigateTo('ev')">⚡ EV</button>
                <button onclick="navigateTo('quiz')">📝 Quiz</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </div>
    <div class="container">
        <main id="page-content"><div class="spinner"></div></main>
    </div>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Education</footer>
</div>
<div id="toast-root"></div>

<script>
    // ============= SUPABASE CONFIGURATION =============
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    let supabase;
    let currentUser = null;
    let isAdmin = false;
    let userProgress = {};
    let materialsCache = {};
    let currentPage = 'home';
    
    // Table mapping
    const tableMapping = { learner: 'learner_units', psv: 'psv_modules', boda: 'boda_modules', ev: 'ev_modules' };
    const unitTitles = ["Intro to Driving","Highway Code","Vehicle Controls","Maintenance","Moving Off","Turning","Roundabouts","Overtaking","Speed Limits","Defensive Driving","Night Driving","Adverse Weather","Alcohol & Drugs","Fatigue","Pedestrian Safety","Emergency Procedures","First Aid","Insurance","Environmental Driving","NTSA Prep","Advanced Skills"];
    
    // Helper functions
    function showToast(msg, type) {
        const toastDiv = document.getElementById('toast-root');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
        toastDiv.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    // Initialize Supabase
    function initSupabase() {
        supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    
    // Fetch materials from Supabase or fallback
    async function fetchMaterials(moduleType) {
        if (materialsCache[moduleType]) return materialsCache[moduleType];
        const table = tableMapping[moduleType];
        if (!table) return getFallbackMaterials(moduleType);
        try {
            const { data, error } = await supabase.from(table).select('*').order('module_number', { ascending: true });
            if (error || !data || data.length === 0) return getFallbackMaterials(moduleType);
            const transformed = data.map(item => ({ ...item, unit_number: item.module_number, module_type: moduleType }));
            materialsCache[moduleType] = transformed;
            return transformed;
        } catch (e) { return getFallbackMaterials(moduleType); }
    }
    
    function getFallbackMaterials(moduleType) {
        if (moduleType === 'learner') {
            return Array.from({ length: 21 }, (_, i) => ({ id: i + 1, title: `Unit ${i + 1}: ${unitTitles[i]}`, description: `Complete NTSA curriculum for ${unitTitles[i]}`, content: generateUnitContent(i + 1, unitTitles[i]), module_type: 'learner', unit_number: i + 1, icon: "🚗", price: 0, is_locked: false }));
        }
        if (moduleType === 'psv') return Array.from({ length: 8 }, (_, i) => ({ id: 100 + i, title: `PSV: ${['Licensing & Compliance', 'Driver Conduct', 'Passenger Safety', 'Defensive Driving', 'Route Management', 'Emergency Response', 'Fare Management', 'Customer Service'][i]}`, content: '<div class="safety-box">PSV professional driver training</div><p>Complete NTSA PSV curriculum.</p>', price: 0, is_locked: false }));
        if (moduleType === 'boda') return Array.from({ length: 10 }, (_, i) => ({ id: 200 + i, title: `Boda: ${['Basic Controls', 'Gear Operation', 'Professionalism', 'Substance Abuse', 'Bike Maintenance', 'Security', 'Passenger Safety', 'Night Riding', 'Business Skills', 'Defensive Riding'][i]}`, content: '<div class="safety-box">Boda safety essentials</div><p>Complete boda training.</p>', price: 0, is_locked: false }));
        if (moduleType === 'ev') return Array.from({ length: 8 }, (_, i) => ({ id: 300 + i, title: `EV: ${['Introduction', 'Battery Technology', 'Charging Infrastructure', 'Maintenance', 'Safety Protocols', 'Range Management', 'Commercial EV', 'Regulations'][i]}`, content: '<div class="safety-box">Electric vehicle knowledge</div><p>EV driver education.</p>', price: 0, is_locked: false }));
        return [];
    }
    
    function generateUnitContent(num, title) {
        return `<div class="content-body"><h2>Unit ${num}: ${escapeHtml(title)}</h2><div class="safety-box"><i class="fas fa-shield-alt"></i> Safety First! This unit covers ${escapeHtml(title)} as per NTSA Kenya Highway Code.</div><p>Detailed curriculum content with illustrations, road signs, and practical tips.</p><p>Practice questions and simulations included after completion.</p></div>`;
    }
    
    // User Progress
    async function fetchUserProgress() {
        if (!currentUser) return {};
        try {
            const { data } = await supabase.from('user_progress').select('*').eq('user_id', currentUser.id);
            const prog = {};
            data?.forEach(p => { prog[p.material_id] = p.progress_percentage || 0; });
            userProgress = prog;
            return prog;
        } catch (e) { return {}; }
    }
    
    async function updateProgress(materialId, progress) {
        if (!currentUser) { showToast('Please login to track progress', 'error'); showLoginModal(); return; }
        await supabase.from('user_progress').upsert({ user_id: currentUser.id, material_id: materialId, progress_percentage: progress, status: progress === 100 ? 'completed' : 'in_progress', last_accessed_at: new Date() });
        userProgress[materialId] = progress;
        showToast(progress === 100 ? '🎉 Unit Completed! +50 XP' : 'Progress saved', 'success');
        renderCurrentPage();
    }
    
    // ============= ADMIN FUNCTIONS =============
    async function adminGetAllUsers() {
        const { data: profiles } = await supabase.from('user_profiles').select('id, is_admin, status, full_name, email');
        return profiles || [];
    }
    
    async function adminDeleteUser(userId) {
        if (!confirm('⚠️ Permanently delete user and all progress?')) return;
        await supabase.from('user_progress').delete().eq('user_id', userId);
        await supabase.from('payments').delete().eq('user_id', userId);
        await supabase.from('user_profiles').delete().eq('id', userId);
        showToast('User deleted', 'success');
        if (isAdmin && currentPage === 'admin') renderAdminDashboard();
    }
    
    async function adminUpdateModule(moduleType, moduleId, updates) {
        const table = tableMapping[moduleType];
        await supabase.from(table).update(updates).eq('id', moduleId);
        materialsCache = {};
        showToast('Module updated', 'success');
        if (isAdmin && currentPage === 'admin') renderAdminDashboard();
    }
    
    async function adminDeleteModule(moduleType, moduleId) {
        if (confirm('Delete this module?')) {
            await supabase.from(tableMapping[moduleType]).delete().eq('id', moduleId);
            materialsCache = {};
            showToast('Deleted', 'success');
            if (isAdmin && currentPage === 'admin') renderAdminDashboard();
        }
    }
    
    async function adminAddModule(moduleType, data) {
        await supabase.from(tableMapping[moduleType]).insert(data);
        materialsCache = {};
        showToast('Module added', 'success');
        if (isAdmin && currentPage === 'admin') renderAdminDashboard();
    }
    
    // ============= RENDER ADMIN DASHBOARD =============
    async function renderAdminDashboard() {
        if (!isAdmin) { navigateTo('home'); return; }
        const container = document.getElementById('page-content');
        container.innerHTML = `<div class="admin-section"><div class="admin-tabs" id="adminTabs"><div class="admin-tab active" data-tab="users">👥 Users</div><div class="admin-tab" data-tab="modules">📦 Modules</div><div class="admin-tab" data-tab="stats">📊 Stats</div></div><div id="adminTabContent"><div class="spinner"></div></div></div>`;
        
        const users = await adminGetAllUsers();
        
        async function renderUsersTab() {
            let html = `<div class="card"><h3><i class="fas fa-users"></i> Registered Users</h3><div style="overflow-x:auto;"><table><thead><tr><th>Email</th><th>Status</th><th>Admin</th><th>Actions</th></tr></thead><tbody>`;
            users.forEach(u => {
                html += `<tr><td>${escapeHtml(u.email || u.id)}</td><td>${u.status || 'active'}</td><td>${u.is_admin ? '✅ Admin' : '👤 User'}</td><td><button class="btn-small btn-danger" onclick="adminDeleteUser('${u.id}')">Delete</button></td></tr>`;
            });
            html += `</tbody></table></div></div><div class="card"><h3>📈 Learning Progress</h3><p>Total users: ${users.length}</p><p>Total completed units: ${Object.values(userProgress).filter(p => p === 100).length}</p></div>`;
            document.getElementById('adminTabContent').innerHTML = html;
        }
        
        async function renderModulesTab() {
            let html = `<div class="card"><h3><i class="fas fa-plus-circle"></i> Add New Module</h3><div class="grid" style="grid-template-columns:1fr 1fr;"><div class="form-group"><label>Module Type</label><select id="adminModuleType"><option value="learner">Learner Hub</option><option value="psv">PSV</option><option value="boda">Boda</option><option value="ev">EV</option></select></div><div class="form-group"><label>Module Number</label><input type="number" id="adminModuleNumber" placeholder="e.g., 22"></div><div class="form-group"><label>Title</label><input type="text" id="adminModuleTitle" placeholder="Unit Title"></div><div class="form-group"><label>Description</label><textarea id="adminModuleDesc" rows="2"></textarea></div></div><button class="btn" onclick="handleAddModule()">➕ Add Module</button></div><div id="modulesListContainer"><div class="spinner"></div></div>`;
            document.getElementById('adminTabContent').innerHTML = html;
            
            const renderModuleList = async (type) => {
                const mods = await fetchMaterials(type);
                let listHtml = `<div class="card"><h3>📚 ${type.toUpperCase()} Modules</h3><div style="overflow-x:auto;"><table><thead><tr><th>#</th><th>Title</th><th>Locked</th><th>Actions</th></tr></thead><tbody>`;
                mods.forEach(m => {
                    listHtml += `<tr><td>${m.unit_number || m.id}</td><td>${escapeHtml(m.title)}</td><td><input type="checkbox" id="lock-${m.id}" ${m.is_locked ? 'checked' : ''}></td><td><button class="btn-small" onclick="adminUpdateModule('${type}', ${m.id}, { is_locked: document.getElementById('lock-${m.id}').checked })">Save</button> <button class="btn-small btn-danger" onclick="adminDeleteModule('${type}', ${m.id})">Delete</button></td></tr>`;
                });
                listHtml += `</tbody></table></div></div>`;
                document.getElementById('modulesListContainer').innerHTML = listHtml;
            };
            
            document.getElementById('adminModuleType').addEventListener('change', (e) => renderModuleList(e.target.value));
            renderModuleList('learner');
        }
        
        function renderStatsTab() {
            document.getElementById('adminTabContent').innerHTML = `<div class="card"><h3>📊 Platform Statistics</h3><p><i class="fas fa-users"></i> Total Users: ${users.length}</p><p><i class="fas fa-book-open"></i> Modules Completed: ${Object.values(userProgress).filter(p => p === 100).length}</p><p><i class="fas fa-chart-line"></i> Active Learners: ${Object.keys(userProgress).length}</p><p><i class="fas fa-database"></i> Supabase Connected</p><button class="btn-small" onclick="exportStats()">Export Report</button></div>`;
        }
        
        document.getElementById('adminTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.admin-tab');
            if (!tab) return;
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'users') renderUsersTab();
            if (tab.dataset.tab === 'modules') renderModulesTab();
            if (tab.dataset.tab === 'stats') renderStatsTab();
        });
        renderUsersTab();
    }
    
    window.adminDeleteUser = adminDeleteUser;
    window.adminUpdateModule = adminUpdateModule;
    window.adminDeleteModule = adminDeleteModule;
    window.handleAddModule = async () => {
        const type = document.getElementById('adminModuleType').value;
        const module_number = parseInt(document.getElementById('adminModuleNumber').value);
        const title = document.getElementById('adminModuleTitle').value;
        const description = document.getElementById('adminModuleDesc').value;
        if (!title || !module_number) { showToast('Title and number required', 'error'); return; }
        await adminAddModule(type, { module_number, title, description: description || 'New module', content: '<p>New content</p>', price: 0, is_locked: false });
        document.getElementById('adminModuleTitle').value = '';
        document.getElementById('adminModuleDesc').value = '';
        document.getElementById('adminModuleNumber').value = '';
    };
    window.exportStats = () => { showToast('Stats exported to console', 'info'); console.log('Stats', { users: window.allUsers, progress: userProgress }); };
    
    // ============= PAGE RENDERING =============
    async function renderModulePage(moduleType) {
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="spinner"></div>';
        const materials = await fetchMaterials(moduleType);
        const cards = materials.map(m => `
            <div class="card" onclick="viewMaterial(${m.id}, '${moduleType}')">
                <h3><i class="fas ${moduleType === 'learner' ? 'fa-graduation-cap' : moduleType === 'psv' ? 'fa-bus' : moduleType === 'boda' ? 'fa-motorcycle' : 'fa-charging-station'}"></i> ${escapeHtml(m.title)}</h3>
                <p>${escapeHtml(m.description?.substring(0, 80) || 'Click to start learning')}</p>
                <div class="progress-bar"><div class="progress-fill" style="width: ${userProgress[m.id] || 0}%"></div></div>
                <button class="btn-small">Start →</button>
            </div>
        `).join('');
        container.innerHTML = `<div class="hero"><h1>${moduleType.toUpperCase()} <span class="highlight">Course</span></h1><p>NTSA certified curriculum</p></div><div class="grid">${cards}</div>`;
    }
    
    window.viewMaterial = async function(id, type) {
        const materials = await fetchMaterials(type);
        const material = materials.find(m => m.id == id);
        if (!material) return;
        const progress = userProgress[material.id] || 0;
        const content = material.content || generateUnitContent(material.unit_number || id, material.title);
        document.getElementById('page-content').innerHTML = `
            <div class="card">
                <h2>${escapeHtml(material.title)}</h2>
                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                <div class="content-body">${content}</div>
                <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
                    <button class="btn" onclick="updateProgress(${material.id}, 100)"><i class="fas fa-check"></i> Mark Complete</button>
                    <button class="btn-outline btn" onclick="navigateTo('${type}')"><i class="fas fa-arrow-left"></i> Back to Modules</button>
                </div>
            </div>
        `;
    };
    
    function renderHome() {
        document.getElementById('page-content').innerHTML = `
            <div class="hero"><h1>Learn Smart. <span class="highlight">Pass NTSA Test</span> Like A Pro.</h1><button class="btn" onclick="navigateTo('learner')">🚀 Start 21-Unit Course</button></div>
            <div class="grid"><div class="card" onclick="navigateTo('learner')"><h3>📚 Learner Hub</h3><p>Complete driver education</p></div><div class="card" onclick="navigateTo('psv')"><h3>🚌 PSV Course</h3><p>Professional service vehicle</p></div><div class="card" onclick="navigateTo('boda')"><h3>🏍️ Boda Safety</h3><p>Motorcycle training</p></div><div class="card" onclick="navigateTo('ev')"><h3>⚡ EV Course</h3><p>Electric vehicles</p></div></div>
            ${isAdmin ? `<div class="card" style="border-color: var(--primary); background: rgba(0,208,132,0.05);" onclick="navigateTo('admin')"><h3><i class="fas fa-shield-alt"></i> Admin Dashboard</h3><p>Manage users, modules & content</p><button class="btn-small">Go to Admin →</button></div>` : ''}
        `;
    }
    
    function renderQuiz() {
        document.getElementById('page-content').innerHTML = `<div class="hero"><h1>📝 NTSA Practice Quiz</h1><p>Coming soon - 500+ questions</p><button class="btn" onclick="showToast('Quiz module launching soon!', 'info')">Get Notified</button></div>`;
    }
    
    async function renderCurrentPage() {
        if (currentPage === 'admin' && isAdmin) await renderAdminDashboard();
        else if (currentPage === 'home') renderHome();
        else if (currentPage === 'quiz') renderQuiz();
        else if (['learner', 'psv', 'boda', 'ev'].includes(currentPage)) await renderModulePage(currentPage);
        else renderHome();
    }
    
    // ============= AUTHENTICATION =============
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const { data: profile } = await supabase.from('user_profiles').select('is_admin').eq('id', currentUser.id).maybeSingle();
            isAdmin = profile?.is_admin === true;
            await fetchUserProgress();
        } else {
            currentUser = null;
            isAdmin = false;
            userProgress = {};
        }
        updateAuthUI();
        await renderCurrentPage();
    }
    
    function updateAuthUI() {
        const authDiv = document.getElementById('authButtons');
        if (!authDiv) return;
        if (currentUser) {
            authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-user-circle"></i> ${currentUser.email?.split('@')[0] || 'User'}</div><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
        } else {
            authDiv.innerHTML = `<button onclick="showLoginModal()"><i class="fas fa-sign-in-alt"></i> Login</button><button onclick="showSignupModal()"><i class="fas fa-user-plus"></i> Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser = null; isAdmin = false; userProgress = {}; updateAuthUI(); currentPage = 'home'; await renderCurrentPage(); showToast('Logged out', 'info'); }
    
    function showLoginModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="card" style="max-width: 450px; margin: 40px auto;">
                <h2><i class="fas fa-key"></i> Login</h2>
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
                <button class="btn" onclick="performLogin()">Login</button>
                <p style="margin-top: 16px;">New user? <span style="color: var(--primary); cursor: pointer;" onclick="showSignupModal()">Sign up here</span></p>
            </div>
        `;
    }
    
    async function performLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { showToast(error.message, 'error'); return; }
        showToast('Login successful!', 'success');
        await checkSession();
        navigateTo('home');
    }
    
    function showSignupModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="card" style="max-width: 450px; margin: 40px auto;">
                <h2><i class="fas fa-user-plus"></i> Sign Up</h2>
                <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="minimum 6 characters"></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name"></div>
                <button class="btn" onclick="performSignup()">Create Account</button>
                <p style="margin-top: 16px;">Already have an account? <span style="color: var(--primary); cursor: pointer;" onclick="showLoginModal()">Login</span></p>
            </div>
        `;
    }
    
    async function performSignup() {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const fullName = document.getElementById('signupName').value;
        const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) { showToast(error.message, 'error'); return; }
        await supabase.from('user_profiles').upsert({ id: data.user.id, email: email, full_name: fullName, status: 'active', is_admin: false });
        showToast('Account created! Please check email to confirm.', 'success');
        showLoginModal();
    }
    
    window.navigateTo = async function(page) {
        currentPage = page;
        await renderCurrentPage();
        window.scrollTo({ top: 0 });
    };
    
    window.performLogin = performLogin;
    window.performSignup = performSignup;
    window.showLoginModal = showLoginModal;
    window.showSignupModal = showSignupModal;
    window.logout = logout;
    window.updateProgress = updateProgress;
    window.viewMaterial = viewMaterial;
    
    // Initialize
    initSupabase();
    checkSession();
    window.allUsers = [];
</script>
</body>
</html>
