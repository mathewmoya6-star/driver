    <style>
        /* ============================================
           RESET & BASE VARIABLES
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B0F19;
            color: #E8EDF5;
            line-height: 1.5;
            overflow-x: hidden;
        }

        :root {
            --accent: #00d084;
            --accent-dark: #00a86b;
            --accent-light: #4ade80;
            --accent-glow: rgba(0, 208, 132, 0.2);
            --bg-primary: #0B0F19;
            --bg-secondary: #0F1622;
            --bg-card: #121B2C;
            --bg-hover: #1A2538;
            --border: #1E2A3E;
            --border-light: #2A3A50;
            --text-primary: #FFFFFF;
            --text-secondary: #A0B3D9;
            --text-muted: #6B7FA3;
            --error: #EF4444;
            --warning: #F59E0B;
            --success: #00d084;
            --info: #3B82F6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(0, 208, 132, 0.15);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dark); }

        /* Selection */
        ::selection { background: var(--accent); color: #0B0F19; }

        /* ============================================
           TYPOGRAPHY
        ============================================ */
        h1, h2, h3, h4, h5, h6 { font-weight: 700; line-height: 1.2; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
        h2 { font-size: clamp(1.5rem, 4vw, 2rem); }
        h3 { font-size: 1.25rem; }
        
        a { text-decoration: none; color: inherit; }
        
        /* ============================================
           LAYOUT COMPONENTS
        ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        .navbar {
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 208, 132, 0.2);
            padding: 16px 0;
            transition: var(--transition);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--text-primary); background: none; -webkit-background-clip: unset; }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .nav-links button:hover {
            background: rgba(0, 208, 132, 0.1);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .admin-link {
            background: rgba(0, 208, 132, 0.1);
            color: var(--accent) !important;
        }

        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #071120 0%, #0A1628 100%);
            padding: 80px 24px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(0, 208, 132, 0.08), transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFFFFF, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .hero-btns {
            margin-top: 32px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn-primary, .btn-secondary, .btn-outline {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #0B0F19;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 208, 132, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(0, 208, 132, 0.1);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Section Styles */
        .section-title {
            font-size: 2rem;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent);
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        /* Course Grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin: 32px 0;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }

        .card-img {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #0f1a2c, #0a1020);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .card-content {
            padding: 24px;
        }

        .card h3 {
            margin-bottom: 12px;
            color: var(--accent);
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .badge-accent {
            background: var(--accent);
            color: #0B0F19;
        }

        /* Auth Section */
        .auth-section {
            background: linear-gradient(135deg, #0F1622, #0B0F19);
            border-radius: 28px;
            padding: 48px;
            margin: 48px 0;
            border: 1px solid rgba(0, 208, 132, 0.2);
        }

        .auth-box {
            max-width: 480px;
            margin: 0 auto;
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 28px;
            color: var(--accent);
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        /* Quiz Panel */
        .quiz-panel {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            margin: 32px 0;
            border: 1px solid var(--border);
        }

        .quiz-timer {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            margin-bottom: 24px;
            font-family: monospace;
        }

        .question-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--bg-card);
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .option:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .option.correct {
            background: rgba(0, 208, 132, 0.15);
            border-color: var(--accent);
        }

        .option.wrong {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--error);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 28px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: var(--accent);
            transition: var(--transition);
        }

        .close-modal:hover { opacity: 0.7; }

        .modal-content h2 { color: var(--accent); margin-bottom: 20px; }
        .modal-content p { margin-bottom: 16px; line-height: 1.7; }
        .modal-content ul { margin-left: 20px; margin-bottom: 16px; }
        .modal-content li { margin: 8px 0; }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 48px;
            font-size: 0.85rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--bg-card);
            border-left: 3px solid var(--accent);
            padding: 14px 20px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-md);
            font-size: 0.9rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container { padding: 0 20px; }
            .hero { padding: 60px 20px; }
            .course-grid { gap: 20px; }
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                margin-top: 16px;
                gap: 8px;
            }
            .nav-links.show { display: flex; }
            .nav-links button { width: 100%; text-align: center; padding: 12px; }
            .hero { padding: 50px 16px; }
            .hero p { font-size: 1rem; }
            .hero-btns { flex-direction: column; align-items: center; }
            .hero-btns button { width: 100%; max-width: 280px; justify-content: center; }
            .section-title { font-size: 1.5rem; }
            .course-grid { grid-template-columns: 1fr; }
            .auth-section { padding: 32px 20px; margin: 32px 0; }
            .quiz-panel { padding: 20px; }
            .quiz-timer { font-size: 1.4rem; }
            .question-card { padding: 20px; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 16px; }
            .card-content { padding: 18px; }
            .btn-primary, .btn-secondary { padding: 12px 24px; font-size: 0.9rem; }
        }
    </style>
</head>

    // Question Bank
    const questionBank = [
        { id: 1, text: "What is the maximum speed limit for a PSV vehicle in Kenya?", options: ["100 km/h", "80 km/h", "110 km/h", "50 km/h"], correct: 1, explanation: "PSV vehicles are legally limited to 80 km/h for passenger safety." },
        { id: 2, text: "What does the 'STOP' sign require drivers to do?", options: ["Slow down and proceed", "Come to a complete halt", "Give way to right", "Sound horn"], correct: 1, explanation: "A STOP sign requires a complete halt at the designated line." },
        { id: 3, text: "What is the legal blood alcohol limit for commercial drivers in Kenya?", options: ["0.05%", "0.08%", "0.00%", "0.10%"], correct: 2, explanation: "Commercial drivers must maintain 0.00% blood alcohol concentration." }
    ];

    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    function renderCourseGrid() {
        const grid = document.getElementById('courseGrid');
        grid.innerHTML = coursesData.map(course => `
            <div class="card" onclick="viewLesson(${course.id})">
                <div class="card-img">${course.icon}</div>
                <div class="card-content">
                    <span class="badge badge-accent">NTSA Certified</span>
                    <h3>${course.title}</h3>
                    <p>${course.description.substring(0, 100)}${course.description.length > 100 ? '...' : ''}</p>
                    <button class="btn-outline" style="width:100%;">Start Learning →</button>
                </div>
            </div>
        `).join('');
    }

    function viewLesson(courseId) {
        const course = coursesData.find(c => c.id === courseId);
        if (course) {
            document.getElementById('lessonContent').innerHTML = course.content;
            document.getElementById('lessonModal').style.display = 'flex';
        }
    }

    function closeLessonModal() {
        document.getElementById('lessonModal').style.display = 'none';
    }

    // ============================================
    // AUTHENTICATION
    // ============================================
    async function registerUser() {
        const name = document.getElementById('signupName')?.value;
        const email = document.getElementById('signupEmail')?.value;
        const password = document.getElementById('signupPassword')?.value;

        if (!email || !password || password.length < 6) {
            showToast("Password must be at least 6 characters", "error");
            return;
        }

        const { error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { full_name: name || email.split('@')[0] } }
        });

        if (error) { showToast(error.message, "error"); return; }
        showToast("Account created! Please verify your email.", "success");
        document.getElementById('signupName').value = '';
        document.getElementById('signupEmail').value = '';
        document.getElementById('signupPassword').value = '';
    }

    async function loginUser() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;

        if (!email || !password) {
            showToast("Enter email and password", "error");
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { showToast(error.message, "error"); return; }

        currentUser = data.user;
        localStorage.setItem('mei_user', JSON.stringify({ id: currentUser.id, email: currentUser.email }));

        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('authNavBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline-block';

        showToast(`Welcome ${currentUser.email.split('@')[0]}!`, "success");
    }

    async function logoutUser() {
        await supabase.auth.signOut();
        currentUser = null;
        localStorage.removeItem('mei_user');

        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('authNavBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';

        showToast("Logged out successfully", "info");
    }

    // ============================================
    // QUIZ SYSTEM
    // ============================================
    function initQuiz() {
        currentQuiz.questions = [...questionBank];
        currentQuiz.currentIndex = 0;
        currentQuiz.score = 0;
        currentQuiz.timeLeft = 300;
        renderQuizQuestion();
        startQuizTimer();
    }

    function renderQuizQuestion() {
        if (currentQuiz.currentIndex >= currentQuiz.questions.length) {
            const percent = Math.round((currentQuiz.score / currentQuiz.questions.length) * 100);
            document.getElementById('quizContainer').innerHTML = `
                <div class="question-card" style="text-align:center;">
                    <h3>🎉 Quiz Complete!</h3>
                    <p style="font-size:1.2rem; margin:20px 0;">Your score: ${currentQuiz.score}/${currentQuiz.questions.length} (${percent}%)</p>
                    <button class="btn-primary" onclick="initQuiz()">Restart Quiz</button>
                </div>
            `;
            if (percent >= 80) showToast("Excellent! Great job!", "success");
            return;
        }

        const q = currentQuiz.questions[currentQuiz.currentIndex];
        document.getElementById('quizContainer').innerHTML = `
            <div class="question-card">
                <h3 style="margin-bottom:8px;">Question ${currentQuiz.currentIndex + 1}/${currentQuiz.questions.length}</h3>
                <div class="question-text">${q.text}</div>
                <div class="options-group">
                    ${q.options.map((opt, idx) => `
                        <div class="option" onclick="answerQuestion(${idx})">
                            ${String.fromCharCode(65 + idx)}. ${opt}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    window.answerQuestion = function(selected) {
        const q = currentQuiz.questions[currentQuiz.currentIndex];
        if (selected === q.correct) {
            currentQuiz.score++;
            showToast(`✅ Correct! ${q.explanation}`, "success");
        } else {
            showToast(`❌ Wrong. ${q.explanation}`, "error");
        }
        currentQuiz.currentIndex++;
        renderQuizQuestion();
    };

    function startQuizTimer() {
        if (currentQuiz.timer) clearInterval(currentQuiz.timer);
        currentQuiz.timer = setInterval(() => {
            if (currentQuiz.timeLeft <= 0) {
                clearInterval(currentQuiz.timer);
                document.getElementById('quizContainer').innerHTML = `
                    <div class="question-card" style="text-align:center;">
                        <h3>⏰ Time's Up!</h3>
                        <button class="btn-primary" onclick="initQuiz()">Try Again</button>
                    </div>
                `;
                return;
            }
            currentQuiz.timeLeft--;
            const mins = Math.floor(currentQuiz.timeLeft / 60);
            const secs = currentQuiz.timeLeft % 60;
            document.getElementById('quizTimer').innerHTML = `⏱️ ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    function scrollToSection(id) {
        const element = document.getElementById(id);
        if (element) element.scrollIntoView({ behavior: 'smooth' });
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        toast.innerHTML = `${icon} ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function checkSession() {
        const stored = localStorage.getItem('mei_user');
        if (stored) {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('authNavBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
            }
        }
    }

    // Mobile Menu Toggle
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
        document.getElementById('navLinks')?.classList.toggle('show');
    });

    // Close mobile menu when clicking outside
    document.addEventListener('click', (e) => {
        const navLinks = document.getElementById('navLinks');
        const mobileBtn = document.getElementById('mobileMenuBtn');
        if (navLinks?.classList.contains('show') && 
            !navLinks.contains(e.target) && 
            mobileBtn && !mobileBtn.contains(e.target)) {
            navLinks.classList.remove('show');
        }
    });

    // Expose global functions
    window.viewLesson = viewLesson;
    window.closeLessonModal = closeLessonModal;
    window.scrollToSection = scrollToSection;
    window.loginUser = loginUser;
    window.registerUser = registerUser;
    window.logoutUser = logoutUser;
    window.initQuiz = initQuiz;
    window.answerQuestion = answerQuestion;

    // Initialize
    renderCourseGrid();
    checkSession();
    initQuiz();
</script>
</body>
</html>
