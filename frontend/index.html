<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | NTSA Driver Training & Test Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; line-height: 1.5; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --secondary: #00d4aa;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text-muted: #888888;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212,175,55,0.3);
            z-index: 1000;
            padding: 0.8rem 2rem;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { color: var(--primary); font-size: 1.5rem; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button, .nav-btn {
            background: transparent;
            border: none;
            color: #a0a0a0;
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links button:hover { background: rgba(212,175,55,0.1); color: var(--primary); }
        .btn-primary-nav {
            background: var(--gradient-gold);
            color: #000 !important;
            font-weight: 700;
        }
        .user-badge {
            background: rgba(212,175,55,0.15);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; }
            .nav-links.show { display: flex; }
            .mobile-menu { display: block; }
        }

        .hero {
            min-height: 85vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(10,10,10,0.85) 100%), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 100px 2rem 4rem;
        }
        .hero-content { max-width: 1400px; margin: 0 auto; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin-bottom: 2rem; }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--gradient-gold); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(212,175,55,0.1); }
        .btn-small { padding: 6px 14px; font-size: 12px; }
        .btn-danger { background: var(--danger); color: white; }
        
        .stats-bar {
            background: #0f0f0f;
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
            text-align: center;
        }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .stat-item p { color: var(--text-muted); }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 4rem 0; }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 2.5rem; }
        .section-title span { color: var(--primary); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.8rem;
        }
        .card {
            background: #111111;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .module-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--primary);
            color: #000;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .module-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0.8rem 0; }
        .module-features { list-style: none; margin: 0.8rem 0; }
        .module-features li { padding: 5px 0; display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.85rem; }
        .module-features i { color: var(--primary); width: 20px; }
        .progress-bar { background: #1e1e2a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; }
        
        .quiz-demo {
            background: linear-gradient(135deg, #111111 0%, #0a0a0a 100%);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border);
        }
        .quiz-option {
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .quiz-option:hover { border-color: var(--primary); background: rgba(212,175,55,0.1); }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .library-card {
            background: #111111;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
        }
        .library-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem; }
        
        .admin-section { margin: 2rem 0; }
        .admin-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
        .admin-tab {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            background: #1a1a1a;
            transition: 0.2s;
        }
        .admin-tab.active { background: var(--primary); color: #000; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        input, select, textarea {
            background: #0f0f15;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 12px;
            color: white;
            width: 100%;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111111;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
        }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2100; }
        .toast { background: #111; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .section-title { font-size: 1.6rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="navigateTo('home')"><i class="fas fa-car"></i> MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="navigateTo('home')">🏠 Home</button>
                <button onclick="navigateTo('learner')">📚 Learner Hub</button>
                <button onclick="navigateTo('psv')">🚌 PSV Course</button>
                <button onclick="navigateTo('boda')">🏍️ Boda Safety</button>

                <div id="authButtons"></div>

        </div>
    </nav>
    <main id="page-content"><div class="container" style="padding: 120px 20px; text-align:center;"><div style="width:40px; height:40px; border:3px solid #333; border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Education | support@meidrive.com</footer>
</div>
<div id="toast-container" class="toast-container"></div>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<script>
    // ============= SUPABASE CONFIGURATION =============
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    let supabase;
    let currentUser = null;
    let isAdmin = false;
    let currentPage = 'home';
    let userProgress = {};
    
    // Complete Course Modules (All 6 modules including School Bus)
    let courseModules = [
        { id: 1, name: "Learner Hub", type: "learner", price: 0, duration: "25 hours", lessons: 21, description: "Complete NTSA-approved driver training - theory & practical prep", icon: "fa-id-card", enrolled: 1245, popular: true },
        { id: 2, name: "EV Drivers & Riders", type: "ev", price: 0, duration: "12 hours", lessons: 8, description: "Electric vehicle safety, charging & efficiency training", icon: "fa-charging-station", enrolled: 567, popular: false },
        { id: 3, name: "Boda Boda Safety", type: "boda", price: 0, duration: "18 hours", lessons: 10, description: "Motorcycle safety, defensive riding & road ethics", icon: "fa-motorcycle", enrolled: 2341, popular: true },
        { id: 4, name: "PSV Professional", type: "psv", price: 2999, duration: "15 hours", lessons: 10, description: "Matatu, bus & commercial driver certification", icon: "fa-bus", enrolled: 892, popular: false },
        { id: 5, name: "School Bus/Van Driver", type: "schoolbus", price: 1999, duration: "12 hours", lessons: 12, description: "Specialized safety training for school transport drivers", icon: "fa-chalkboard-user", enrolled: 456, popular: true },
        { id: 6, name: "Digital Road Safety Library", type: "library", price: 0, duration: "Unlimited", lessons: 50, description: "Comprehensive digital resources, manuals, and safety guides", icon: "fa-book-open", enrolled: 890, popular: false }
    ];
    
    // Detailed Materials per type (including School Bus)
    let materialsDB = {
        learner: Array.from({ length: 21 }, (_, i) => ({ id: i+1, title: `Unit ${i+1}: ${["Intro to Driving","Highway Code","Vehicle Controls","Maintenance","Moving Off","Turning","Roundabouts","Overtaking","Speed Limits","Defensive Driving","Night Driving","Adverse Weather","Alcohol & Drugs","Fatigue","Pedestrian Safety","Emergency Procedures","First Aid","Insurance","Environmental Driving","NTSA Prep","Advanced Skills"][i]}`, description: `Complete NTSA unit ${i+1}`, content: `<div style="padding:1rem;"><h3>${["Intro to Driving","Highway Code","Vehicle Controls","Maintenance","Moving Off","Turning","Roundabouts","Overtaking","Speed Limits","Defensive Driving","Night Driving","Adverse Weather","Alcohol & Drugs","Fatigue","Pedestrian Safety","Emergency Procedures","First Aid","Insurance","Environmental Driving","NTSA Prep","Advanced Skills"][i]}</h3><div class="safety-box" style="background:rgba(212,175,55,0.1); padding:1rem; border-radius:12px; margin:1rem 0;"><i class="fas fa-shield-alt"></i> Official NTSA curriculum content.</div><p>Complete this unit to unlock practical knowledge.</p></div>`, unit_number: i+1, is_locked: false })),
        psv: Array.from({ length: 10 }, (_, i) => ({ id: 100+i, title: `PSV: ${["Licensing & Compliance","Driver Conduct","Passenger Safety","Defensive Driving","Route Management","Emergency Response","Fare Management","Customer Service","Vehicle Inspections","Incident Reporting"][i]}`, description: "Professional PSV training module", content: `<div class="safety-box">PSV professional driver training - NTSA compliant.</div><p>Essential for commercial drivers.</p>`, unit_number: i+1, is_locked: false })),
        boda: Array.from({ length: 12 }, (_, i) => ({ id: 200+i, title: `Boda: ${["Basic Controls","Gear Operation","Professionalism","Substance Abuse","Bike Maintenance","Security","Passenger Safety","Night Riding","Business Skills","Defensive Riding","First Aid","Legal Requirements"][i]}`, description: "Boda safety essentials", content: `<div class="safety-box">Boda safety training - defensive riding techniques.</div><p>Master professional motorcycle riding.</p>`, unit_number: i+1, is_locked: false })),
        ev: Array.from({ length: 10 }, (_, i) => ({ id: 300+i, title: `EV: ${["Introduction","Battery Technology","Charging Infrastructure","Maintenance","Safety Protocols","Range Management","Commercial EV","Regulations","Emergency Response","Future Tech"][i]}`, description: "Electric vehicle knowledge", content: `<div class="safety-box">Electric vehicle driver education.</div><p>Master EV technology and safety.</p>`, unit_number: i+1, is_locked: false })),
        schoolbus: Array.from({ length: 12 }, (_, i) => ({ id: 400+i, title: `School Bus: ${["Child Safety Protocols","Loading/Unloading","Route Planning","Student Management","Emergency Drills","Vehicle Inspection","Defensive Driving","Communication Systems","First Aid for Children","Legal Compliance","Drug & Alcohol Policy","Parent Communication"][i]}`, description: "School transport safety", content: `<div class="safety-box"><i class="fas fa-child"></i> Critical safety training for school bus/van operators.</div><p>Protect Kenya's children with professional training.</p>`, unit_number: i+1, is_locked: false }))
    };
    
    // Digital Road Safety Library Resources
    let digitalLibrary = [
        { id: 1, title: "Kenya Highway Code (Official)", type: "PDF", icon: "fa-book", downloads: 5245, description: "Complete NTSA highway code manual" },
        { id: 2, title: "Defensive Driving Techniques", type: "Video", icon: "fa-video", downloads: 3120, description: "Video series on defensive driving" },
        { id: 3, title: "Road Signs & Markings Guide", type: "PDF", icon: "fa-signs-post", downloads: 2890, description: "All Kenyan road signs explained" },
        { id: 4, title: "Emergency First Aid for Drivers", type: "PDF", icon: "fa-medkit", downloads: 1756, description: "Life-saving techniques" },
        { id: 5, title: "School Bus Safety Handbook", type: "PDF", icon: "fa-chalkboard", downloads: 1432, description: "Complete guide for school transport" },
        { id: 6, title: "EV Safety & Maintenance", type: "Video", icon: "fa-charging-station", downloads: 987, description: "Electric vehicle care" },
        { id: 7, title: "NTSA Practice Test Bank", type: "Interactive", icon: "fa-tasks", downloads: 4231, description: "500+ exam questions" },
        { id: 8, title: "Boda Boda Safety Manual", type: "PDF", icon: "fa-motorcycle", downloads: 2678, description: "Specialized for motorcycle riders" }
    ];
    
    let quizQuestions = [
        { id: 1, question: "What is the minimum age for a private vehicle learner's licence in Kenya?", options: ["16 years", "17 years", "18 years", "21 years"], correct: 2, explanation: "NTSA requires 18 years for learner's licence." },
        { id: 2, question: "What does a continuous yellow line on a two-way road mean?", options: ["Overtaking encouraged", "No overtaking", "Parking allowed", "Slow down only"], correct: 1, explanation: "Solid yellow line = no overtaking zone." },
        { id: 3, question: "What is the legal blood alcohol limit for a private driver in Kenya?", options: ["0.00%", "0.05%", "0.08%", "0.10%"], correct: 1, explanation: "BAC limit is 0.05%." },
        { id: 4, question: "When transporting school children, the maximum speed limit is?", options: ["80 km/h", "60 km/h", "50 km/h", "40 km/h"], correct: 1, explanation: "School vehicles limited to 60 km/h on highways." },
        { id: 5, question: "What does ABS stand for in vehicles?", options: ["Auto Brake System", "Anti-lock Braking System", "Advanced Brake Safety", "Automatic Brake Sensor"], correct: 1, explanation: "Anti-lock Braking System prevents wheel lockup." }
    ];
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type] || 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function initSupabase() {
        supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const { data: profile } = await supabase.from('user_profiles').select('is_admin').eq('id', currentUser.id).maybeSingle();
            isAdmin = profile?.is_admin === true;
            await loadUserProgressFromSupabase();
        }
        updateAuthUI();
    }
    
    async function loadUserProgressFromSupabase() {
        if (!currentUser) return;
        const { data } = await supabase.from('user_progress').select('*').eq('user_id', currentUser.id);
        if (data) data.forEach(p => { userProgress[p.material_id] = p.progress_percentage || 0; });
    }
    
    async function updateProgress(materialId, progress) {
        if (!currentUser) { showToast('Please login to save progress', 'warning'); showLoginModal(); return; }
        if (supabase) {
            await supabase.from('user_progress').upsert({ user_id: currentUser.id, material_id: materialId, progress_percentage: progress, status: progress === 100 ? 'completed' : 'in_progress', last_accessed_at: new Date() });
        }
        userProgress[materialId] = progress;
        showToast(progress === 100 ? '🎉 Unit Completed! +50 XP' : 'Progress saved', 'success');
        renderCurrentPage();
    }
    
    async function renderModulePage(type) {
        const materials = materialsDB[type] || [];
        const cards = materials.map(m => `
            <div class="card" onclick="viewMaterial(${m.id}, '${type}')">
                <div class="progress-bar"><div class="progress-fill" style="width: ${userProgress[m.id] || 0}%"></div></div>
                <h3><i class="fas ${type === 'learner' ? 'fa-graduation-cap' : type === 'psv' ? 'fa-bus' : type === 'boda' ? 'fa-motorcycle' : type === 'ev' ? 'fa-charging-station' : 'fa-chalkboard-user'}"></i> ${escapeHtml(m.title)}</h3>
                <p style="color:#888; margin:8px 0;">${escapeHtml(m.description)}</p>
                <button class="btn btn-primary btn-small">${userProgress[m.id] === 100 ? 'Review ✓' : 'Start →'}</button>
            </div>
        `).join('');
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <div class="hero" style="background: none; min-height: auto; padding: 2rem 0;"><h1><span>${type.toUpperCase().replace('SCHOOLBUS','SCHOOL BUS/VAN')}</span> Course</h1><p>NTSA certified curriculum. Track your progress.</p></div>
                <div class="grid">${cards}</div>
            </div>
        `;
    }
    
    window.viewMaterial = async function(id, type) {
        const material = materialsDB[type].find(m => m.id == id);
        if (!material) return;
        const progress = userProgress[material.id] || 0;
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px; max-width: 900px;">
                <div class="card">
                    <h2>${escapeHtml(material.title)}</h2>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <div style="margin: 24px 0;">${material.content}</div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="updateProgress(${material.id}, 100)"><i class="fas fa-check"></i> Mark Complete</button>
                        <button class="btn btn-outline" onclick="navigateTo('${type}')"><i class="fas fa-arrow-left"></i> Back</button>
                    </div>
                </div>
            </div>
        `;
    };
    
    function renderLibrary() {
        const libItems = digitalLibrary.map(item => `
            <div class="library-card">
                <i class="fas ${item.icon}"></i>
                <h3>${escapeHtml(item.title)}</h3>
                <p style="color:#888; font-size:13px;">${item.type} • ${item.downloads.toLocaleString()} downloads</p>
                <p style="font-size:12px; margin:8px 0;">${escapeHtml(item.description)}</p>
                <button class="btn btn-outline btn-small" onclick="downloadResource(${item.id})"><i class="fas fa-download"></i> Access Resource</button>
            </div>
        `).join('');
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <div class="hero" style="background: none; padding: 2rem 0;"><h1><span>📖 Digital Road Safety Library</span></h1><p>Free access to NTSA-approved manuals, videos, and study materials</p></div>
                <div class="library-grid">${libItems}</div>
            </div>
        `;
    }
    
    window.downloadResource = (id) => {
        const resource = digitalLibrary.find(r => r.id === id);
        if (resource) {
            showToast(`Opening: ${resource.title} - Premium content ready`, 'success');
            if (supabase && currentUser) {
                supabase.from('library_access_logs').insert({ user_id: currentUser.id, resource_id: id, accessed_at: new Date() }).catch(e=>console.log);
            }
        }
    };
    
    function renderHome() {
        const totalProgress = Object.values(userProgress).filter(p => p === 100).length;
        document.getElementById('page-content').innerHTML = `
            <section class="hero">
                <div class="hero-content">
                    <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
                    <p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. Complete driver education platform with 6 specialized courses + digital safety library.</p>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="navigateTo('learner')"><i class="fas fa-road"></i> Explore Courses</button>
                        <button class="btn btn-outline" onclick="showLoginModal()"><i class="fas fa-user-graduate"></i> Get Started</button>
                    </div>
                </div>
            </section>
            <div class="stats-bar">
                <div class="stat-item"><h3>15K+</h3><p>Active Students</p></div>
                <div class="stat-item"><h3>6</h3><p>Expert Courses</p></div>
                <div class="stat-item"><h3>98%</h3><p>Pass Rate</p></div>
                <div class="stat-item"><h3>50+</h3><p>Library Resources</p></div>
            </div>
            <div class="container section"><h2 class="section-title">Our <span>Complete Course Catalog</span></h2><div class="grid" id="homeModulesGrid"></div></div>
            <div class="container section"><h2 class="section-title">Test Your <span>Knowledge</span></h2><div class="quiz-demo" id="quizPreview"></div></div>
        `;
        const homeGrid = document.getElementById('homeModulesGrid');
        if(homeGrid) homeGrid.innerHTML = courseModules.map(m => `<div class="card" onclick="navigateTo('${m.type}')"><i class="fas ${m.icon}" style="font-size:2rem; color:var(--primary);"></i><h3>${m.name}</h3><p>${m.description.substring(0,80)}...</p><div class="module-price">${m.price === 0 ? 'FREE' : `KES ${m.price.toLocaleString()}`}</div><button class="btn btn-primary btn-small">${m.type === 'library' ? 'Browse Library →' : 'Enroll Now'}</button></div>`).join('');
        const quizPreview = document.getElementById('quizPreview');
        if(quizPreview && quizQuestions[0]) quizPreview.innerHTML = `<div class="quiz-question">${escapeHtml(quizQuestions[0].question)}</div><div class="quiz-options">${quizQuestions[0].options.map((opt,i)=>`<div class="quiz-option" onclick="previewAnswer(${i})">${escapeHtml(opt)}</div>`).join('')}</div><div id="previewFeedback"></div><button class="btn btn-outline btn-small" style="margin-top:1rem;" onclick="navigateTo('quizPage')">Full Practice Test →</button>`;
    }
    
    window.previewAnswer = (selected) => {
        const q = quizQuestions[0];
        const fb = document.getElementById('previewFeedback');
        if(selected === q.correct) fb.innerHTML = `<span style="color:#2ecc71;">✓ Correct! ${q.explanation}</span>`;
        else fb.innerHTML = `<span style="color:#e74c3c;">✗ Correct answer: ${q.options[q.correct]}</span>`;
    };
    
    function renderQuizPage() {
        let currentQ = 0;
        const renderQuestion = () => {
            if(currentQ >= quizQuestions.length) {
                document.getElementById('quizFull').innerHTML = `<div style="text-align:center; padding:2rem;"><h3>🎉 Quiz Complete!</h3><button class="btn btn-primary" onclick="navigateTo('home')">Back Home</button></div>`;
                return;
            }
            const q = quizQuestions[currentQ];
            document.getElementById('quizFull').innerHTML = `<div class="quiz-question">${escapeHtml(q.question)}</div><div class="quiz-options">${q.options.map((opt,i)=>`<div class="quiz-option" onclick="submitAnswer(${currentQ},${i})">${escapeHtml(opt)}</div>`).join('')}</div><div id="quizFeedback"></div>`;
        };
        window.submitAnswer = (qIdx, selected) => {
            const q = quizQuestions[qIdx];
            const fbDiv = document.getElementById('quizFeedback');
            if(selected === q.correct) { fbDiv.innerHTML = `<span style="color:#2ecc71;">✓ Correct! ${q.explanation}</span><button class="btn btn-small" style="margin-top:10px;" onclick="nextQuestion()">Next →</button>`; }
            else { fbDiv.innerHTML = `<span style="color:#e74c3c;">✗ Wrong! Correct: ${q.options[q.correct]}. ${q.explanation}</span><button class="btn btn-small" style="margin-top:10px;" onclick="nextQuestion()">Next →</button>`; }
        };
        window.nextQuestion = () => { currentQ++; renderQuestion(); };
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top: 100px;"><div class="card"><h2>📝 NTSA Practice Exam</h2><div id="quizFull"></div></div></div>`;
        renderQuestion();
    }
    
    // Auth Functions
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if(!container) return;
        if(currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentUser.email?.split('@')[0]}</div><button onclick="logout()">Logout</button>${isAdmin ? '<button class="btn-primary-nav" onclick="navigateTo(\'admin\')">Admin</button>' : ''}`;
        } else {
            container.innerHTML = `<button onclick="showLoginModal()">Login</button><button class="btn-primary-nav" onclick="showSignupModal()">Sign Up</button>`;
        }
    }
    
    function showLoginModal() { showAuthForm('login'); }
    function showSignupModal() { showAuthForm('signup'); }
    
    function showAuthForm(mode) {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 120px; max-width: 500px;">
                <div class="card"><h2>${mode === 'login' ? '🔐 Sign In' : '📝 Create Account'}</h2>
                <div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="your@email.com"></div>
                ${mode === 'signup' ? '<div class="form-group"><label>Full Name</label><input type="text" id="authName" placeholder="Your name"></div>' : ''}
                <div class="form-group"><label>Password</label><input type="password" id="authPassword" placeholder="password"></div>
                <button class="btn btn-primary" onclick="submitAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button>
                <p style="margin-top:1rem;">${mode === 'login' ? 'No account? <span style="color:var(--primary); cursor:pointer;" onclick="showSignupModal()">Sign up</span>' : 'Have account? <span style="color:var(--primary); cursor:pointer;" onclick="showLoginModal()">Login</span>'}</p>
                </div>
            </div>
        `;
    }
    
    window.submitAuth = async (mode) => {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        if(!email || !password) { showToast('Fill all fields','error'); return; }
        if(mode === 'login') {
            if(email === 'admin@meidrive.com' && password === 'admin123') {
                currentUser = { email: 'admin@meidrive.com', name: 'Admin', isAdmin: true };
                isAdmin = true;
                updateAuthUI();
                showToast('Admin logged in','success');
                navigateTo('admin');
                return;
            }
            if(supabase) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) { showToast(error.message, 'error'); return; }
                await initSupabase();
                showToast('Login successful!','success');
                navigateTo('home');
            } else {
                showToast('Supabase connection: Use admin@meidrive.com / admin123', 'info');
            }
        } else {
            if(supabase) {
                const name = document.getElementById('authName')?.value;
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if(error) { showToast(error.message, 'error'); return; }
                showToast('Account created! Please verify email.','success');
                showLoginModal();
            } else {
                showToast('Signup demo: Use admin login','info');
            }
        }
    };
    
    async function logout() {
        if(supabase) await supabase.auth.signOut();
        currentUser = null;
        isAdmin = false;
        userProgress = {};
        updateAuthUI();
        navigateTo('home');
        showToast('Logged out','info');
    }
    
    function renderAdminDashboard() {
        if(!isAdmin) { navigateTo('home'); return; }
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top: 100px;"><div class="admin-section"><div class="admin-tabs"><div class="admin-tab active" data-tab="stats">📊 Stats</div><div class="admin-tab" data-tab="modules">📦 Modules</div><div class="admin-tab" data-tab="library">📚 Library</div></div><div id="adminContent"><div class="card"><h3>Admin Dashboard Active</h3><p>Manage courses and resources from here.</p></div></div></div></div>`;
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                if(tab.dataset.tab === 'stats') document.getElementById('adminContent').innerHTML = `<div class="card"><h3>Platform Stats</h3><p>Total Courses: ${courseModules.length}</p><p>Library Resources: ${digitalLibrary.length}</p><p>Quiz Questions: ${quizQuestions.length}</p><button class="btn-small" onclick="showToast('Sync with Supabase','info')">Sync Data</button></div>`;
                if(tab.dataset.tab === 'modules') document.getElementById('adminContent').innerHTML = `<div class="card"><h3>Course Modules</h3><table><thead><tr><th>Name</th><th>Type</th><th>Price</th> </tr></thead><tbody>${courseModules.map(m => `<tr><td>${m.name}</td><td>${m.type}</td><td>${m.price === 0 ? 'FREE' : `KES ${m.price}`}</td></tr>`).join('')}</tbody></table></div>`;
                if(tab.dataset.tab === 'library') document.getElementById('adminContent').innerHTML = `<div class="card"><h3>Digital Library</h3><table><thead><tr><th>Title</th><th>Type</th><th>Downloads</th> </tr></thead><tbody>${digitalLibrary.map(l => `<tr><td>${l.title}</td><td>${l.type}</td><td>${l.downloads}</td></tr>`).join('')}</tbody></table></div>`;
            };
        });
    }
    
    async function renderCurrentPage() {
        if(currentPage === 'admin' && isAdmin) renderAdminDashboard();
        else if(currentPage === 'home') renderHome();
        else if(currentPage === 'quizPage') renderQuizPage();
        else if(currentPage === 'library') renderLibrary();
        else if(['learner','psv','boda','ev','schoolbus'].includes(currentPage)) await renderModulePage(currentPage);
        else renderHome();
        if(window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
    }
    
    window.navigateTo = (page) => { currentPage = page; renderCurrentPage(); window.scrollTo({top:0}); };
    window.toggleMobileMenu = () => document.getElementById('navLinks')?.classList.toggle('show');
    window.showLoginModal = showLoginModal;
    window.showSignupModal = showSignupModal;
    window.logout = logout;
    window.updateProgress = updateProgress;
    
    initSupabase();
    renderCurrentPage();
</script>
</body>
</html>
