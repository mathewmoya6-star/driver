<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | NTSA Driver Training & Certification</title>
    <meta name="description" content="NTSA-approved driver training platform. Practice daily, revise smarter, pass with confidence.">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="MEI DRIVE AFRICA | NTSA Driver Training">
    <meta property="og:description" content="NTSA-approved driver training platform. Practice daily, revise smarter, pass with confidence.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2300ff88'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='%230a192f' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        /* Navy + Green + White Theme - All CSS classes fixed */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --primary-light: #88ffcc;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
            --success: #00ff88;
            --danger: #ff4757;
            --warning: #ffa502;
        }
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(10, 25, 47, 0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; padding: 0.8rem 2rem; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-green); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--primary); font-size: 1.5rem; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button, .nav-links a { background: transparent; border: none; color: #a0b3d9; padding: 8px 14px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; text-decoration: none; }
        .nav-links button:hover, .nav-links a:hover { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        .btn-primary-nav { background: var(--gradient-green); color: #0a192f !important; font-weight: 700; }
        .user-badge { background: rgba(0, 255, 136, 0.15); border-radius: 40px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        @media (max-width: 768px) { .navbar { padding: 0.8rem 1rem; } .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } .nav-links.show { display: flex; } .mobile-menu { display: block; } }
        .hero { min-height: 85vh; background: linear-gradient(135deg, rgba(10, 25, 47, 0.95) 0%, rgba(13, 33, 55, 0.85) 100%), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 100px 2rem 4rem; }
        .hero-content { max-width: 1400px; margin: 0 auto; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin-bottom: 2rem; }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0, 255, 136, 0.1); transform: translateY(-2px); }
        .stats-bar { background: #0d2137; border-bottom: 1px solid var(--border); padding: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; text-align: center; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 4rem 0; }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 2.5rem; }
        .section-title span { color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; }
        .card { background: #0d2137; border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .module-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0.8rem 0; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; transition: width 0.3s ease; }
        .quiz-option { padding: 12px 16px; background: #112240; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(0, 255, 136, 0.1); transform: translateX(4px); }
        .quiz-category-selector { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .quiz-category-btn { background: #112240; border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; cursor: pointer; transition: 0.2s; color: #a0b3d9; }
        .quiz-category-btn.active, .quiz-category-btn:hover { background: var(--primary); color: #0a192f; border-color: var(--primary); }
        .search-input { background: #0f1a2c; border: 1px solid var(--border); padding: 10px 16px; border-radius: 50px; color: white; width: 100%; max-width: 300px; }
        .resource-tag { background: rgba(0, 255, 136, 0.2); padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin: 2px; color: var(--primary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        .skeleton { background: linear-gradient(90deg, #1e2a3a 25%, #2a3a4a 50%, #1e2a3a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2100; max-height: 300px; overflow-y: auto; }
        .toast { background: #0d2137; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; gap: 12px; animation: slideIn 0.3s ease; }
        .toast-close { cursor: pointer; color: var(--text-muted); font-size: 14px; background: none; border: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }
        footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .grid { grid-template-columns: 1fr; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: #0d2137; border: 1px solid var(--primary); border-radius: 24px; width: 90%; max-width: 500px; padding: 2rem; }
        input, select, textarea { background: #0f1a2c; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; width: 100%; margin: 8px 0; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,255,136,0.2); }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); background: none; border: none; font-size: 1rem; }
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #0d2137; padding: 1rem; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-wrap: wrap; }
        .quiz-feedback { margin-top: 1rem; padding: 0.5rem; border-radius: 8px; }
        .correct-option { border-color: #00ff88 !important; background: rgba(0,255,136,0.1) !important; }
        .selected-option { border-color: #ff4757 !important; background: rgba(255,71,87,0.1) !important; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo" onclick="app.navigate('home')" tabindex="0" role="button" aria-label="Home"><i class="fas fa-car" aria-hidden="true"></i> MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="app.toggleMobileMenu()" aria-label="Menu" role="button"><i class="fas fa-bars" aria-hidden="true"></i></div>
            <div class="nav-links" id="navLinks" role="menu">
                <button onclick="app.navigate('home')" role="menuitem">🏠 Home</button>
                <button onclick="app.navigate('courses')" role="menuitem">📚 Courses</button>
                <button onclick="app.navigate('quiz')" role="menuitem">📝 Quiz</button>
                <button onclick="app.navigate('library')" role="menuitem">📖 Safety Library</button>
                <button id="dashboardNavBtn" onclick="app.navigate('dashboard')" style="display:none;" role="menuitem">📊 Dashboard</button>
                <div id="authButtons" role="group"></div>
            </div>
        </div>
    </nav>
    <main id="page-content" role="main"><div class="container" style="padding: 120px 20px;"><div class="loading-spinner" aria-label="Loading"></div></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved | <a href="#" onclick="app.showLegal('privacy')" style="color:var(--primary);">Privacy</a> | <a href="#" onclick="app.showLegal('terms')" style="color:var(--primary);">Terms</a></footer>
</div>
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<script>
    // ==================== SUPABASE SETUP with Error Handling ====================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const appState = {
        supabase: null,
        currentUser: null,
        isAdmin: false,
        currentRoute: 'home',
        isLoading: false,
        courses: null,
        userStats: { totalProgress: 0, completedCourses: 0, quizScore: 0 },
        routeParams: {},
        libraryResources: []
    };
    
    // Helper functions
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const id = Date.now();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.id = `toast-${id}`;
        toast.setAttribute('role', 'alert');
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type] || 'ℹ️'} ${escapeHtml(msg)}<button class="toast-close" onclick="app.closeToast('${id}')" aria-label="Close">×</button>`;
        container.appendChild(toast);
        setTimeout(() => app.closeToast(id), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    const coursesData = [
        { id: 1, name: "Learner Hub", type: "learner", price: 0, duration: "25 hours", lessons: 21, description: "Complete NTSA-approved driver training", icon: "fa-id-card" },
        { id: 2, name: "EV Drivers & Riders", type: "ev", price: 0, duration: "12 hours", lessons: 12, description: "Electric vehicle safety training", icon: "fa-charging-station" },
        { id: 3, name: "Boda Boda Safety", type: "boda", price: 0, duration: "18 hours", lessons: 12, description: "Motorcycle safety & defensive riding", icon: "fa-motorcycle" },
        { id: 4, name: "PSV Professional", type: "psv", price: 2999, duration: "15 hours", lessons: 8, description: "Commercial driver certification", icon: "fa-bus" },
        { id: 5, name: "School Bus/Van Driver", type: "schoolbus", price: 1999, duration: "12 hours", lessons: 12, description: "School transport safety training", icon: "fa-chalkboard-user" },
        { id: 6, name: "Advanced Driver Academy", type: "advanced", price: 4999, duration: "20 hours", lessons: 10, description: "Professional driver excellence", icon: "fa-award" }
    ];
    appState.courses = coursesData;
    
    async function initSupabase() {
        try {
            appState.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            appState.supabase.auth.onAuthStateChange(async (event, session) => {
                try {
                    if (event === 'SIGNED_IN' && session) await handleUserLogin(session.user);
                    else if (event === 'SIGNED_OUT') handleUserLogout();
                    await checkSession();
                    renderCurrentRoute();
                } catch (err) { console.error('Auth state change error:', err); }
            });
            await checkSession();
        } catch (err) { showToast('Connection error: ' + err.message, 'error'); console.error(err); }
    }
    
    async function checkSession() {
        try {
            const { data: { session } } = await appState.supabase.auth.getSession();
            if (session && !appState.currentUser) await handleUserLogin(session.user);
            else if (!session && appState.currentUser) handleUserLogout();
            updateAuthUI();
        } catch (err) { console.error('Session check error:', err); }
    }
    
    async function isUserAdmin() {
        if (!appState.currentUser) return false;
        try {
            const { data, error } = await appState.supabase.rpc('is_admin_user');
            if (!error && data !== undefined) return !!data;
            const { data: profile } = await appState.supabase.from('user_profiles').select('is_admin').eq('id', appState.currentUser.id).maybeSingle();
            return profile?.is_admin === true;
        } catch { return false; }
    }
    
    async function handleUserLogin(user) {
        appState.currentUser = user;
        // Ensure profile exists
        try {
            const { data: existing } = await appState.supabase.from('user_profiles').select('id').eq('id', user.id).maybeSingle();
            if (!existing) {
                await appState.supabase.from('user_profiles').insert({ id: user.id, email: user.email, full_name: user.user_metadata?.full_name || '', is_admin: false, created_at: new Date() });
            }
        } catch (err) { console.warn('Profile creation check:', err); }
        appState.isAdmin = await isUserAdmin();
        await loadUserStats();
        updateAuthUI();
        renderCurrentRoute();
    }
    
    function handleUserLogout() {
        appState.currentUser = null;
        appState.isAdmin = false;
        appState.userStats = { totalProgress: 0, completedCourses: 0, quizScore: 0 };
        updateAuthUI();
        renderCurrentRoute();
    }
    
    async function loadUserStats() {
        if (!appState.currentUser) return;
        try {
            const { data: progress } = await appState.supabase.from('user_progress').select('progress_percentage').eq('user_id', appState.currentUser.id);
            if (progress?.length) {
                const total = progress.reduce((a, p) => a + (p.progress_percentage || 0), 0);
                appState.userStats.totalProgress = Math.round(total / progress.length);
            }
            const { data: enrolls } = await appState.supabase.from('enrollments').select('course_id').eq('user_id', appState.currentUser.id).eq('payment_status', 'verified');
            appState.userStats.completedCourses = enrolls?.length || 0;
            const { data: quizzes } = await appState.supabase.from('quiz_attempts').select('score').eq('user_id', appState.currentUser.id).order('id', { ascending: false }).limit(1);
            if (quizzes?.[0]) appState.userStats.quizScore = quizzes[0].score;
        } catch (err) { console.error('Load stats error:', err); }
    }
    
    async function enrollInCourse(courseId, price) {
        if (!appState.currentUser) { showToast('Please login', 'warning'); showLoginModal(); return false; }
        if (price === 0) {
            await appState.supabase.from('enrollments').upsert({ user_id: appState.currentUser.id, course_id: courseId, payment_status: 'verified', enrolled_at: new Date() });
            showToast('Enrolled successfully!', 'success');
            return true;
        }
        showToast(`Processing KES ${price}...`, 'info');
        await new Promise(r => setTimeout(r, 800));
        await appState.supabase.from('enrollments').upsert({ user_id: appState.currentUser.id, course_id: courseId, payment_status: 'verified', enrolled_at: new Date(), amount_paid: price });
        showToast('Payment verified! Course unlocked.', 'success');
        return true;
    }
    
    async function updateProgress(courseId, progressPercent) {
        if (!appState.currentUser) return false;
        try {
            await appState.supabase.from('user_progress').upsert({ user_id: appState.currentUser.id, course_id: courseId, progress_percentage: progressPercent, updated_at: new Date() });
            await loadUserStats();
            return true;
        } catch (err) { console.error('Progress update error:', err); return false; }
    }
    
    async function signUp(email, password, fullName) {
        try {
            const { data, error } = await appState.supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
            if (error) throw error;
            if (data.user) {
                showToast('Account created! Please verify your email.', 'success');
                return true;
            }
        } catch (err) { showToast(err.message, 'error'); return false; }
        return false;
    }
    
    async function signIn(email, password) {
        try {
            const { error } = await appState.supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            showToast('Logged in successfully!', 'success');
            return true;
        } catch (err) { showToast(err.message, 'error'); return false; }
    }
    
    async function signOut() { await appState.supabase.auth.signOut(); showToast('Logged out', 'info'); app.navigate('home'); }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        const dashboardBtn = document.getElementById('dashboardNavBtn');
        if (!container) return;
        if (appState.currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${escapeHtml(appState.currentUser.email?.split('@')[0])}</div><button onclick="app.signOut()">Logout</button>${appState.isAdmin ? '<button class="btn-primary-nav" onclick="app.navigate(\'admin\')">Admin</button>' : ''}`;
            if (dashboardBtn) dashboardBtn.style.display = 'inline-block';
        } else {
            container.innerHTML = `<button onclick="app.showLoginModal()">Login</button><button class="btn-primary-nav" onclick="app.showSignupModal()">Sign Up</button>`;
            if (dashboardBtn) dashboardBtn.style.display = 'none';
        }
    }
    
    // ==================== RENDERING FUNCTIONS ====================
    async function renderCurrentRoute() {
        if (appState.isLoading) return;
        appState.isLoading = true;
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="container" style="padding:120px 20px;"><div class="loading-spinner" aria-label="Loading content"></div></div>';
        try {
            if (appState.currentRoute === 'home') await renderHome();
            else if (appState.currentRoute === 'courses') await renderCourses();
            else if (appState.currentRoute === 'course-detail') await renderCourseDetail();
            else if (appState.currentRoute === 'learn') await renderLearnPage();
            else if (appState.currentRoute === 'quiz') await renderQuizPage();
            else if (appState.currentRoute === 'library') await renderLibraryPage();
            else if (appState.currentRoute === 'dashboard') {
                if (!appState.currentUser) { showLoginModal(); return; }
                await renderDashboard();
            }
            else if (appState.currentRoute === 'admin' && appState.isAdmin) await renderAdminDashboard();
            else if (appState.currentRoute === 'legal') await renderLegal();
            else await renderHome();
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="container" style="padding-top:100px;"><div class="card"><h2>Error Loading Page</h2><button class="btn btn-primary" onclick="app.navigate(\'home\')">Go Home</button></div></div>';
        }
        appState.isLoading = false;
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    async function renderHome() {
        const html = `<section class="hero"><div class="hero-content"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1><p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. NTSA-approved courses.</p><div class="btn-group"><button class="btn btn-primary" onclick="app.navigate('courses')"><i class="fas fa-road"></i> Explore Courses</button><button class="btn btn-outline" onclick="app.showLoginModal()"><i class="fas fa-user-graduate"></i> Get Started</button></div></div></section><div class="stats-bar"><div class="stat-item"><h3>10K+</h3><p>Students</p></div><div class="stat-item"><h3>6</h3><p>Courses</p></div><div class="stat-item"><h3>98%</h3><p>Pass Rate</p></div></div><div class="container section"><h2 class="section-title">Our <span>Courses</span></h2><div class="grid" id="homeCoursesGrid"></div></div>`;
        document.getElementById('page-content').innerHTML = html;
        const grid = document.getElementById('homeCoursesGrid');
        if (grid) grid.innerHTML = appState.courses.map(c => `<div class="card" onclick="app.navigateToCourse('${c.type}')" role="button" tabindex="0"><i class="fas ${c.icon}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><p>${escapeHtml(c.description)}</p><div class="module-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div></div>`).join('');

    async function renderCourses() {
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">Our <span>Courses</span></h1><div class="grid" id="coursesGrid"></div></div>`;
        document.getElementById('coursesGrid').innerHTML = appState.courses.map(c => `<div class="card" onclick="app.navigateToCourse('${c.type}')" role="button" tabindex="0"><i class="fas ${c.icon}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><p>${escapeHtml(c.description)}</p><div class="module-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div></div>`).join('');
    }
    
    async function renderCourseDetail() {
        const courseType = appState.routeParams.courseType;
        const course = appState.courses.find(c => c.type === courseType);
        if (!course) { app.navigate('courses'); return; }
        let isEnrolled = false;
        if (appState.currentUser) {
            try {
                const { data } = await appState.supabase.from('enrollments').select('id').eq('user_id', appState.currentUser.id).eq('course_id', course.id).eq('payment_status', 'verified').maybeSingle();
                isEnrolled = !!data;
            } catch(e) { console.warn(e); }
        }
        if (!isEnrolled && course.price === 0) {
            isEnrolled = await enrollInCourse(course.id, 0);
        }
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>${escapeHtml(course.name)}</h2><p>${escapeHtml(course.description)}</p><div class="module-price">${course.price === 0 ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>${isEnrolled ? '<button class="btn btn-primary" onclick="app.navigate(\'learn\', { courseId: '+course.id+' })">Start Learning</button>' : '<button class="btn btn-primary" onclick="app.enrollNow('+course.id+','+course.price+')">Enroll Now</button>'}<button class="btn btn-outline" onclick="app.navigate(\'courses\')">Back</button></div></div>`;
    }
    
    window.enrollNow = async (courseId, price) => {
        const success = await enrollInCourse(courseId, price);
        if (success) { app.navigate('learn', { courseId }); }

    // ==================== ENHANCED LIBRARY MODULE ====================

                { id: 2, title: 'EV Safety Handbook', description: 'Complete guide to electric vehicle safety and operation', category: 'PDF', content_url: '#', tags: ['ev', 'electric'] },
                { id: 3, title: 'First Aid for Road Accidents', description: 'What to do before help arrives - emergency response guide', category: 'Article', content_text: 'Step 1: Ensure scene safety\nStep 2: Call emergency services\nStep 3: Check for responsiveness\nStep 4: Open airway, check breathing\nStep 5: Control bleeding with direct pressure\nStep 6: Keep victim warm and calm\nStep 7: Do not remove helmet from motorcyclist\nStep 8: Wait for professional help', tags: ['first aid', 'emergency'] },
                { id: 4, title: 'NTSA Highway Code', description: 'Official Kenyan highway code summary', category: 'Guide', content_text: 'Key rules: Keep left, overtake right, obey speed limits, use indicators, yield to ambulances, don\'t drink and drive, always carry license.', tags: ['rules', 'ntsa'] },
                { id: 5, title: 'Rainy Season Driving Tips', description: 'Essential safety tips for wet weather driving', category: 'Tip', content_text: 'Reduce speed by 1/3, increase following distance to 5-6 seconds, use headlights, avoid sudden braking, watch for hydroplaning, check tires regularly.', tags: ['weather', 'safety'] }
            ];
        }
        appState.libraryResources = resources;
        
        const html = `<div class="container" style="padding-top:100px;"><h1 class="section-title">Digital <span>Safety Library</span></h1><div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;"><input type="text" id="librarySearch" class="search-input" placeholder="Search by title or tag..." onkeyup="app.filterLibrary()" aria-label="Search library"><div id="libraryCategoryFilter" class="quiz-category-selector"></div></div><div id="libraryGrid" class="grid"></div></div>`;
        document.getElementById('page-content').innerHTML = html;
        
        const categories = [...new Set(resources.map(r => r.category))];
        const filterDiv = document.getElementById('libraryCategoryFilter');
        filterDiv.innerHTML = `<button class="quiz-category-btn active" data-cat="all" onclick="app.filterLibrary('all')">All</button>` + categories.map(cat => `<button class="quiz-category-btn" data-cat="${cat}" onclick="app.filterLibrary('${cat}')">${cat}</button>`).join('');
        
        window.app.filterLibrary = (category = 'all') => {
            const search = document.getElementById('librarySearch')?.value.toLowerCase() || '';
            let filtered = resources;
            if (category !== 'all') filtered = filtered.filter(r => r.category === category);
            if (search) filtered = filtered.filter(r => r.title.toLowerCase().includes(search) || (r.tags && r.tags.some(t => t.toLowerCase().includes(search))));
            const grid = document.getElementById('libraryGrid');
            if (!grid) return;
            grid.innerHTML = filtered.map(r => `<div class="card"><i class="fas ${r.category === 'PDF' ? 'fa-file-pdf' : (r.category === 'Video' ? 'fa-video' : (r.category === 'Guide' ? 'fa-book' : 'fa-lightbulb'))}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(r.title)}</h3><p>${escapeHtml(r.description || (r.content_text ? r.content_text.substring(0, 100) + '...' : ''))}</p><div>${(r.tags || []).map(t => `<span class="resource-tag">#${escapeHtml(t)}</span>`).join('')}</div><button class="btn btn-outline" onclick="app.viewResource(${r.id})">View Resource</button></div>`).join('');
        };
        window.app.filterLibrary();
        
        window.app.viewResource = (id) => {
            const res = resources.find(r => r.id === id);
            if (res.content_url) window.open(res.content_url, '_blank');
            else if (res.content_text) showToast(`${res.title}: ${res.content_text.substring(0, 200)}...`, 'info');
            else showToast('Resource preview coming soon', 'info');
        };
    }
    
    // Quiz functions
    let currentQuizQuestions = [], quizCurrentIndex = 0, quizScore = 0, quizUserAnswers = [];
    
    async function renderQuizPage() {
        if (!appState.currentUser) { showLoginModal(); return; }
        let categories = ['All'];
        try {
            const { data, error } = await appState.supabase.from('questions').select('category').limit(500);
            if (!error && data) categories = ['All', ...new Set(data.map(q => q.category))];
        } catch(e) { console.warn('Using default categories'); }
        const html = `<div class="container" style="padding-top:100px;"><div class="card"><h2>📝 NTSA Practice Exam</h2><div id="quizSetup"><div class="quiz-category-selector" id="quizCategorySelector"></div><button class="btn btn-primary" onclick="app.startQuiz()">Start Randomized Quiz (20 Questions)</button></div><div id="quizContainer" style="display:none;"></div></div></div>`;
        document.getElementById('page-content').innerHTML = html;
        const selector = document.getElementById('quizCategorySelector');
        selector.innerHTML = categories.map(cat => `<button class="quiz-category-btn ${cat === 'All' ? 'active' : ''}" data-cat="${cat}" onclick="app.selectQuizCategory('${cat}')">${cat}</button>`).join('');
        window.app.selectedQuizCategory = 'All';
        window.app.selectQuizCategory = (cat) => { window.app.selectedQuizCategory = cat; document.querySelectorAll('#quizCategorySelector .quiz-category-btn').forEach(btn => { btn.classList.toggle('active', btn.dataset.cat === cat); }); };
        window.app.startQuiz = async () => {
            const category = window.app.selectedQuizCategory === 'All' ? null : window.app.selectedQuizCategory;
            let query = appState.supabase.from('questions').select('*');
            if (category) query = query.eq('category', category);
            const { data, error } = await query.limit(500);
            if (error || !data || data.length === 0) { showToast('No questions available', 'error'); return; }
            const shuffled = [...data]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            currentQuizQuestions = shuffled.slice(0, 20);
            quizCurrentIndex = 0; quizScore = 0; quizUserAnswers = new Array(currentQuizQuestions.length).fill(null);
            document.getElementById('quizSetup').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            renderQuizQuestion();
        };
        window.app.resetQuiz = () => { document.getElementById('quizSetup').style.display = 'block'; document.getElementById('quizContainer').style.display = 'none'; currentQuizQuestions = []; };
        window.app.submitAnswer = (selected) => { if (quizUserAnswers[quizCurrentIndex] !== null) return; const q = currentQuizQuestions[quizCurrentIndex]; quizUserAnswers[quizCurrentIndex] = selected; if (selected === q.correct_option) quizScore++; renderQuizQuestion(); };
        window.app.nextQuizQuestion = () => { if (quizCurrentIndex < currentQuizQuestions.length - 1) { quizCurrentIndex++; renderQuizQuestion(); } else { quizCurrentIndex = currentQuizQuestions.length; renderQuizQuestion(); } };
        window.app.prevQuizQuestion = () => { if (quizCurrentIndex > 0) { quizCurrentIndex--; renderQuizQuestion(); } };
        
        function renderQuizQuestion() {
            if (quizCurrentIndex >= currentQuizQuestions.length) {
                const percent = Math.round((quizScore / currentQuizQuestions.length) * 100);
                saveQuizScore(percent, currentQuizQuestions.length);
                document.getElementById('quizContainer').innerHTML = `<div style="text-align:center; padding:2rem;"><h3>🎉 Quiz Complete!</h3><p>Your score: ${quizScore} / ${currentQuizQuestions.length} (${percent}%)</p><button class="btn btn-primary" onclick="app.navigate('dashboard')">Dashboard</button><button class="btn btn-outline" onclick="app.resetQuiz()">Try Again</button></div>`;
                return;
            }
            const q = currentQuizQuestions[quizCurrentIndex];
            const options = [q.option_a, q.option_b, q.option_c, q.option_d];
            const letters = ['a','b','c','d'];
            const currentAnswer = quizUserAnswers[quizCurrentIndex];
            document.getElementById('quizContainer').innerHTML = `<div><div class="quiz-question"><strong>${escapeHtml(q.question_text)}</strong></div><div class="quiz-options">${options.map((opt, idx) => `<div class="quiz-option" style="${currentAnswer !== null && letters[idx] === q.correct_option ? 'border-color:#00ff88; background:rgba(0,255,136,0.1);' : (currentAnswer === letters[idx] ? 'border-color:#ff4757; background:rgba(255,71,87,0.1);' : '')}" onclick="if(${currentAnswer === null}) app.submitAnswer('${letters[idx]}')">${escapeHtml(opt)}</div>`).join('')}</div><div class="quiz-feedback">${currentAnswer !== null ? `<span style="color: ${currentAnswer === q.correct_option ? '#00ff88' : '#ff4757'}">${currentAnswer === q.correct_option ? '✓ Correct!' : '✗ Incorrect'}</span> ${escapeHtml(q.explanation || '')}` : ''}</div><div style="display:flex; justify-content:space-between; margin-top:1.5rem;"><button class="btn btn-outline" onclick="app.prevQuizQuestion()" ${quizCurrentIndex === 0 ? 'disabled' : ''}>◀ Previous</button><span>Question ${quizCurrentIndex+1} of ${currentQuizQuestions.length}</span><button class="btn btn-primary" onclick="app.nextQuizQuestion()">Next ▶</button></div></div>`;
        }
    }
    
    async function saveQuizScore(scorePercent, total) {
        if (!appState.currentUser) return;
        try { await appState.supabase.from('quiz_attempts').insert({ user_id: appState.currentUser.id, score: scorePercent, total_questions: total, completed_at: new Date() }); await loadUserStats(); } catch(e) { console.error(e); }
    }

        await loadUserStats();
        let enrolledHtml = '';
        try {
            const { data: enrollments } = await appState.supabase.from('enrollments').select('course_id').eq('user_id', appState.currentUser.id).eq('payment_status', 'verified');
            if (enrollments?.length) {
                const enrolledIds = enrollments.map(e => e.course_id);
                const enrolled = appState.courses.filter(c => enrolledIds.includes(c.id));
                enrolledHtml = `<div class="grid">${enrolled.map(c => `<div class="card" onclick="app.navigate('learn', { courseId: ${c.id} })"><i class="fas ${c.icon}" style="font-size:1.5rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><button class="btn btn-outline">Continue</button></div>`).join('')}</div>`;
            } else enrolledHtml = '<p>No enrollments yet. <a href="#" onclick="app.navigate(\'courses\')" style="color:var(--primary);">Browse courses</a></p>';
        } catch(e) { enrolledHtml = '<p>Loading enrollments...</p>'; }
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">My <span>Dashboard</span></h1><div class="dashboard-stats"><div class="stat-card"><div class="stat-value">${appState.userStats.totalProgress}%</div><div>Overall Progress</div></div><div class="stat-card"><div class="stat-value">${appState.userStats.completedCourses}</div><div>Completed Courses</div></div><div class="stat-card"><div class="stat-value">${appState.userStats.quizScore}%</div><div>Best Quiz Score</div></div></div><div class="card"><h3>📚 My Enrolled Courses</h3>${enrolledHtml}</div><div class="card" style="margin-top:1rem;"><h3>🏆 Certificate</h3><button class="btn btn-primary" onclick="showToast('Certificate generation coming soon','info')">Download Certificate</button></div></div>`;
    }
    
    async function renderAdminDashboard() {
        if (!appState.isAdmin) { app.navigate('home'); showToast('Admin access denied', 'error'); return; }
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>Admin Dashboard</h2><p>Manage users, courses, payments, and content.</p><button class="btn btn-outline" onclick="showToast('Admin features: User management, course editor, analytics','info')">Settings</button></div></div>`;
    }
    
    function renderLegal() {
        const page = appState.routeParams.page || 'privacy';
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>${page === 'privacy' ? 'Privacy Policy' : 'Terms of Service'}</h2><p>MEI DRIVE AFRICA is NTSA-approved. Your data is protected under Kenyan law.</p><button class="btn btn-outline" onclick="app.navigate('home')">Back</button></div></div>`;
    }
    
    // Auth UI functions
    function showLoginModal() { showAuthModal('login'); }
    function showSignupModal() { showAuthModal('signup'); }
    function showAuthModal(mode) {
        const modalHtml = `<div class="modal active" id="authModal" role="dialog" aria-modal="true"><div class="modal-content"><h2>${mode === 'login' ? '🔐 Sign In' : '📝 Sign Up'}</h2>${mode === 'signup' ? '<input type="text" id="authName" placeholder="Full Name" aria-label="Full Name">' : ''}<input type="email" id="authEmail" placeholder="Email" aria-label="Email"><div class="password-wrapper"><input type="password" id="authPassword" placeholder="Password" aria-label="Password"><button class="password-toggle" onclick="togglePasswordVisibility('authPassword')" type="button" aria-label="Toggle password visibility">👁️</button></div><button class="btn btn-primary" onclick="app.handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button><p style="margin-top:1rem;">${mode === 'login' ? 'No account? <span style="color:var(--primary);cursor:pointer;" onclick="app.showSignupModal()">Sign up</span>' : 'Have account? <span style="color:var(--primary);cursor:pointer;" onclick="app.showLoginModal()">Login</span>'}</p><button class="btn btn-outline" onclick="app.closeAuthModal()">Cancel</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        window.togglePasswordVisibility = (id) => { const input = document.getElementById(id); if (input) input.type = input.type === 'password' ? 'text' : 'password'; };
    }
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value;
        const pwd = document.getElementById('authPassword')?.value;
        if (!email || !pwd) { showToast('Fill all fields', 'error'); return; }
        if (mode === 'signup') {
            const name = document.getElementById('authName')?.value;
            if (!name) { showToast('Full name required', 'error'); return; }
            await signUp(email, pwd, name);
        } else { await signIn(email, pwd); }
        closeAuthModal();
    }
    function closeAuthModal() { document.getElementById('authModal')?.remove(); }
    function closeToast(id) { document.getElementById(`toast-${id}`)?.remove(); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    function navigate(route, params = {}) { appState.currentRoute = route; appState.routeParams = params; renderCurrentRoute(); }
    function navigateToCourse(courseType) { navigate('course-detail', { courseType }); }
    function showLegal(page) { navigate('legal', { page }); }
    
    window.app = { navigate, navigateToCourse, showLegal, enrollNow, lessonPrev:()=>{}, lessonNext:()=>{}, lessonComplete:()=>{}, showLoginModal, showSignupModal, handleAuth, closeAuthModal, closeToast, signOut, toggleMobileMenu, showToast, filterLibrary:()=>{}, viewResource:()=>{}, startQuiz:()=>{}, submitAnswer:()=>{}, nextQuizQuestion:()=>{}, prevQuizQuestion:()=>{}, resetQuiz:()=>{}, selectQuizCategory:()=>{} };
    initSupabase();
    renderCurrentRoute();
</script>
