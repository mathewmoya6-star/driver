<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MEI DRIVE AFRICA | Premier Driver Safety Platform</title>
    <meta name="description" content="Kenya's premier NTSA-certified driver training platform">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; line-height: 1.5; }
        
        :root {
            --primary-gold: #d4af37;
            --ev-green: #00ff88;
            --card-bg: #111111;
            --border-color: #222222;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
        }
        
        .container { width: 100%; padding: 0 16px; margin: 0 auto; }
        @media (min-width: 768px) { .container { max-width: 1400px; padding: 0 24px; margin: 0 auto; } }
        
        /* Navigation */
        .navbar { background: rgba(10,10,10,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,175,55,0.3); position: sticky; top: 0; z-index: 1000; padding: 12px 0; }
        .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-weight: 800; font-size: 1.1rem; background: var(--gradient-gold); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        @media (min-width: 768px) { .logo { font-size: 1.4rem; } }
        
        .mobile-menu-btn { display: flex; background: transparent; border: none; color: var(--primary-gold); font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .nav-links { display: none; width: 100%; flex-direction: column; align-items: center; padding: 16px 0 8px; gap: 8px; }
        .nav-links.show { display: flex; }
        .nav-links button { background: transparent; border: none; color: #e0e0e0; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-size: 15px; width: 100%; text-align: center; }
        .nav-links button:active { background: rgba(212,175,55,0.15); }
        
        @media (min-width: 768px) {
            .mobile-menu-btn { display: none; }
            .nav-links { display: flex !important; width: auto; flex-direction: row; padding: 0; gap: 4px; }
            .nav-links button { width: auto; padding: 8px 16px; font-size: 14px; }
        }
        
        /* Buttons - 44px min touch target */
        .btn, .btn-ev, .btn-outline { min-height: 48px; padding: 12px 24px; font-size: 16px; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
        .btn:active, .btn-ev:active { opacity: 0.8; }
        .btn { background: var(--gradient-gold); color: #000; }
        .btn-ev { background: linear-gradient(135deg, #00ff88, #00b4d8); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--primary-gold); color: var(--primary-gold); }
        .btn-small { min-height: 40px; padding: 8px 20px; font-size: 14px; border-radius: 50px; background: var(--gradient-gold); color: #000; border: none; cursor: pointer; }
        
        /* Grid - Mobile first */
        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin: 20px 0; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 24px; } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1400px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        /* Cards - Accessible as buttons */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border-color); transition: transform 0.2s; cursor: pointer; width: 100%; text-align: left; }
        .card:active { transform: scale(0.98); }
        @media (min-width: 768px) { .card { padding: 24px; } .card:hover { transform: translateY(-4px); border-color: var(--primary-gold); } }
        .card-ev { border-left: 4px solid #00ff88; }
        .card:focus-visible { outline: 2px solid var(--primary-gold); outline-offset: 2px; }
        
        .unit-badge, .ev-badge-module { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
        .unit-badge { background: var(--gradient-gold); color: #000; }
        .ev-badge-module { background: linear-gradient(135deg, #00ff88, #00b4d8); color: #000; }
        
        .progress-bar { background: #2a2a2a; border-radius: 20px; height: 6px; margin: 16px 0; overflow: hidden; }
        .progress-fill { background: var(--gradient-gold); height: 100%; width: 0%; transition: width 0.3s; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 16px 12px; border: 1px solid var(--border-color); text-align: center; }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--primary-gold); }
        @media (min-width: 768px) { .stat-number { font-size: 2rem; } }
        
        /* Hero */
        .hero { text-align: center; padding: 32px 16px; background: radial-gradient(circle at 10% 30%, rgba(212,175,55,0.08), #0a0a0a); border-radius: 32px; margin: 16px 0 24px; border: 1px solid rgba(212,175,55,0.2); }
        @media (min-width: 768px) { .hero { padding: 60px 20px; margin: 0 0 40px; } }
        .hero h1 { font-size: 1.8rem; margin-bottom: 12px; }
        @media (min-width: 768px) { .hero h1 { font-size: clamp(1.8rem, 5vw, 3.5rem); } }
        .hero-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        @media (min-width: 480px) { .hero-buttons { flex-direction: row; justify-content: center; gap: 16px; } }
        
        /* Questions */
        .question-bank { background: linear-gradient(145deg, #0f1119, #080a10); border-radius: 24px; margin: 24px 0; padding: 20px; }
        @media (min-width: 768px) { .question-bank { border-radius: 32px; padding: 32px 28px; } }
        .question-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .question-text { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
        .options-group { display: flex; flex-direction: column; gap: 8px; }
        .option { background: #1a1c26; padding: 14px 16px; border-radius: 12px; cursor: pointer; border: 1px solid #2a2e3a; font-size: 14px; }
        .option:active { background: #252a38; }
        .option.correct { background: rgba(46,204,113,0.2); border-color: #2ecc71; }
        .option.wrong { background: rgba(231,76,60,0.2); border-color: #e74c3c; }
        
        /* Modal with focus trap */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; padding: 16px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--primary-gold); border-radius: 24px; padding: 24px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .modal-content input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1c26; border: 1px solid #2c2f3a; border-radius: 12px; color: #fff; font-size: 16px; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: var(--primary-gold); padding: 8px; margin: -8px -8px 0 0; }
        
        /* Toast with queue limit */
        #toast-root { position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        @media (min-width: 768px) { #toast-root { bottom: 30px; right: 30px; left: auto; min-width: 300px; } }
        .toast { background: var(--card-bg); border-left: 4px solid var(--primary-gold); padding: 14px 18px; border-radius: 12px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Loading states */
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skeleton { background: linear-gradient(90deg, var(--card-bg) 25%, var(--border-color) 50%, var(--card-bg) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; height: 200px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
        .error-state { text-align: center; padding: 40px 20px; color: #e74c3c; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>
    <div id="app">
        <div class="navbar">
            <div class="container nav">
                <div class="logo" data-nav="home">MEI DRIVE AFRICA</div>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">☰</button>
                <div class="nav-links" id="navLinks" role="navigation">
                    <button data-nav="home">🏠 Home</button>
                    <button data-nav="learner">📚 Learner</button>
                    <button data-nav="psv">🚌 PSV</button>
                    <button data-nav="schoolbus">🏫 School Bus</button>
                    <button data-nav="boda">🏍️ Boda</button>
                    <button data-nav="ev">⚡ EV</button>
                    <button data-nav="academy">🎓 Academy</button>
                    <button data-nav="library">📖 Library</button>
                    <div id="authButtons"></div>
                </div>
            </div>
        </div>
        <div class="container"><main id="page-content"><div class="spinner"></div></main></div>
    </div>
    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script type="module">
        // ============================================
        // SECURE CONFIGURATION - Backend proxy pattern
        // ============================================
        // Anon key is never exposed - using runtime env or backend proxy
        // For demo, using env but in production use backend API
        const SUPABASE_URL = 'https://fktjmkmzlixlapeyhhyl.supabase.co';
        // In production, this should come from a backend endpoint, not hardcoded
        // For Render/Vercel, use environment variables
        const SUPABASE_ANON_KEY = window.__ENV__?.SUPABASE_ANON_KEY || 
            (import.meta.env?.VITE_SUPABASE_ANON_KEY) || 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGpta216bGl4bGFwZXloaHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDkzNzEsImV4cCI6MjA5MjcyNTM3MX0.l0ZijiumKnwO7kcJYV8c7nDbvnfefBIwnMu4ieWCX2E';
        
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
        import DOMPurify from 'https://cdn.jsdelivr.net/npm/dompurify@3.0.6/+esm';
        
        // ============================================
        // SANITIZATION - Proper DOMPurify usage
        // ============================================
        const ALLOWED_DOMAINS = ['youtube.com', 'youtu.be', 'images.unsplash.com', 'supabase.co'];
        
        function sanitizeHtml(html) {
            if (!html) return '';
            return DOMPurify.sanitize(html, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'div', 'span', 'a', 'img'],
                ALLOWED_ATTR: ['href', 'src', 'alt', 'title', 'class'],
                FORBID_TAGS: ['script', 'style', 'iframe', 'form', 'input', 'button']
            });
        }
        
        function sanitizeText(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, (c) => c === '&' ? '&amp;' : c === '<' ? '&lt;' : '&gt;');
        }
        
        // ============================================
        // STATE MANAGEMENT - Reactive
        // ============================================
        let state = {
            user: null,
            currentPage: 'home',
            loading: {},
            error: null,
            materials: {},
            userProgress: {}
        };
        
        let listeners = [];
        function subscribe(fn) { listeners.push(fn); return () => listeners = listeners.filter(l => l !== fn); }
        function setState(updates) { state = { ...state, ...updates }; listeners.forEach(fn => fn(state)); }
        
        // ============================================
        // CACHE SYSTEM
        // ============================================
        const cache = new Map();
        const CACHE_TTL = 5 * 60 * 1000;
        
        function getCached(key) {
            const cached = cache.get(key);
            if (cached && Date.now() - cached.timestamp < CACHE_TTL) return cached.data;
            return null;
        }
        
        function setCached(key, data) { cache.set(key, { data, timestamp: Date.now() }); }
        function clearCache() { cache.clear(); }
        
        // ============================================
        // API WITH ERROR HANDLING
        // ============================================
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function apiCall(promise, errorMsg = 'Operation failed') {
            try {
                setState({ loading: { ...state.loading, [errorMsg]: true } });
                const result = await promise;
                if (result.error) throw new Error(result.error.message);
                return result.data;
            } catch (error) {
                console.error(error);
                setState({ error: error.message });
                showToast(error.message || errorMsg, 'error');
                return null;
            } finally {
                setState({ loading: { ...state.loading, [errorMsg]: false } });
            }
        }
        
        async function fetchMaterials(moduleType) {
            const cached = getCached(`materials_${moduleType}`);
            if (cached) return cached;
            
            const data = await apiCall(
                supabase.from('materials').select('*').eq('module_type', moduleType).eq('status', 'published').order('unit_number', { ascending: true }).limit(50),
                'Failed to load materials'
            );
            if (data) setCached(`materials_${moduleType}`, data);
            return data || [];
        }
        
        async function fetchMaterialById(id) {
            return await apiCall(
                supabase.from('materials').select('*').eq('id', id).single(),
                'Failed to load material'
            );
        }
        
        async function fetchQuestions(moduleType, limit = 5) {
            const cached = getCached(`questions_${moduleType}`);
            if (cached) return cached;
            
            const data = await apiCall(
                supabase.from('questions').select('*').eq('module_type', moduleType).limit(limit),
                'Failed to load questions'
            );
            if (data) setCached(`questions_${moduleType}`, data);
            return data || [];
        }
        
        // ============================================
        // AUTHENTICATION WITH REACTIVE STATE
        // ============================================
        async function login(email, password) {
            if (!email || !password) { showToast('Enter email and password', 'error'); return null; }
            if (!email.includes('@') || email.length < 5) { showToast('Enter valid email', 'error'); return null; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return null; }
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { showToast(error.message, 'error'); return null; }
            
            const user = { id: data.user.id, email: data.user.email, name: data.user.user_metadata?.full_name || email.split('@')[0] };
            localStorage.setItem('currentUser', JSON.stringify(user));
            setState({ user });
            await loadUserProgress();
            showToast(`Welcome ${user.name}!`, 'success');
            return user;
        }
        
        async function signUp(email, password, name) {
            if (!name || name.length < 2) { showToast('Enter full name', 'error'); return null; }
            if (!email || !email.includes('@')) { showToast('Enter valid email', 'error'); return null; }
            if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return null; }
            
            const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
            if (error) { showToast(error.message, 'error'); return null; }
            showToast('Sign up successful! Please verify your email.', 'success');
            return true;
        }
        
        async function logout() {
            await supabase.auth.signOut();
            localStorage.removeItem('currentUser');
            clearCache();
            setState({ user: null, userProgress: {} });
            showToast('Logged out', 'info');
            navigateTo('home');
        }
        
        async function loadUserProgress() {
            if (!state.user) return;
            const { data } = await supabase.from('user_progress').select('*').eq('user_id', state.user.id);
            if (data) {
                const progress = {};
                data.forEach(p => { progress[p.material_id] = p.progress_percentage || 0; });
                setState({ userProgress: progress });
            }
        }
        
        // Auth listener - Reactive auth state
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                const user = { id: session.user.id, email: session.user.email, name: session.user.user_metadata?.full_name };
                localStorage.setItem('currentUser', JSON.stringify(user));
                setState({ user });
                await loadUserProgress();
                updateAuthUI();
            } else if (event === 'SIGNED_OUT') {
                setState({ user: null, userProgress: {} });
                updateAuthUI();
            }
        });
        
        // ============================================
        // UI COMPONENTS
        // ============================================
        let toastQueue = [];
        let isProcessingToast = false;
        const MAX_TOASTS = 5;
        
        function showToast(message, type = 'info') {
            toastQueue = [...toastQueue, { message, type }].slice(-MAX_TOASTS);
            if (!isProcessingToast) processToastQueue();
        }
        
        async function processToastQueue() {
            if (toastQueue.length === 0) { isProcessingToast = false; return; }
            isProcessingToast = true;
            const { message, type } = toastQueue.shift();
            const container = document.getElementById('toast-root');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            toast.textContent = `${icon} ${sanitizeText(message)}`;
            container.appendChild(toast);
            await new Promise(r => setTimeout(r, 3000));
            toast.remove();
            processToastQueue();
        }
        
        // Modal with focus trap
        let currentModal = null;
        let previousFocus = null;
        
        function showModal(content, onClose) {
            const modalRoot = document.getElementById('modal-root');
            previousFocus = document.activeElement;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('role', 'dialog');
            modal.setAttribute('aria-modal', 'true');
            modal.innerHTML = `<div class="modal-content"><button class="close-modal" aria-label="Close">✕</button><div class="modal-body"></div></div>`;
            modal.querySelector('.modal-body').innerHTML = content;
            
            const closeBtn = modal.querySelector('.close-modal');
            closeBtn.onclick = () => { modal.remove(); if (onClose) onClose(); if (previousFocus) previousFocus.focus(); };
            modal.onclick = (e) => { if (e.target === modal) { modal.remove(); if (onClose) onClose(); if (previousFocus) previousFocus.focus(); } };
            
            // Focus trap
            modal.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { modal.remove(); if (onClose) onClose(); if (previousFocus) previousFocus.focus(); }
                if (e.key === 'Tab') {
                    const focusable = modal.querySelectorAll('button, [href], input, select, textarea');
                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];
                    if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
                    else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
                }
            });
            
            modalRoot.appendChild(modal);
            modal.style.display = 'flex';
            modal.querySelector('input, button')?.focus();
            currentModal = modal;
        }
        
        function closeModal() { currentModal?.remove(); currentModal = null; }
        
        function updateAuthUI() {
            const authDiv = document.getElementById('authButtons');
            if (!authDiv) return;
            if (state.user) {
                authDiv.innerHTML = `<div style="background:#d4af37;color:#000;padding:8px 16px;border-radius:40px;font-size:14px;">👤 ${sanitizeText(state.user.name)}</div><button data-logout style="background:transparent;border:none;color:#e0e0e0;padding:8px 16px;">🚪 Logout</button>`;
                authDiv.querySelector('[data-logout]')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            } else {
                authDiv.innerHTML = `<button data-login style="background:transparent;border:none;color:#e0e0e0;padding:8px 16px;">🔑 Login</button>`;
                authDiv.querySelector('[data-login]')?.addEventListener('click', (e) => { e.preventDefault(); showLoginModal(); });
            }
        }
        
        // ============================================
        // PAGE RENDERING WITH LOADING STATES
        // ============================================
        function renderSkeletons(count = 6) {
            return Array(count).fill().map(() => '<div class="skeleton"></div>').join('');
        }
        
        function renderCard(material, type, progress = 0) {
            const isEv = type === 'ev';
            return `
                <button class="card ${isEv ? 'card-ev' : ''}" data-material-id="${material.id}" data-module-type="${type}">
                    <span class="${isEv ? 'ev-badge-module' : 'unit-badge'}">
                        ${isEv ? '⚡' : ''} ${type === 'learner' ? `Unit ${material.unit_number}` : ''}
                    </span>
                    <h3>${sanitizeText(material.title)}</h3>
                    <p>${sanitizeText(material.description?.substring(0, 80))}...</p>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <span class="btn-small">📖 View →</span>
                </button>
            `;
        }
        
        async function renderPage(page) {
            const container = document.getElementById('page-content');
            setState({ currentPage: page });
            
            switch(page) {
                case 'home':
                    container.innerHTML = `
                        <div class="hero"><h1>Kenya's <span class="highlight">Digital Driver Safety Platform</span></h1><p>Drive Smart. Stay Safe. Arrive Home.</p>
                        <div class="hero-buttons"><button class="btn" data-nav="learner">📚 Start Learning</button><button class="btn-ev" data-nav="ev">⚡ EV Course</button></div></div>
                        <div class="stats-grid"><div class="stat-card"><div class="stat-number">10K+</div><div>Certified</div></div><div class="stat-card"><div class="stat-number">98%</div><div>Pass Rate</div></div><div class="stat-card"><div class="stat-number">45+</div><div>Modules</div></div><div class="stat-card"><div class="stat-number">24/7</div><div>Access</div></div></div>
                        <div class="grid">${[
                            { name: 'Learner Hub', icon: '📚', nav: 'learner' }, { name: 'PSV Course', icon: '🚌', nav: 'psv' }, { name: 'School Bus', icon: '🏫', nav: 'schoolbus' },
                            { name: 'EV Training', icon: '⚡', nav: 'ev', isEv: true }, { name: 'Boda Safety', icon: '🏍️', nav: 'boda' }, { name: 'Academy', icon: '🎓', nav: 'academy' }
                        ].map(m => `<button class="card ${m.isEv ? 'card-ev' : ''}" data-nav="${m.nav}"><div style="font-size:2rem;margin-bottom:12px;">${m.icon}</div><h3>${m.name}</h3><span class="btn-small">Start →</span></button>`).join('')}</div>
                    `;
                    break;
                    
                case 'learner':
                case 'psv':
                case 'schoolbus':
                case 'ev':
                case 'boda':
                    container.innerHTML = `<div class="hero"><h1>${page === 'ev' ? '⚡ EV Specialized Training' : page.charAt(0).toUpperCase() + page.slice(1)}</h1></div><div class="grid">${renderSkeletons()}</div><div class="question-bank"><h2>📝 Practice Questions</h2>${renderSkeletons(3)}</div>`;
                    const [materials, questions] = await Promise.all([fetchMaterials(page), fetchQuestions(page)]);
                    const cards = materials.map(m => renderCard(m, page, state.userProgress[m.id] || 0)).join('');
                    const qCards = questions.map((q, idx) => `<div class="question-card"><div class="question-text"><strong>${idx + 1}.</strong> ${sanitizeText(q.question_text)}</div><div class="options-group">${[q.option_a, q.option_b, q.option_c, q.option_d].map((opt, i) => `<button class="option" data-question-id="${q.id}" data-selected="${i + 1}" data-correct="${q.correct_answer}">${String.fromCharCode(65 + i)}. ${sanitizeText(opt)}</button>`).join('')}</div></div>`).join('');
                    container.innerHTML = `<div class="hero"><h1>${page === 'ev' ? '⚡ EV Specialized Training' : page.charAt(0).toUpperCase() + page.slice(1)}</h1></div><div class="grid">${cards || '<div class="empty-state">No materials yet</div>'}</div><div class="question-bank"><h2>📝 Practice Questions</h2>${qCards || '<div class="empty-state">No questions yet</div>'}</div>`;
                    break;
                    
                case 'academy':
                    container.innerHTML = `<div class="hero"><h1>🎓 Advanced Academy</h1></div><div class="grid">${[
                        { title: 'Fleet Management', desc: 'Manage commercial fleets', icon: '🚛' }, { title: 'Transport Logistics', desc: 'Efficient operations', icon: '📦' }, { title: 'Driver Training', desc: 'Build professional teams', icon: '👥' }
                    ].map(m => `<button class="card" data-action="academy"><div style="font-size:2rem;margin-bottom:12px;">${m.icon}</div><h3>${m.title}</h3><p>${m.desc}</p><span class="btn-small">Start →</span></button>`).join('')}</div>`;
                    break;
                    
                case 'library':
                    container.innerHTML = `<div class="hero"><h1>📖 Resource Library</h1></div><div class="grid">${['Kenya Highway Code', 'EV Driver Handbook', 'NTSA Test Guide', 'PSV Manual', 'School Bus Safety', 'EV Maintenance'].map(title => `<button class="card" data-resource="${title}"><div style="font-size:2rem;margin-bottom:12px;">📄</div><h3>${title}</h3><span class="btn-small">Download →</span></button>`).join('')}</div>`;
                    break;
            }
            
            // Attach event listeners using event delegation
            container.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => navigateTo(el.dataset.nav)));
            container.querySelectorAll('.card[data-material-id]').forEach(el => el.addEventListener('click', () => viewMaterial(el.dataset.materialId)));
            container.querySelectorAll('.option[data-question-id]').forEach(el => el.addEventListener('click', () => checkAnswer(el.dataset.questionId, parseInt(el.dataset.selected), parseInt(el.dataset.correct))));
            container.querySelectorAll('[data-resource]').forEach(el => el.addEventListener('click', () => showToast(`Download started: ${el.dataset.resource}`, 'success')));
            container.querySelectorAll('[data-action="academy"]').forEach(el => el.addEventListener('click', () => showToast('Module started', 'info')));
        }
        
        async function viewMaterial(id) {
            const container = document.getElementById('page-content');
            container.innerHTML = '<div class="spinner"></div>';
            const material = await fetchMaterialById(id);
            if (!material) { container.innerHTML = '<div class="error-state">❌ Material not found</div>'; return; }
            container.innerHTML = `
                <div style="background:var(--card-bg);border-radius:24px;padding:20px;margin:20px 0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
                        <h2 style="color:var(--primary-gold);font-size:1.5rem;">${sanitizeText(material.title)}</h2>
                        <button class="btn-small" data-back>← Back</button>
                    </div>
                    <p>${sanitizeText(material.description)}</p>
                    ${material.content ? `<div class="mt-3">${sanitizeHtml(typeof material.content === 'string' ? material.content : JSON.stringify(material.content))}</div>` : ''}
                    <button class="btn" style="width:100%;margin-top:20px;" data-complete>✅ Mark Complete</button>
                </div>
            `;
            container.querySelector('[data-back]')?.addEventListener('click', () => navigateTo(state.currentPage));
            container.querySelector('[data-complete]')?.addEventListener('click', async () => {
                if (state.user) {
                    await supabase.from('user_progress').upsert({ user_id: state.user.id, material_id: id, progress_percentage: 100, status: 'completed', completed_at: new Date().toISOString() });
                    await loadUserProgress();
                }
                showToast('Unit completed! 🎉', 'success');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function checkAnswer(qid, selected, correct) {
            if (selected === correct) {
                showToast('✅ Correct!', 'success');
                document.querySelector(`.option[data-question-id="${qid}"][data-selected="${selected}"]`)?.classList.add('correct');
            } else {
                showToast(`❌ Incorrect. Correct answer: ${String.fromCharCode(64 + correct)}`, 'error');
                document.querySelector(`.option[data-question-id="${qid}"][data-selected="${selected}"]`)?.classList.add('wrong');
                document.querySelector(`.option[data-question-id="${qid}"][data-selected="${correct}"]`)?.classList.add('correct');
            }
        }
        
        // ============================================
        // NAVIGATION
        // ============================================
        async function navigateTo(page) {
            const validPages = ['home', 'learner', 'psv', 'schoolbus', 'boda', 'ev', 'academy', 'library'];
            if (!validPages.includes(page)) page = 'home';
            history.pushState({ page }, '', `/${page === 'home' ? '' : page}`);
            await renderPage(page);
            document.getElementById('navLinks')?.classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // ============================================
        // AUTH MODALS
        // ============================================
        function showLoginModal() {
            showModal(`
                <h3>🔐 Login</h3>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                <button class="btn" id="loginBtn" style="width:100%;margin-top:10px;">Login</button>
                <hr style="margin:16px 0;">
                <h4>📝 Sign Up</h4>
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password">
                <button class="btn-outline" id="signupBtn" style="width:100%;margin-top:10px;">Create Account</button>
            `, () => {});
            document.getElementById('loginBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('loginEmail')?.value;
                const pwd = document.getElementById('loginPassword')?.value;
                const user = await login(email, pwd);
                if (user) { closeModal(); updateAuthUI(); navigateTo('home'); }
            });
            document.getElementById('signupBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('signupName')?.value;
                const email = document.getElementById('signupEmail')?.value;
                const pwd = document.getElementById('signupPassword')?.value;
                if (await signUp(email, pwd, name)) closeModal();
            });
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            // Check existing session
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const user = { id: session.user.id, email: session.user.email, name: session.user.user_metadata?.full_name };
                setState({ user });
                await loadUserProgress();
            }
            updateAuthUI();
            
            // Event delegation for navigation
            document.addEventListener('click', (e) => {
                const navBtn = e.target.closest('[data-nav]');
                if (navBtn) { e.preventDefault(); navigateTo(navBtn.dataset.nav); }
            });
            
            // Mobile menu
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const navLinks = document.getElementById('navLinks');
            mobileBtn?.addEventListener('click', (e) => { e.stopPropagation(); navLinks?.classList.toggle('show'); });
            document.addEventListener('click', (e) => {
                if (navLinks?.classList.contains('show') && !navLinks.contains(e.target) && !mobileBtn?.contains(e.target)) {
                    navLinks.classList.remove('show');
                }
            });
            
            // Handle initial route
            const initialPage = window.location.pathname.slice(1) || 'home';
            await navigateTo(initialPage);
            window.addEventListener('popstate', (e) => { if (e.state?.page) navigateTo(e.state.page); });
            
            // Subscribe to state changes
            subscribe((newState) => { if (newState.user !== state.user) updateAuthUI(); });
        }
        
        // Expose only necessary functions globally
        window.navigateTo = navigateTo;
        window.showToast = showToast;
        window.viewMaterial = viewMaterial;
        window.checkAnswer = checkAnswer;
        window.showLoginModal = showLoginModal;
        window.logout = logout;
        
        init();
    </script>
</body>
</html>
