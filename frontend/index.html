<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mei Drive Africa | Premier Driver Training Platform</title>
    <meta name="description" content="Kenya's modern driver training platform for learner drivers, boda boda riders, PSV operators, and fleet drivers.">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #d4af37;
            --primary-dark: #b8960c;
            --primary-light: #f0c674;
            --secondary: #00ff88;
            --secondary-dark: #00b4d8;
            --dark: #0a0a0a;
            --dark-card: #111111;
            --dark-hover: #1a1a1a;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gradient-gold: linear-gradient(135deg, #d4af37 0%, #f0c674 100%);
            --gradient-dark: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; overflow-x: hidden; }
        
        /* Hero Section */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: var(--gradient-dark);
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
            color: var(--primary-light);
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        /* Learning Paths Grid */
        .learning-paths {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin: 48px 0 40px;
        }
        
        .path-card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .path-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
        }
        
        .path-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        
        .path-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
        }
        
        .path-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        
        /* Library Section */
        .library-section {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 32px;
            margin: 32px 0;
            border: 1px solid var(--border);
        }
        
        .library-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        
        .library-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .library-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        
        .library-item i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        /* Defense Section */
        .defense-section {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(0,0,0,0));
            border-radius: 24px;
            padding: 32px;
            margin: 32px 0;
            border: 1px solid var(--primary);
        }
        
        .defense-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--primary);
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--gradient-gold);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            color: #000;
        }
        
        .trust-badge {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .trust-badge i { color: var(--primary); margin-right: 6px; }
        
        /* Layout */
        .app { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark-card);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .logo { 
            font-size: 1.3rem; 
            font-weight: 800; 
            background: var(--gradient-gold); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .logo-icon { font-size: 1.6rem; }
        
        .user-info { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; background: var(--gradient-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .nav-menu { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 24px 32px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; }
        .page-title p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-info h3 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-icon { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Modules Grid */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 40px; }
        
        .module-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .module-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .module-cover { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; position: relative; background-size: cover; background-position: center; }
        .module-badge { position: absolute; top: 12px; right: 12px; background: var(--primary); color: #000; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .module-content { padding: 20px; }
        .module-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .module-description { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; line-height: 1.4; }
        .module-stats { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.75rem; color: var(--text-muted); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; background: var(--gradient-gold); border-radius: 3px; transition: width 0.3s; }
        
        /* Course Player */
        .course-layout { display: flex; gap: 24px; }
        .course-main { flex: 1; }
        .video-container { background: #000; border-radius: 24px; overflow: hidden; margin-bottom: 24px; }
        .video-container iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
        
        .course-sidebar { width: 340px; background: var(--dark-card); border-radius: 24px; padding: 20px; position: sticky; top: 24px; height: fit-content; }
        .lesson-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }
        .lesson-item:hover, .lesson-item.active { background: rgba(212, 175, 55, 0.1); }
        .lesson-item.completed { color: var(--success); }
        .lesson-status { width: 28px; }
        
        /* Study Material */
        .study-material {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 30px;
            margin-top: 24px;
        }
        .study-material h3 { color: var(--primary); margin: 20px 0 12px; }
        .key-concepts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 20px 0; }
        .concept-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; border-left: 3px solid var(--primary); }
        
        /* Quiz */
        .quiz-question { margin-bottom: 28px; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
        .quiz-option {
            background: rgba(255,255,255,0.05);
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quiz-option:hover { background: rgba(212, 175, 55, 0.1); }
        .quiz-option.selected { background: var(--primary); color: #000; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            padding: 32px;
        }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .toast { background: var(--dark-card); border-left: 4px solid var(--primary); padding: 14px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Mobile */
        .mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 101; background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; margin-top: 60px; }
            .mobile-menu-btn { display: block; }
            .course-layout { flex-direction: column; }
            .course-sidebar { width: 100%; position: static; }
            .hero-title { font-size: 2rem; }
            .learning-paths { grid-template-columns: 1fr; }
        }
        
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input { background: var(--dark-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; width: 100%; margin: 8px 0; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Complete Module Data
        const MODULES = [
            { id: 1, type: 'learner', name: 'Beginner Drivers Course', icon: '🚗', description: 'Build strong foundations and prepare for your first driving test with confidence.', color: '#d4af37', lessons: 21, quizzes: 21, exams: 2, hours: 25, is_free: true },
            { id: 2, type: 'ev', name: 'EV Drivers & Riders', icon: '⚡', description: 'Modern training for electric vehicle drivers focused on safety, efficiency, and control.', color: '#00ff88', lessons: 8, quizzes: 8, exams: 1, hours: 12, is_free: true },
            { id: 3, type: 'boda', name: 'Boda Boda Riders', icon: '🛵', description: 'Practical road safety training for everyday riders navigating urban traffic.', color: '#e67e22', lessons: 12, quizzes: 12, exams: 1, hours: 18, is_free: true },
            { id: 4, type: 'psv', name: 'PSV & Professional Drivers', icon: '🚌', description: 'Advanced preparation for matatu, bus, and commercial driving standards.', color: '#3498db', lessons: 10, quizzes: 10, exams: 1, hours: 15, is_free: true },
            { id: 5, type: 'schoolbus', name: 'School Bus & Van Drivers', icon: '🏫', description: 'Specialized safety training focused on passenger protection and route management.', color: '#9b59b6', lessons: 6, quizzes: 6, exams: 1, hours: 10, is_free: true },
            { id: 6, type: 'refresher', name: 'Experienced Drivers Refresher', icon: '🔄', description: 'Refresh your skills, improve discipline, and stay updated with modern road rules.', color: '#1abc9c', lessons: 8, quizzes: 6, exams: 1, hours: 12, is_free: true }
        ];

        const LESSONS = {
            learner: [
                { number: 1, title: 'Introduction to Driving in Kenya', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '18:30', objectives: ['Understand driving fundamentals', 'Learn NTSA requirements', 'Develop safe driving habits'], content: '<h3>📘 Introduction</h3><p>Complete guide to driving in Kenya.</p>' }
            ],
            ev: [
                { number: 1, title: 'EV Technology & Safety', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '20:00', objectives: ['Understand EV technology', 'Learn charging safety', 'Master regenerative braking'], content: '<h3>⚡ Electric Vehicle Training</h3><p>Master EV operation and safety.</p>' }
            ],
            boda: [
                { number: 1, title: 'Boda Boda Safety Basics', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '25:00', objectives: ['Learn defensive riding', 'Understand passenger safety', 'Master traffic rules'], content: '<h3>🛵 Boda Boda Safety Course</h3><p>Complete motorcycle safety training.</p>' }
            ],
            psv: [
                { number: 1, title: 'PSV Licensing & Compliance', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '22:00', objectives: ['Understand PSV regulations', 'Learn compliance standards', 'Master professional conduct'], content: '<h3>🚌 PSV Professional Course</h3><p>Professional driver training.</p>' }
            ],
            schoolbus: [
                { number: 1, title: 'Child Safety Fundamentals', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '20:00', objectives: ['Learn child safety protocols', 'Understand danger zones', 'Master emergency procedures'], content: '<h3>🏫 School Bus Safety</h3><p>Child transport safety training.</p>' }
            ],
            refresher: [
                { number: 1, title: 'Modern Road Rules Update', video: 'https://www.youtube.com/embed/8gX2XqFqPcE', duration: '15:00', objectives: ['Update traffic rule knowledge', 'Refresh defensive driving', 'Learn new regulations'], content: '<h3>🔄 Refresher Course</h3><p>Stay updated with modern road safety.</p>' }
            ]
        };

        const QUIZZES = {
            learner_1: [
                { question: 'What is the minimum age for a learner\'s licence?', options: ['16 years', '17 years', '18 years', '21 years'], correct: 2, explanation: 'The Traffic Act specifies 18 years.' }
            ]
        };

        // App State
        let currentUser = null;
        let currentView = 'dashboard';
        let currentModule = null;
        let currentLesson = null;
        let userProgress = JSON.parse(localStorage.getItem('userProgress') || '{}');
        let completedLessons = JSON.parse(localStorage.getItem('completedLessons') || '{}');

        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function saveProgress() {
            localStorage.setItem('userProgress', JSON.stringify(userProgress));
            localStorage.setItem('completedLessons', JSON.stringify(completedLessons));
        }

        function markLessonComplete(moduleType, lessonNum) {
            const key = `${moduleType}_${lessonNum}`;
            if (!completedLessons[key]) {
                completedLessons[key] = true;
                userProgress[moduleType] = (userProgress[moduleType] || 0) + 1;
                saveProgress();
                showToast('Lesson completed! 🎉', 'success');
                renderApp();
            }
        }

        function login(email, password) {
            if (email && password) {
                currentUser = { email, name: email.split('@')[0] };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast(`Welcome back, ${currentUser.name}!`, 'success');
                renderApp();
                return true;
            }
            showToast('Please enter email and password', 'error');
            return false;
        }

        function signUp(name, email, password) {
            if (name && email && password && password.length >= 6) {
                currentUser = { email, name };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast('Account created successfully!', 'success');
                renderApp();
                return true;
            }
            showToast('Please fill all fields correctly', 'error');
            return false;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showToast('Logged out', 'info');
            renderApp();
        }

        function checkSession() {
            const stored = localStorage.getItem('currentUser');
            if (stored) currentUser = JSON.parse(stored);
        }

        function setView(view) {
            currentView = view;
            currentModule = null;
            currentLesson = null;
            renderApp();
        }

        function viewModule(moduleType) {
            currentModule = moduleType;
            const lessons = LESSONS[moduleType] || [];
            if (lessons.length > 0) currentLesson = lessons[0];
            currentView = 'course';
            renderApp();
        }

        function selectLesson(lesson) {
            currentLesson = lesson;
            renderApp();
        }

        function openQuiz(moduleType, lessonNum) {
            const quizKey = `${moduleType}_${lessonNum}`;
            const quiz = QUIZZES[quizKey] || QUIZZES.learner_1;
            let currentQuestion = 0;
            let answers = [];

            function renderQuestion() {
                const q = quiz[currentQuestion];
                const modalContent = document.getElementById('quizModalContent');
                modalContent.innerHTML = `
                    <div class="quiz-question">
                        <h3>Question ${currentQuestion + 1} of ${quiz.length}</h3>
                        <p style="margin: 16px 0; font-size: 1.1rem;">${q.question}</p>
                        <div class="quiz-options">
                            ${q.options.map((opt, idx) => `
                                <div class="quiz-option" onclick="selectQuizOption(this, ${idx})">${String.fromCharCode(65 + idx)}. ${opt}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 24px;">
                        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-primary" onclick="nextQuestion()">Next →</button>
                    </div>
                `;
            }

            window.selectQuizOption = (el, idx) => {
                document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
                answers[currentQuestion] = idx;
            };

            window.nextQuestion = () => {
                if (answers[currentQuestion] === undefined) {
                    showToast('Please select an answer', 'warning');
                    return;
                }
                if (currentQuestion + 1 < quiz.length) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    let correct = 0;
                    quiz.forEach((q, idx) => { if (answers[idx] === q.correct) correct++; });
                    const score = Math.round((correct / quiz.length) * 100);
                    const passed = score >= 70;

                            <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeModal(); renderApp();">Close</button>
                        </div>
                    `;
                }
            };

            const modalContent = document.getElementById('quizModalContent');
            modalContent.innerHTML = '<div class="spinner"></div>';
            renderQuestion();
            document.getElementById('quizModal').classList.add('active');

        };
        window.doLogin = () => { const email = document.getElementById('loginEmail')?.value; const password = document.getElementById('loginPassword')?.value; if (login(email, password)) document.getElementById('loginModal').classList.remove('active'); };
        window.doSignup = () => { const name = document.getElementById('signupName')?.value; const email = document.getElementById('signupEmail')?.value; const pwd = document.getElementById('signupPassword')?.value; if (signUp(name, email, pwd)) document.getElementById('signupModal').classList.remove('active'); };
        window.setView = setView; window.viewModule = viewModule; window.selectLesson = selectLesson; window.openQuiz = openQuiz; window.logout = logout; window.showToast = showToast; window.toggleSidebar = toggleSidebar; window.closeModal = closeModal;

        checkSession();
        renderApp();
    </script>
</body>
</html>
