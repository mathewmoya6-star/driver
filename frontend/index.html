<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MEI DRIVE AFRICA | Learn Smart Pass NTSA Test Like Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0B0F19; color: #E8EDF5; }
        :root {
            --primary: #00d084;
            --bg-card: #121B2C;
            --border: #1E2A3E;
            --danger: #EF4444;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .navbar { background: rgba(11,15,25,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,208,132,0.3); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #4ade80); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .nav-links button, .nav-links .nav-item { background: transparent; border: none; color: #A0B3D9; padding: 8px 16px; border-radius: 50px; cursor: pointer; }
        .nav-links button:hover { background: rgba(0,208,132,0.1); color: var(--primary); }
        .btn { padding: 12px 24px; border-radius: 50px; background: linear-gradient(135deg, var(--primary), #00a86b); border: none; font-weight: bold; cursor: pointer; }
        .btn-small { padding: 6px 12px; border-radius: 40px; background: var(--primary); border: none; cursor: pointer; font-size: 12px; }
        .btn-danger { background: var(--danger); color: white; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .admin-section { margin: 30px 0; }
        .admin-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .admin-tab { padding: 10px 20px; cursor: pointer; border-radius: 12px 12px 0 0; background: #1E2A3E; }
        .admin-tab.active { background: var(--primary); color: #0B0F19; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        input, select { background: #0F1622; border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; color: white; }
        .hero { text-align: center; padding: 40px 20px; background: radial-gradient(circle at 10% 30%, rgba(0,208,132,0.08), #0B0F19); border-radius: 32px; margin: 20px 0; }
        .profile-link { background: rgba(0,208,132,0.15); border-radius: 40px; padding: 6px 16px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; z-index: 1100; }
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
<div id="app">
    <div class="navbar">
        <div class="container nav">
            <div class="logo" data-nav="home">MEI DRIVE AFRICA ⚡</div>
            <div class="nav-links" id="navLinks">
                <button data-nav="home">🏠 Home</button>
                <button data-nav="learner">📚 Learner Hub</button>
                <button data-nav="psv">🚌 PSV</button>
                <button data-nav="boda">🏍️ Boda</button>
                <button data-nav="ev">⚡ EV</button>
                <button data-nav="quiz">📝 Quiz</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </div>
    <div class="container"><main id="page-content"><div class="spinner"></div></main></div>
</div>
<div id="toast-root"></div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
    const supabaseUrl = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);
    
    let currentUser = null;
    let isAdmin = false;
    let userProgress = {};
    let currentPage = 'home';
    let materialsCache = {};
    const tableMapping = { learner: 'learner_units', psv: 'psv_modules', boda: 'boda_modules', ev: 'ev_modules' };
    const unitTitles = ["Intro to Driving","Highway Code","Vehicle Controls","Maintenance","Moving Off","Turning","Roundabouts","Overtaking","Speed Limits","Defensive Driving","Night Driving","Adverse Weather","Alcohol & Drugs","Fatigue","Pedestrian Safety","Emergency Procedures","First Aid","Insurance","Environmental Driving","NTSA Prep","Advanced Skills"];
    
    function showToast(msg, type) { const toast=document.createElement('div'); toast.className='toast'; toast.innerHTML=`${type==='success'?'✅':'ℹ️'} ${msg}`; document.getElementById('toast-root').appendChild(toast); setTimeout(()=>toast.remove(),3000); }
    function escapeHtml(t){ return t?.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]||c)) || ''; }
    
    async function fetchMaterials(moduleType) {
        if(materialsCache[moduleType]) return materialsCache[moduleType];
        const table=tableMapping[moduleType];
        if(!table) return getFallbackMaterials(moduleType);
        try {
            const {data,error}=await supabase.from(table).select('*').order('module_number',{ascending:true});
            if(error||!data?.length) return getFallbackMaterials(moduleType);
            const transformed=data.map(item=>({...item, unit_number:item.module_number, module_type:moduleType, price:item.price||0, is_locked:item.is_locked||false}));
            materialsCache[moduleType]=transformed;
            return transformed;
        } catch(e){ return getFallbackMaterials(moduleType); }
    }
    function getFallbackMaterials(moduleType) {
        if(moduleType==='learner') return Array.from({length:21},(_,i)=>({ id:i+1, title:`Unit ${i+1}: ${unitTitles[i]}`, description:`NTSA unit`, content:generateUnitContent(i+1,unitTitles[i]), module_type:'learner', unit_number:i+1, icon:"🚗", price:19.99, is_locked:false }));
        if(moduleType==='psv') return Array.from({length:8},(_,i)=>({ id:100+i, title:`PSV: ${['Licensing','Conduct','Safety','Defensive','Routes','Emergencies','Fares','Customer'][i]}`, content:'<p>PSV content</p>', price:29.99, is_locked:false }));
        if(moduleType==='boda') return Array.from({length:10},(_,i)=>({ id:200+i, title:`Boda: ${['Controls','Gear','Professionalism','Drugs','Service','Crime','Passengers','Night','Biz','Defensive'][i]}`, content:'<p>Boda training</p>', price:14.99, is_locked:false }));
        if(moduleType==='ev') return Array.from({length:8},(_,i)=>({ id:300+i, title:`EV: ${['Intro','Battery','Charging','Maintenance','Safety','Range','Commercial','Rules'][i]}`, content:'<p>EV knowledge</p>', price:39.99, is_locked:false }));
        return [];
    }
    function generateUnitContent(num,title){ return `<h2>Unit ${num}: ${title}</h2><div class="safety-box">Safety first!</div><p>Full NTSA content.</p>`; }
    
    async function fetchUserProgress() { if(!currentUser) return {}; try { const {data}=await supabase.from('user_progress').select('*').eq('user_id',currentUser.id); const prog={}; data?.forEach(p=>{ prog[p.material_id]=p.progress_percentage||0; }); userProgress=prog; return prog; } catch(e){ return {}; } }
    async function updateProgress(materialId, progress) { if(!currentUser) return false; await supabase.from('user_progress').upsert({ user_id:currentUser.id, material_id:materialId, progress_percentage:progress, status:progress===100?'completed':'in_progress', last_accessed_at:new Date() }); userProgress[materialId]=progress; showToast(progress===100?'Unit completed!':'Progress saved','success'); return true; }
    
    // Admin functions (same as before)
    async function adminGetAllUsers() { const {data:profiles}=await supabase.from('user_profiles').select('id,is_admin,status,full_name'); const users=[]; for(const p of profiles||[]){ const {data:authUser}=await supabase.auth.admin.getUserById(p.id); const email=authUser?.user?.email||'unknown'; users.push({...p,email}); } return users; }
    async function adminDeleteUser(userId) { if(!confirm('Permanently delete user?')) return; await supabase.from('user_progress').delete().eq('user_id',userId); await supabase.from('payments').delete().eq('user_id',userId); await supabase.from('user_profiles').delete().eq('id',userId); await supabase.auth.admin.deleteUser(userId); showToast('User deleted','success'); }
    async function adminUpdateModule(moduleType, moduleId, updates) { const table=tableMapping[moduleType]; await supabase.from(table).update(updates).eq('id',moduleId); materialsCache={}; showToast('Module updated','success'); }
    async function adminDeleteModule(moduleType, moduleId) { if(confirm('Delete this module?')){ await supabase.from(tableMapping[moduleType]).delete().eq('id',moduleId); materialsCache={}; showToast('Deleted','success'); } }
    async function adminAddModule(moduleType, data) { const table=tableMapping[moduleType]; await supabase.from(table).insert(data); materialsCache={}; showToast('Module added','success'); }
    async function adminGetPayments() { const {data}=await supabase.from('payments').select('*, user_profiles(full_name)'); return data||[]; }
    async function adminUpdatePayment(paymentId, status) { await supabase.from('payments').update({ status, updated_at:new Date() }).eq('id',paymentId); showToast(`Payment ${status}`,'success'); }
    
    window.viewMaterial = async function(id, type) {
        const materials = await fetchMaterials(type);
        const material = materials.find(m => m.id == id);
        if (!material) return;
        if (material.is_locked && (!currentUser || !isAdmin)) { showToast('This module is locked.','error'); return; }
        const progress = userProgress[material.id] || 0;
        const content = material.content || `<h2>${escapeHtml(material.title)}</h2><p>${escapeHtml(material.description)}</p>`;
        document.getElementById('page-content').innerHTML = `<div class="card"><h2>${escapeHtml(material.title)}</h2><div>${content}</div><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div><button class="btn" onclick="updateProgress(${material.id},100)">Mark Complete</button><button class="btn-small" onclick="navigateTo('${type}')">← Back</button></div>`;
    };
    
    async function renderAdminDashboard() {
        if (!isAdmin) { navigateTo('home'); return; }
        const container = document.getElementById('page-content');
        container.innerHTML = `<div class="admin-section"><div class="admin-tabs" id="adminTabs"><div class="admin-tab active" data-tab="users">👥 Users</div><div class="admin-tab" data-tab="modules">📦 Modules</div><div class="admin-tab" data-tab="payments">💰 Payments</div></div><div id="adminTabContent"></div></div>`;
        const users = await adminGetAllUsers();
        const payments = await adminGetPayments();
        function renderUsersTab() {
            let html = `<div class="card"><h3>All Users</h3><table><th>Email</th><th>Status</th><th>Admin</th><th>Actions</th></tr>`;
            users.forEach(u => { html += `<tr><td>${escapeHtml(u.email)}</td><td>${u.status||'active'}</td><td>${u.is_admin?'✅':'❌'}</td><td><button class="btn-small btn-danger" onclick="adminDeleteUser('${u.id}')">Delete</button></td></tr>`; });
            html += `<\/table></div><div class="card"><h3>Progress Summary</h3>${users.map(u=>`<p>${escapeHtml(u.email)}: ${Object.values(userProgress).filter(p=>p>0).length} units started</p>`).join('')}</div>`;
            document.getElementById('adminTabContent').innerHTML = html;
            window.adminDeleteUser = adminDeleteUser;
        }
        async function renderModulesTab() {
            let html = `<div class="card"><h3>Manage Modules</h3><select id="moduleTypeSelect"><option value="learner">Learner Units</option><option value="psv">PSV</option><option value="boda">Boda</option><option value="ev">EV</option></select><button class="btn-small" onclick="showAddModuleModal()">+ Add Module</button><div id="modulesList"></div></div>`;
            document.getElementById('adminTabContent').innerHTML = html;
            const renderList = async (type) => {
                let mods = await fetchMaterials(type);
                let listHtml = `<table><th>#</th><th>Title</th><th>Price</th><th>Locked</th><th>Actions</th></tr>`;
                mods.forEach(m => {
                    listHtml += `<tr><td>${m.unit_number}</td><td>${escapeHtml(m.title)}</td><td><input type="number" id="price-${m.id}" value="${m.price}" step="0.01" style="width:80px"></td><td><input type="checkbox" id="lock-${m.id}" ${m.is_locked?'checked':''}></td>
                    <td><button class="btn-small" onclick="updateModuleFields('${type}',${m.id})">Save</button> <button class="btn-small btn-danger" onclick="adminDeleteModule('${type}',${m.id})">Delete</button></td></tr>`;
                });
                listHtml += `<\/table>`;
                document.getElementById('modulesList').innerHTML = listHtml;
                window.updateModuleFields = async (type, id) => {
                    const price = parseFloat(document.getElementById(`price-${id}`).value);
                    const is_locked = document.getElementById(`lock-${id}`).checked;
                    await adminUpdateModule(type, id, { price, is_locked });
                    renderList(type);
                };
                window.adminDeleteModule = adminDeleteModule;
            };
            document.getElementById('moduleTypeSelect').addEventListener('change', (e) => renderList(e.target.value));
            renderList('learner');
            window.showAddModuleModal = () => {
                const type = document.getElementById('moduleTypeSelect').value;
                const newNumber = prompt('Enter module number');
                const title = prompt('Enter title');
                if(newNumber && title) adminAddModule(type, { module_number: parseInt(newNumber), title, content: '<p>New content</p>', price: 0, is_locked: false, status: 'published' });
            };
        }
        function renderPaymentsTab() {
            let html = `<div class="card"><h3>Payments</h3>能ables><tr><th>User</th><th>Module</th><th>Amount</th><th>Status</th><th>Action</th></tr>`;
            payments.forEach(p => {
                html += `<tr><td>${escapeHtml(p.user_profiles?.full_name || p.user_id)}</td><td>${p.module_type} #${p.module_id}</td><td>$${p.amount}</td><td>${p.status}</td><td>${p.status==='pending'?`<button class="btn-small" onclick="adminUpdatePayment(${p.id},'approved')">Approve</button> <button onclick="adminUpdatePayment(${p.id},'defaulted')" class="btn-small btn-danger">Default</button>`:p.status==='defaulted'?`<button onclick="adminUpdatePayment(${p.id},'pending')">Reset</button>`:'✅ Approved'}</td></tr>`;
            });
            html += `<\/table></div>`;
            document.getElementById('adminTabContent').innerHTML = html;
            window.adminUpdatePayment = adminUpdatePayment;
        }
        document.getElementById('adminTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.admin-tab');
            if(!tab) return;
            document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            if(tab.dataset.tab === 'users') renderUsersTab();
            if(tab.dataset.tab === 'modules') renderModulesTab();
            if(tab.dataset.tab === 'payments') renderPaymentsTab();
        });
        renderUsersTab();
    }
    
    async function renderModulePage(moduleType) {
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="spinner"></div>';
        const materials = await fetchMaterials(moduleType);
        const cards = materials.map(m => `<div class="card" onclick="viewMaterial(${m.id}, '${moduleType}')"><h3>${escapeHtml(m.title)}</h3><p>${m.price ? `$${m.price}` : 'Free'}</p><button class="btn-small">View →</button></div>`).join('');
        container.innerHTML = `<div class="hero"><h1>${moduleType.toUpperCase()} Course</h1></div><div class="grid">${cards}</div>`;
    }
    
    function renderHome() {
        document.getElementById('page-content').innerHTML = `<div class="hero"><h1>Learn Smart. Pass NTSA Test Like A Pro.</h1><button class="btn" onclick="navigateTo('learner')">Start 21-Unit Course</button></div>
        <div class="grid"><div class="card" onclick="navigateTo('learner')"><h3>📚 Learner Hub</h3></div><div class="card" onclick="navigateTo('psv')"><h3>🚌 PSV</h3></div><div class="card" onclick="navigateTo('boda')"><h3>🏍️ Boda</h3></div><div class="card" onclick="navigateTo('ev')"><h3>⚡ EV</h3></div></div>`;
    }
    function renderQuiz() { document.getElementById('page-content').innerHTML = `<div class="hero"><h1>📝 NTSA Quiz</h1><p>Coming soon</p></div>`; }
    
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const { data: profile, error } = await supabase
                .from('user_profiles')
                .select('is_admin')
                .eq('id', currentUser.id)
                .maybeSingle();
            isAdmin = (!error && profile?.is_admin === true);
            await fetchUserProgress();
        } else {
            currentUser = null;
            isAdmin = false;
            userProgress = {};
        }
        updateAuthUI();
        // Check URL parameter for admin dashboard
        const urlParams = new URLSearchParams(window.location.search);
        const showAdmin = urlParams.get('admin') === 'true';
        if (isAdmin && showAdmin) {
            await renderAdminDashboard();
            // Remove the parameter from URL without reload
            window.history.replaceState({}, '', window.location.pathname);
        } else {
            navigateTo('home');
        }
    }
    
    function updateAuthUI() {
        const authDiv = document.getElementById('authButtons');
        if (!authDiv) return;
        if (currentUser) {
            authDiv.innerHTML = `<div class="profile-link">👤 ${currentUser.email.split('@')[0]}</div><button onclick="logout()">Logout</button>`;
        } else {
            authDiv.innerHTML = `<button onclick="showLoginModal()">Login</button><button onclick="showSignupModal()">Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser=null; isAdmin=false; userProgress={}; updateAuthUI(); navigateTo('home'); }
    function showLoginModal() { alert('Use Sign Up first, then login.'); }
    function showSignupModal() { alert('Sign up via Supabase Auth.'); }
    
    window.navigateTo = async function(page) {
        if (page === 'home') renderHome();
        else if (page === 'quiz') renderQuiz();
        else if (['learner','psv','boda','ev'].includes(page)) await renderModulePage(page);
        else renderHome();
        document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    };
    
    window.viewMaterial = viewMaterial;
    window.navigateTo = navigateTo;
    window.updateProgress = updateProgress;
    window.logout = logout;
    window.adminDeleteUser = adminDeleteUser;
    window.adminDeleteModule = adminDeleteModule;
    window.adminUpdatePayment = adminUpdatePayment;
    
    checkSession();
</script>
</body>
</html>
