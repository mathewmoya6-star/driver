        function startQuiz() {
            currentQuiz = [...QUIZ_BANK];
            currentQuestionIndex = 0;
            quizAnswers = [];
            quizSubmitted = false;
            renderQuiz();
        }
        
        function selectQuizAnswer(questionId, answerIndex) {
            if (quizSubmitted) return;
            
            const existingAnswer = quizAnswers.find(a => a.questionId === questionId);
            if (existingAnswer) {
                existingAnswer.selectedAnswer = answerIndex;
            } else {
                quizAnswers.push({ questionId, selectedAnswer: answerIndex });
            }
            renderQuiz();
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < currentQuiz.length - 1) {
                currentQuestionIndex++;
                renderQuiz();
            }
        }
        
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuiz();
            }
        }
        
        function submitQuiz() {
            const answeredCount = quizAnswers.length;
            const totalQuestions = currentQuiz.length;
            
            if (answeredCount < totalQuestions) {
                showToast(`Please answer all ${totalQuestions} questions before submitting. You've answered ${answeredCount}.`, 'warning');
                return;
            }
            
            quizSubmitted = true;
            let score = 0;
            quizAnswers.forEach(answer => {
                const question = currentQuiz.find(q => q.id === answer.questionId);
                if (question && answer.selectedAnswer === question.correct) {
                    score++;
                }
            });
            
            const percentage = Math.round((score / totalQuestions) * 100);
            const passed = percentage >= 70;
            
            showToast(passed ? `🎉 Congratulations! You passed with ${percentage}%!` : `📚 You scored ${percentage}%. Keep practicing!`, passed ? 'success' : 'info');
            renderQuiz();
        }

            startQuiz();
        }

            return `

                                const isSelected = currentAnswer && currentAnswer.selectedAnswer === idx;

                        <input type="email" id="signupEmail" placeholder="Email address">
                        <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
                        <button class="btn btn-primary" style="width: 100%;" onclick="doSignup()">Create Account</button>
                        <hr style="margin: 20px 0;">
                        <p style="text-align: center;">Already have an account? <a href="#" onclick="showLoginModal(); return false;">Login</a></p>
                    `;
                    modal.classList.add('active');
                };
                window.doLogin = () => {
                    const email = document.getElementById('loginEmail')?.value;
                    const password = document.getElementById('loginPassword')?.value;
                    if (login(email, password)) {
                        document.getElementById('loginModal').classList.remove('active');
                    }
                };
                window.doSignup = () => {
                    const name = document.getElementById('signupName')?.value;
                    const email = document.getElementById('signupEmail')?.value;
                    const password = document.getElementById('signupPassword')?.value;
                    if (signUp(name, email, password)) {
                        document.getElementById('signupModal').classList.remove('active');
                    }
                };
                return;
            }
            
            const views = {
                dashboard: renderDashboard(),
                modules: renderModules(),
                admin: renderAdminPanel()
            };
            
            const navItems = userRole === 'admin' 
                ? `<div class="nav-item ${currentView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                   <div class="nav-item ${currentView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> Learning Paths</div>
                   <div class="nav-item ${currentView === 'admin' ? 'active' : ''}" onclick="setView('admin')"><i class="fas fa-shield-alt"></i> Admin Panel <span class="admin-badge">ADMIN</span></div>
                   <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>`
                : `<div class="nav-item ${currentView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                   <div class="nav-item ${currentView === 'modules' ? 'active' : ''}" onclick="setView('modules')"><i class="fas fa-book"></i> Learning Paths</div>
                   <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>`;
            
            app.innerHTML = `
                <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header"><div class="logo"><span class="logo-icon">🚗</span> MEI DRIVE AFRICA ⚡</div></div>
                    <div class="user-info"><div class="user-avatar">👤</div><div class="user-details"><h4>${escapeHtml(currentUser.name)}</h4><p>${escapeHtml(currentUser.email)}${userRole === 'admin' ? ' • Admin' : ''}</p></div></div>
                    <div class="nav-menu">${navItems}</div>
                </div>
                <div class="main-content">
                    <div class="top-bar"><div class="page-title"><h1>${currentView === 'dashboard' ? 'Dashboard' : currentView === 'modules' ? 'Learning Paths' : 'Admin Panel'}</h1><p>Welcome back, ${escapeHtml(currentUser.name)}</p></div></div>
                    ${views[currentView] || views.dashboard}
                </div>
            `;
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c] || c)); }
        
        // Make functions global for onclick
        window.toggleSidebar = () => document.getElementById('sidebar')?.classList.toggle('open');
        window.setView = setView;
        window.viewModule = viewModule;
        window.logout = logout;
        window.showToast = showToast;
        window.startQuiz = startQuiz;
        window.selectQuizAnswer = selectQuizAnswer;
        window.nextQuestion = nextQuestion;
        window.prevQuestion = prevQuestion;
        window.submitQuiz = submitQuiz;
        window.resetQuiz = resetQuiz;
        
        // Initialize
        checkSession();
        renderApp();
    </script>
</body>
</html>
