<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MEI DRIVE AFRICA</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .offline-container { max-width: 400px; padding: 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #00ff88; }
        .btn { background: #00ff88; color: #0a192f; padding: 12px 24px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <button class="btn" onclick="location.reload()">Retry</button>
    </div>
</body>
