<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MEI Drive Africa</title>
    <style>
        :root { --neon-green: #00FF88; --dark-blue: #041B3D; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; padding: 40px; border-radius: 20px; width: 400px; text-align: center; }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h2 { color: var(--dark-blue); margin-bottom: 10px; }
        .admin-badge { background: var(--neon-green); color: var(--dark-blue); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: var(--neon-green); color: var(--dark-blue); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚗</div>
        <h2>MEI DRIVE AFRICA</h2>
        <div class="admin-badge">Administrator Panel</div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login as Admin</button>
        </form>
        <div id="error" class="error"></div>
    </div>
    <script>
        const API_URL = window.location.origin;
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminEmail', email);
                    window.location.href = '/admin-dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid credentials';
                }
            } catch (error) {
