<script>
    const form = document.getElementById('adminLoginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('error');
    const loadingDiv = document.getElementById('loading');

    // YOUR REAL BACKEND URL
    // Use ONE of these based on your setup:
    const API_URL = 'https://meidriveafrica-backend.onrender.com';  // Your Render backend
    // const API_URL = 'https://www.meidriveafrica.com/api';  // Your domain API
    // const API_URL = 'http://localhost:5000';  // Local backend

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
            showError('Please enter both email and password');
            return;
        }
        
        hideError();
        showLoading();
        loginBtn.disabled = true;
        
        try {
            // Try to connect to real backend
            const response = await fetch(`${API_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    password: password 
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                // Save admin session
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminEmail', email);
                localStorage.setItem('adminName', data.admin?.name || 'Administrator');
                
                // Show success and redirect
                loadingDiv.innerHTML = '✅ Login successful! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                showError(data.message || data.error || 'Invalid credentials');
                hideLoading();
                loginBtn.disabled = false;
            }
        } catch (error) {
            console.error('Connection error:', error);
            showError(`Cannot connect to backend. Make sure your backend is running at ${API_URL}`);
            hideLoading();
            loginBtn.disabled = false;
        }
    });
    
    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
    }
    
    function hideError() {
        errorDiv.classList.remove('show');
        errorDiv.textContent = '';
    }
    
    function showLoading() {
        loadingDiv.classList.add('show');
        loadingDiv.innerHTML = '🔐 Authenticating with backend...';
    }
    
    function hideLoading() {
        loadingDiv.classList.remove('show');
    }
</script>
