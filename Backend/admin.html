<!DOCTYPE html>
<html>
<head>
    <title>Login - MEI Drive Africa</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            max-width: 400px;
            width: 90%;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
        }
        .btn {
            background: #d4af37;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
        .error {
            color: #dc3545;
            margin-top: 10px;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 style="color: #d4af37; text-align: center;">MEI Drive Africa</h2>
        <h3 style="text-align: center;">Admin Login</h3>
        
        <input type="email" id="email" placeholder="Email" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        
        <button class="btn" onclick="login()">Login</button>
        
        <div id="error" class="error"></div>
        <div id="loading" class="loading">Logging in...</div>
    </div>

    <script>
        // Backend API URL - CHANGE THIS TO YOUR ACTUAL BACKEND URL
        const API = "https://your-backend.onrender.com"; // Replace with your Render backend URL
        
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error");
            const loadingDiv = document.getElementById("loading");
            
            // Validate input
            if (!email || !password) {
                errorDiv.innerText = "Please enter email and password";
                errorDiv.style.display = "block";
                return;
            }
            
            // Show loading state
            loadingDiv.style.display = "block";
            errorDiv.style.display = "none";
            
            try {
                // Send login request to backend
                const res = await fetch(`${API}/api/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    // Save token for authenticated requests
                    localStorage.setItem("adminToken", data.token);
                    localStorage.setItem("adminUser", JSON.stringify(data.user));
                    
                    // Redirect to admin dashboard
                    window.location.href = "/admin/admin.html";
                } else {
                    // Show error message
                    errorDiv.innerText = data.error || "Login failed. Check your credentials.";
                    errorDiv.style.display = "block";
                }
            } catch (error) {
                console.error("Login error:", error);
                errorDiv.innerText = "Network error. Can't reach server.";
                errorDiv.style.display = "block";
            } finally {
                loadingDiv.style.display = "none";
            }
        }
        
        // Check if already logged in
        const token = localStorage.getItem("adminToken");
        if (token && window.location.pathname !== "/admin/admin.html") {
            window.location.href = "/admin/admin.html";
        }
        
        // Allow Enter key to submit
        document.getElementById("password").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>
</body>
</html>
