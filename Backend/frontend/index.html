<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Driver Safety Platform</title>
    <meta name="description" content="Kenya's enterprise-grade driver safety platform">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        :root { --primary-gold: #d4af37; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        
        .navbar { background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,175,55,0.2); position: sticky; top: 0; z-index: 1000; padding: 16px 0; }
        .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, #d4af37, #f0c674); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .nav-links button { background: transparent; border: none; color: #e0e0e0; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: 0.3s; }
        .nav-links button:hover { color: var(--primary-gold); background: rgba(212,175,55,0.1); }
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        .btn { background: linear-gradient(135deg, #d4af37, #f0c674); color: #000; font-weight: 700; padding: 12px 28px; border: none; border-radius: 48px; cursor: pointer; transition: 0.3s; }
        .btn-outline { background: transparent; border: 2px solid var(--primary-gold); color: var(--primary-gold); padding: 10px 26px; border-radius: 48px; cursor: pointer; }
        .btn-small { background: var(--primary-gold); color: #000; padding: 8px 20px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        
        .hero { text-align: center; padding: 60px 20px; background: radial-gradient(circle at 10% 30%, rgba(212,175,55,0.08), #0a0a0a); border-radius: 48px; margin-bottom: 40px; }
        .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; margin-bottom: 16px; }
        .highlight { background: linear-gradient(135deg, #d4af37, #f0c674); background-clip: text; -webkit-background-clip: text; color: transparent; }
        
        .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 32px 0; }
        .unit-card { background: #111; border-radius: 24px; padding: 24px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .unit-card:active { transform: scale(0.98); }
        .unit-number { background: linear-gradient(135deg, #d4af37, #f0c674); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; display: inline-block; margin-bottom: 12px; }
        .unit-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .unit-desc { font-size: 0.8rem; color: #aaa; margin-bottom: 12px; }
        .progress-bar { background: #2a2a2a; border-radius: 20px; height: 6px; overflow: hidden; }
        .progress-fill { background: linear-gradient(135deg, #d4af37, #f0c674); height: 100%; width: 0%; transition: width 0.5s; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; padding: 16px; }
        .modal-content { background: #111; border: 1px solid var(--primary-gold); border-radius: 28px; padding: 28px; max-width: 420px; width: 100%; position: relative; }
        .modal-content input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1c26; border: 1px solid #2c2f3a; border-radius: 12px; color: #fff; }
        .close-modal { position: absolute; top: 16px; right: 20px; font-size: 24px; cursor: pointer; color: var(--primary-gold); }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #111; border-left: 4px solid var(--primary-gold); padding: 14px 22px; border-radius: 14px; z-index: 2000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--primary-gold); border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #0d0d12; border-radius: 24px; padding: 20px; border: 1px solid #222; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary-gold); }
        
        footer { text-align: center; padding: 40px; color: #6a6e7e; border-top: 1px solid #222; margin-top: 60px; }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .mobile-menu-btn { display: block; }
            .nav-links { display: none; width: 100%; flex-direction: column; }
            .nav-links.show { display: flex; }
            .nav-links button { width: 100%; text-align: center; }
            .units-grid { grid-template-columns: 1fr; }
            .toast { left: 20px; right: 20px; bottom: 20px; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav">
        <div class="logo" onclick="navigateTo('home')">MEI DRIVE AFRICA</div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        <div class="nav-links" id="navLinks">
            <button onclick="navigateTo('home')">Home</button>
            <button onclick="navigateTo('learner')">Learner Hub</button>
            <button onclick="navigateTo('psv')">PSV</button>
            <button onclick="navigateTo('boda')">Boda</button>
            <div id="authButtons"></div>
        </div>
    </div>
</div>

<div class="container">
    <div id="home" class="page active-page">
        <div class="hero">
            <h1>Kenya's <span class="highlight">Driver Safety Platform</span></h1>
            <p>Drive Smart. Stay Safe. Arrive Home.</p>
            <button class="btn" style="margin-top: 28px;" onclick="navigateTo('learner')">Start Learning</button>
        </div>
        <div class="stats-grid" id="homeStats"></div>
        <div class="units-grid" id="homeModulesGrid"></div>
    </div>

    <div id="learner" class="page">
        <div class="hero"><h1>Learner Driver Hub</h1><p>21 NTSA Units • Tap any unit to start</p></div>
        <div class="units-grid" id="unitsContainer"></div>
        <div id="quizSection" style="display:none; background:#0d0d12; border-radius:28px; padding:24px; margin-top:24px;">
            <h3 id="quizTitle">Unit Quiz</h3>
            <div id="quizContainer"></div>
            <div id="quizResult" style="margin-top:16px;"></div>
            <div style="text-align:center; margin-top:16px;"><button class="btn-outline btn-small" onclick="closeQuiz()">Close Quiz</button></div>
        </div>
    </div>

    <div id="psv" class="page"><div class="hero"><h1>PSV Driver Course</h1></div><div class="units-grid"><div class="unit-card"><h3>🚍 Coming Soon</h3><button class="btn-small">Notify Me</button></div></div></div>
    <div id="boda" class="page"><div class="hero"><h1>Boda Safety Course</h1></div><div class="units-grid"><div class="unit-card"><h3>🏍️ Coming Soon</h3><button class="btn-small">Notify Me</button></div></div></div>
</div>
<footer><p>© 2026 MEI DRIVE AFRICA — Secure • AI-Powered</p></footer>

<script>
// ====================== SECURE CONFIGURATION ======================
// API URL must be set via environment variable at build time
// For Vercel: Set NEXT_PUBLIC_API_URL in Environment Variables
const API_URL = window.__API_URL__ || 'https://mei-drive-backend.onrender.com';

// Session is stored in memory only, not in localStorage
let currentSession = null;
let currentUser = null;
let userProgress = {};
let currentQuiz = null;
let quizAnswers = [];
let authRefreshTimer = null;

// ====================== UNITS ======================
const UNITS = Array.from({ length: 21 }, (_, i) => ({
    id: i + 1,
    title: i === 0 ? "Introduction to Driving in Kenya" :
           i === 1 ? "The Highway Code & Traffic Signs" :
           i === 2 ? "Road User Behaviour & Etiquette" :
           i === 3 ? "Speed Limits & Safe Following" :
           i === 4 ? "Overtaking & Lane Discipline" :
           i === 5 ? "Junctions & Intersections" :
           i === 6 ? "Pedestrian Crossings & School Zones" :
           i === 7 ? "Parking & Reversing" :
           i === 8 ? "Vehicle Controls & Cockpit Drill" :
           i === 9 ? "Night Driving & Weather" :
           i === 10 ? "Emergency Procedures" :
           i === 11 ? "Alcohol, Drugs & Fitness" :
           i === 12 ? "Practical Test Guidelines" :
           i === 13 ? "Road Safety & Environment" :
           i === 14 ? "Roundabouts & Traffic Circles" :
           i === 15 ? "Motorway & Highway Driving" :
           i === 16 ? "Defensive Driving" :
           i === 17 ? "Vehicle Maintenance" :
           i === 18 ? "First Aid & Accident Response" :
           i === 19 ? "PSV & Commercial Safety" :
           "Final Assessment & Certification",
    desc: "NTSA Kenya curriculum unit"
}));

// ====================== SECURE API CALLS (with timeout) ======================
async function apiCall(endpoint, options = {}) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    
    try {
        const res = await fetch(`${API_URL}${endpoint}`, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                ...(currentSession?.access_token && { 'Authorization': `Bearer ${currentSession.access_token}` }),
                ...options.headers
            },
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        const data = await res.json();
        
        if (!res.ok) {
            if (res.status === 401) {
                // Session expired - clear and redirect
                logout();
                throw new Error('Session expired. Please login again.');
            }
            throw new Error(data.error || 'Request failed');
        }
        
        return data;
    } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
            throw new Error('Request timeout. Please try again.');
        }
        throw err;
    }
}

// ====================== AUTH FUNCTIONS ======================
async function login(email, password) {
    try {
        const data = await apiCall('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });
        
        if (data.session) {
            currentSession = data.session;
            currentUser = data.user;
            await loadProgress();
            updateAuthUI();
            showToast(`Welcome ${data.user.email?.split('@')[0]}!`, 'success');
            navigateTo('learner');
            renderUnits();
            
            // Set up session refresh (every 50 minutes)
            if (authRefreshTimer) clearInterval(authRefreshTimer);
            authRefreshTimer = setInterval(async () => {
                try {
                    const meData = await apiCall('/api/auth/me');
                    if (!meData.user) logout();
                } catch (e) { logout(); }
            }, 50 * 60 * 1000);
        }
        return data;
    } catch (err) {
        showToast(err.message, 'error');
        throw err;
    }
}

async function signup(email, password, full_name) {
    try {
        const data = await apiCall('/api/auth/signup', {
            method: 'POST',
            body: JSON.stringify({ email, password, full_name })
        });
        
        if (data.session) {
            await login(email, password);
        } else {
            showToast('Account created! Please check your email to verify.', 'success');
        }
        return data;
    } catch (err) {
        showToast(err.message, 'error');
        throw err;
    }
}

function logout() {
    if (authRefreshTimer) clearInterval(authRefreshTimer);
    currentSession = null;
    currentUser = null;
    userProgress = {};
    updateAuthUI();
    showToast('Logged out', 'info');
    navigateTo('home');
    renderUnits();
}

async function loadProgress() {
    if (!currentUser) return;
    try {
        const data = await apiCall('/api/progress');
        userProgress = data.reduce((acc, p) => ({ ...acc, [p.unit_id]: p }), {});
    } catch (e) {
        console.error('Load progress error:', e);
    }
    renderUnits();
}

async function saveProgress(unitId, score) {
    if (!currentUser) return;
    try {
        await apiCall('/api/progress', {
            method: 'POST',
            body: JSON.stringify({ unit_id: unitId, unit_title: UNITS[unitId-1]?.title, score })
        });
        await loadProgress();
    } catch (e) {
        console.error('Save error:', e);
        showToast('Failed to save progress', 'error');
    }
}

// ====================== RENDER FUNCTIONS ======================
function renderUnits() {
    const container = document.getElementById('unitsContainer');
    if (!container) return;
    
    container.innerHTML = UNITS.map(unit => {
        const progress = userProgress[unit.id];
        const completed = progress?.completed;
        const score = progress?.score || 0;
        return `
            <div class="unit-card ${completed ? 'completed' : ''}" onclick="startUnitQuiz(${unit.id})">
                <div style="display:flex; justify-content:space-between;">
                    <span class="unit-number">Unit ${unit.id}</span>
                    ${completed ? `<span style="color:#2ecc71;">✓ ${score}%</span>` : ''}
                </div>
                <div class="unit-title">${escapeHtml(unit.title)}</div>
                <div class="unit-desc">${escapeHtml(unit.desc)}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${completed ? 100 : 0}%"></div></div>
                <button class="btn-small" style="margin-top:12px; width:100%;" onclick="event.stopPropagation(); startUnitQuiz(${unit.id})">
                    ${completed ? '📝 Retake Quiz' : '🎯 Start Unit'}
                </button>
            </div>
        `;
    }).join('');
}

function renderHome() {
    document.getElementById('homeStats').innerHTML = `
        <div class="stat-card"><div class="stat-number">21</div><div>NTSA Units</div></div>
        <div class="stat-card"><div class="stat-number">🤖 AI</div><div>Smart Assistant</div></div>
        <div class="stat-card"><div class="stat-number">🔐</div><div>Secure Cloud</div></div>
    `;
    document.getElementById('homeModulesGrid').innerHTML = UNITS.slice(0, 6).map(unit => `
        <div class="unit-card" onclick="navigateTo('learner')">
            <span class="unit-number">Unit ${unit.id}</span>
            <div class="unit-title">${escapeHtml(unit.title)}</div>
            <div class="unit-desc">${escapeHtml(unit.desc.substring(0, 60))}...</div>
            <button class="btn-small" style="margin-top:12px;">Start →</button>
        </div>
    `).join('');
}

// ====================== QUIZ FUNCTIONS ======================
function startUnitQuiz(unitId) {
    if (!currentUser) { showToast('Please login to track progress', 'error'); showLoginModal(); return; }
    
    const unit = UNITS[unitId-1];
    const questions = [
        { text: `What is the main focus of "${unit.title}"?`, options: ["Road Safety", "Driving Techniques", unit.title, "Vehicle Care"], correct: 2 },
        { text: "What is a key safety principle?", options: ["Speed is priority", "Safety first", "Rules optional", "Only practice"], correct: 1 },
        { text: "How to apply this knowledge?", options: ["Safe driving practices", "Ignoring rules", "Speeding", "Distraction"], correct: 0 }
    ];
    
    currentQuiz = { unitId, unitTitle: unit.title, questions, currentIndex: 0, score: 0 };
    quizAnswers = new Array(3).fill(null);
    
    document.getElementById('quizTitle').innerHTML = `${unit.title} Quiz`;
    document.getElementById('quizSection').style.display = 'block';
    renderQuiz();
    document.getElementById('quizSection').scrollIntoView({ behavior: 'smooth' });
}

function renderQuiz() {
    const container = document.getElementById('quizContainer');
    if (!container || !currentQuiz) return;
    const q = currentQuiz.questions[currentQuiz.currentIndex];
    const selected = quizAnswers[currentQuiz.currentIndex];
    
    container.innerHTML = `
        <div>
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span>Q${currentQuiz.currentIndex+1}/${currentQuiz.questions.length}</span>
                <span>Score: ${currentQuiz.score}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${((currentQuiz.currentIndex+1)/currentQuiz.questions.length)*100}%"></div></div>
            <div style="font-weight:600; margin:16px 0;">${escapeHtml(q.text)}</div>
            ${q.options.map((opt, idx) => `
                <div class="quiz-option" style="background:#1a1c26; padding:12px 16px; border-radius:60px; margin-bottom:8px; cursor:pointer;" onclick="selectAnswer(${idx})">
                    <span style="font-weight:700; color:#d4af37; margin-right:12px;">${String.fromCharCode(65+idx)}</span> ${escapeHtml(opt)}
                </div>
            `).join('')}
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button class="btn-outline btn-small" onclick="prevQuestion()" ${currentQuiz.currentIndex===0?'disabled':''}>Previous</button>
                <button class="btn-small" onclick="nextQuestion()">${currentQuiz.currentIndex===currentQuiz.questions.length-1?'Submit':'Next'}</button>
            </div>
        </div>
    `;
}

function selectAnswer(idx) { quizAnswers[currentQuiz.currentIndex] = idx; renderQuiz(); }
function prevQuestion() { if (currentQuiz.currentIndex > 0) { currentQuiz.currentIndex--; renderQuiz(); } }

async function nextQuestion() {
    if (quizAnswers[currentQuiz.currentIndex] === null) { showToast('Select an answer', 'error'); return; }
    if (quizAnswers[currentQuiz.currentIndex] === currentQuiz.questions[currentQuiz.currentIndex].correct) currentQuiz.score++;
    
    if (currentQuiz.currentIndex === currentQuiz.questions.length - 1) {
        const percent = Math.round((currentQuiz.score / currentQuiz.questions.length) * 100);
        const passed = percent >= 70;
        
        document.getElementById('quizResult').innerHTML = `
            <div style="padding:16px; background:#1a1c26; border-radius:16px;">
                <h3>${passed ? '🎉 Passed!' : '📚 Keep learning!'}</h3>
                <p>Score: ${currentQuiz.score}/${currentQuiz.questions.length} (${percent}%)</p>
            </div>
        `;
        
        if (passed) {
            await saveProgress(currentQuiz.unitId, percent);
            showToast(`🎉 Unit ${currentQuiz.unitId} completed! Score: ${percent}%`, 'success');
        }
        currentQuiz = null;
    } else {
        currentQuiz.currentIndex++;
        renderQuiz();
    }
}

function closeQuiz() {
    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('quizResult').innerHTML = '';
    currentQuiz = null;
}

// ====================== UI HELPERS ======================
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${escapeHtml(msg)}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function showLoginModal() {
    const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>Login / Sign Up</h3>
            <input type="text" id="loginName" placeholder="Full Name">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="btn" id="authBtn" style="width:100%" onclick="handleSignup()">Sign Up</button>
            <p style="margin-top:12px; text-align:center;"><a href="#" onclick="toggleAuthMode()">Already have an account? Login</a></p>
        </div>
    `;
    document.body.appendChild(modal);
    window.activeModal = modal;
}

let isLoginMode = false;
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    const btn = document.getElementById('authBtn');
    const title = document.querySelector('.modal-content h3');
    if (isLoginMode) {
        title.innerHTML = 'Login';
        btn.innerHTML = 'Login';
        btn.onclick = () => handleLogin();
    } else {
        title.innerHTML = 'Sign Up';
        btn.innerHTML = 'Sign Up';
        btn.onclick = () => handleSignup();
    }
}

async function handleSignup() {
    const name = document.getElementById('loginName').value;
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showToast('Please fill all fields', 'error'); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    try {
        await signup(email, password, name);
        closeModal();
    } catch (e) { showToast(e.message, 'error'); }
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showToast('Please enter email and password', 'error'); return; }
    try {
        await login(email, password);
        closeModal();
    } catch (e) { showToast(e.message, 'error'); }
}

function updateAuthUI() {
    const div = document.getElementById('authButtons');
    if (currentUser) {
        const name = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
        div.innerHTML = `<div style="background:#d4af37;color:#000;padding:6px 16px;border-radius:40px;"><i class="fas fa-user"></i> ${escapeHtml(name)}</div><button onclick="logout()">Logout</button>`;
    } else {
        div.innerHTML = `<button onclick="showLoginModal()">Login</button>`;
    }
}

function closeModal() { if (window.activeModal) { window.activeModal.remove(); window.activeModal = null; } }
function toggleMobileMenu() { document.getElementById('navLinks').classList.toggle('show'); }

let navDebounce = false;
function navigateTo(page) {
    if (navDebounce) return;
    navDebounce = true;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.getElementById(page).classList.add('active-page');
    if (page === 'learner') renderUnits();
    if (page === 'home') renderHome();
    setTimeout(() => navDebounce = false, 300);
}

// ====================== INIT ======================
function init() {
    // Check for existing session via API (not localStorage)
    // This will trigger auth state or require login
    updateAuthUI();
    renderHome();
    renderUnits();
}

window.navigateTo = navigateTo;
window.startUnitQuiz = startUnitQuiz;
window.selectAnswer = selectAnswer;
window.prevQuestion = prevQuestion;
window.nextQuestion = nextQuestion;
window.closeQuiz = closeQuiz;
window.showLoginModal = showLoginModal;
window.logout = logout;
window.closeModal = closeModal;
window.toggleMobileMenu = toggleMobileMenu;
window.toggleAuthMode = toggleAuthMode;
window.handleSignup = handleSignup;
window.handleLogin = handleLogin;

init();
</script>
</body>
</html>
