services:
  - type: web
    name: mei-drive-africa-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
  
  - type: static
    name: mei-drive-africa-frontend
    runtime: static
    publish: public
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
